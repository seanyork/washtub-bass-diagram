/* ── CoF + picker overlays ── */
/* ══ CoF wheel positioning — DO NOT CHANGE ══════════════════════════
   cof-wrap MUST stay at left:0 bottom:0 (device left edge, behind left-rail).
   play-zone and play-drawer are at left:56px (right of left-rail).
   These two systems are SEPARATE. Never merge cof-wrap into play-zone.
   The left-rail (z-index:15) intentionally sits on top of the CoF wheel. */
#cof-wrap{position:absolute;left:0;bottom:0;width:170px;height:170px;z-index:14;pointer-events:auto;}
#cof-canvas{display:block;cursor:grab;}
#cof-canvas.spinning{cursor:grabbing;}
/* ── Play zone: play-btn-row only, sits above CoF ── */
/* IMPORTANT: left:56px keeps this right of the left rail.
   CoF wheel (cof-wrap) stays at left:0 — do not merge these. */
#play-zone{position:absolute;left:56px;bottom:170px;z-index:14;width:130px;display:none;flex-direction:column;}
@media(prefers-color-scheme:dark){#play-zone{background:#1e1e1e;}}
/* ── Play drawer: slides up above play row, scrollable, capped at top of canvas ── */
/* Play drawer — top:50px keeps it below the tone strip; bottom:238px keeps it above play-btn-row (170 CoF + 22 toggle + 46 go). Scrollable within this bounded area. */
#play-drawer{position:absolute;left:56px;bottom:238px;top:50px;z-index:14;width:130px;display:none;overflow-y:auto;background:#fff;border:0.5px solid rgba(83,58,183,0.2);border-bottom:none;border-radius:8px 8px 0 0;flex-direction:column;}
@media(prefers-color-scheme:dark){#play-drawer{background:#1e1e1e;}}
#play-drawer::-webkit-scrollbar{width:3px;}
#play-drawer::-webkit-scrollbar-thumb{background:rgba(128,128,128,0.25);border-radius:2px;}
/* play drawer section structure */
.pd-sec{display:flex;flex-direction:column;gap:3px;padding:6px 6px 4px;}
.pd-sec+.pd-sec{border-top:0.5px solid rgba(128,128,128,0.12);}
.pd-lbl{font-size:7px;font-weight:700;letter-spacing:0.07em;text-transform:uppercase;color:#888;text-align:center;margin-top:2px;}
@media(prefers-color-scheme:dark){.pd-lbl{color:#666;}}
.pd-row{display:flex;gap:3px;}
.pd-vr{width:0.5px;background:rgba(128,128,128,0.2);flex-shrink:0;align-self:stretch;}
.pd-col-lbls{display:flex;margin-top:2px;}
.pd-col-lbl{flex:1;min-width:0;text-align:center;font-size:7px;font-weight:700;letter-spacing:0.05em;text-transform:uppercase;color:#888;}

/* buttons — flex:1 min-width:0 on BOTH button and gap ensures equal column widths */
.pd-btn{flex:1;min-width:0;height:26px;font-size:10px;font-weight:600;border:0.5px solid rgba(128,128,128,0.25);border-radius:4px;background:var(--inkey-fill,#fff);color:var(--color-text-primary,#1a1a1a);display:flex;align-items:center;justify-content:center;white-space:nowrap;cursor:pointer;}
.pd-btn.on{background:#533AB7;color:#fff;border-color:#533AB7;}
@media(prefers-color-scheme:dark){.pd-btn{background:#2a2a2a;color:#ddd;}.pd-btn.on{background:#533AB7;color:#fff;border-color:#533AB7;}}
/* dim entire section when not applicable */
.pd-dim{opacity:0.18;pointer-events:none;}
/* Voice label style cycle button */
.pd-style-btn{width:100%;height:26px;font-size:9px;font-weight:600;border:0.5px solid rgba(83,58,183,0.35);border-radius:4px;background:#EEEDFE;color:#533AB7;display:flex;align-items:center;justify-content:center;gap:5px;cursor:pointer;white-space:nowrap;}
@media(prefers-color-scheme:dark){.pd-style-btn{background:rgba(83,58,183,0.2);color:#AFA9EC;border-color:rgba(83,58,183,0.4);}}
/* play row */
/* play-btn-row: toggle strip on top (full width, 22px), go button below (full width, 46px) */
#play-btn-row{display:flex;flex-direction:column;border-top:0.5px solid rgba(83,58,183,0.15);flex-shrink:0;}
#play-go-btn{width:100%;height:46px;background:radial-gradient(ellipse at 50% 50%,#fff 0%,#C8EDD9 100%);border:none;cursor:pointer;display:flex;align-items:center;gap:8px;padding:0 10px;}

#scale-picker{position:absolute;left:44px;top:50px;z-index:50;background:#fff;border:0.5px solid rgba(128,128,128,0.25);border-radius:10px;box-shadow:0 4px 24px rgba(0,0,0,0.14);padding:4px 0;min-width:160px;display:none;}
@media(prefers-color-scheme:dark){#scale-picker{background:#2a2a2a;}}
#scale-picker.visible{display:block;}
.sp-item{padding:5px 12px;font-size:13px;cursor:pointer;color:#1a1a1a;text-align:left;}
.sp-item:hover{background:rgba(83,58,183,0.07);}
.sp-item.on{color:#533AB7;font-weight:700;background:rgba(83,58,183,0.05);}
.sp-item-name{font-size:13px;font-weight:500;line-height:1.4;}
.sp-item-degs{display:flex;gap:0;margin-top:2px;}
.sp-item-degs span{display:inline-block;min-width:20px;font-size:10px;font-weight:600;color:#533AB7;text-align:center;}
.sp-item.on .sp-item-degs span{color:#7B63D4;}
.sp-item-notes{display:flex;gap:0;}
.sp-item-notes span{display:inline-block;min-width:20px;font-size:10px;font-weight:500;color:#888;text-align:center;}
.sp-sep{height:0.5px;background:rgba(128,128,128,0.2);margin:3px 0;}
@media(prefers-color-scheme:dark){.sp-item{color:#e0e0e0;}.sp-item-notes span{color:#666;}}
#home-picker{position:absolute;left:44px;top:100px;z-index:50;background:#fff;border:0.5px solid rgba(128,128,128,0.25);border-radius:8px;box-shadow:0 4px 20px rgba(0,0,0,0.12);padding:4px;display:none;flex-direction:column;gap:1px;min-width:56px;}
@media(prefers-color-scheme:dark){#home-picker{background:#2a2a2a;}}
#home-picker.visible{display:flex;}
.hp-item{padding:5px 12px;font-size:19px;cursor:pointer;color:#1a1a1a;border-radius:4px;text-align:center;}
.hp-item:hover{background:rgba(83,58,183,0.07);}
.hp-item.on{color:#533AB7;font-weight:700;background:rgba(83,58,183,0.06);}
@media(prefers-color-scheme:dark){.hp-item{color:#e0e0e0;}}
/* ── README panel ── */
#readme-panel{display:none;position:absolute;left:0;right:0;bottom:76px;z-index:20;background:#fff;border-top:0.5px solid rgba(128,128,128,0.2);box-shadow:0 -4px 20px rgba(0,0,0,0.08);flex-direction:column;max-height:70vh;}

#readme-panel.visible{display:flex;}
#readme-panel-header{display:flex;align-items:center;padding:8px 12px;border-bottom:0.5px solid rgba(128,128,128,0.15);gap:8px;flex-shrink:0;}
#readme-panel-title{font-size:12px;font-weight:600;color:#533AB7;flex:1;}
#readme-panel-close{font-size:16px;color:#aaa;cursor:pointer;padding:0 4px;line-height:1;}
#readme-panel-body{flex:1;overflow-y:auto;padding:14px 16px;font-size:13px;line-height:1.6;color:#1a1a1a;touch-action:pan-y;}

#readme-panel-body h2{font-size:15px;font-weight:700;color:#533AB7;margin:16px 0 6px;border-bottom:0.5px solid rgba(83,58,183,0.2);padding-bottom:4px;}
#readme-panel-body h3{font-size:13px;font-weight:600;color:#1a1a1a;margin:12px 0 4px;}

#readme-panel-body p{margin:0 0 8px;}
#readme-panel-body ul{margin:4px 0 8px;padding-left:18px;}

#readme-panel-body hr{border:none;border-top:0.5px solid rgba(128,128,128,0.2);margin:12px 0;}
#readme-panel-body strong{font-weight:600;}
#readme-panel-body em{font-style:italic;color:#888;}
.br-readme-btn{display:flex;flex-direction:column;align-items:center;justify-content:center;gap:2px;width:48px;height:48px;border:0.5px solid rgba(128,128,128,0.25);border-radius:6px;background:#fff;cursor:pointer;flex-shrink:0;}

.br-readme-btn:active{background:rgba(83,58,183,0.08);border-color:#533AB7;}
.br-readme-btn-lbl{font-size:7px;color:#888;text-transform:uppercase;letter-spacing:0.04em;}

@keyframes vizFadeOut {
  0%   { opacity: 1; }
  100% { opacity: 0; }
}

<body>
<div id="dev-banner" style="display:none;"></div>


<!-- ════════════════════════════════════════════════════════════════
     LEGACY CONTROLS — hidden from view, preserved for JS compatibility
     All element IDs that existing JS references by getElementById()
     or querySelectorAll() live here. Steps 3–12 wire new visible UI
     elements to call the same functions / update the same state.
     Do NOT remove or rename any element ID in this section.
     ════════════════════════════════════════════════════════════════ -->
<div id="legacy-controls" style="display:none;" aria-hidden="true">
  <!-- waveform -->
  <button id="wav-sine" onclick="setWaveform('sine',this)"></button>
  <button id="wav-warm" onclick="setWaveform('warm',this)"></button>
  <button class="on" id="wav-string" onclick="setWaveform('string',this)"></button>
  <!-- duration + volume -->
  <input type="range" id="dur-sl" min="0.2" max="4" step="0.1" value="0.5" oninput="syncSlider('dur',this.value)">
  <input id="dur-ro" value="0.5 s" onchange="syncReadout('dur',this.value)">
  <input type="range" id="vol-sl" min="0" max="100" step="1" value="65" oninput="syncSlider('vol',this.value)">
  <input id="vol-ro" value="65%" onchange="syncReadout('vol',this.value)">
  <!-- key grid — JS builds kbtn children here -->
  <div id="key-grid"></div>
  <!-- mode buttons -->
  <button class="tog on mode-btn" onclick="setMode('ionian',this)">1 Ionian</button>
  <button class="tog mode-btn" onclick="setMode('dorian',this)">2 Dorian</button>
  <button class="tog mode-btn" onclick="setMode('phrygian',this)">3 Phrygian</button>
  <button class="tog mode-btn" onclick="setMode('lydian',this)">4 Lydian</button>
  <button class="tog mode-btn" onclick="setMode('mixolydian',this)">5 Mixolydian</button>
  <button class="tog mode-btn" onclick="setMode('aeolian',this)">6 Aeolian</button>
  <button class="tog mode-btn" onclick="setMode('locrian',this)">7 Locrian</button>
  <button class="tog mode-btn" onclick="setMode('harmonic_minor',this)">harmonic minor</button>
  <button class="tog mode-btn" onclick="setMode('melodic_minor',this)">melodic minor</button>
  <!-- tune buttons -->
  <button id="tune-btn" onclick="tuneToKey()">Tune to G</button>
  <button id="tune-btn2" onclick="tuneToKey()">Tune String to G Ionian</button>
  <!-- scale spelling chip -->
  <div id="scale-spelling"></div>
  <!-- node view (hidden — new BR nav buttons call setNodeView passing these) -->
  <button class="tog on" id="view-full" onclick="setNodeView('full',this)">full string</button>
  <button class="tog" id="view-nut" onclick="setNodeView('nut',this)">nut height</button>
  <button class="tog" id="view-capo" onclick="setNodeView('capo',this)">capo</button>
  <!-- nut clusters -->
  <div id="nut-preset-cluster">
    <input id="nut-pre-0" value='6.0"' onchange="setNutPreset(0,this.value)">
    <input id="nut-pre-1" value='12.0"' onchange="setNutPreset(1,this.value)">
    <input id="nut-pre-2" value='19.0"' onchange="setNutPreset(2,this.value)">
    <input id="nut-offset-ro" value='0.0"' readonly>
    <input id="nut-speaking-ro" value='69.0"' readonly>
  </div>
  <!-- capo cluster -->
  <div id="capo-cluster">
    <div id="capo-snap-btns"></div>
    <input id="capo-upper-ro" value="—" readonly>
    <input id="capo-lower-ro" value="—" readonly>
  </div>
  <!-- home node -->
  <button class="tog on" id="hn-fund" onclick="setHomeNodeUI(1)">fundamental</button>
  <button class="tog" id="hn-fifth" onclick="setHomeNodeUI(5)">5th node</button>
  <select id="hn-select" onchange="setHomeNodeFromSelect(this.value)">
    <option value="1" selected>1st</option><option value="2">2nd</option>
    <option value="3">3rd</option><option value="4">4th</option>
    <option value="5">5th</option><option value="6">6th</option>
    <option value="7">7th</option>
  </select>
  <!-- physics sliders (canonical state holders) -->
  <input type="range" id="len-sl" min="24" max="200" step="0.5" value="69" oninput="syncSlider('len',this.value)">
  <input id="len-ro" value='69.0"' onchange="syncReadout('len',this.value)">
  <button class="tog on" id="unit-in" onclick="setUnits('in',this)">in</button>
  <button class="tog" id="unit-cm" onclick="setUnits('cm',this)">cm</button>
  <input type="range" id="ten-sl" min="5" max="150" step="1" value="50" oninput="syncSlider('ten',this.value)">
  <input id="ten-ro" value="5.0 lbs" onchange="syncReadout('ten',this.value)">
  <input type="range" id="mu-sl" min="1" max="100" step="1" value="52" oninput="syncSlider('mu',this.value)">
  <input id="mu-ro" value="0.000754" onchange="syncReadout('mu',this.value)">
  <!-- my bass defaults -->
  <input id="def-len" value='69.0"'>
  <input id="def-ten" value="5.0 lbs">
  <input id="def-mu" value="0.000754">
  <!-- status elements (still updated by updateStatus()) -->

  <span id="st-tension">—</span><span id="st-root">G</span>
  <span id="st-scale">G Ionian</span>
  <span id="st-scale-degs">—</span><span id="st-scale-notes">—</span>
  <!-- tone strip rows (still written by showStrip/clearStrip — redirected in Step 4) -->

    <div class="strip-label">current tone</div>
    <div class="strip-main" id="tone-row1">
      <span class="strip-idle">hover or touch a node</span>
    </div>
    <div id="tone-row2"></div>
  </div>
  <!-- zoom label (written by applyT()) — moved to left rail in Step 3, kept here as fallback) -->
</div>

<!-- ════ v4 APP SHELL ════════════════════════════════════════════ -->
<div id="app-shell">

  <!-- DEV banner spacer — collapsed (banner hidden) -->

  <!-- top tone strip -->
  <div id="new-tone-strip">
    <div id="nts-left">
      <div id="nts-scale">G Ionian</div>
      <div id="nts-num" class="nts-spell"></div>
      <div id="nts-let" class="nts-spell"></div>
    </div>
    <div id="nts-right">
      <span class="nts-idle">hover or touch a node</span>
    </div>
  </div>

  <!-- app body: left rail + diagram + ruler -->
  <div id="app-body">

    <!-- left rail -->
    <div id="left-rail">
      <!-- column-reverse: FIRST child = visual BOTTOM, LAST child = visual TOP -->
      <!-- DOM order: auto-tune · tune · ks-chip · home · sep · zoom · sep · tension · fund -->

      <!-- auto-tune button: visual bottom -->
      <div id="lr-autotune-btn" onclick="toggleAutoTune()" title="Auto-tune on key/mode change"
        style="width:46px;height:32px;background:rgba(128,128,128,0.07);border:0.5px solid rgba(128,128,128,0.3);border-radius:6px;display:flex;flex-direction:column;align-items:center;justify-content:center;cursor:pointer;flex-shrink:0;gap:0;">
        <span style="font-size:7px;font-weight:700;letter-spacing:0.06em;color:#888;line-height:1.3;">AUTO</span>
        <span style="font-size:7px;font-weight:700;letter-spacing:0.06em;color:#888;line-height:1.3;">TUNE</span>
      </div>

      <!-- tune button: T3 icon (offset waves + arrow) -->
      <div id="lr-tune-btn" onclick="tuneToKey()" title="Tune to key">
        <svg width="38" height="22" viewBox="0 0 38 22" xmlns="http://www.w3.org/2000/svg">
          <!-- arrow across top -->
          <line x1="3" y1="3" x2="34" y2="3" stroke="#533AB7" stroke-width="1.4" stroke-linecap="round" opacity="0.8"/>
          <polyline points="30,1 34,3 30,5" fill="none" stroke="#533AB7" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round" opacity="0.8"/>
          <!-- solid wave -->
          <path d="M1 19 C4 19 5 11 8 11 C11 11 12 19 15 19 C18 19 19 11 22 11 C25 11 26 19 29 19 C32 19 33 11 36 11"
                fill="none" stroke="#533AB7" stroke-width="1.8" stroke-linecap="round"/>
          <!-- dashed wave shifted left — out of phase -->
          <path d="M-3 9 C0 9 1 1 4 1 C7 1 8 9 11 9 C14 9 15 1 18 1 C21 1 22 9 25 9 C28 9 29 1 32 1"
                fill="none" stroke="#533AB7" stroke-width="1.4" stroke-linecap="round"
                stroke-dasharray="3 2" opacity="0.55"/>
        </svg>
      </div>

      <!-- combined key + scale chip -->
      <div id="chip-keyscale" class="lr-ks-chip" onclick="toggleCoF()">
        <div class="lr-ks-key" id="chip-key-val">G</div>
        <div class="lr-ks-mode" id="chip-scale-val">ION</div>
      </div>

      <!-- home chip: icon + number -->
      <div id="chip-home" class="lr-chip" onclick="openHomePicker()">
        <!-- home chip icon — colors must match HOME_COL / HOME_COL_LIGHT constants -->

<script>
// Diagnostic error display — shows JS errors in the UI instead of crashing
(function(){
  const _errs=[];
  function _showErr(msg){
    _errs.push(msg);
    let el=document.getElementById('_dbg');
    if(!el){
      el=document.createElement('div');
      el.id='_dbg';
      el.style.cssText='position:fixed;top:0;left:0;right:0;background:#c00;color:#fff;font-size:11px;padding:6px 8px;z-index:99999;white-space:pre-wrap;max-height:120px;overflow:auto;font-family:monospace;';
      // Try body first, fall back to documentElement
      (document.body||document.documentElement).appendChild(el);
    }
    el.textContent=_errs.slice(-5).join('\n');
    console.error('[washtub]', msg); // also log to devtools console
  }
  window.onerror=function(msg,src,line,col,err){
    _showErr('L'+line+': '+((err&&err.message)||msg));
    return false; // do NOT suppress — let it propagate to devtools console
  };
  window.addEventListener('unhandledrejection',function(e){
    _showErr('Promise: '+(e.reason&&(e.reason.message||e.reason)||'unknown'));
    // do not preventDefault — let it show in console
  });
  // Expose for manual calls
  window._dbgErr=_showErr;
})();

// Iframe detection — true when running inside any iframe (Claude artifact renderer,
// embedded page, etc.). Cross-origin access to window.top throws SecurityError → true.
const _isIframe=(()=>{ try{ return window.self!==window.top; } catch(e){ return true; } })();
// Touch-primary device detection — true on phones/tablets, false on desktop.
const _isCoarsePointer=!!(window.matchMedia&&window.matchMedia('(pointer:coarse)').matches);
// Disable fan overlay only in desktop iframes — mobile iframes (Claude mobile app) work fine.
// Desktop Claude renderer crashes on layout reads (clientWidth) even in rAF.
const _disableFanOverlay=_isIframe&&!_isCoarsePointer;

// ══════════════════════════════════════════════════════════════════════════════
// ⚠️  PHYSICS & MUSIC THEORY CORE — DO NOT MODIFY DURING UI REDESIGN (v4.x)
// ══════════════════════════════════════════════════════════════════════════════
// The following functions are FROZEN for all Steps 1–16 of the v4 UI redesign.
// They contain all frequency physics, just intonation math, music theory logic,
// audio engine code, and node rendering logic. UI wiring steps must CALL these
// functions, never rewrite them.
//
// FROZEN FUNCTIONS:
//   tensionToFreq()       — core frequency formula f=(1/2L)√(T/μ)
//   fundFreq()            — fundamental frequency from current physics state
//   effectiveSpeakingLength() — accounts for nut height offset
//   diatonicPitchClasses()   — pitch class set for current key+mode
//   scaleInfo()           — degree labels + note names for current scale
//   freqToMidi()          — frequency → MIDI note number
//   noteInfo()            — MIDI → note name, octave, cents, snapped flag
//   chromDeg()            — chromatic degree label relative to home key
//   isInKey()             — is a MIDI note diatonic to current key+mode?
//   setMode()             — change mode/scale, trigger render
//   playTone()            — Web Audio tone synthesis
//   stopActive()          — stop currently playing tone (mono mode)
//   getCtx()              — get/create AudioContext
//   tuneToKey()           — calculate tension to tune home node to key root
//   remapDegree()         — remap node ratio to degree relative to home node
//   isTonalCenter()       — is this node the home node?
//   homeNodeRatio()       — JI ratio for current home node degree
//   setHomeNode()         — change home node, sync UI, trigger render
//   resolveColor()        — node color logic (in-key, chromatic, home, unsnapped)
//   render()              — full diagram redraw (calls all dynamic draw functions)
//   updateNutMarker()     — nut height layer SVG update
//   updateCapoLayer()     — capo SVG layer update
//   capoYpx()             — capo Y position in SVG pixels
//   capoUpperIn/LowerIn/UpperFreq/LowerFreq() — capo segment math
//   setCapoNode()         — select capo snap interval
//   playCapoBoth()        — play both capo segments
//   syncSlider()          — slider → value → readout → render
//   syncReadout()         — readout → value → slider → render
//   tenSlToVal/tenValToSl/muSlToVal/muValToSl() — slider scale conversions
//   resetDefaults()       — restore hardwired default values
//   applyDefaults()       — copy default fields → physics state → render
//   useCurrentSettings()  — copy live physics → default fields
//   setNutPreset/saveNutPreset/applyNutPreset/applyNutOffset() — nut preset logic
//   buildCapoSnapBtns()   — build capo snap button DOM
//   updateScaleSpelling() — update #scale-spelling chip
//   updateTuneBtn()       — update tune button label
//   updateStatus()        — update status chips
//   mk()                  — SVG element factory
//   fontSize()            — dynamic font size based on node spacing
//   gcdFn/complementFrac()— fraction math for ruler labels
//   showStrip/clearStrip/showStripBoth/stripVoiceHTML() — tone strip (Step 4)
//   hideHoldPanel()       — clear hold panel SVG group
//
// FROZEN CONSTANTS & DATA:

// ── fitH — proper horizontal pan ─────────────────────────────────
// Keeps current sc. Pans tx so the string column sits at ~35% from
// the effective left edge of usable canvas space.
// When the play drawer is open it occupies PLAY_DRAWER_W px from the
// canvas left — the string must clear that boundary so labels aren't
// hidden underneath it. When the ruler+sidebar are open their width
// is already reflected in canvas.clientWidth (they are flex siblings).
function fitH(){
  const cw=canvas.clientWidth;
  // Effective left boundary: play drawer width if open, else 0
  const leftOffset=(_playPanelOpen&&cofVisible)?PLAY_DRAWER_W:0;
  const availW=cw-leftOffset;
  // Target: string at 35% of available width, offset by drawer
  tx=leftOffset + availW*0.35 - 480*sc;
  clamp();
  applyT();
}

// ── fitV — fit full string height vertically ──────────────────────
function fitV(){
  sc=canvas.clientHeight/1440;
  tx=0; ty=0;
  smartPan();
  applyT();
}

// ── fitVPlay — v-fit with tight horizontal label centering ────────
// Used when play zone is open: v-fit sc keeps full string visible,
// tx is chosen to center the label span [SDEG_X, NOTE_X+55] in the
// available viewport so note names don't clip behind the drawer or right edge.
function fitVPlay(){
  sc=canvas.clientHeight/1440;
  ty=0;
  const cw=canvas.clientWidth;
  const leftOffset=(_playPanelOpen&&cofVisible)?PLAY_DRAWER_W:0;
  const availW=cw-leftOffset;
  const labelMid=(SDEG_X+(NOTE_X+55))/2;
  tx=leftOffset+availW/2-labelMid*sc;
  const lEdge=tx+SDEG_X*sc;
  if(lEdge<leftOffset+4) tx+=leftOffset+4-lEdge;
  const rEdge=tx+(NOTE_X+55)*sc;
  if(rEdge>cw-4) tx-=rEdge-(cw-4);
  clamp();
  applyT();
}

// ── _warmAudioCtx — silent primer to wake up audio pipeline ───────
// Prevents first-note delay on iOS by initialising the hardware pipeline
// before the user presses play. Call when play zone becomes visible.
function _warmAudioCtx(){
  try{
    const ctx=getCtx();
    if(!ctx) return; // audio disabled in this context (e.g. iframe renderer)
    if(ctx.state==='suspended'){ ctx.resume().catch(()=>{}); }
    const s=ctx.createOscillator();
    const g=ctx.createGain();
    g.gain.setValueAtTime(0,ctx.currentTime);
    s.connect(g); g.connect(ctx.destination);
    s.start(ctx.currentTime);
    s.stop(ctx.currentTime+0.06);
  }catch(e){}
}

const svgNS_v4='http://www.w3.org/2000/svg';

// ── Fraction complement helper ────────────────────────────────────
function compFrac(fs){
  const p=fs.split('/'); if(p.length!==2) return '';
  const n=parseInt(p[0]),d=parseInt(p[1]),cn=d-n;
  const g=(a,b)=>b===0?a:g(b,a%b);
  const gg=g(cn,d); return `${cn/gg}/${d/gg}`;
}

// ── Interval name from just-intonation ratio ──────────────────────
function intervalName(ratio){
  let r=ratio;
  if(!r||!isFinite(r)||r<=0) return '?';
  let _i=0; while(r>=2&&_i++<60) r/=2;
  _i=0;     while(r<1 &&_i++<60) r*=2;
  const table=[
    [1,'P1'],[9/8,'M2'],[5/4,'M3'],[4/3,'P4'],
    [3/2,'P5'],[5/3,'M6'],[15/8,'M7'],[2,'P8']
  ];
  let best='?',bestD=Infinity;
  table.forEach(([v,name])=>{const d=Math.abs(r-v);if(d<bestD){bestD=d;best=name;}});
  return best;
}

// Compound-interval version for cross-capo spans.
// Normalizes to [1,4) to preserve octave context: M9, P12, etc.
function intervalNameCompound(ratio){
  let r=ratio;
  if(!r||!isFinite(r)||r<=0) return '?';
  let _i=0; while(r>=4&&_i++<60) r/=2;
  _i=0;     while(r<1 &&_i++<60) r*=2;
  const table=[
    [1,'P1'],[9/8,'M2'],[5/4,'M3'],[4/3,'P4'],
    [3/2,'P5'],[5/3,'M6'],[15/8,'M7'],
    [2,'P8'],[9/4,'M9'],[5/2,'M10'],[8/3,'P11'],
    [3,'P12'],[10/3,'M13'],[15/4,'M14'],[4,'P15']
  ];
  let best='?',bestD=Infinity;
  table.forEach(([v,name])=>{const d=Math.abs(r-v);if(d<bestD){bestD=d;best=name;}});
  return best;
}

// Returns segment-local home node {frac, freq} for a capo segment.
// In capo mode, tonal-center sub-nodes live at compressed positions
// within each segment — these differ from the full-string TC positions.
function getCapoSegHomeFracsWithFreq(seg, cf){
  const result=[];
  const segFund=seg==='lower' ? fundFreq()/cf : fundFreq()/(1-cf);
  // Segment "nut": capo position for lower, main nut for upper — ratio=1 (segment fundamental)
  if(isTonalCenter(1)) result.push({frac:seg==='lower'?cf:1.0, freq:segFund, ratio:1});
  NODES.forEach(n=>{
    if(isTonalCenter(n.ratio)){
      const hf=seg==='lower' ? n.frac*cf : cf+n.frac*(1-cf);
      result.push({frac:hf, freq:segFund*n.ratio, ratio:n.ratio});
    }
  });
  return result.sort((a,b)=>a.frac-b.frac);
}

// Returns ALL string positions across both segments where the key root (tonal center)
// appears in any octave — for the full-string ruler perspective in capo mode.
// Lower segment TC freq = lSegFund * homeNodeRatio(). A node belongs here if its
// frequency is an octave-equivalent of that pitch.
function getFullStringHomeFracsWithFreq(segCf){
  const phi=1-segCf;
  const hnR=homeNodeRatio();
  const lSegFund=fundFreq()/segCf;
  const uSegFund=fundFreq()/phi;
  const result=[];

  function isOct(r){
    if(!r||!isFinite(r)||r<=0) return false;
    let _i=0; while(r>=2&&_i++<60) r/=2;
    _i=0;     while(r<1 &&_i++<60) r*=2;
    return Math.abs(r-1)<0.006;
  }

  // Lower segment nut (frac=segCf): freq=lSegFund. isOct(lSegFund / (lSegFund*hnR)) = isOct(1/hnR)
  if(isOct(1/hnR)) result.push({frac:segCf, freq:lSegFund, ratio:1});
  // Lower segment nodes
  NODES.forEach(n=>{
    if(isOct(n.ratio/hnR))
      result.push({frac:n.frac*segCf, freq:lSegFund*n.ratio, ratio:1});
  });

  // Upper segment nut (frac=1.0): freq=uSegFund. ratio rel to TC: uSegFund/(lSegFund*hnR)=segCf/(phi*hnR)
  if(isOct(segCf/(phi*hnR))) result.push({frac:1.0, freq:uSegFund, ratio:1});
  // Upper segment nodes: freq=uSegFund*n.ratio. ratio rel to TC: n.ratio*segCf/(phi*hnR)
  NODES.forEach(n=>{
    if(isOct(n.ratio*segCf/(phi*hnR)))
      result.push({frac:segCf+n.frac*phi, freq:uSegFund*n.ratio, ratio:1});
  });

  return result.sort((a,b)=>a.frac-b.frac);
}
function getHomeNodeFracs(){
  const fracs=[];
  if(isTonalCenter(1)) fracs.push(1.0); // nut = frac=1 in the coordinate system
  NODES.forEach(n=>{if(isTonalCenter(n.ratio)) fracs.push(n.frac);});
  return fracs.sort((a,b)=>a-b);
}

// ── Full ruler SVG redraw ─────────────────────────────────────────
// Fan overlay — draws fan lines + shade polygon in #fan-overlay.
// Uses clientWidth/clientHeight instead of getBoundingClientRect to avoid
// forced synchronous layout reflows which crash sandboxed iframes.
// Layout is known from CSS: rrail=42px, sidebar=72px, both fixed.
const _drawFanOverlay = (withinFs, crossFs, activeFrac, isSeg_, segType_, otherSegCol_) => {
  const fo=document.getElementById('fan-overlay');
  if(!fo) return;
  fo.innerHTML='';
  if(sidebarCollapsed) return;
  const abody=document.getElementById('app-body');
  const cv=document.getElementById('canvas-wrap');
  const rr=document.getElementById('rrail');
  if(!abody||!cv||!rr) return;
  // clientWidth/clientHeight — avoids forced layout reflow unlike getBoundingClientRect
  // Layout: left-rail (56px) | canvas-wrap (flex:1) | rrail (42px) | sidebar (72px)
  const lr=document.getElementById('left-rail');
  const lrW=lr?lr.clientWidth:56;
  const rrW=rr.clientWidth||42;
  const rrH=rr.clientHeight||300;
  const cvW=cv.clientWidth||(abody.clientWidth-lrW-rrW-72);
  // In the overlay (inset:0 inside app-body):
  // left-rail at x=0, canvas-wrap at x=lrW, rrail at x=lrW+cvW
  const _CX=lrW+cvW+rrW/2;
  const _TOP=66, _BOT=54, _MINI_H=rrH-_TOP-_BOT;
  const _miniY=f=>(_MINI_H+_TOP)-f*_MINI_H;
  const strPt=f=>({x:lrW+tx+SX*sc, y:ty+nY(f)*sc});
  const rulPt=f=>({x:_CX,          y:_miniY(f)});
  const mk_=(tag,attrs)=>{
    const el=document.createElementNS('http://www.w3.org/2000/svg',tag);
    Object.entries(attrs).forEach(([k,v])=>el.setAttribute(k,v));
    return el;
  };
  // Shade polygon between nearest home nodes
  if(activeFrac!==null && withinFs.length>=2){
    const above=withinFs.filter(f=>f>activeFrac);
    const below=withinFs.filter(f=>f<activeFrac);
    const nearAbove=above.length?Math.min(...above):null;
    const nearBelow=below.length?Math.max(...below):null;
    if(nearAbove!==null && nearBelow!==null){
      const sa=strPt(nearAbove), sb=strPt(nearBelow);
      const ra=rulPt(nearAbove), rb=rulPt(nearBelow);
      fo.appendChild(mk_('polygon',{
        points:`${sa.x.toFixed(1)},${sa.y.toFixed(1)} ${sb.x.toFixed(1)},${sb.y.toFixed(1)} ${rb.x.toFixed(1)},${rb.y.toFixed(1)} ${ra.x.toFixed(1)},${ra.y.toFixed(1)}`,
        fill:'rgba(83,58,183,0.06)','pointer-events':'none'
      }));
    }
  }
  // Active node fan line
  if(activeFrac!==null){
    const fanCol=isSeg_?(segType_==='lower'?SUB_COL_LOWER:SUB_COL_UPPER):'#533AB7';
    const sp=strPt(activeFrac), rp=rulPt(activeFrac);
    fo.appendChild(mk_('line',{
      x1:rp.x.toFixed(1),y1:rp.y.toFixed(1),x2:sp.x.toFixed(1),y2:sp.y.toFixed(1),
      stroke:fanCol,'stroke-width':1,'stroke-dasharray':'4 3',opacity:0.5
    }));
  }
  // Home node fan lines
  withinFs.forEach(hf=>{
    const sp=strPt(hf), rp=rulPt(hf);
    fo.appendChild(mk_('line',{
      x1:rp.x.toFixed(1),y1:rp.y.toFixed(1),x2:sp.x.toFixed(1),y2:sp.y.toFixed(1),
      stroke:HOME_COL,'stroke-width':1,'stroke-dasharray':'3 4',opacity:0.4
    }));
  });
  crossFs.forEach(hf=>{
    if(!otherSegCol_) return;
    const sp=strPt(hf), rp=rulPt(hf);
    fo.appendChild(mk_('line',{
      x1:rp.x.toFixed(1),y1:rp.y.toFixed(1),x2:sp.x.toFixed(1),y2:sp.y.toFixed(1),
      stroke:otherSegCol_,'stroke-width':1,'stroke-dasharray':'3 4',opacity:0.3
    }));
  });
};

let sidebarCollapsed = false;
function toggleSidebar(){
  sidebarCollapsed = !sidebarCollapsed;
  const rr = document.getElementById('rrail');
  const sb = document.getElementById('sidebar');
  const btn = document.getElementById('sb-toggle');
  rr.style.display = sidebarCollapsed ? 'none' : '';
  sb.classList.toggle('collapsed', sidebarCollapsed);
  btn.textContent = sidebarCollapsed ? '\u2039  RULER' : 'RULER  \u203a';
  btn.classList.toggle('collapsed', sidebarCollapsed);
  document.getElementById('fan-overlay').innerHTML = '';
  clamp(); applyT();
  if(!sidebarCollapsed && _activeNode) drawRulerSVG(_activeNode);
}

function drawRulerSVG(node){
  try{
  if(sidebarCollapsed) return;
  const rrail=document.getElementById('rrail');
  const svg=document.getElementById('rr-svg');
  if(!rrail||!svg) return;
  const W=rrail.clientWidth||42, H=rrail.clientHeight||300;
  const CX=W/2;
  const TOP_INSET=66, BOT_INSET=54;
  const MINI_TOP=TOP_INSET, MINI_BOT=H-BOT_INSET, MINI_H=MINI_BOT-MINI_TOP;
  const frac=node?node.frac:null;

  // In nut view: frac=1.0 naturally maps to the effective nut (nY(1.0)=nutEffY()),
  // and miniY(1.0)=MINI_TOP, so no coordinate remapping is needed.
  // Only the label changes to reflect the effective nut.
  const nutViewActive = nodeView==='nut' && nutOffsetInches>0;
  const nutLabel = nutViewActive ? 'eff. nut' : 'nut';
  const miniY=f=>MINI_BOT-f*MINI_H; // frac=1=top, frac=0=bottom — correct in all modes

  // Viewport indicator geometry
  const diagH=canvas.clientHeight||1;
  const totalSvgH=1440*sc;
  const scrollable=Math.max(0,totalSvgH-diagH);
  const visH=Math.max(6,Math.min(MINI_H,MINI_H*diagH/totalSvgH));
  const scrollFrac=scrollable>0?Math.min(1,Math.max(0,-ty/scrollable)):0;
  const vpTop=MINI_TOP+scrollFrac*(MINI_H-visH);

  let html='';
  let bgHtml=''; // background layer — rendered first (behind everything)

  // Home fracs — correct in all modes with standard fracs (frac=1.0 = eff. nut in nut view)
  const homeFracs=getHomeNodeFracs();

  // Capo segment state — hoisted early so shade block and capo tick can both reference it
  const isSeg=(node&&node.segment);
  const segCf=isSeg?node.cf:null;
  const segType=isSeg?node.segment:null;

  // Segment-aware home node data.
  // SEGMENT perspective (default): each segment has its own home nodes.
  // FULL-STRING perspective: one set of home nodes across the whole string.
  // The useFullString flag gates the full-string path; segment path is untouched.
  const useFullString = isSeg && capoRulerPerspective==='fullstring';
  const otherSegType = segType==='lower'?'upper':'lower';
  const otherSegCol  = (!useFullString && isSeg) ? (segType==='lower' ? SUB_COL_UPPER : SUB_COL_LOWER) : null;

  let withinHomeData, crossHomeData, withinFracs, crossFracs;
  if(useFullString){
    // Full-string: find every position on string where key root appears, all labeled '1'
    withinHomeData = getFullStringHomeFracsWithFreq(segCf);
    crossHomeData = [];
    withinFracs = withinHomeData.map(d=>d.frac);
    crossFracs  = [];
  } else {
    // Segment perspective (existing logic — fully guarded)
    withinHomeData = isSeg
      ? getCapoSegHomeFracsWithFreq(segType, segCf)
      : homeFracs.map(hf=>({frac:hf,
          freq:hf>=0.999?fundFreq():(NODES.find(n=>Math.abs(n.frac-hf)<0.001)||{ratio:2}).ratio*fundFreq(),
          ratio:hf>=0.999?1:(NODES.find(n=>Math.abs(n.frac-hf)<0.001)||{ratio:2}).ratio}));
    crossHomeData = isSeg ? getCapoSegHomeFracsWithFreq(otherSegType, segCf) : [];
    withinFracs = withinHomeData.map(d=>d.frac);
    crossFracs  = crossHomeData.map(d=>d.frac);
  }

  // Draw fan lines + shade only when pinned and not in a desktop iframe.
  // Mobile iframes work fine; desktop Claude renderer crashes on layout reads.
  if(_pinnedFrac!==null && !_disableFanOverlay){
    requestAnimationFrame(()=>{
      try{
        _drawFanOverlay(withinFracs, crossFracs, frac, isSeg, segType,
          (!useFullString && isSeg) ? otherSegCol : null);
      }catch(e){}
    });
  } else {
    const fo=document.getElementById('fan-overlay'); if(fo) fo.innerHTML='';
  }

  // Viewport indicator
  html+=`<rect x="${(CX-8).toFixed(1)}" y="${vpTop.toFixed(1)}" width="16" height="${visH.toFixed(1)}"
    rx="3" fill="rgba(83,58,183,0.07)" stroke="rgba(83,58,183,0.18)" stroke-width="0.5"/>`;

  // Ministring
  html+=`<line x1="${CX}" y1="${MINI_TOP}" x2="${CX}" y2="${MINI_BOT}"
    stroke="rgba(128,128,128,0.3)" stroke-width="2" stroke-linecap="round"/>`;
  html+=`<line x1="${CX-5}" y1="${MINI_TOP}" x2="${CX+5}" y2="${MINI_TOP}"
    stroke="rgba(128,128,128,0.4)" stroke-width="1.5"/>`;
  html+=`<line x1="${CX-5}" y1="${MINI_BOT}" x2="${CX+5}" y2="${MINI_BOT}"
    stroke="rgba(128,128,128,0.4)" stroke-width="1.5"/>`;
  if(isSeg && segCf!==null){
    const capoY=miniY(segCf).toFixed(1);
    html+=`<line x1="${(CX-9).toFixed(1)}" y1="${capoY}" x2="${(CX+9).toFixed(1)}" y2="${capoY}"
      stroke="#C8821A" stroke-width="2" stroke-linecap="round"/>`;
    html+=`<text x="${(CX+11).toFixed(1)}" y="${(parseFloat(capoY)+3).toFixed(1)}"
      font-size="7" fill="#C8821A" opacity="0.85">capo</text>`;
  }
  // Home node icons — always full-string perspective (no segment filtering)
  // Full string perspective: always use miniY for dot and home icons
  const activeMiniY=miniY;
  const dotFrac=frac; // pseudoNode.frac is already a main-string frac
  // Home icons — colored by segment in segment mode, all purple in full-string mode
  const _segIconColor = (!useFullString && isSeg) ? (segType==='lower' ? SUB_COL_LOWER : SUB_COL_UPPER) : HOME_COL;
  const _segIconFill  = (!useFullString && isSeg) ? (segType==='lower' ? 'rgba(29,122,107,0.15)' : 'rgba(122,58,29,0.12)') : HOME_COL_LIGHT;
  const _crossIconFill= (!useFullString && isSeg) ? (segType==='lower' ? 'rgba(122,58,29,0.12)' : 'rgba(29,122,107,0.15)') : HOME_COL_LIGHT;
  const _homeIconEls=[];
  [
    ...withinHomeData.map(d=>({...d, iconColor:_segIconColor,  iconFill:_segIconFill})),
    ...crossHomeData.map( d=>({...d, iconColor:otherSegCol||HOME_COL, iconFill:_crossIconFill}))
  ].forEach(({frac:hf, freq:_hFreq, iconColor, iconFill})=>{
    const hy=parseFloat(miniY(hf).toFixed(1));
    const mkS2=(tag,attrs)=>{
      const el=document.createElementNS('http://www.w3.org/2000/svg',tag);
      Object.entries(attrs).forEach(([k,v])=>el.setAttribute(k,v));
      return el;
    };
    const hit=mkS2('circle',{cx:CX,cy:hy,r:12,fill:'transparent',style:'cursor:pointer;pointer-events:all;'});
    hit.addEventListener('click',e=>{try{e.stopPropagation();playTone(_hFreq);_origShowStrip_step5(_hFreq,hf,'1',iconColor);}catch(e){}});
    hit.addEventListener('touchstart',e=>{try{e.stopPropagation();playTone(_hFreq);_origShowStrip_step5(_hFreq,hf,'1',iconColor);}catch(e){}},{passive:true});
    _homeIconEls.push(
      mkS2('circle',{cx:CX,cy:hy,r:7,fill:'none',stroke:iconColor,'stroke-width':1.4,opacity:0.4}),
      mkS2('circle',{cx:CX,cy:hy,r:4,fill:iconFill,stroke:iconColor,'stroke-width':1.4}),
      mkS2('circle',{cx:CX,cy:hy,r:1.8,fill:iconColor}),
      hit
    );
  });

  // Spans + interval labels + dot
  let upperFrac=null, lowerFrac=null; // hoisted so direction arrows block can reference
  if(frac!==null){
    const dy=activeMiniY(dotFrac);
    const upperHomes=withinFracs.filter(f=>f>dotFrac);
    const lowerHomes=withinFracs.filter(f=>f<dotFrac);
    upperFrac=upperHomes.length?Math.min(...upperHomes):null;
    lowerFrac=lowerHomes.length?Math.max(...lowerHomes):null;

    // Full-string: interval = node's freq / lower-seg TC freq (normalized to [1,∞))
    // This correctly handles cross-segment spans where segments have different fundamentals.
    const tcFreq = (fundFreq()/segCf) * homeNodeRatio(); // lower seg TC freq = reference "1"
    const nodeRatioForInterval=(useFullString&&isSeg&&node)
      ?(node.freq || (segType==='lower'?fundFreq()/segCf:fundFreq()/(1-segCf))*node.ratio) / tcFreq
      :(node?node.ratio:1);
    // Cross-capo: home frac belongs to other segment — use compound interval
    const isCrossCapo=hf=>useFullString&&isSeg&&segCf!==null
      &&(segType==='lower'?hf>segCf+0.001:hf<segCf-0.001);

    // Pass 1: all lines
    if(upperFrac!==null){
      const uy=activeMiniY(upperFrac);
      const crossUp=isCrossCapo(upperFrac);
      html+=`<line x1="${CX}" y1="${uy.toFixed(1)}" x2="${CX}" y2="${dy.toFixed(1)}"
        stroke="${HOME_COL}" stroke-width="3" stroke-linecap="round"${crossUp?' stroke-dasharray="5 3"':''}/>`;
    }
    if(lowerFrac!==null){
      const ly=activeMiniY(lowerFrac);
      const crossLo=isCrossCapo(lowerFrac);
      html+=`<line x1="${CX}" y1="${dy.toFixed(1)}" x2="${CX}" y2="${ly.toFixed(1)}"
        stroke="${HOME_COL}" stroke-width="3" stroke-linecap="round"${crossLo?' stroke-dasharray="5 3"':''}/>`;
    }
    if(crossFracs.length>0&&otherSegCol){
      crossFracs.forEach(hf=>{
        const cy=activeMiniY(hf);
        html+=`<line x1="${CX}" y1="${dy.toFixed(1)}" x2="${CX}" y2="${cy.toFixed(1)}"
          stroke="${otherSegCol}" stroke-width="3" stroke-linecap="round" opacity="0.55"/>`;
      });
    }

    // Pass 2: interval labels on top
    if(upperFrac!==null){
      const uy=activeMiniY(upperFrac);
      const uHomeEntry=withinHomeData.find(d=>Math.abs(d.frac-upperFrac)<0.002);
      const uHomeRatio=uHomeEntry?uHomeEntry.ratio:1;
      const crossUp=isCrossCapo(upperFrac);
      // Full-string mode: always use nodeRatioForInterval + compound name (cross or same-side)
      // Segment mode: use node.ratio + simple name (unchanged)
      const itvl=useFullString
        ?intervalNameCompound(nodeRatioForInterval/uHomeRatio)
        :intervalName(node.ratio/uHomeRatio);
      const lblY=uy-12;
      const lblW=crossUp?26:20;
      html+=`<rect x="${(CX-lblW/2).toFixed(1)}" y="${lblY-10}" width="${lblW}" height="13" rx="2" fill="rgba(255,255,255,0.95)"/>`;
      html+=`<text x="${CX}" y="${lblY}" text-anchor="middle" font-size="${crossUp?9:12}" font-weight="800" fill="${HOME_COL}">${itvl}</text>`;
    }
    if(lowerFrac!==null){
      const ly=activeMiniY(lowerFrac);
      const lHomeEntry=withinHomeData.find(d=>Math.abs(d.frac-lowerFrac)<0.002);
      const lHomeRatio=lHomeEntry?lHomeEntry.ratio:2;
      const crossLo=isCrossCapo(lowerFrac);
      const itvl=useFullString
        ?intervalNameCompound(lHomeRatio/nodeRatioForInterval)
        :intervalName(lHomeRatio/node.ratio);
      const lblW=crossLo?26:20;
      html+=`<rect x="${(CX-lblW/2).toFixed(1)}" y="${ly+10}" width="${lblW}" height="13" rx="2" fill="rgba(255,255,255,0.95)"/>`;
      html+=`<text x="${CX}" y="${ly+20}" text-anchor="middle" font-size="${crossLo?9:12}" font-weight="800" fill="${HOME_COL}">${itvl}</text>`;
    }

    // Dot (color by segment) — DOM element so we can attach tap handler
    const dotCol=isSeg?(segType==='lower'?SUB_COL_LOWER:SUB_COL_UPPER):'#533AB7';
    const _dotFreq=node?(node.freq||fundFreq()*node.ratio):fundFreq();
    const _mkDot=(tag,attrs)=>{
      const el=document.createElementNS('http://www.w3.org/2000/svg',tag);
      Object.entries(attrs).forEach(([k,v])=>el.setAttribute(k,v));
      return el;
    };
    const dotEl=_mkDot('circle',{cx:CX,cy:dy.toFixed(1),r:5,fill:dotCol,stroke:'#fff','stroke-width':2});
    const dotHit=_mkDot('circle',{cx:CX,cy:dy.toFixed(1),r:12,fill:'transparent',style:'cursor:pointer;pointer-events:all;'});
    dotHit.addEventListener('click',e=>{try{
      e.stopPropagation();playTone(_dotFreq);
      if(_lastStripArgs) _origShowStrip_step5(_dotFreq,_lastStripArgs.frac,_lastStripArgs.nodeLabel,_lastStripArgs.color);
    }catch(e){}});
    dotHit.addEventListener('touchstart',e=>{try{
      e.stopPropagation();playTone(_dotFreq);
      if(_lastStripArgs) _origShowStrip_step5(_dotFreq,_lastStripArgs.frac,_lastStripArgs.nodeLabel,_lastStripArgs.color);
    }catch(e){}},{passive:true});
    _homeIconEls.push(dotEl, dotHit);

    // Full-string mode: if the pinned node is itself a key-root position, relabel strip to '1'
    if(useFullString && withinFracs.some(wf=>Math.abs(wf-frac)<0.003)){
      _origShowStrip_step5(_dotFreq, frac, '1', HOME_COL);
      if(_lastStripArgs) _lastStripArgs={frac:_lastStripArgs.frac, nodeLabel:'1', color:HOME_COL};
    }
  }

  // Top inset
  if(frac!==null){
    const upperFracStr=compFrac(node.fs);
    // Upper ratio: invert the complement fraction (e.g. "2/3" → "3:2")
    const _uf=upperFracStr.split('/');
    const upperRatioStr=_uf.length===2?`${_uf[1]}:${_uf[0]}`:'—';
    // Lower ratio: node.rs (e.g. "3:2")
    const lowerRatioStr=node.rs;
    html+=`<text x="${CX}" y="11" text-anchor="middle" font-size="7.5" fill="#aaa">${nutLabel}</text>`;
    html+=`<text x="${CX}" y="23" text-anchor="middle" font-size="9" fill="#533AB7" font-weight="700">${upperFracStr}</text>`;
    html+=`<text x="${CX}" y="35" text-anchor="middle" font-size="8" fill="#888">${upperRatioStr}</text>`;
    html+=`<text x="${CX}" y="${H-41}" text-anchor="middle" font-size="8" fill="#888">${lowerRatioStr}</text>`;
    html+=`<text x="${CX}" y="${H-29}" text-anchor="middle" font-size="9" fill="#533AB7" font-weight="700">${node.fs}</text>`;
    html+=`<text x="${CX}" y="${H-17}" text-anchor="middle" font-size="7.5" fill="#aaa">bridge</text>`;
  } else {
    html+=`<text x="${CX}" y="11" text-anchor="middle" font-size="7.5" fill="#aaa">${nutLabel}</text>`;
    html+=`<text x="${CX}" y="${H-17}" text-anchor="middle" font-size="7.5" fill="#aaa">bridge</text>`;
  }

  // Direction arrows
  if(frac!==null){
    const dotY=miniY(frac);
    const AX=CX+14;
    // Upper arrow: from just below upper interval label down to dot
    if(upperFrac!==null && dotY>MINI_TOP+20){
      const uy=activeMiniY(upperFrac);
      const lblBottom=uy-12+3; // bottom of label pill (lblY-10+height13)
      const ay1=lblBottom+3, ay2=dotY-4;
      if(ay2-ay1>8){
        html+=`<line x1="${AX}" y1="${ay1+6}" x2="${AX}" y2="${ay2}"
          stroke="rgba(128,128,128,0.35)" stroke-width="1.5" stroke-linecap="round"/>`;
        html+=`<polyline points="${AX-3},${ay1+6} ${AX},${ay1} ${AX+3},${ay1+6}"
          fill="none" stroke="rgba(128,128,128,0.35)" stroke-width="1.5" stroke-linejoin="round" stroke-linecap="round"/>`;
      }
    } else if(upperFrac===null && dotY>MINI_TOP+20){
      // No upper home node — arrow from nut area to dot
      const ay1=MINI_TOP+4, ay2=dotY-4;
      html+=`<line x1="${AX}" y1="${ay1+6}" x2="${AX}" y2="${ay2}"
        stroke="rgba(128,128,128,0.35)" stroke-width="1.5" stroke-linecap="round"/>`;
      html+=`<polyline points="${AX-3},${ay1+6} ${AX},${ay1} ${AX+3},${ay1+6}"
        fill="none" stroke="rgba(128,128,128,0.35)" stroke-width="1.5" stroke-linejoin="round" stroke-linecap="round"/>`;
    }
    // Lower arrow: from dot down to just above lower interval label
    if(lowerFrac!==null && MINI_BOT-dotY>20){
      const ly=activeMiniY(lowerFrac);
      const lblTop=ly+10; // top of label pill
      const ay1=dotY+4, ay2=lblTop-3;
      if(ay2-ay1>8){
        html+=`<line x1="${AX}" y1="${ay1}" x2="${AX}" y2="${ay2-6}"
          stroke="rgba(128,128,128,0.35)" stroke-width="1.5" stroke-linecap="round"/>`;
        html+=`<polyline points="${AX-3},${ay2-6} ${AX},${ay2} ${AX+3},${ay2-6}"
          fill="none" stroke="rgba(128,128,128,0.35)" stroke-width="1.5" stroke-linejoin="round" stroke-linecap="round"/>`;
      }
    } else if(lowerFrac===null && MINI_BOT-dotY>20){
      // No lower home node — arrow from dot to bridge area
      const ay1=dotY+4, ay2=MINI_BOT-4;
      html+=`<line x1="${AX}" y1="${ay1}" x2="${AX}" y2="${ay2-6}"
        stroke="rgba(128,128,128,0.35)" stroke-width="1.5" stroke-linecap="round"/>`;
      html+=`<polyline points="${AX-3},${ay2-6} ${AX},${ay2} ${AX+3},${ay2-6}"
        fill="none" stroke="rgba(128,128,128,0.35)" stroke-width="1.5" stroke-linejoin="round" stroke-linecap="round"/>`;
    }
  }

  svg.innerHTML=bgHtml+html;
  // Append home node icon DOM elements (need event listeners, can't be in innerHTML)
  _homeIconEls.forEach(el=>svg.appendChild(el));
  }catch(e){} // swallow any rendering errors — never crash the app
}

// ── Sidebar builder ───────────────────────────────────────────────
function showLabel(node){
  try{

  // If pinned to a different node, don't update the display
  if(_pinnedFrac!==null && Math.abs(_pinnedFrac-node.frac)>0.001) return;
  _activeFrac=node.frac; _activeNode=node;
  window._activeRatioFund=node.ratio||1;
  setRowHL(node.frac);
  drawRulerSVG(node);
  const fund=fundFreq(), esl=effectiveSpeakingLength();
  const lowerIn=fmtLen(node.frac*esl);
  const upperIn=fmtLen((1-node.frac)*esl);
  const lowerHz=Math.round(fund*node.ratio);
  const upperHz=node.frac<0.999 ? Math.round(fund/(1-node.frac)) : 0;
  const lNi=noteInfo(fund*node.ratio);
  const uNi=node.frac<0.999 ? noteInfo(fund/(1-node.frac)) : null;
  const lNote=lNi.snapped?lNi.name+lNi.octave:'—';
  const uNote=uNi&&uNi.snapped?uNi.name+uNi.octave:'—';
  const lCol=lNi.snapped&&isInKey(lNi.midi)?'#0F6E56':'#993C1D';
  const uCol=uNi&&uNi.snapped&&isInKey(uNi.midi)?'#0F6E56':'#993C1D';
  const upper=document.getElementById('sb-upper');
  const lower=document.getElementById('sb-lower');
  // Compute dot position as fraction of rrail height to align h-rule with dot
  const _rr=document.getElementById('rrail');
  const _H=_rr?(_rr.clientHeight||300):300;
  const _TOP=66, _BOT=54, _MH=_H-_TOP-_BOT;
  const _dotY=(_H-_BOT)-node.frac*_MH; // miniY with corrected formula
  const _dotFrac=_sbDotFrac(_H, _dotY);
  if(upper){
    upper.style.flex=String(_dotFrac);
    upper.innerHTML=`<div class="sb-len">${upperIn}</div><div class="sb-hz">${upperHz} Hz</div><div class="sb-note" style="color:${uCol};">${uNote}</div>`;
  }
  if(lower){
    lower.style.flex=String(1-_dotFrac);
    lower.innerHTML=`<div class="sb-note" style="color:${lCol};">${lNote}</div><div class="sb-hz">${lowerHz} Hz</div><div class="sb-len">${lowerIn}</div>`;
  }
  }catch(e){} // never crash on hover/tap
}

function hideLabel(){
  _activeFrac=null; _activeNode=null; _activeSegment=null;
  window._activeRatioFund=1; // reset tension tone to fundamental
  setRowHL(null);
  drawRulerSVG(null);
  const fo=document.getElementById('fan-overlay'); if(fo) fo.innerHTML='';
  const upper=document.getElementById('sb-upper');
  const lower=document.getElementById('sb-lower');
  if(upper){ upper.style.flex='1'; upper.innerHTML=''; }
  if(lower){ lower.style.flex='0'; lower.innerHTML=''; }
}

// Compute the flex fraction for sb-upper that aligns #sb-hrule with
// the ruler dot at _dotY (px from sidebar top). Accounts for the
// fixed-height children above (sb-toggle) and below (capo controls)
// so the h-rule always tracks the dot correctly regardless of capo mode.
function _sbDotFrac(_H, _dotY){
  const sbTog=document.getElementById('sb-toggle');
  const togH=sbTog?sbTog.clientHeight:22;
  const hruleH=0.5;
  let capoH=0;
  ['capo-root-toggle','capo-ruler-persp','capo-label-toggle'].forEach(id=>{
    const el=document.getElementById(id);
    if(el && el.classList.contains('visible')) capoH+=el.clientHeight;
  });
  const flexTotal=_H-togH-hruleH-capoH;
  const upperPx=Math.max(0,_dotY-togH-hruleH);
  return flexTotal>0?upperPx/flexTotal:0.5;
}


function updateVP(){
  try{
    if(_activeNode) drawRulerSVG(_activeNode);
    else drawRulerSVG(null);
  }catch(e){}
}

const _applyT_orig=applyT;
applyT = function(){ try{ _applyT_orig(); }catch(e){} try{ updateVP(); }catch(e){} };

// ── Hook showStrip / clearStrip ───────────────────────────────────
const _origShowStrip_step5=showStrip;
showStrip = function(freq, frac, nodeLabel, color){
  // If something is pinned, only allow updates for the pinned node itself
  if(_pinnedFrac!==null && Math.abs(_pinnedFrac-frac)>0.001) return;
  _origShowStrip_step5(freq, frac, nodeLabel, color);
  _lastStripArgs={frac, nodeLabel, color};
  // Don't activate the ruler during pan/scroll — only on intentional hover/tap
  if(_suppressHover) return;
  const node=NODES.find(n=>Math.abs(n.frac-frac)<0.001);
  if(node) showLabel(node); else hideLabel();
};

const _origClearStrip_step5=clearStrip;
clearStrip = function(){
  if(_pinnedFrac!==null) return; // don't clear while something is pinned
  _origClearStrip_step5(); hideLabel();
};

// Clear pin on structural changes (key/mode/homeNode/string length)

const _render_orig=render;
render = function(){
  _render_orig();
  if(_activeNode){
    if(_activeNode.segment){
      // Capo segment node: re-run the appropriate renderer with fresh physics
      const _cf=_activeNode.cf;
      if(_activeNode.segFrac===1.0){
        _showCapoEndNode(_activeNode.segment, _cf);
      } else if(_activeNode._origNode){
        const _pKey=_activeNode.segment==='lower'
          ?_activeNode._origNode.frac*_cf
          :_cf+_activeNode._origNode.frac*(1-_cf);
        const _diagY=TY-_activeNode.frac*SPX;
        _showSubNode(_activeNode._origNode, _activeNode.segment,
          fundFreq()*window._activeRatioFund, _cf, _diagY);
      }
    } else {
      showLabel(_activeNode);
    }
    if(_lastStripArgs){
      const freshFreq=fundFreq()*(window._activeRatioFund||1);
      _origShowStrip_step5(freshFreq, _lastStripArgs.frac, _lastStripArgs.nodeLabel, _lastStripArgs.color);
    }
  } else updateVP();
};

// ── Mini slider helper ────────────────────────────────────────────
// Creates a draggable mini slider div synced to a hidden range input.
// onchange(0–1 normalized value) is called on drag.
function makeMiniSlider(pct, onchange){
  const wrap=document.createElement('div');
  wrap.className='br-sl-track';
  const thumb=document.createElement('div');
  thumb.className='br-sl-thumb';
  thumb.style.left=(pct*100)+'%';
  wrap.appendChild(thumb);
  let dragging=false;
  wrap.addEventListener('mousedown',e=>{
    dragging=true; e.preventDefault();
    const move=ev=>{
      if(!dragging) return;
      const r=wrap.getBoundingClientRect();
      const v=Math.max(0,Math.min(1,(ev.clientX-r.left)/r.width));
      thumb.style.left=(v*100)+'%';
      onchange(v);
    };
    const up=()=>{dragging=false;window.removeEventListener('mousemove',move);window.removeEventListener('mouseup',up);};
    window.addEventListener('mousemove',move);
    window.addEventListener('mouseup',up);
  });
  return wrap;
}

function renderBRCtx(){
  const ctx=document.getElementById('br-ctx');

  ['full','nut','capo'].forEach(v=>{
    const btn=document.getElementById('br-'+v);
    if(!btn) return;
    btn.className='br-nvb'+(brNodeView===v?(v==='capo'?' br-nvb-cap-on':' br-nvb-on'):'');
  });
  // Right panel button highlights
  ['audio','phys','lgnd'].forEach(p=>{
    const btn=document.getElementById('br-'+p);
    if(btn) btn.className='br-apb'+(brRightPanel===p?' br-apb-on':'');
  });

  // If a right panel is active, it takes over all three rows
  if(brRightPanel){
    ctx.innerHTML=renderRightPanel(brRightPanel);
    setTimeout(wireAllBRSliders,0);
    return;
  }
  // Otherwise show node-view context
  ctx.innerHTML=renderNodeViewCtx(brNodeView);

}

// ── Wire duration/volume mini sliders after render ─────────────────
// ── Unified mini-slider wiring ────────────────────────────────────
// Called via setTimeout after every renderBRCtx() and renderOverflowPanel().
// Handles all three slider families: audio dur/vol, nut preset offsets,
// phys defaults length/tension/density.
function wireAllBRSliders(){

  // Generic wiring: given a track el, min, max, callback(value)
  function wireTrack(track, min, max, cb){
    if(!track || track._wired) return;
    track._wired=true;
    const thumb=track.querySelector('.br-sl-thumb');
    if(!thumb) return;
    let drag=false;
    track.addEventListener('mousedown',e=>{
      drag=true; e.preventDefault();
      const move=ev=>{
        if(!drag) return;
        const r=track.getBoundingClientRect();
        const pct=Math.max(0,Math.min(1,(ev.clientX-r.left)/r.width));
        thumb.style.left=(pct*100).toFixed(1)+'%';
        cb(min+pct*(max-min), pct);
      };
      const up=()=>{drag=false;window.removeEventListener('mousemove',move);window.removeEventListener('mouseup',up);};
      window.addEventListener('mousemove',move);
      window.addEventListener('mouseup',up);
    });
    // touch support
    track.addEventListener('touchstart',e=>{
      e.preventDefault();
      drag=true;
      const move=ev=>{
        ev.preventDefault();
        if(!drag) return;
        const r=track.getBoundingClientRect();
        const pct=Math.max(0,Math.min(1,(ev.touches[0].clientX-r.left)/r.width));
        thumb.style.left=(pct*100).toFixed(1)+'%';
        cb(min+pct*(max-min), pct);
      };
      const up=()=>{drag=false;track.removeEventListener('touchmove',move);track.removeEventListener('touchend',up);};
      track.addEventListener('touchmove',move,{passive:false});
      track.addEventListener('touchend',up,{passive:true});
    },{passive:false});
  }

  // ── Audio: dur ────────────────────────────────────────────────
  wireTrack(document.getElementById('br-dur-track'), 0.2, 4, (val)=>{
    const valEl=document.getElementById('br-dur-val');
    if(valEl) valEl.textContent=val.toFixed(1)+'s';
    syncSlider('dur', val);
  });

  // ── Audio: spacing — wired with pointer capture for reliability ──
  (function wireSpcSlider(){
    const track=document.getElementById('br-spc-track');
    if(!track||track._wired) return;
    track._wired=true;
    const SPC_MAX=1.0;
    function update(clientX){
      const r=track.getBoundingClientRect();
      if(r.width<1) return;
      const pct=Math.max(0,Math.min(1,(clientX-r.left)/r.width));
      toneSpacing=Math.max(0,Math.min(SPC_MAX,pct*SPC_MAX));
      const thumb=track.querySelector('.br-sl-thumb');
      if(thumb) thumb.style.left=(pct*100).toFixed(1)+'%';
      const val=document.getElementById('br-spc-val');
      if(val) val.textContent=toneSpacing.toFixed(2)+'s';
    }
    let _dragging=false;
    track.addEventListener('pointerdown',e=>{
      e.preventDefault();
      track.setPointerCapture(e.pointerId);
      _dragging=true;
      update(e.clientX);
    });
    track.addEventListener('pointermove',e=>{
      if(!_dragging) return;
      update(e.clientX);
    });
    track.addEventListener('pointerup',e=>{
      _dragging=false;
      track.releasePointerCapture(e.pointerId);
    });
    track.addEventListener('pointercancel',e=>{
      _dragging=false;
    });
  })();

  // ── Viz: node amp ─────────────────────────────────────────────
  (function wireNAmpSlider(){
    const track=document.getElementById('ov-namp-track');
    if(!track||track._wired) return;
    track._wired=true;
    const AMP_MIN=5, AMP_MAX=60;
    function update(clientX){
      const r=track.getBoundingClientRect();
      if(r.width<1) return;
      const pct=Math.max(0,Math.min(1,(clientX-r.left)/r.width));
      vizNodeAmp=Math.round(AMP_MIN+pct*(AMP_MAX-AMP_MIN));
      const thumb=track.querySelector('.br-sl-thumb');
      if(thumb) thumb.style.left=(pct*100).toFixed(1)+'%';
      const val=document.getElementById('ov-namp-val');
      if(val) val.textContent=vizNodeAmp.toFixed(0);
    }
    let _d=false;
    track.addEventListener('pointerdown',e=>{e.preventDefault();track.setPointerCapture(e.pointerId);_d=true;update(e.clientX);});
    track.addEventListener('pointermove',e=>{if(!_d)return;update(e.clientX);});
    track.addEventListener('pointerup',e=>{_d=false;track.releasePointerCapture(e.pointerId);});
    track.addEventListener('pointercancel',()=>{_d=false;});
  })();

  // ── Viz: node dur ─────────────────────────────────────────────
  (function wireNDurSlider(){
    const track=document.getElementById('ov-ndur-track');
    if(!track||track._wired) return;
    track._wired=true;
    const DUR_MIN=0.1, DUR_MAX=4.0;
    function update(clientX){
      const r=track.getBoundingClientRect();
      if(r.width<1) return;
      const pct=Math.max(0,Math.min(1,(clientX-r.left)/r.width));
      vizNodeDur=Math.max(DUR_MIN,Math.min(DUR_MAX,DUR_MIN+pct*(DUR_MAX-DUR_MIN)));
      const thumb=track.querySelector('.br-sl-thumb');
      if(thumb) thumb.style.left=(pct*100).toFixed(1)+'%';
      const val=document.getElementById('ov-ndur-val');
      if(val) val.textContent=vizNodeDur.toFixed(1)+'s';
    }
    let _d=false;
    track.addEventListener('pointerdown',e=>{e.preventDefault();track.setPointerCapture(e.pointerId);_d=true;update(e.clientX);});
    track.addEventListener('pointermove',e=>{if(!_d)return;update(e.clientX);});
    track.addEventListener('pointerup',e=>{_d=false;track.releasePointerCapture(e.pointerId);});
    track.addEventListener('pointercancel',()=>{_d=false;});
  })();

  // ── Viz: wave amp ─────────────────────────────────────────────
  (function wireWAmpSlider(){
    const track=document.getElementById('ov-wamp-track');
    if(!track||track._wired) return;
    track._wired=true;
    const AMP_MIN=5, AMP_MAX=60;
    function update(clientX){
      const r=track.getBoundingClientRect();
      if(r.width<1) return;
      const pct=Math.max(0,Math.min(1,(clientX-r.left)/r.width));
      vizWaveAmp=Math.round(AMP_MIN+pct*(AMP_MAX-AMP_MIN));
      const thumb=track.querySelector('.br-sl-thumb');
      if(thumb) thumb.style.left=(pct*100).toFixed(1)+'%';
      const val=document.getElementById('ov-wamp-val');
      if(val) val.textContent=vizWaveAmp.toFixed(0);
    }
    let _d=false;
    track.addEventListener('pointerdown',e=>{e.preventDefault();track.setPointerCapture(e.pointerId);_d=true;update(e.clientX);});
    track.addEventListener('pointermove',e=>{if(!_d)return;update(e.clientX);});
    track.addEventListener('pointerup',e=>{_d=false;track.releasePointerCapture(e.pointerId);});
    track.addEventListener('pointercancel',()=>{_d=false;});
  })();

  // ── Viz: wave dur ─────────────────────────────────────────────
  (function wireWDurSlider(){
    const track=document.getElementById('ov-wdur-track');
    if(!track||track._wired) return;
    track._wired=true;
    const DUR_MIN=0.1, DUR_MAX=4.0;
    function update(clientX){
      const r=track.getBoundingClientRect();
      if(r.width<1) return;
      const pct=Math.max(0,Math.min(1,(clientX-r.left)/r.width));
      vizWaveDur=Math.max(DUR_MIN,Math.min(DUR_MAX,DUR_MIN+pct*(DUR_MAX-DUR_MIN)));
      const thumb=track.querySelector('.br-sl-thumb');
      if(thumb) thumb.style.left=(pct*100).toFixed(1)+'%';
      const val=document.getElementById('ov-wdur-val');
      if(val) val.textContent=vizWaveDur.toFixed(1)+'s';
    }
    let _d=false;
    track.addEventListener('pointerdown',e=>{e.preventDefault();track.setPointerCapture(e.pointerId);_d=true;update(e.clientX);});
    track.addEventListener('pointermove',e=>{if(!_d)return;update(e.clientX);});
    track.addEventListener('pointerup',e=>{_d=false;track.releasePointerCapture(e.pointerId);});
    track.addEventListener('pointercancel',()=>{_d=false;});
  })();

  // ── Audio: vol ────────────────────────────────────────────────
  wireTrack(document.getElementById('br-vol-track'), 0, 100, (val)=>{
    const valEl=document.getElementById('br-vol-val');
    if(valEl) valEl.textContent=Math.round(val)+'%';
    syncSlider('vol', val);
  });

  // ── Overflow: nut preset sliders ──────────────────────────────
  [0,1,2].forEach(i=>{
    const track=document.getElementById(`ov-nut-sl-${i}`);
    wireTrack(track, 0, stringInches, (val)=>{
      nutPresets[i]=Math.max(0,Math.min(stringInches*0.85,val));
      const field=document.getElementById(`nut-pre-ov-${i}`);
      if(field) field.value=fmtLen(nutPresets[i]);
      // also sync legacy field
      const leg=document.getElementById(`nut-pre-${i}`);
      if(leg) leg.value=fmtLen(nutPresets[i]);
    });
  });

  // ── Overflow: phys defaults sliders ──────────────────────────
  wireTrack(document.getElementById('ov-len-sl'), 24, 200, (val)=>{
    const v=useInches?val.toFixed(1)+'"':(val*2.54).toFixed(1)+' cm';
    const f=document.getElementById('def-len-ov');
    if(f){f.value=v; document.getElementById('def-len').value=v;}
  });
  wireTrack(document.getElementById('ov-ten-sl'), 1, 15, (val)=>{
    const v=val.toFixed(1)+' lbs';
    const f=document.getElementById('def-ten-ov');
    if(f){f.value=v; document.getElementById('def-ten').value=v;}
  });
  // density: log scale — handled by IIFE below, no wireTrack call here
  // mu uses log scale — re-wire manually
  (()=>{
    const track=document.getElementById('ov-mu-sl');
    if(!track || track._wired) return;
    track._wired=true;
    const thumb=track.querySelector('.br-sl-thumb');
    if(!thumb) return;
    let drag=false;
    const doMove=(clientX)=>{
      const r=track.getBoundingClientRect();
      const pct=Math.max(0,Math.min(1,(clientX-r.left)/r.width));
      const val=0.0001*Math.pow(0.005/0.0001,pct);
      thumb.style.left=(pct*100).toFixed(1)+'%';
      const v=val.toFixed(6);
      const f=document.getElementById('def-mu-ov');
      if(f){f.value=v; document.getElementById('def-mu').value=v;}
    };
    track.addEventListener('mousedown',e=>{
      drag=true; e.preventDefault();
      const move=ev=>{if(drag) doMove(ev.clientX);};
      const up=()=>{drag=false;window.removeEventListener('mousemove',move);window.removeEventListener('mouseup',up);};
      window.addEventListener('mousemove',move);
      window.addEventListener('mouseup',up);
    });
    track.addEventListener('touchstart',e=>{
      e.preventDefault();
      const move=ev=>{ev.preventDefault();doMove(ev.touches[0].clientX);};
      const up=()=>{track.removeEventListener('touchmove',move);track.removeEventListener('touchend',up);};
      track.addEventListener('touchmove',move,{passive:false});
      track.addEventListener('touchend',up,{passive:true});
    },{passive:false});
  })();
}

// Drawer width used for tx shift on open/close.
// MUST match #play-drawer width in CSS (130px).
const PLAY_DRAWER_W = 130;

// State
let playSeq       = 'chord';  // 'chord' | 'scale-1oct' | 'scale-full'
let playVoices    = 'triad';  // legacy — kept for compat
let playInversion = 0;        // 0=root 1=1st 2=2nd 3=3rd
let playChordStyle = 'arpeg'; // 'arpeg'|'block'
// Independent voice toggles — true = include this voice in chord
let playVoiceSet = {1:true, 3:true, 5:true, 7:false, 9:false, 11:false, 13:false};
// Voice label style: 'interval'|'degree'|'symbol'
let playLabelStyle = 'degree';

// Degree index for each chord voice (within 7-note scale)
const VOICE_DEG_IDX = {1:0, 3:2, 5:4, 7:6, 9:1, 11:3, 13:5};
// Symbol notation map keyed by interval name
const VOICE_LABEL_SYMBOL = {
  'P1':'1','m2':'\u266d9','M2':'9','m3':'\u22123','M3':'3',
  'P4':'11','A4':'\u266f11','P5':'5','d5':'\u22125',
  'm6':'\u266d13','M6':'13','m7':'\u22127','M7':'\u03947'
};

// Compute quality-aware label for a chord voice in current mode
function _voiceLabel(voice){
  const steps = MODE_SCALES[currentMode];
  const semi=[0]; let acc=0;
  for(let i=0;i<6;i++){ acc+=steps[i]; semi.push(acc); }
  const idx = VOICE_DEG_IDX[voice];
  if(idx===undefined) return String(voice);
  // Compound voices (9/11/13) need an octave shift for correct compound labels
  const octShift = [9,11,13].includes(voice) ? 12 : 0;
  const st = semi[idx%7] + Math.floor(idx/7)*12 + octShift;
  const intervalMap={0:'P1',1:'m2',2:'M2',3:'m3',4:'M3',5:'P4',6:'A4',
    7:'P5',8:'m6',9:'M6',10:'m7',11:'M7'};
  const itvl = intervalMap[st%12]||String(st);
  if(playLabelStyle==='interval') return itvl;
  if(playLabelStyle==='symbol') return VOICE_LABEL_SYMBOL[itvl]||itvl;
  // degree
  // Degree style: use compound names for extensions above octave (9/11/13)
  // Compound voices: derive label from actual st vs expected natural position
  if(st>=12){
    // Expected semitone for natural (major/perfect) compound interval
    const naturalSt={9:14,11:17,13:21}[voice];
    if(naturalSt!==undefined){
      const diff=st-naturalSt;
      const prefix=diff<0?'\u266d'.repeat(-diff):diff>0?'\u266f'.repeat(diff):'';
      return prefix+voice;
    }
    return String(voice);
  }
  const degMap={0:'1',1:'\u266d2',2:'2',3:'\u266d3',4:'3',5:'4',6:'\u266f4',
    7:'5',8:'\u266d6',9:'6',10:'\u266d7',11:'7'};
  return degMap[st%12]||String(st);
}

function _styleExample(){
  return _voiceLabel(3)+' \xb7 '+_voiceLabel(5);
}

function cycleVoiceLabelStyle(){
  const order=['interval','degree','symbol'];
  playLabelStyle=order[(order.indexOf(playLabelStyle)+1)%3];

function _syncVoiceBtnLabels(){
  // Update ALL voice buttons with current label style + mode quality
  const btnMap={13:'pdv-13th',11:'pdv-11th',9:'pdv-9th',7:'pdv-7th',5:'pdv-5',3:'pdv-3',1:'pdv-1'};
  Object.entries(btnMap).forEach(([v,id])=>{
    const b=document.getElementById(id);
    if(b) b.textContent=_voiceLabel(parseInt(v));
  });
  const ex=document.getElementById('pd-style-example');
  if(ex) ex.textContent=_styleExample();
}

// ── Dimming ────────────────────────────────────────────────────────
function _updatePlayDimming(){
  const isChord = playSeq === 'chord';
  const isBlock = isChord && playChordStyle === 'block';
  // Only voices/inversion dims — based on whether scale mode is active
  const cv = document.getElementById('pd-chord-voices');
  if(cv) cv.classList.toggle('pd-dim', !isChord);

// ── Play button label ───────────────────────────────────────────────
function _playLabel(){
  const rootNote = NOTES[homeKey];
  const modeName = MODE_NAMES[currentMode];
  if(playSeq==='scale-1oct') return rootNote+' '+modeName;
  if(playSeq==='scale-full') return rootNote+' '+modeName+' (full)';
  // chord — auto-derive quality and extension from active voice set + mode
  const steps = MODE_SCALES[currentMode];
  const semi=[0]; let acc=0;
  for(let i=0;i<6;i++){ acc+=steps[i]; semi.push(acc); }
  const has=playVoiceSet;
  const third=semi[2]; // 3rd degree semitones
  const fifth=semi[4];
  let quality='';
  if(has[3]){
    if(third===3 && fifth===6) quality='dim';
    else if(third===3) quality='m';
    else if(third===4 && fifth===8) quality='aug';
    // else major — no suffix
  } else if(!has[3] && has[5]){
    quality='5'; // power chord
  }
  // Extension suffix — derive from voice set + mode intervals
  const s7=semi[6]; // semitones to 7th
  let ext='';
  if(has[7]&&!has[9]&&!has[11]&&!has[13])
    ext=s7===11?' maj7':' 7';
  else if(has[7]&&has[9]&&!has[11]&&!has[13])
    ext=s7===11?' maj9':' 9';
  else if(has[7]&&has[9]&&has[11]&&!has[13])
    ext=s7===11?' maj11':' 11';
  else if(has[7]&&has[9]&&has[11]&&has[13])
    ext=s7===11?' maj13':' 13';
  else if(!has[7]&&has[9]) ext=' add9';
  else if(!has[7]&&has[11]) ext=' add11';
  else if(!has[7]&&has[13]) ext=' add13';
  // No suffix needed for basic triad (1,3,5 only)
  return rootNote+quality+ext;
}

function _playSubLabel(){
  if(playSeq==='chord'){
    const invNames=['root pos','1st inv','2nd inv','3rd inv'];
    return playChordStyle==='block'

}

// ── Capo playback segment selection ──────────────────────────────
function _playCapoSegment(){
  const cn=CAPO_NODES[capoNodeIdx];
  const cf=1-cn.phi;
  // Priority 1: labels mode forces a segment
  if(capoSubLabelMode==='lower') return 'lower';
  if(capoSubLabelMode==='upper') return 'upper';
  // Priority 2: last touched segment
  if(_lastCapoSegment) return _lastCapoSegment;
  // Priority 3: segment whose fundamental is closest to home key root (any octave)
  const lFreq=capoLowerFreq(), uFreq=capoUpperFreq();
  const rootHz=REF_HZ*Math.pow(2,(homeKey+60-REF_MIDI)/12);
  function octDist(f,r){ let ratio=f/r; while(ratio>2)ratio/=2; while(ratio<0.5)ratio*=2; return Math.abs(1-ratio); }
  return octDist(lFreq,rootHz)<=octDist(uFreq,rootHz)?'lower':'upper';
}

// Find sub-node matching a frequency within the given capo segment
function _nodeForFreqCapo(freq, seg){
  const cn=CAPO_NODES[capoNodeIdx];
  const cf=1-cn.phi;
  const fund=fundFreq();
  const segFund=seg==='lower'?fund/cf:fund/(1-cf);
  let best=null, bestD=Infinity;
  NODES.forEach(n=>{
    const nFreq=n.ratio*segFund;
    const d=Math.abs(nFreq-freq);
    if(d<bestD){bestD=d;best=n;}
  });
  // Also check segment fundamental
  const dFund=Math.abs(segFund-freq);
  if(dFund<bestD) return {ratio:1,frac:seg==='lower'?cf:1-cf,harm:1,primary:true,_isFund:true,_seg:seg};
  return bestD/Math.max(freq,1)<0.02?{...best,_seg:seg}:null;
}

// Trigger viz and row highlight for a capo sub-node frequency
function _vizForFreqCapo(freq, seg){
  const cn=CAPO_NODES[capoNodeIdx];
  const cf=1-cn.phi;
  const node=_nodeForFreqCapo(freq,seg);
  if(!node) return;
  const col=seg==='lower'?SUB_COL_LOWER:SUB_COL_UPPER;
  if(node._isFund){
    const capoY=capoYpx();
    const segs=seg==='lower'
      ?[{topY:capoY,botY:TY,frac:1.0,harm:1,color:col}]
      :[{topY:nutEffY(),botY:capoY,frac:1.0,harm:1,color:col}];
    triggerCapoViz(capoY,col,segs);
    return;
  }
  const fullFrac=seg==='lower'?node.frac*cf:cf+node.frac*(1-cf);
  const svgY=TY-fullFrac*SPX;
  const segs=seg==='lower'
    ?[{topY:capoYpx(),botY:TY,frac:node.frac,harm:node.harm,color:col}]
    :[{topY:nutEffY(),botY:capoYpx(),frac:node.frac,harm:node.harm,color:col}];
  triggerCapoViz(svgY,col,segs);
}


// Find the key root frequency among a list of {freq} objects (node set).
// Searches all octaves of the key root — returns the matching freq if found
// within 2% tolerance, otherwise falls back to fallbackFreq.
function _findKeyRootFreq(nodeList, fallbackFreq){
  const rootHz=REF_HZ*Math.pow(2,(homeKey+60-REF_MIDI)/12);
  // Try all octaves from -4 to +4 (low first so fundamental found before midpoint)
  for(let oct=-4;oct<=4;oct++){
    const target=rootHz*Math.pow(2,oct);
    for(const n of nodeList){
      const f=typeof n==='object'?n.freq:n;
      if(Math.abs(f/target-1)<0.02) return f;
    }
  }
  // No matching node found (string detuned away from key).
  // Find the lowest octave of the ET key root that falls within the string's
  // playable range [fund, fund*4] — a root that would be on the string if tuned.
  const fund=fundFreq();
  const lo=fund*0.99, hi=fund*4.01;
  for(let oct=-4;oct<=4;oct++){
    const target=rootHz*Math.pow(2,oct);
    if(target>=lo && target<=hi) return target; // lowest feasible root on the string
  }
  // Nothing in range — return nearest octave above fundamental as last resort
  let t=rootHz;
  while(t<fund) t*=2;
  return t;
}

function buildPlayFreqs(){
  const fund = fundFreq();
  const hnRatio = homeNodeRatio();

  // ── Capo view: build from the chosen segment ─────────────────────
  if(nodeView==='capo'){
    const seg=_playCapoSegment();
    const cn=CAPO_NODES[capoNodeIdx];
    const cf=1-cn.phi;
    const segFund=seg==='lower'?fund/cf:fund/(1-cf);
    // Locate key root among segment node frequencies
    const _segNodes=NODES.map(n=>({freq:n.ratio*segFund}));
    _segNodes.push({freq:segFund});
    const rootFreq=_findKeyRootFreq(_segNodes, segFund*hnRatio);

    if(playSeq==='chord'){
      const steps=MODE_SCALES[currentMode];
      const semi=[0]; let acc=0;
      for(let i=0;i<6;i++){acc+=steps[i];semi.push(acc);}
      const voiceList=[1,3,5,7,9,11,13];
      const octShiftAt=[9,11,13];
      let freqs=voiceList.filter(v=>playVoiceSet[v]).map(v=>{
        const idx=VOICE_DEG_IDX[v];
        const st=semi[idx%7]+Math.floor(idx/7)*12+(octShiftAt.includes(v)?12:0);
        return rootFreq*Math.pow(2,st/12);
      });
      for(let inv=0;inv<playInversion;inv++) if(freqs.length>1) freqs.push(freqs.shift()*2);
      return freqs.map(f=>({freq:f,_seg:seg}));
    }

    // Scale sequences: all NODES within the segment
    const allNodes=[{freq:segFund,frac:seg==='lower'?cf:1-cf,harm:1,_seg:seg,_isFund:true}];
    NODES.forEach(n=>{
      allNodes.push({freq:n.ratio*segFund,frac:n.frac,harm:n.harm,_seg:seg,_node:n});
    });
    if(playSeq==='scale-full') return allNodes.sort((a,b)=>a.freq-b.freq);
    // 1-oct: scale steps from root
    const steps=MODE_SCALES[currentMode];
    const freqObjs=[{freq:rootFreq,_seg:seg}];
    let f=rootFreq;
    steps.forEach(st=>{f*=Math.pow(2,st/12);freqObjs.push({freq:f,_seg:seg});});
    return freqObjs;
  }

  // Locate key root among current node frequencies
  const _allNodeFreqs=getPlayableNodes();
  const rootFreq = _findKeyRootFreq(_allNodeFreqs, fund*hnRatio);

  if(playSeq==='chord'){
    const steps = MODE_SCALES[currentMode];
    const semi=[0]; let acc=0;
    for(let i=0;i<6;i++){ acc+=steps[i]; semi.push(acc); }
    // Voice order: 1,3,5,7,9,11,13 — include only those toggled on in playVoiceSet
    const voiceList=[1,3,5,7,9,11,13];
    const octShiftAt=[9,11,13]; // these go up an octave (conventional voicing)
    let freqs=voiceList.filter(v=>playVoiceSet[v]).map(v=>{
      const idx=VOICE_DEG_IDX[v];
      const st=semi[idx%7]+Math.floor(idx/7)*12+(octShiftAt.includes(v)?12:0);
      return rootFreq*Math.pow(2,st/12);
    });
    // Apply inversion: rotate lowest note(s) up an octave
    for(let inv=0;inv<playInversion;inv++) if(freqs.length>1) freqs.push(freqs.shift()*2);
    return freqs;
  }

  const steps = MODE_SCALES[currentMode];
  if(playSeq==='scale-full'){
    // Step ET scale from rootFreq upward until we've covered the full string range.
    // Each step plays audio; highlight/viz only fire if a snapped diatonic node matches.
    // This guarantees the scale starts on the key root regardless of string tuning.
    const maxFreq = fund * Math.max(...NODES.map(n=>n.ratio)); // stop at highest node
    const freqObjs = [];
    // rootFreq is already the lowest feasible key root in [fund, fund*4] via _findKeyRootFreq
    let f = rootFreq;
    // Step upward through scale until we exceed the string's range
    let stepIdx = 0;
    while(f <= maxFreq){
      freqObjs.push({freq:f, frac:null});
      f *= Math.pow(2, steps[stepIdx % 7] / 12);
      stepIdx++;
      if(stepIdx > 100) break; // safety cap
    }
    return freqObjs;
  }
  // scale-1oct: 8 notes (root + 7 steps)
  const freqObjs=[{freq:rootFreq,frac:null}];
  let f=rootFreq;
  steps.forEach(st=>{ f*=Math.pow(2,st/12); freqObjs.push({freq:f,frac:null}); });
  return freqObjs;
}

function stopPlaySequence(){
  _playTimers.forEach(t=>clearTimeout(t)); _playTimers=[];
  _playActive=false;
  // Restore pinned node state
  if(_savedPinFrac!==null){
    _pinnedFrac=_savedPinFrac;
    _savedPinFrac=null;
    const restoredNode=NODES.find(n=>Math.abs(n.frac-_pinnedFrac)<0.002);
    if(restoredNode) showLabel(restoredNode);

    _savedPinFrac=null;
    hideLabel();
  }
