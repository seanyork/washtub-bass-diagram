// ── Ruler annotation ─────────────────────────────────────────────
const RX=172, RHW=10, RLX=160, RULER_COL='#533AB7', RULER_FS=11;

function gcdFn(a,b){return b===0?a:gcdFn(b,a%b);}
function complementFrac(fs){
  const p=fs.split('/');
  if(p.length!==2) return '';
  const n=parseInt(p[0]),d=parseInt(p[1]),cn=d-n,g=gcdFn(cn,d);
  return cn===0?'0':`${cn/g}/${d/g}`;
}

function showRuler(nodeY, upperIn, lowerIn, nodeFs, nodeFreq, upperFracStr, rulerColor){
  clearRuler();
  const g=document.getElementById('dyn-ruler');
  const nutY=nutEffY();
  const gap=8;
  const labelFS=36;
  const fund=fundFreq();
  const speakingIn=effectiveSpeakingLength();
  const COL=rulerColor||RULER_COL;
  const mkr=(tag,attrs)=>{
    const el=document.createElementNS('http://www.w3.org/2000/svg',tag);
    for(const[k,v]of Object.entries(attrs))el.setAttribute(k,v);
    return el;
  };
  const hash=(y,op,hw,sw)=>mkr('line',{x1:RX-hw,x2:RX+hw,y1:y,y2:y,stroke:COL,
    'stroke-width':sw||1.5,opacity:op});

  // lines: array of strings, stacked outward from node hash
  const label=(y,lines,anchor)=>{
    lines.forEach((txt,i)=>{
      if(!txt) return;
      const ly=anchor==='above'
        ? y - labelFS*0.2 - i*labelFS*1.0
        : y + labelFS*0.9 + i*labelFS*1.0;
      const el=mkr('text',{x:RLX,y:ly,'font-size':labelFS,'text-anchor':'end',
        fill:COL,'font-weight':i===0?'500':'400',opacity:i===0?1:i===1?0.65:0.45});
      el.textContent=txt; g.appendChild(el);
    });
  };

  // Top hash (nut) — light
  g.appendChild(hash(nutY,0.5,10,1.5));
  // Middle hash (node) — heavy
  g.appendChild(hash(nodeY,1.0,14,3));
  // Bottom hash (tub) — light
  g.appendChild(hash(TY,0.5,10,1.5));

  // Upper segment
  if(upperIn > 0.5 && nodeY-nutY > gap*3){
    g.appendChild(mkr('line',{x1:RX,x2:RX,y1:nutY+gap,y2:nodeY-gap,stroke:COL,
      'stroke-width':1,'marker-start':'url(#arrow)','marker-end':'url(#arrow)'}));
    const ufrac=upperFracStr||complementFrac(nodeFs);
    const upperFreq=upperIn>0 ? fund*(speakingIn/upperIn) : 0;
    const uni=upperFreq>0 ? noteInfo(upperFreq) : null;
    const uNote=uni&&uni.snapped ? uni.name+uni.octave : '';
    const uFreq=upperFreq>0 ? upperFreq.toFixed(1)+' Hz' : '';
    label(nodeY-gap-4, [fmtLen(upperIn), ufrac, uFreq, uNote], 'above');
  }

  // Lower segment
  if(TY-nodeY > gap*3){
    g.appendChild(mkr('line',{x1:RX,x2:RX,y1:nodeY+gap,y2:TY-gap,stroke:COL,
      'stroke-width':1,'marker-start':'url(#arrow)','marker-end':'url(#arrow)'}));
    const lni=nodeFreq ? noteInfo(nodeFreq) : null;
    const lNote=lni&&lni.snapped ? lni.name+lni.octave : '';
    const lFreq=nodeFreq ? nodeFreq.toFixed(1)+' Hz' : '';
    label(nodeY+gap+4, [fmtLen(lowerIn), nodeFs, lFreq, lNote], 'below');
  }
}

}

function render(){

  if(nodeView==='capo') updateCapoSubNodes();

    const cn=CAPO_NODES[capoNodeIdx];

    // Nut label for upper segment fundamental
    const nutG2=document.getElementById('dyn-nut');
    const nutYc=nutEffY(), nutFS2=26, nutInfoFS2=15, nutRowH2=nutFS2+10;
    nutG2.appendChild(mk('text',{x:SDEG_X,y:nutYc+9,'font-size':nutFS2,'font-weight':'500',
      'text-anchor':'middle',fill:SUB_COL_UPPER,opacity:0.75},'↑'));
    nutG2.appendChild(mk('text',{x:HOME_X,y:nutYc+9,'font-size':nutFS2,'font-weight':'500',
      fill:SUB_COL_UPPER},uNote));
    nutG2.appendChild(mk('text',{x:NOTE_X,y:nutYc+9,'font-size':nutInfoFS2,
      fill:SUB_COL_UPPER,opacity:0.7},Math.round(uFreq)+' Hz'));
    const nutHitC=mk('rect',{x:0,y:nutYc-nutFS2*0.65,width:SVG_W,height:nutRowH2,
      fill:'transparent',class:'row-hit'});
    nutHitC.addEventListener('mousedown',()=>{
      if(_togglePin(1.0, false)){ playTone(uFreq); _showCapoEndNode('upper',_cf); }
    });
    nutHitC.addEventListener('touchstart',()=>{
      if(_togglePin(1.0, true)){ playTone(uFreq); _showCapoEndNode('upper',_cf); }
    },{passive:true});
    nutHitC.addEventListener('touchend',()=>{ if(!_pinnedFrac) hideLabel(); },{passive:true});
    nutG2.appendChild(nutHitC);
    showRuler(capoYpx(), capoUpperIn(), capoLowerIn(), '1\u2212'+cn.phiStr, capoLowerFreq(), cn.phiStr, CAPO_COL);
    return;
  }
  const g=document.getElementById('dyn-nodes');
  const homeRingsG=document.getElementById('dyn-home-rings');
  const nutG=document.getElementById('dyn-nut');
  const fund=fundFreq();
  const speakingIn=effectiveSpeakingLength();

  // Compute dynamic node positions and font sizes
  const nodeYS=getNodeYS();
  const fSizes=nodeYS.map((_,i)=>fontSize(i,nodeYS));

  // ── NUT ROW ──
  const nutFS=30, nutInfoFS=16, nutY=73;
  const fi=noteInfo(fund);
  const nutRowH=nutFS+10;

  // ── NUT ROW — hidden in nut height mode (replaced by travelling annotation) ──
  if(nodeView!=='nut'){
    const nutIsHome=isTonalCenter(1);
    const nutHomeLabel=remapDegree(1)||'1';
    const nutColor=nutIsHome?'#533AB7':(fi.snapped?(isInKey(fi.midi)?'#0F6E56':'rgba(153,60,29,0.6)'):GRAY);
    // home ring behind nut if home node=fundamental
    if(nutIsHome){
      nutG.appendChild(mk('circle',{cx:SX,cy:NY,r:16,fill:'none',stroke:'#533AB7','stroke-width':2,opacity:0.35}));
    }
    if(showPitchBars) nutG.appendChild(mk('rect',{x:BR-barW(1),y:nutY-5,width:barW(1),height:10,rx:2,fill:nutColor,opacity:0.55}));
    // Fixed string degree — dark grey bold, left of string
    nutG.appendChild(mk('text',{x:SDEG_X,y:nutY+9,'font-size':nutFS,'font-weight':'500','text-anchor':'middle',fill:'#5F5E5A'},'1'));
    // home degree — right of string
    nutG.appendChild(mk('text',{x:HOME_X,y:nutY+9,'font-size':nutFS,'font-weight':'500',fill:nutColor},nutHomeLabel));
    if(fi.snapped){
      const kd=chromDeg(fi.midi,homeKey);
      const col=isInKey(fi.midi)?'#0F6E56':'rgba(153,60,29,0.6)';
      nutG.appendChild(mk('text',{x:KD_RX,y:nutY+9,'font-size':nutFS,'font-weight':'500','text-anchor':'end',fill:col},kd));
      nutG.appendChild(mk('text',{x:NOTE_X,y:nutY+9,'font-size':nutFS,'font-weight':'500',fill:col},fi.name+fi.octave));
    } else {
      nutG.appendChild(mk('text',{x:KD_RX,y:nutY+9,'font-size':nutInfoFS,'text-anchor':'end',fill:GRAY,opacity:0.4},'—'));
      nutG.appendChild(mk('text',{x:NOTE_X,y:nutY+9,'font-size':nutInfoFS,fill:GRAY,opacity:0.4},'—'));
    }
    if(showPitchBars){
      nutG.appendChild(mk('text',{x:INFO_X,y:nutY+9,'font-size':nutInfoFS,fill:nutColor,opacity:0.8},'1/1  ·  1:1  ·  fundamental'));
      nutG.appendChild(mk('text',{x:SEG_X,y:nutY+9,'font-size':nutInfoFS,fill:nutColor,opacity:0.65},'— | '+fmtLen(speakingIn)));
    }
    const nutHit=mk('rect',{x:0,y:nutY-nutFS*0.65,width:SVG_W,height:nutRowH,fill:'transparent',class:'row-hit'});
    const _nutNode={frac:1.0,ratio:1,fs:'1/1',rs:'1:1',desc:'fundamental',label:'1',primary:true,tonic:false};
    nutHit.addEventListener('mousedown',()=>{
      if(_togglePin(1.0, false)){ playTone(fund); showStrip(fund,1.0,nutHomeLabel,nutColor); showLabel(_nutNode); }
    });
    nutHit.addEventListener('mouseenter',()=>{
      if(_pinnedFrac!==null&&_pinnedFrac!==1.0) return;
      showStrip(fund,1.0,nutHomeLabel,nutColor); showLabel(_nutNode);
    });
    nutHit.addEventListener('mouseleave',()=>{ clearStrip(); });
    nutHit.addEventListener('touchstart',()=>{
      if(_togglePin(1.0, true)){ playTone(fund); showStrip(fund,1.0,nutHomeLabel,nutColor); showLabel(_nutNode); }
    },{passive:true});
    nutHit.addEventListener('touchend',()=>{ clearStrip(); },{passive:true});
    nutG.appendChild(nutHit);
  }

  // In nut height mode: update string length field to show effective speaking length
  // String length slider becomes bidirectional — moving it adjusts nut offset
  if(nodeView==='nut'){
    document.getElementById('len-ro').value=fmtLen(speakingIn);
    document.getElementById('len-sl').value=speakingIn;
  }

  // ── NODE ROWS ──
  NODES.forEach((node,i)=>{
    const y=nodeYS[i];
    const freq=fund*node.ratio;
    const ni=noteInfo(freq);
    const inKey=ni.snapped?isInKey(ni.midi):false;
    // home degree remapping
    const remapped=remapDegree(node.ratio);
    const isHome=isTonalCenter(node.ratio);
    const c=resolveColor(node,ni.snapped,inKey,isHome);
    const isT=isHome, isPri=node.primary&&!isHome;
    const displayLabel=remapped||node.label;
    const bw=barW(node.ratio);
    const fs=fSizes[i];
    const infoFS=Math.max(11,Math.round(fs*0.5));
    const yOff=fs*0.38;
    const rowH=fs+10;
    const lowerIn=node.frac*speakingIn;
    const upperIn=(1-node.frac)*speakingIn;

    // home ring — large unfilled ring behind everything at this node position
    if(isHome){
      homeRingsG.appendChild(mk('circle',{cx:SX,cy:y,r:16,fill:'none',stroke:'#533AB7','stroke-width':2,opacity:0.35}));
    }

    if(showPitchBars) g.appendChild(mk('rect',{x:BR-bw,y:y-(isT||isPri?7:5),width:bw,
      height:isT||isPri?14:10,rx:2,fill:c.bar,opacity:isT?0.65:isPri?0.55:0.35}));
    const hw=isT?18:isPri?14:10;
    g.appendChild(mk('line',{x1:SX-hw,x2:SX+hw,y1:y,y2:y,stroke:c.stroke,'stroke-width':isT?2.5:isPri?2:1}));
    const r=isT?10:isPri?8:5;
    const ca={cx:SX,cy:y,r,fill:isT||isPri?c.fill:'none',stroke:c.stroke,'stroke-width':isT||isPri?2:1.5};
    if(c.dash) ca['stroke-dasharray']='3 2';
    g.appendChild(mk('circle',ca));
    if(isT||isPri) g.appendChild(mk('circle',{cx:SX,cy:y,r:isT?4:3,fill:c.dot}));
    // Fixed string degree — dark grey bold, left of string
    g.appendChild(mk('text',{x:SDEG_X,y:y+yOff,'font-size':fs,'font-weight':'500','text-anchor':'middle',fill:'#5F5E5A'},node.label));
    // home degree — right of string, colored
    g.appendChild(mk('text',{x:HOME_X,y:y+yOff,'font-size':fs,'font-weight':'500',fill:c.text},displayLabel));
    if(ni.snapped){
      const kd=chromDeg(ni.midi,homeKey);
      g.appendChild(mk('text',{x:KD_RX,y:y+yOff,'font-size':fs,'font-weight':'500','text-anchor':'end',fill:c.text},kd));
      g.appendChild(mk('text',{x:NOTE_X,y:y+yOff,'font-size':fs,'font-weight':'500',fill:c.text},ni.name+ni.octave));
    } else {
      g.appendChild(mk('text',{x:KD_RX,y:y+yOff,'font-size':infoFS,'text-anchor':'end',fill:GRAY,opacity:0.3},'—'));
      g.appendChild(mk('text',{x:NOTE_X,y:y+yOff,'font-size':infoFS,fill:GRAY,opacity:0.3},'—'));
    }
    if(showPitchBars){
      g.appendChild(mk('text',{x:INFO_X,y:y+yOff,'font-size':infoFS,fill:c.text,opacity:0.8},
        `${node.fs}  ·  ${node.rs}  ·  ${node.desc}`));
      g.appendChild(mk('text',{x:SEG_X,y:y+yOff,'font-size':infoFS,fill:c.text,opacity:0.7},
        fmtLen(upperIn)+' | '+fmtLen(lowerIn)));
    }

    const hitRect=mk('rect',{x:0,y:y-rowH/2,width:SVG_W,height:rowH,fill:'transparent',class:'row-hit'});
    // Pin toggle: second tap on same node unpins; tap different node switches pin
    hitRect.addEventListener('mousedown',()=>{
      if(_togglePin(node.frac, false)){ playTone(freq); showStrip(freq,node.frac,displayLabel,c.text); }
    });
    hitRect.addEventListener('mouseenter',()=>{
      if(_pinnedFrac!==null&&_pinnedFrac!==node.frac) return; // don't override a different pin
      showStrip(freq,node.frac,displayLabel,c.text); showRuler(y,upperIn,lowerIn,node.fs,freq);
    });
    hitRect.addEventListener('mouseleave',()=>{ clearStrip(); });
    hitRect.addEventListener('touchstart',()=>{
      if(_togglePin(node.frac, true)){ playTone(freq); showStrip(freq,node.frac,displayLabel,c.text); showRuler(y,upperIn,lowerIn,node.fs,freq); }
    },{passive:true});
    hitRect.addEventListener('touchend',()=>{ clearStrip(); },{passive:true});
    g.appendChild(hitRect);
  });
}

// ── Pan / zoom ────────────────────────────────────────────────────
const canvas=document.getElementById('canvas-wrap');
const inner=document.getElementById('svg-inner');
let sc=0.38, scMn=0.2, scMx=3, tx=0, ty=0, dragging=false, dsx, dsy, dtx, dty;

function applyT(){
  if(!isFinite(sc)||sc<=0) sc=0.38; // guard against NaN/Infinity from pinch divide-by-zero
  if(!isFinite(tx)) tx=0;
  if(!isFinite(ty)) ty=0;
  inner.style.transform=`translate(${tx}px,${ty}px) scale(${sc})`;
  document.getElementById('zoom-label').textContent=Math.round(sc*100)+'%';
}
function clamp(){
  const sw=1380*sc, sh=1440*sc, ww=canvas.clientWidth, wh=canvas.clientHeight;
  tx=Math.min(0,Math.max(tx,ww-sw));
  ty=Math.min(0,Math.max(ty,wh-sh));
}

// ── smartPan: pin string horizontally, centre active node vertically ──
// SVG string x = SX=480. Target: string at 38% from canvas left.
// If a node is active, centre its SVG y in the canvas vertically.
// If no node active, preserve current vertical scroll fraction.
function smartPan(){
  const cw=canvas.clientWidth, ch=canvas.clientHeight;
  // Horizontal: pin string column
  tx=cw*0.38 - SX*sc;
  // Vertical
  if(_activeFrac!==null){
    // Node SVG y (string runs NY→TY, frac measured from TY upward)
    const nodeSvgY=TY - _activeFrac*SPX;
    // Centre in canvas
    ty=ch/2 - nodeSvgY*sc;
  }
  // else: leave ty unchanged (user may have panned)
  clamp();
}

function zoom(f){
  const oldSc=sc;
  sc=Math.min(scMx,Math.max(scMn,sc*f));
  smartPan();
  applyT();
}
function zoomTo1(){sc=1;smartPan();clamp();applyT();}
function zoomFit(){
  setTimeout(()=>{
    sc=canvas.clientHeight/1440;
    ty=0;
    smartPan(); // pins string horizontally, resets ty if no active node
    applyT();
  },0);
}

canvas.addEventListener('mousedown',e=>{
  if(e.target.classList.contains('row-hit'))return;
  dragging=true;canvas.classList.add('dragging');
  dsx=e.clientX;dsy=e.clientY;dtx=tx;dty=ty;
});
window.addEventListener('mousemove',e=>{
  if(!dragging)return;
  tx=dtx+(e.clientX-dsx);ty=dty+(e.clientY-dsy);clamp();applyT();
});
window.addEventListener('mouseup',()=>{dragging=false;canvas.classList.remove('dragging');});
canvas.addEventListener('wheel',e=>{
  e.preventDefault();
  const f=e.deltaY>0?0.85:1.18;
  sc=Math.min(scMx,Math.max(scMn,sc*f));
  smartPan();
  applyT();
},{passive:false});
// ── Canvas touch: single-finger pan + two-finger pinch zoom ──────
// Single-finger on a non-hit area pans. Two-finger pinch zooms.
let _t2StartDist=0, _t2StartSc=0, _t2StartTx=0, _t2StartTy=0, _t2MidX=0, _t2MidY=0;

function _t2Mid(e){
  return {
    x:(e.touches[0].clientX+e.touches[1].clientX)/2,
    y:(e.touches[0].clientY+e.touches[1].clientY)/2,
    dist:Math.hypot(
      e.touches[1].clientX-e.touches[0].clientX,
      e.touches[1].clientY-e.touches[0].clientY
    )
  };
}

canvas.addEventListener('touchstart',e=>{
  if(e.touches.length===2){
    // Two-finger: start pinch — cancel any single-finger pan
    dragging=false;
    const m=_t2Mid(e);
    _t2StartDist=m.dist; _t2StartSc=sc;
    _t2StartTx=tx; _t2StartTy=ty;
    _t2MidX=m.x; _t2MidY=m.y;
  } else if(e.touches.length===1&&!e.target.classList.contains('row-hit')){
    // Single-finger on non-node area: pan
    dragging=true;
    dsx=e.touches[0].clientX; dsy=e.touches[0].clientY;
    dtx=tx; dty=ty;
  }
},{passive:true});

canvas.addEventListener('touchmove',e=>{
  if(e.touches.length===2){
    const m=_t2Mid(e);
    sc=Math.min(scMx,Math.max(scMn,_t2StartSc*(m.dist/_t2StartDist)));
    smartPan();
    clamp(); applyT();
    e.preventDefault();
  } else if(dragging&&e.touches.length===1){
    tx=dtx+(e.touches[0].clientX-dsx);
    ty=dty+(e.touches[0].clientY-dsy);
    clamp(); applyT();
  }
},{passive:false});

canvas.addEventListener('touchend',e=>{
  if(e.touches.length<2){ dragging=false; }
});

// ── Overflow drag gesture ─────────────────────────────────────────
// The "more ↑" row opens the overflow on tap OR on upward swipe ≥20px.
// Works alongside the existing onclick on the row element.
(function wireOverflowDrag(){
  let _odStartY=0, _odMoved=false;
  document.getElementById('bottom-rail').addEventListener('touchstart',e=>{
    const row=e.target.closest('.br-ctx-row');
    if(!row) return;
    const lbl=row.querySelector('.br-more-lbl');

// Simple markdown → HTML converter (headers, bold, lists, tables, hr)
function mdToHtml(md){
  const lines=md.split('\n');
  let html='', inList=false, inTable=false;
  const flushList=()=>{ if(inList){html+='</ul>';inList=false;} };
  const flushTable=()=>{ if(inTable){html+='</table>';inTable=false;} };
  // Extract {#id} anchor from header text
  const hdr=(text,tag)=>{
    const m=text.match(/\{#([^}]+)\}$/);
    const id=m?` id="${m[1]}"` :'';
    const clean=m?text.slice(0,text.lastIndexOf('{#')).trim():text;
    return `<${tag}${id}>${fmt(clean)}</${tag}>`;
  };
  lines.forEach(line=>{
    if(/^### /.test(line)){flushList();flushTable();html+=hdr(line.slice(4),'h3');return;}
    if(/^## /.test(line)){flushList();flushTable();html+=hdr(line.slice(3),'h2');return;}
    if(/^# /.test(line)){flushList();flushTable();html+=hdr(line.slice(2),'h2');return;}
    if(/^\|/.test(line)){
      flushList();
      const cells=line.split('|').slice(1,-1).map(c=>c.trim());
      if(cells.every(c=>/^[-:]+$/.test(c))){return;}
      if(!inTable){html+='<table>';inTable=true;}
      const tag=cells.some(c=>c.startsWith('**'))?'th':'td';
      html+=`<tr>${cells.map(c=>`<${tag}>${fmt(c)}</${tag}>`).join('')}</tr>`;
      return;
    }
    if(/^---/.test(line)){flushList();flushTable();html+='<hr>';return;}
    if(/^- /.test(line)){
      flushTable();
      if(!inList){html+='<ul>';inList=true;}
      html+=`<li>${fmt(line.slice(2))}</li>`;return;
    }
    flushList(); flushTable();
    if(line.trim()===''){return;}
    html+=`<p>${fmt(line)}</p>`;
  });
  flushList(); flushTable();
  return html;
}
function fmt(s){
  return s
    .replace(/\*\*(.+?)\*\*/g,'<strong>$1</strong>')
    .replace(/\*(.+?)\*/g,'<em>$1</em>');
}
const README_FULL_MD=`# Washtub Bass: Music Theory, Physics, and the String Map

*A reference document covering the physics of string vibration, music theory concepts as they apply to the washtub bass, and how all of it is depicted in the interactive string map diagram. Updated to reflect v5 of the app.*

---

## Part 1: The Physics of String Vibration {#physics}

### The Fundamental Formula

A vibrating string under tension produces sound. The frequency it produces depends on three physical properties:

**f = (1 / 2L) × √(T / μ)**

Where:

- **f** is frequency in Hz (cycles per second)
- **L** is the speaking length of the string in meters
- **T** is the tension in Newtons
- **μ** (mu) is the linear density of the string in kg/m (mass per unit length)

This formula tells us something immediately useful: pitch goes up when tension increases (pull harder = higher note), and pitch goes down when the string gets longer (longer string = lower note). It also tells us that a heavier string (higher μ) produces lower pitches at the same tension and length.

Solving for tension given a target frequency: **T = (2 × L × f)² × μ**. This is what the app's Tune button uses to calculate the tension needed to bring the home node to the pitch of the selected key.

### Calibration

For this specific instrument — a 69" plastic-coated aviation cable — the calibration point is G1 (49 Hz) at approximately 5 lbs tension. Using the formula in reverse (solving for μ), we get a linear density of 0.000754 kg/m.

This value is stored as the default in the app. With it, the tension slider and left-rail display accurately predict the pitch you'll hear for any tension setting within the playable range.

### The Harmonic Series

When a string vibrates at its fundamental frequency, it also vibrates at integer multiples of that frequency simultaneously. These are called harmonics (or partials). The first harmonic is the fundamental itself, the second harmonic is twice the frequency (one octave up), the third is three times the frequency, and so on.

These harmonics arise because a string can vibrate in multiple patterns at once — as a single arch (fundamental), two arches (second harmonic), three arches (third harmonic), etc. Each pattern requires a node (a point of zero movement) at a specific position along the string.

The positions of these nodes are exactly the points depicted in the string map diagram. Touching the string gently at a node point while plucking it suppresses all harmonics except those that also have a node at that point, producing a pure, bell-like tone called a harmonic or flageolet tone. On a washtub bass, you can produce these tones by lightly touching the string at the correct position while plucking.

### Node Positions and Frequency Ratios

The node positions are simply fractions of the string length. The relationship between position and pitch is inverted: a node at 1/2 the string length produces a frequency of 2/1 (twice the fundamental, one octave up). A node at 1/3 produces 3/1, at 2/3 produces 3/2, and so on.

This inversion is because the speaking length below the node (toward the tub) determines the pitch. If the node is at the 2/3 position from the nut, the lower segment is 2/3 of the full string — and a string 2/3 as long vibrates at 3/2 times the frequency (the ratio inverts).

The diagram shows this explicitly: the fraction column (e.g. "2/3") shows the position of the node from the nut as a fraction of the full string, while the ratio column (e.g. "3:2") shows the frequency ratio of the pitch produced. These are reciprocals of each other.

### Just Intonation

The node positions in the harmonic series produce frequency ratios that are simple integer fractions. This system of tuning by exact integer ratios is called just intonation. It differs slightly from the equal temperament used in modern pianos and guitars, where every semitone is exactly the 12th root of 2 (approximately 1.0595).

Just intonation produces intervals that are physically "pure" — they do not beat (produce a warbling oscillation) when two notes are played together. The washtub bass, like other instruments that use harmonics directly, naturally produces just intonation pitches. This is one reason the instrument sounds resonant and rich when played in tune.

The diagram uses just intonation ratios throughout. The snap threshold (25 cents, where 100 cents = one semitone) determines whether a node is close enough to a named pitch to be labeled with a note name and scale degree.

---

## Part 2: Music Theory Concepts {#theory}

### Scale Degrees

Western music organizes pitches into scales. A major scale has seven distinct pitches (plus the octave, which repeats the first). Each pitch is assigned a scale degree number: 1 (the root or tonic), 2, 3, 4, 5, 6, 7, and back to 1 an octave up.

The interval pattern of a major scale (in semitones) is 2-2-1-2-2-2-1 — two whole steps, a half step, three whole steps, and a half step. This pattern is what gives each scale degree its character: the half step between degrees 3 and 4 is why the 4th feels like it wants to resolve back down, and the half step between 7 and 1 is what gives the 7th its strong pull toward the tonic.

The Nashville Number System refers to chords and melody notes by their scale degree number rather than their letter name, making it easy to transpose a song to any key. Developed in Nashville in the late 1950s by Neal Matthews Jr. of the Jordanaires, the system has spread well beyond its origins to genres including country, bluegrass, folk, pop, rock, jazz, and contemporary worship music.

The diagram uses scale degrees throughout. The **key°** column shows each node's degree within the current home key, using chromatic degree names for notes outside the major scale: ♭2, ♭3, ♯4, ♭6, ♭7 for the five chromatic tones between diatonic degrees.

### Intervals

An interval is the distance in pitch between two notes. The intervals produced by the harmonic series nodes (measured from the fundamental) are:

- 2:1 ratio — octave (8th)
- 3:2 ratio — perfect fifth
- 4:3 ratio — perfect fourth
- 5:4 ratio — major third
- 5:3 ratio — major sixth
- 9:8 ratio — major second
- 15:8 ratio — major seventh

These are all consonant intervals — they occur naturally in the harmonic series and sound stable and pleasing. The washtub bass's harmonic node positions are therefore a naturally consonant set of pitches, spanning about two octaves of a major scale.

### Interval Inversion

When an interval is inverted — flipped so the lower note becomes the higher note — it produces a complementary interval. The rule is: the two intervals always add up to 9 (for simple intervals within an octave).

The most important inversion for washtub bass is: a perfect fifth inverted is a perfect fourth (5 + 4 = 9). This means that the 5th node, which is a perfect fifth above the fundamental, is also a perfect fourth below the next octave of the tonic. When we set the 5th node as the home node, the fundamental becomes the 4th degree of the new key, because the interval from the 5th down to the 1st is a fourth.

A practical example: if you set your home node to D (the 5th of G major), then G becomes the 4th of D. This is not coincidental — it is the fundamental structure underlying the circle of fifths.

### The Circle of Fifths

The circle of fifths arranges the 12 major keys in a cycle where each adjacent key is a perfect fifth apart. Moving clockwise adds one sharp to the key signature; moving counterclockwise adds one flat. The circle is: C – G – D – A – E – B – F# – C# – Ab – Eb – Bb – F – (back to C).

Keys that are adjacent on the circle share six of their seven scale tones, making them closely related harmonically. The key selector in the app (accessible by tapping the key/scale chip on the left rail, which opens the Circle of Fifths wheel) is arranged in circle of fifths order to reflect these relationships visually. Spinning the wheel snaps to the nearest key and updates the diagram immediately.

### Tonal Center and the Home Node

The tonal center is the pitch that functions as "home" in a given musical passage — the root of whatever scale or mode is being played. In Western music, the tonal center is most often the root of the key, but modes and various musical traditions treat different degrees as the center of gravity.

On the washtub bass, a practical question arises from this concept: which node on the string is currently functioning as the tonal center? This is what the home node setting addresses. The home node is the physical string node that the player designates as the tonal center for the scale or mode they are playing in. These are two distinct but related ideas — the tonal center is a musical concept, and the home node is its physical location on the string.

When the home node is the fundamental (the default), the open string pitch is the tonal center and the diagram labels everything relative to that. But the open string is not always the most prominent or useful pitch. A player in the key of D, for example, might be playing where the 5th harmonic node sounds D — in that case, setting the home node to the 5th means D becomes the tonal center even though the fundamental is G.

The diagram remaps all degree labels relative to the chosen home node. The physical string degrees (**str°**) never change — they reflect the harmonic physics of the string and are shown in dark grey at the left of the string. The **home°** labels (shown in color immediately to the right of the string) change to show each node's relationship to the designated home node.

### The Home Node Mapping Algorithm

For any node with frequency ratio R relative to the fundamental, and a home node with ratio HN:

**interval = R / HN**

This interval is then reduced to within one octave (repeatedly dividing or multiplying by 2 until it falls between 1 and 2), and matched against the known just intonation ratios for the seven scale degrees [1, 9/8, 5/4, 4/3, 3/2, 5/3, 15/8].

Example with home node = 5th node (ratio 3/2):

- Fundamental (R=1): 1 ÷ 3/2 = 2/3 → ×2 → 4/3 → matches perfect fourth → degree 4
- Octave node (R=2): 2 ÷ 3/2 = 4/3 → matches perfect fourth → degree 4 (one octave up from fundamental)
- 5th node (R=3/2): 3/2 ÷ 3/2 = 1 → matches unison → degree 1 (the new tonic)
- Downstring 5th (R=3): 3 ÷ 3/2 = 2 → ÷2 → 1 → degree 1 (two octaves above new tonic)

### Modes

A mode is a scale built by treating a different degree of the major scale as the tonal center. The key insight is that no notes change — only where you start counting from. The major scale has the interval sequence 2-2-1-2-2-2-1 (in semitones). Every mode is that same sequence read starting from a different position, wrapping around when the end is reached. The resulting sequence has a distinct intervallic character, which is what gives each mode its unique sound.

The conventional name for a mode is the root note followed by the mode name — for example, D Dorian or G Mixolydian. The root note is the tonal center of that mode: the note that functions as home, not the root of the parent major scale.

The seven modes, their parent degree, interval sequence, numeric degree spelling relative to the mode root, and letter spelling in C:

**Harmonic minor** raises the 7th degree of natural minor by a semitone, creating a leading tone that pulls strongly toward the root. This produces the characteristic augmented second (3 semitones) between degrees 6 and 7, which gives the scale its distinctive, slightly exotic sound.

In classical theory, melodic minor uses different notes ascending and descending (reverting to natural minor on the way down). In jazz and contemporary practice, the ascending form is used in both directions and treated as a standalone scale.

### Modes and the Home Node Together

The mode and home node settings work independently but complement each other. The **mode** determines which pitches are in key (diatonic) and which are chromatic — this governs the color coding in the diagram (green for in-key, red/coral for chromatic). The **home node** determines how degree numbers are assigned to each node — this governs the home° column labels.

A natural starting point is home node = fundamental, mode = Ionian. This gives a standard major key view with the open string as the tonic. But many useful combinations exist:

- Home node = 5th, mode = Mixolydian: the 5th node becomes degree 1 of a Mixolydian scale — useful when playing in a key whose root lies at the 5th harmonic node.
- Home node = fundamental, mode = Dorian: the open string is degree 1 of a Dorian scale — the full string is now mapped as a minor context with a raised 6th.
- Home node = 4th, mode = Ionian: the 4th node becomes the tonic, and the key° coloring reflects the major scale built on that pitch.

In all cases, the str° column is unchanged — it is always the physics-grounded harmonic label. Only the home° labels and key° colors respond to these settings.

## Part 3: The Washtub Bass in Practice {#instrument}

### The Instrument

The washtub bass consists of an inverted metal washtub (the resonating body, acting as the bridge for the lower end of the string), a wooden pole braced against the rim of the tub, and a single string running from the tub up to the top of the pole. The flat bottom of the inverted tub faces up, and the string attaches there; the open rim rests on the ground.

The instrument is played by plucking the string with one hand while the other controls the pole. Changing the angle of the pole against the tub rim changes the tension of the string, and therefore its pitch.

### Tension-Based Playing

Increasing the pole angle away from the body tightens the string, raising the pitch. The player must develop the physical sense of where each interval lives in terms of pole angle and tension, which is challenging because it is a purely kinesthetic skill with no frets or keys to guide the fingers.

The app's tension slider and left-rail display show the fundamental frequency in real time, letting you explore the relationship between tension and pitch before developing it by ear and feel.

### Node Pinching (Harmonics)

A second method for producing distinct pitches is to pinch the string lightly at a specific point while plucking. When the string is touched at one of its vibrational nodes — the same points mapped in the string diagram — it vibrates in a higher mode, producing a harmonic or flageolet tone at the corresponding frequency.

In practice, not all nodes produce equally clear tones. The clearest are typically:

- The midpoint (the octave of the fundamental) — the strongest and most reliable harmonic
- The 1/3 and 2/3 positions (perfect fifth above the octave and perfect fifth above the fundamental) — also quite reliable
- The 3/4 and 1/4 positions (perfect fourth nodes) — usually good
- The 3/5, 4/5, and other ratio positions — variable; clarity depends on the instrument and setup

Node pinching and tension control complement each other. Tension shifts the fundamental and everything built on it. Node pinching produces fixed harmonic intervals relative to whatever the fundamental currently is at the moment of the pluck. The two methods can be combined: set the tension to a desired pitch area, then use node pinching to access the consonant harmonics at and around that pitch level.

### Using Alternate Nuts (Nut Height View)

When playing in lower keys, the open string at low tension can be floppy and quiet, producing a dull, indistinct tone. Shortening the speaking length of the string improves tone and playability by raising the fundamental at the same tension, making the string more taut and resonant.

One way to shorten the speaking length on the fly is to hold the string against the pole with the fretting hand — but this keeps that hand occupied and precludes using it for node pinching. A better solution is an **alternate nut**: a fixed contact point (a clamp, knot, or wrap) at a lower position on the pole that shortens the speaking length without tying up either hand.

Wrapping the string around an alternate nut positioned lower on the pole shortens the speaking length, increasing the fundamental frequency at the same tension. All the harmonic nodes compress into the shorter speaking length; their proportional positions are unchanged, but their physical positions on the string shift upward toward the pole.

The app's **nut height view** depicts this. A draggable purple marker represents the effective nut. Moving it down the string (increasing the offset from the main nut) compresses all the harmonic nodes into the shorter speaking length. The physics recalculates automatically — all frequencies, fractions, and intervals remain accurate for the new speaking length. Three preset positions (6", 12", 19" offset) are saved in the app corresponding to the actual alternate nut positions on this specific instrument.

**Tuning with alternate nuts:** the Tune button always targets the home node. When an alternate nut is active, it calculates the tension needed to bring the home node to the selected key root within the shorter speaking length. This means a given key can often be reached at higher tension (and thus better string feel) using an alternate nut than with the full string length.

### Capo Mode: Two-Voice Playing

The capo view represents a technique where the string is stopped at an intermediate point — a capo position — dividing it into two independently resonating segments: an upper segment (from the capo to the nut) and a lower segment (from the capo to the tub). Each segment can be plucked to produce its own pitch; the two pitches together form a specific harmonic interval.

The capo position is chosen so that one segment produces the fundamental of the current tension setting (the "1" of the interval), and the other segment produces the interval note above it. For example, the perfect fifth capo position places the capo at 2/5 of the string length from the tub: the lower segment (2/5 of the string) produces a perfect fifth above the fundamental, and the upper segment (3/5) produces a perfect fourth above the fundamental — which is the octave of the original fundamental.

The app's capo view shows both segment layers overlaid on the main string:

- **Lower segment** (tub to capo) — shown in teal: all the harmonic nodes of the lower segment, calculated relative to the lower segment's length.
- **Upper segment** (capo to nut) — shown in amber: all the harmonic nodes of the upper segment, calculated relative to the upper segment's length.

Available capo intervals: minor 3rd, major 3rd, perfect 4th, perfect 5th, minor 6th, major 6th, and octave. The capo marker is draggable along the string and snaps to the nearest available interval position.

Tapping a sub-node in capo mode plays its tone and shows its details — frequency, note name, and its position within its segment — in the tone strip. Tapping the capo handle plays the lower segment's fundamental. Tapping the nut row in capo mode plays the upper segment's fundamental.

### Playing Through Changes

A key challenge in playing washtub bass is navigating chord changes — keeping appropriate notes as the harmonic environment shifts. The harmonic nodes provide a useful framework: because they are all drawn from the natural harmonic series, they form a naturally consonant set of pitches that work well together and against a chord.

Understanding which nodes correspond to chord tones in any given key — and being able to find those nodes by feel — is the core technique the diagram is designed to support.

The **home node** setting is particularly useful here. Rather than always viewing the diagram from the perspective of the fundamental, you can set the home node to whichever node corresponds to the root of the chord currently being played. The degree labels in the home° column immediately reflect that new perspective, showing you the scale structure relative to the current chord root.

In practice: if a song moves from G to D and back, you might keep the home node at the fundamental for the G section (where G is the open string), then switch to home node = 5th for the D section (where D is the 5th harmonic node). The diagram redraws its degree labels accordingly, and the Tune button can set tension so that the home node hits D in the right octave.

The mode selector adds another layer. If the chord being played functions as a Mixolydian chord (common in rock and blues), selecting Mixolydian mode while the home node is on that chord's root will correctly show the ♭7 as an in-key (green) degree rather than a chromatic one.

## Part 4: The String Map Diagram {#app}

### Overview

The string map is a mobile-first interactive diagram designed to be used in the hand during or before playing. It runs as a self-contained HTML file in any browser. The layout is optimized for left-hand grip (holding the phone) with right-hand tapping and plucking.

### The Diagram Canvas

The central panel shows the string as a vertical line, with the nut at the top and the tub (bridge) at the bottom. The string is drawn to scale: a node at the midpoint of the string appears at the midpoint of the vertical line.

Each node is represented as a circle on the string. Size and fill encode the node type:

- **Large filled circle** — primary node (perfect 4th, perfect 5th, or octave tonic)
- **Small outlined circle** — secondary node (major 2nd, major 3rd, major 6th, major 7th)
- **Purple with outer ring** — home node (the designated tonal center)
- **Grey dashed circle** — not snapped to a named pitch within 25 cents

Horizontal pitch bars extend to the left of each node when enabled. Their length represents the frequency ratio — a longer bar means a higher pitch relative to the fundamental.

Small grey tick marks appear between adjacent nodes that are a major second apart, indicating the chromatic passing tone at the equal-temperament semitone position between them.

### Column Structure (left to right)

- **Pitch bars** — length encodes frequency ratio (togglable in the phys panel)
- **str°** — string degree: the physics-grounded harmonic label, dark grey bold, never changes regardless of key, mode, or home node setting
- **[string line]**
- **home°** — home node degree: the musical label relative to the current home node, colored
- **key°** — chromatic degree within the selected home key and mode (green = in key, red/coral = chromatic)
- **note** — letter name and octave, shown when the node's pitch is within 25 cents of a named pitch
- **fraction · ratio · interval** — the full physical description of the node
- **upper | lower** — segment lengths from nut to node (upper) and from node to tub (lower)

The distinction between str° and home° is important: str° is fixed by physics and never changes. home° is a musical interpretation that changes whenever the home node or mode setting changes.

### The Top Tone Strip

A fixed-height bar across the top of the screen shows the current key and scale on the left (always visible), and the selected node's details on the right (updates when a node is tapped or hovered).

The right side shows: the home° degree, key° degree, note name, frequency in Hz, and the upper segment length. This solves the problem of needing to zoom in to read node labels — you can keep the whole string visible and read the detail from the strip.

### The Left Rail

A narrow column on the left edge of the screen contains the primary controls:

- **Tune button** — calculates and sets the tension so the home node produces the pitch of the selected key root (nearest suitable octave)
- **Key/scale chip** — shows the current key and mode abbreviation; tapping opens the **Circle of Fifths wheel**, which can be dragged to select a key and tapped in the center to open the **mode picker**
- **Home chip** — shows the current home node degree (1–7); tapping opens the **home node picker**
- **Zoom cluster** — +/−/fit buttons
- **Tension slider** — vertical drag to adjust tension; plays a continuous tone during drag so you can hear the pitch in real time
- **Fund display** — shows the fundamental frequency in Hz and the current tension in lbs; updates live during tension drag

### Node Views

Three node views are available from the lower-left of the bottom rail:

**Full string view** — the default. All 14 harmonic nodes are shown at their standard positions along the full speaking length.

**Nut height view** — shows the string with an effective nut at a lower position. A draggable purple marker represents the alternate nut. Dragging it changes the speaking length in real time; all node positions and frequencies update accordingly. Three preset positions can be saved and recalled. The string length display shows the current effective speaking length.

**Capo view** — shows two overlaid sets of harmonic nodes, one for each segment created by the capo position. The capo marker (amber) is draggable and snaps to one of seven interval positions. Play buttons in the bottom rail play the upper segment, lower segment, or both simultaneously.

### The Ruler and Sidebar

When a node is tapped (pinned), a panel on the right side of the screen activates:

- **Ruler rail** — a narrow column with a miniature representation of the full string. A dot marks the selected node's position. A fan line connects the dot to the actual node position in the main diagram. Dashed lines connect home node positions on the ministring to their corresponding positions on the main string, with a light purple trapezoidal shading between the nearest home nodes above and below the selected node. Span lines and interval labels (P4, P5, etc.) show the distance from the selected node to the nearest home nodes.
- **Sidebar** — shows the upper segment (length, frequency, note name) above a dividing line, and the lower segment (note name, frequency, length) below it. The dividing line is aligned with the node's position on the ministring.

Tapping a pinned node again unpins it, clearing the ruler and sidebar but playing the tone once more as confirmation.

### The Bottom Rail

A fixed panel at the bottom of the screen provides access to additional controls through a state machine. The left column selects the node view (full/nut/capo). The center area shows context-specific controls for the active view. The right column gives access to three panels:

- **Audio** — waveform (sine/warm/string), polyphony, duration, volume
- **Phys** — string length, density defaults, pitch bar toggle
- **Lgnd** — color and symbol legend

### The README

In full string view, the bottom rail center area shows four buttons linking to sections of this document: **physics**, **theory**, **instrument**, and **app**. Tapping any button opens a scrollable panel with the relevant section. The title bar updates as you scroll through to show which section you are currently reading.

### Color System

Node colors encode two independent properties simultaneously: whether the node is primary or secondary (size and fill), and whether its pitch is in key or chromatic (color):

- **Purple** — home node / tonal center, always, regardless of key
- **Green (dark / light)** — primary / secondary, in key (diatonic to the current home key and mode)
- **Red/coral** — primary / secondary, chromatic (snapped to a pitch but outside the current key)
- **Grey dashed** — between named pitches (not snapped within 25 cents)

The home° column labels match the node color. The key° column shows chromatic degree names (♭2, ♭3, ♯4, ♭6, ♭7) for chromatic nodes.

In capo view, the two segment layers use their own colors: **teal** for the lower segment (tub to capo) and **amber** for the upper segment (capo to nut). Home nodes within each segment are highlighted with a ring in the segment's color.

// Anchor map: button key → h2 id attribute value
const README_ANCHORS={
  physics:'physics', theory:'theory', instrument:'instrument', app:'app'
};
const README_TITLES={
  physics:'Part 1 · String Physics',
  theory:'Part 2 · Music Theory',
  instrument:'Part 3 · The Washtub Bass',
  app:'Part 4 · The String Map App'
};

// Reverse map: anchor id → title
const README_ANCHOR_TITLES={
  physics:'Part 1 · String Physics',
  theory:'Part 2 · Music Theory',
  instrument:'Part 3 · The Washtub Bass',
  app:'Part 4 · The String Map App'
};

let _readmeOpen=false;
let _readmeRendered=false;

function _updateReadmeTitle(){
  const body=document.getElementById('readme-panel-body');
  const title=document.getElementById('readme-panel-title');
  if(!body||!title) return;
  // Find the last h2 whose top is at or above the midpoint of the panel
  const mid=body.scrollTop+body.clientHeight*0.35;
  const h2s=body.querySelectorAll('h2[id]');
  let active=null;
  h2s.forEach(h=>{
    if(h.offsetTop<=mid) active=h;
  });
  if(active && README_ANCHOR_TITLES[active.id]){
    title.textContent=README_ANCHOR_TITLES[active.id];
  }
}

function openReadme(section){
  const panel=document.getElementById('readme-panel');
  const body=document.getElementById('readme-panel-body');
  const title=document.getElementById('readme-panel-title');
  if(!panel||!body) return;
  title.textContent=README_TITLES[section]||'README';
  // Render full doc once, cache it, wire scroll listener
  if(!_readmeRendered){
    body.innerHTML=mdToHtml(README_FULL_MD);
    _readmeRendered=true;
    body.addEventListener('scroll',_updateReadmeTitle,{passive:true});
  }
  panel.classList.add('visible');
  _readmeOpen=true;
  // Scroll to anchor
  const anchorId=README_ANCHORS[section]||'physics';
  setTimeout(()=>{
    const target=body.querySelector('#'+anchorId);
    if(target) target.scrollIntoView({block:'start'});
    else body.scrollTop=0;
  },0);
}

function closeReadme(){
  const panel=document.getElementById('readme-panel');
  if(panel) panel.classList.remove('visible');
  _readmeOpen=false;
}

// Close readme on outside tap
document.addEventListener('touchstart',e=>{
  if(!_readmeOpen) return;
  const panel=document.getElementById('readme-panel');
  if(panel&&!panel.contains(e.target)) closeReadme();
},{passive:true});


// ── End README panel ───────────────────────────────────────────────

window.addEventListener('resize',()=>{clamp();applyT();});
