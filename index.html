  updatePlayBtn();
}

// ── Playable node registry ────────────────────────────────────────
// Single source of truth for all nodes that can be played, highlighted,
// and shown in the tone strip. Add new node types here (47, 39, etc.)
// and highlight/strip support comes for free.
function getPlayableNodes(){
  const fund=fundFreq();
  const esl=effectiveSpeakingLength();
  const nodes=[];
  // Nut / fundamental — always first
  nodes.push({frac:1.0, ratio:1, harm:1, primary:true, tonic:false,
    label:'1', fs:'1/1', rs:'1:1', desc:'fundamental',
    freq:fund, _isNut:true});
  // All 14 NODES
  NODES.forEach(n=>{
    nodes.push({...n, freq:fund*n.ratio});
  });
  return nodes;
}

// Match a freq to a playable node — strict tolerance, no nearest-match fallback.
// Returns null if no node matches within 2%, or if the matched node is unsnapped
// (between named pitches, showing —). Unsnapped nodes must never highlight.
function _nodeForFreq(freq){
  if(nodeView==='capo') return null; // capo uses _nodeForFreqCapo
  const nodes=getPlayableNodes();
  for(const n of nodes){
    if(Math.abs(n.freq/freq-1)<0.02){
      // Reject unsnapped nodes — they show — and must not highlight
      const nni=noteInfo(n.freq);
      if(!nni.snapped) continue;
      return n;
    }
  }
  return null;
}

// Unified playback highlight + tone strip update.
// Called for every note during playback — updates row highlight, sidebar ruler,
// and top tone strip. Works for all current node types; future nodes added to
// getPlayableNodes() automatically inherit this behaviour.
function _showNodeForPlayback(node, freq){
  if(!node) return;
  setRowHL(node.frac);
  // Derive display values
  const ni=noteInfo(freq);
  const inKey=ni.snapped?isInKey(ni.midi):false;
  const displayLabel=remapDegree(node.ratio)||node.label;
  const col=isTonalCenter(node.ratio)?HOME_COL:
    node.primary?(inKey?'var(--inkey)':'#993C1D'):(inKey?'var(--inkey)':'#D85A30');
  // Update tone strip (nts-right) via showStrip
  showStrip(freq, node.frac, displayLabel, col);
  if(node._isNut){
    // Nut row: build pseudo-node matching the format showLabel expects,
    // then call showLabel to update sidebar ruler split + dot position
    const nutPseudo={frac:1.0, ratio:1, fs:'1/1', rs:'1:1',
      label:displayLabel, primary:true, desc:'fundamental'};
    showLabel(nutPseudo);
  } else {
    showLabel(node);
  }
}

function _hlNodeForFreq(freq){
  // Freq match only — 2% tolerance covers JI/ET divergence when string is in tune.
  // When detuned, no match fires — correct behavior.
  // Note+name fallback removed: caused false highlights when string was detuned.
  const node=_nodeForFreq(freq);
  if(node) _showNodeForPlayback(node, freq);
}



function _vizForFreq(freq){
  if(nodeView==='capo') return;
  const node=_nodeForFreq(freq);
  if(!node) return;
  if(node.ratio===1){
    const nutY=nodeView==='nut'?nutEffY():NY;
    triggerViz(1.0, 1, nutY, HOME_COL);
    return;
  }
  const ni=noteInfo(freq);
  const inKey=ni.snapped?isInKey(ni.midi):false;
  const col=isTonalCenter(node.ratio)?HOME_COL:
    node.primary?(inKey?'var(--inkey)':'#993C1D'):(inKey?'var(--inkey)':'#D85A30');
  triggerViz(node.frac, node.harm, nY(node.frac), col);
}


function playSequence(){
  if(_playActive){ stopPlaySequence(); return; }
  // Ensure Web Audio context is running before starting — avoids short/disjointed first note
  const ctx = getCtx();
  if(!ctx){ _startPlaySequence(); return; } // audio disabled — start immediately
  if(ctx.state==='suspended'){
    ctx.resume().then(()=>{ _startPlaySequence(); }).catch(()=>{ _startPlaySequence(); });
  } else {
    _startPlaySequence();
  }
}

function _startPlaySequence(){
  _playActive=true;
  _warmAudioCtx();
  _savedPinFrac=_pinnedFrac;
  _pinnedFrac=null;
  const btn=document.getElementById('play-go-btn');
  if(btn) btn.classList.add('playing');
  updatePlayBtn();

  const D=toneDuration*1000;
  const G=Math.max(30,toneSpacing*1000);
  const step=D+G;
  let rawFreqs=buildPlayFreqs();

  // Build note-name set from playback freqs — used to gate node highlights.
  // Using note names (not raw freqs) handles JI vs ET divergence and ensures
  // only nodes whose actual pitch is being played light up.
  const isCapo=nodeView==='capo';
  const _seg=isCapo?_playCapoSegment():null;
  // Use name+octave so B2 doesn't match when B3 is played
  const _playNoteSet=new Set(
    rawFreqs.map(f=>{
      const fv=typeof f==='object'?f.freq:f;
      const ni=noteInfo(fv);
      return ni.snapped?ni.name+ni.octave:null;
    }).filter(Boolean)
  );
  const _noteInStack=freq=>{
    const ni=noteInfo(freq);
    return ni.snapped && _playNoteSet.has(ni.name+ni.octave);
  };

  const _doViz=isCapo
    ?(f=>_vizForFreqCapo(typeof f==='object'?f.freq:f, _seg))
    :(f=>{
      const fv=typeof f==='object'?f.freq:f;
      const ni=noteInfo(fv);
      if(!ni.snapped || !isInKey(ni.midi)) return; // no viz for non-diatonic notes
      _vizForFreq(fv);
    });
  // Highlight: fire for any node whose note name is in the playback stack
  // This handles JI/ET divergence and catches chord block multi-highlight
  const _doHl=f=>{
    const fv=typeof f==='object'?f.freq:f;
    if(isCapo) return; // capo hl TBD in item 35 follow-up
    const ni=noteInfo(fv);
    if(!ni.snapped || !isInKey(ni.midi)){
      // Non-diatonic note: clear all ruler/label state so stale state doesn't persist
      hideLabel();
      return;
    }
    _hlNodeForFreq(fv);
  };
  // For chord block: highlight ALL nodes whose note is in the chord
  // For chord block: collect chord voice freqs, then find all nodes within
  // 2% of any chord voice freq. Freq-based matching handles JI/ET divergence
  // correctly and avoids octave/name mismatch false positives/negatives.
  const _chordFreqs=rawFreqs.map(f=>typeof f==='object'?f.freq:f);
  const _doHlAll=()=>{
    if(isCapo) return;
    const playableNodes=getPlayableNodes();
    const matchingFracs=[];
    playableNodes.forEach(n=>{
      const matched=_chordFreqs.some(cf=>Math.abs(n.freq/cf-1)<0.02 && noteInfo(n.freq).snapped);
      if(matched) matchingFracs.push(n.frac);
    });
    setMultiRowHL(matchingFracs);
  };
  // Tone strip always updates (even if no node match)
  const _doStrip=f=>{
    const fv=typeof f==='object'?f.freq:f;
    const ni=noteInfo(fv);
    const kd=ni.snapped?chromDeg(ni.midi,homeKey):'—';
    const inKey=ni.snapped?isInKey(ni.midi):false;
    const noteStr=ni.snapped?ni.name+ni.octave:'—';
    const keyCol=inKey?'#0F6E56':'rgba(153,60,29,0.6)';
    const dst=document.getElementById('nts-right');
    if(dst) dst.innerHTML=
      `<div style="display:flex;align-items:baseline;gap:4px;line-height:1;">
         <span style="font-size:18px;font-weight:500;color:${keyCol};">${kd}</span>
         <span style="font-size:10px;color:#ccc;">·</span>
         <span style="font-size:18px;font-weight:500;color:${keyCol};">${noteStr}</span>
         <span style="font-size:10px;color:#ccc;">·</span>
         <span style="font-size:14px;font-weight:400;color:#aaa;">${fv.toFixed(1)} Hz</span>
       </div>`;
  };

  if(playSeq==='chord'){
    const freqs=rawFreqs.map(f=>typeof f==='object'?f.freq:f);
    if(playChordStyle==='block'){
      freqs.forEach(f=>playTone(f));
      freqs.forEach(f=>_doViz(f));
      _doHlAll(); // highlight all nodes whose note is in the chord
      _doStrip(freqs[0]);
      _playTimers.push(setTimeout(stopPlaySequence,D));
      return;
    }
    let seq=[...freqs];
    if(playDir==='down') seq=[...seq].reverse();
    if(playDir==='updown') seq=[...seq,...[...seq].reverse().slice(1)];
    seq.forEach((f,i)=>{
      _playTimers.push(setTimeout(()=>{ stopActive(); playTone(f); _doViz(f); _doHl(f); _doStrip(f); },i*step));
      _playTimers.push(setTimeout(()=>{ hideLabel(); },i*step+D));
    });
    _playTimers.push(setTimeout(stopPlaySequence,seq.length*step));
    return;
  }

  let seq=rawFreqs.map(f=>typeof f==='object'?f.freq:f);
  if(playDir==='down') seq=[...seq].reverse();
  if(playDir==='updown') seq=[...seq,...[...seq].reverse().slice(1)];
  seq.forEach((f,i)=>{
    _playTimers.push(setTimeout(()=>{ stopActive(); playTone(f); _doViz(f); _doHl(f); _doStrip(f); },i*step));
    _playTimers.push(setTimeout(()=>{ hideLabel(); },i*step+D));
  });
  // Item 63: clear strip after last note completes
  _playTimers.push(setTimeout(()=>{ stopPlaySequence(); clearStrip(); },seq.length*step+toneDuration*1000));
}

// ── Circle of Fifths ──────────────────────────────────────────────
let cofVisible=false;
let cofAngle=0;
const COF_CX=85, COF_CY=85, COF_R=68;

function drawCoF(){
  const cv=document.getElementById('cof-canvas');
  if(!cv) return;
  const ctx=cv.getContext('2d');
  const W=170, cx=COF_CX, cy=COF_CY;
  const outerR=78, innerR=34, gap=0.018;
  ctx.clearRect(0,0,W,W);

  // White background circle — covers diagram content behind wheel
  ctx.beginPath(); ctx.arc(cx,cy,outerR+2,0,Math.PI*2);
  ctx.fillStyle='#fff'; ctx.fill();

  const selPos=cofKeyAtTop();

  COF_ORDER.forEach((chromIdx,pos)=>{
    const distFromSel=Math.min(Math.abs(pos-selPos),12-Math.abs(pos-selPos));
    const atDot=(distFromSel===0);
    const midA=(pos/12)*2*Math.PI - Math.PI/2 + cofAngle;
    const sliceAngle=(2*Math.PI/12);
    const startA=midA - sliceAngle/2 + gap;
    const endA  =midA + sliceAngle/2 - gap;

    let fillColor, textColor;
    if(atDot){fillColor='#533AB7'; textColor='#fff';}
    else if(distFromSel===1){fillColor='#E0DCF5'; textColor='#4A33A8';}
    else if(distFromSel===2){fillColor='#F0EEF9'; textColor='#8E7FCC';}
    else{fillColor='#F7F6FD'; textColor='#B3ABDB';}

    ctx.beginPath();
    ctx.arc(cx,cy,outerR,startA,endA);
    ctx.arc(cx,cy,innerR,endA,startA,true);
    ctx.closePath(); ctx.fillStyle=fillColor; ctx.fill();

    const labelR=(innerR+outerR)/2;
    const lx=cx+labelR*Math.cos(midA), ly=cy+labelR*Math.sin(midA);
    ctx.font=(atDot?'bold ':'')+(atDot?'17':'15')+'px system-ui,sans-serif';
    ctx.fillStyle=textColor; ctx.textAlign='center'; ctx.textBaseline='middle';
    ctx.fillText(NOTES[chromIdx],lx,ly);
  });

  // Selector dot — exactly at top centre of wheel
  ctx.beginPath(); ctx.arc(cx, cy-outerR, 4, 0, Math.PI*2);
  ctx.fillStyle='#533AB7'; ctx.fill();
  ctx.strokeStyle='#fff'; ctx.lineWidth=2; ctx.stroke();

  // ── Donut hole with mode label ──
  ctx.beginPath(); ctx.arc(cx,cy,innerR-2,0,Math.PI*2);
  ctx.fillStyle='#fff'; ctx.fill();
  ctx.strokeStyle='#C4BEE8'; ctx.lineWidth=1; ctx.stroke();

  // Mode number (line 1) + abbreviated name (line 2)
  const abbrev=MODE_ABBREV[currentMode]||'';
  const modeNum={'ionian':'1','dorian':'2','phrygian':'3','lydian':'4',
    'mixolydian':'5','aeolian':'6','locrian':'7',
    'harmonic_minor':'','melodic_minor':''}[currentMode]||'';

  ctx.textAlign='center'; ctx.textBaseline='middle';
  if(modeNum){
    ctx.font='bold 15px system-ui,sans-serif'; ctx.fillStyle='#533AB7';
    ctx.fillText(modeNum, cx, cy-18);
    ctx.font='bold 10px system-ui,sans-serif'; ctx.fillStyle='#6B58C4';
    ctx.fillText(abbrev, cx, cy-4);
  } else {
    ctx.font='bold 11px system-ui,sans-serif'; ctx.fillStyle='#533AB7';
    ctx.fillText(abbrev, cx, cy-10);
  }
}

function cofKeyAtTop(){
  // Normalise each position's angle to [-π,π] and find closest to 0 (top = -π/2 + π/2 = 0)
  let best=0, bestDist=Infinity;
  COF_ORDER.forEach((_,pos)=>{
    let a=((pos/12)*2*Math.PI + cofAngle) % (2*Math.PI);
    if(a>Math.PI) a-=2*Math.PI;
    if(Math.abs(a)<bestDist){bestDist=Math.abs(a);best=pos;}
  });
  return best;
}

function snapCoF(){
  const pos=cofKeyAtTop();
  const targetAngle=-(pos/12)*2*Math.PI;
  const start=cofAngle;
  let diff=((targetAngle-start) % (2*Math.PI));
  if(diff>Math.PI) diff-=2*Math.PI;
  if(diff<-Math.PI) diff+=2*Math.PI;
  const duration=220, t0=performance.now();
  function step(t){
    const p=Math.min(1,(t-t0)/duration);
    const ease=1-Math.pow(1-p,3);
    cofAngle=start+diff*ease;
    drawCoF();
    if(p<1){ requestAnimationFrame(step); }
    else{
      cofAngle=targetAngle;
      const newKey=COF_ORDER[pos];
      _clearPin();
      homeKey=newKey;
      drawCoF(); // redraw with updated homeKey so highlight reflects new selection
      document.querySelectorAll('.kbtn').forEach((b,bi)=>{
        b.classList.toggle('on', COF_ORDER[bi]===newKey);
      });
      updateTuneBtn(); updateScaleSpelling(); updateScaleStrip();
      updateLeftRailChips(); render(); _maybeAutoTune();
    }
  }
  requestAnimationFrame(step);
}

function initCoF(){
  const homePos=COF_ORDER.indexOf(homeKey);
  cofAngle=-(homePos/12)*2*Math.PI;
  drawCoF();
}

// Spin to a specific CoF position (0-11), animating from current angle
function spinToPos(pos){
  const targetAngle=-(pos/12)*2*Math.PI;
  const start=cofAngle;
  let diff=((targetAngle-start) % (2*Math.PI));
  if(diff>Math.PI) diff-=2*Math.PI;
  if(diff<-Math.PI) diff+=2*Math.PI;
  if(Math.abs(diff)<0.001){ snapCoF(); return; } // already there — just snap+select
  const duration=280, t0=performance.now();
  function step(t){
    const p=Math.min(1,(t-t0)/duration);
    const ease=1-Math.pow(1-p,3);
    cofAngle=start+diff*ease;
    drawCoF();
    if(p<1){ requestAnimationFrame(step); }
    else{
      cofAngle=targetAngle;
      const newKey=COF_ORDER[pos];
      _clearPin(); homeKey=newKey;
      drawCoF();
      document.querySelectorAll('.kbtn').forEach((b,bi)=>{
        b.classList.toggle('on', COF_ORDER[bi]===newKey);
      });
      updateTuneBtn(); updateScaleSpelling(); updateScaleStrip();
      updateLeftRailChips(); render(); _maybeAutoTune();
    }
  }
  requestAnimationFrame(step);
}

// Drag + tap wiring
(function(){
  const cv=document.getElementById('cof-canvas');
  if(!cv) return;
  let dragging=false, startA=0, startCof=0;
  let _tapStartX=0, _tapStartY=0, _moved=false;

  function ptrAngle(e){
    const r=cv.getBoundingClientRect();
    const cx=(e.touches?e.touches[0].clientX:e.clientX)-r.left-COF_CX;
    const cy=(e.touches?e.touches[0].clientY:e.clientY)-r.top-COF_CY;
    return Math.atan2(cy,cx);
  }

  // Given a canvas-relative (x,y), return which CoF position (0-11) was tapped, or -1
  function hitPos(ex, ey){
    const r=cv.getBoundingClientRect();
    const dx=ex-r.left-COF_CX, dy=ey-r.top-COF_CY;
    const dist=Math.sqrt(dx*dx+dy*dy);
    const outerR=78, innerR=34;
    if(dist<innerR||dist>outerR) return -1; // hit donut hole or outside
    const tapAngle=Math.atan2(dy,dx);
    // midAngle for pos = (pos/12)*2π - π/2 + cofAngle
    // tapAngle ≈ (pos/12)*2π - π/2 + cofAngle → pos = (tapAngle + π/2 - cofAngle)*12/(2π)
    let raw=(tapAngle + Math.PI/2 - cofAngle) * 12 / (2*Math.PI);
    return ((Math.round(raw) % 12) + 12) % 12;
  }

  cv.addEventListener('mousedown',e=>{
    dragging=true; _moved=false; cv.style.cursor='grabbing';
    startA=ptrAngle(e); startCof=cofAngle;
    _tapStartX=e.clientX; _tapStartY=e.clientY;
    e.stopPropagation();
  });
  cv.addEventListener('touchstart',e=>{
    e.preventDefault(); dragging=true; _moved=false;
    startA=ptrAngle(e); startCof=cofAngle;
    _tapStartX=e.touches[0].clientX; _tapStartY=e.touches[0].clientY;
    e.stopPropagation();
  },{passive:false});

  window.addEventListener('mousemove',e=>{
    if(!dragging) return;
    _moved=true;
    cofAngle=startCof+(ptrAngle(e)-startA); drawCoF();
  });
  cv.addEventListener('touchmove',e=>{
    e.preventDefault(); if(!dragging) return;
    _moved=true;
    cofAngle=startCof+(ptrAngle(e)-startA); drawCoF();
  },{passive:false});

  window.addEventListener('mouseup',e=>{
    if(!dragging) return;
    dragging=false; cv.style.cursor='grab';
    if(!_moved){
      // Tap: spin to tapped key
      const pos=hitPos(e.clientX, e.clientY);
      if(pos>=0){ spinToPos(pos); return; }
    }
    snapCoF();
  });
  window.addEventListener('touchend',e=>{
    if(!dragging) return;
    dragging=false;
    if(!_moved && e.changedTouches.length>0){
      const t=e.changedTouches[0];
      const pos=hitPos(t.clientX, t.clientY);
      if(pos>=0){ spinToPos(pos); return; }
    }
    snapCoF();
  });
})();

(function(){
  const cv=document.getElementById('cof-canvas');

  cv.addEventListener('mousedown',e=>{_tapStartX=e.clientX;_tapStartY=e.clientY;_tapMoved=false;},{capture:true});
  cv.addEventListener('mousemove',e=>{if(Math.hypot(e.clientX-_tapStartX,e.clientY-_tapStartY)>4)_tapMoved=true;},{capture:true});
  cv.addEventListener('click',e=>{

    const r=cv.getBoundingClientRect();

  cv.addEventListener('touchend',e=>{
    if(e.changedTouches.length===0) return;
    const r=cv.getBoundingClientRect();
    const dx=e.changedTouches[0].clientX-r.left-COF_CX;
    const dy=e.changedTouches[0].clientY-r.top-COF_CY;

  });
})();

// ── Continuous tone while dragging tension slider ─────────────────
let _cOsc=null, _cGain=null, _cCtx=null, _cDragging=false;

function _tenStartTone(){
  if(_cDragging) return;
  _cDragging=true;
  try{
    if(_cOsc){try{_cOsc.stop();}catch(e){} _cOsc=null;}
    _cCtx=getCtx();
    if(_cCtx.state==='suspended') _cCtx.resume();
    const freq=_tenCurrentFreq();
    _cOsc=_cCtx.createOscillator();
    const _cFilter=_cCtx.createBiquadFilter();
    _cGain=_cCtx.createGain();
    // Match playTone signal chain exactly
    if(waveform==='sine'){
      _cOsc.type='sine';
      _cFilter.type='lowpass'; _cFilter.frequency.value=20000; _cFilter.Q.value=0.5;
    } else if(waveform==='warm'){
      _cOsc.type='triangle';
      _cFilter.type='lowpass'; _cFilter.frequency.value=Math.min(1000,freq*8); _cFilter.Q.value=0.7;
    } else {
      _cOsc.type='sawtooth';
      _cFilter.type='lowpass'; _cFilter.frequency.value=Math.min(900,freq*6); _cFilter.Q.value=0.8;
    }
    _cOsc.connect(_cFilter); _cFilter.connect(_cGain); _cGain.connect(_cCtx.destination);
    _cOsc.frequency.value=freq;
    const t=_cCtx.currentTime;
    _cGain.gain.setValueAtTime(0,t);
    _cGain.gain.linearRampToValueAtTime(volume,t+0.04);
    _cOsc.start();
  }catch(e){_cDragging=false;}
}

function _tenCurrentFreq(){
  // Use stored true ratio (accounts for segment perspective in capo mode)
  const ratio=(typeof window._activeRatioFund==='number'&&window._activeRatioFund>0)
    ? window._activeRatioFund : 1;
  return fundFreq()*ratio;
}

function _tenUpdateTone(){
  if(!_cOsc||!_cCtx||!_cDragging) return;
  try{ _cOsc.frequency.setTargetAtTime(_tenCurrentFreq(),_cCtx.currentTime,0.015); }catch(e){}
  // Update strip: pinned node handled by render patch; fundamental case handled here
  if(!_lastStripArgs){
    const fund=fundFreq();
    const fi=noteInfo(fund);
    const nutIsHome=isTonalCenter(1);
    const nutColor=nutIsHome?HOME_COL:(fi.snapped?(isInKey(fi.midi)?'#0F6E56':'rgba(153,60,29,0.6)'):GRAY);
    const nutLabel=remapDegree(1)||'1';
    if(typeof _origShowStrip_step5==='function'){
      _origShowStrip_step5(fund, 1.0, nutLabel, nutColor);
    }
  }
}

function _tenStopTone(){
  if(!_cDragging) return;
  _cDragging=false;
  if(!_cGain||!_cCtx) return;
  try{
    const t=_cCtx.currentTime;
    _cGain.gain.cancelScheduledValues(t);
    _cGain.gain.setValueAtTime(_cGain.gain.value,t);
    _cGain.gain.linearRampToValueAtTime(0,t+0.08);
    const o=_cOsc; _cOsc=null; _cGain=null;
    setTimeout(()=>{try{o.stop();}catch(e){}},150);
  }catch(e){}
}

setTimeout(()=>{

// Compute degree + note spelling for a given mode key at current homeKey
function modeSpelling(modeKey){
  const steps=MODE_SCALES[modeKey];
  const degs=[], notes=[];
  let pc=homeKey;
  for(let i=0;i<7;i++){
    degs.push(CHROM[((pc-homeKey)%12+12)%12]);
    notes.push(NOTES[((pc%12)+12)%12]);
    pc+=steps[i];
  }
  return {degs, notes};
}

function tensionToFreq(lbs,inches,mu){
  const L=inches*IN_TO_M, T=lbs*LBS_TO_N;
  return (1/(2*L))*Math.sqrt(T/mu);
}
function fundFreq(){return tensionToFreq(tensionLbs,effectiveSpeakingLength(),muKgM);}

function capoYpx(){
  const nutY=nutEffY(), speakingPx=TY-nutY;
  return nutY + CAPO_NODES[capoNodeIdx].phi * speakingPx;

function capoUpperIn(){ return CAPO_NODES[capoNodeIdx].phi * effectiveSpeakingLength(); }
function capoLowerIn(){ return (1-CAPO_NODES[capoNodeIdx].phi) * effectiveSpeakingLength(); }
function capoUpperFreq(){ return fundFreq() / CAPO_NODES[capoNodeIdx].phi; }
function capoLowerFreq(){ return fundFreq() / (1-CAPO_NODES[capoNodeIdx].phi); }

// Returns the frequency to play for a capo segment, respecting a pinned node.
// Uses _pinnedFrac (reliable) rather than _activeNode (may be stale from hover events).
// Reverse-engineers whether _pinnedFrac belongs to this segment, finds the matching
// NODES entry, and returns segFund * node.ratio. Falls back to segment fundamental
// if nothing is pinned on this segment.
function _capoSegFreq(seg){
  if(_pinnedFrac===null) return seg==='lower'?capoLowerFreq():capoUpperFreq();
  const cf=1-CAPO_NODES[capoNodeIdx].phi;
  // Derive the segment-local frac from _pinnedFrac
  const segNodeFrac=seg==='lower'
    ? (cf>0 ? _pinnedFrac/cf : null)
    : ((1-cf)>0 ? (_pinnedFrac-cf)/(1-cf) : null);
  if(segNodeFrac===null||segNodeFrac<-0.01||segNodeFrac>1.01){
    return seg==='lower'?capoLowerFreq():capoUpperFreq();
  }
  const matchNode=NODES.find(n=>Math.abs(n.frac-segNodeFrac)<0.003);
  if(!matchNode) return seg==='lower'?capoLowerFreq():capoUpperFreq(); // endpoint or no match
  const segFund=seg==='lower'?fundFreq()/cf:fundFreq()/(1-cf);
  return segFund*matchNode.ratio;
}

// Label for strip: pinned node label if pinned on segment, else segment abbr
function _capoSegLabel(seg){
  const cn=CAPO_NODES[capoNodeIdx];
  const def=seg==='lower'?('↓ '+cn.abbr):('↑ '+cn.abbr);
  if(_pinnedFrac===null) return def;
  const cf=1-cn.phi;
  const segNodeFrac=seg==='lower'
    ? (cf>0 ? _pinnedFrac/cf : null)
    : ((1-cf)>0 ? (_pinnedFrac-cf)/(1-cf) : null);
  if(segNodeFrac===null||segNodeFrac<-0.01||segNodeFrac>1.01) return def;
  const matchNode=NODES.find(n=>Math.abs(n.frac-segNodeFrac)<0.003);
  return matchNode ? (matchNode.label) : def;
}

// Returns viz segment params {topY,botY,frac,harm,color} for a capo segment,
// respecting a pinned node using the same _pinnedFrac logic as _capoSegFreq.
function _capoSegVizParams(seg){
  const cf=1-CAPO_NODES[capoNodeIdx].phi;
  const cy_=capoYpx(), nutY_=nutEffY();
  const topY=seg==='lower'?cy_:nutY_;
  const botY=seg==='lower'?TY:cy_;
  const color=seg==='lower'?SUB_COL_LOWER:SUB_COL_UPPER;
  const def={topY,botY,frac:1.0,harm:1,color};
  if(_pinnedFrac===null) return def;
  const segNodeFrac=seg==='lower'
    ?(cf>0?_pinnedFrac/cf:null)
    :((1-cf)>0?(_pinnedFrac-cf)/(1-cf):null);
  if(segNodeFrac===null||segNodeFrac<-0.01||segNodeFrac>1.01) return def;
  const matchNode=NODES.find(n=>Math.abs(n.frac-segNodeFrac)<0.003);
  if(!matchNode) return def;
  return {topY,botY,frac:matchNode.frac,harm:matchNode.harm,color};
}

// Redraws capo viz at updated position after capo handle moves, if a node is pinned.
// Uses segFrac (stable) + current cf to recompute position, matching refreshCapoRowHL logic.
function refreshCapoViz(){
  if(!nodeViz && !waveViz) return;
  if(_pinnedFrac===null||!_activeNode) return;
  const seg=_activeNode.segment;
  if(!seg) return;
  const cf_new=1-CAPO_NODES[capoNodeIdx].phi;
  const sf=(_activeNode.segFrac!==undefined)?_activeNode.segFrac:1.0;
  const new_frac=seg==='lower'?sf*cf_new:cf_new+sf*(1-cf_new);
  const newY=TY-new_frac*SPX;
  const harm=(_activeNode._origNode&&_activeNode._origNode.harm)?_activeNode._origNode.harm:1;
  const col=seg==='lower'?SUB_COL_LOWER:SUB_COL_UPPER;
  const cy_=capoYpx(), nutY_=nutEffY();
  const topY=seg==='lower'?cy_:nutY_;
  const botY=seg==='lower'?TY:cy_;
  triggerCapoViz(newY, col, [{topY, botY, frac:sf, harm, color:col}]);
}

function refreshCapoRowHL(){
  if(_pinnedFrac===null||!_activeNode) return;
  const rowHl=document.getElementById('row-hl');
  if(!rowHl) return;
  rowHl.innerHTML='';

  const seg=_activeNode.segment||null;
  let y;
  if(seg!==null){
    // Recompute position from current capo cf and the within-segment frac (segFrac).
    // segFrac is stable across capo position changes; _pinnedFrac is stale after a capo move.
    const cf_new=1-CAPO_NODES[capoNodeIdx].phi;
    const sf=(_activeNode.segFrac!==undefined)?_activeNode.segFrac:1.0;
    const new_frac=seg==='lower' ? sf*cf_new : cf_new+sf*(1-cf_new);
    y=TY - new_frac*SPX;
  } else {
    y=nY(_pinnedFrac);
  }

  const fillColor=seg==='lower'?'rgba(29,122,107,0.12)':
                  seg==='upper'?'rgba(122,58,29,0.12)':
                  'rgba(200,150,20,0.14)';

  Object.entries({x:0,y:y-16,width:SVG_W,height:32,fill:fillColor,rx:2})
    .forEach(([k,v])=>rect.setAttribute(k,v));
  rowHl.appendChild(rect);
}

const SUB_COL_LOWER='#1D7A6B'; // teal — lower segment (bridge→capo)
const SUB_COL_UPPER='#7A3A1D'; // dark amber — upper segment (capo→nut)

function updateCapoSubNodes(){
  const g=document.getElementById('capo-sub-nodes');
  if(!g) return;
  g.innerHTML='';
  if(nodeView!=='capo'){return;}

  const fund=fundFreq();
  const phi=CAPO_NODES[capoNodeIdx].phi; // fraction from NUT
  const cf=1-phi;  // capo fraction from BRIDGE (matches our frac coord system)
  const nutY=nutEffY(), speakingIn=effectiveSpeakingLength();
  const mkS=(tag,attrs,txt)=>{
    const el=document.createElementNS('http://www.w3.org/2000/svg',tag);
    for(const[k,v]of Object.entries(attrs)) el.setAttribute(k,v);
    if(txt!==undefined) el.textContent=txt;
    return el;
  };

  NODES.forEach(node=>{
    // ── Lower sub-node ──
    const lFrac = node.frac * cf;
    const lFreq = node.ratio * fund / cf;
    const lY    = TY - lFrac * SPX;
    const lCol  = SUB_COL_LOWER;
    const lIsPri= node.primary;
    const lR    = lIsPri ? 6 : 4;
    const lFS   = lIsPri ? 20 : 15;

    // circle
    g.appendChild(mkS('line',{x1:SX-(lIsPri?12:8),x2:SX+(lIsPri?12:8),y1:lY,y2:lY,
      stroke:lCol,'stroke-width':lIsPri?1.8:1.2,opacity:0.7}));
    const lCa={cx:SX,cy:lY,r:lR,fill:lIsPri?'rgba(29,122,107,0.12)':'none',
      stroke:lCol,'stroke-width':lIsPri?1.8:1.4,opacity:0.8};
    g.appendChild(mkS('circle',lCa));
    if(lIsPri) g.appendChild(mkS('circle',{cx:SX,cy:lY,r:2.5,fill:lCol,opacity:0.8}));
    // Home node ring — teal ring when this sub-node is a tonal center
    if(isTonalCenter(node.ratio)){
      g.appendChild(mkS('circle',{cx:SX,cy:lY,r:16,fill:'none',stroke:lCol,'stroke-width':2,opacity:0.55}));
    }

    // labels — conditional on capoSubLabelMode
    if(capoSubLabelMode==='both'||capoSubLabelMode==='lower'){
      const lNi2=noteInfo(lFreq);
      const lKd=lNi2.snapped?chromDeg(lNi2.midi,homeKey):'—';
      const lInKey=lNi2.snapped?isInKey(lNi2.midi):false;
      const lNoteStr=lNi2.snapped?lNi2.name+lNi2.octave:'—';
      const lKeyCol=lInKey?'#0F6E56':'#993C1D';
      const lRemapped=capoRulerPerspective==='fullstring'
        ?(lNi2.snapped?lKd:node.label)
        :(remapDegree(node.ratio)||node.label);
      const yOff=lFS*0.38;
      // str°
      g.appendChild(mkS('text',{x:SDEG_X,y:lY+yOff,'font-size':lFS,'font-weight':'500',
        'text-anchor':'middle',fill:lCol,opacity:0.75},node.label));
      // harmonic number superscript
      const lHarmFS=Math.max(8,Math.round(lFS*0.55));
      const _lht=mkS('text',{x:SX-lR-4,y:lY-lR+2,'font-size':lHarmFS,'text-anchor':'end',fill:'#B4B2A9',opacity:0.6});
      _lht.appendChild(document.createTextNode(node.harm+''));
      const _lhf=document.createElementNS('http://www.w3.org/2000/svg','tspan');
      _lhf.setAttribute('font-style','italic'); _lhf.textContent='f';
      _lht.appendChild(_lhf); g.appendChild(_lht);
      // home°
      g.appendChild(mkS('text',{x:HOME_X,y:lY+yOff,'font-size':lFS,'font-weight':'500',
        fill:lCol,opacity:0.85},lRemapped));
      // key° + note (snapped only)
      if(lNi2.snapped){
        g.appendChild(mkS('text',{x:KD_RX,y:lY+yOff,'font-size':lFS,'font-weight':'500',
          'text-anchor':'end',fill:lKeyCol},lKd));
        g.appendChild(mkS('text',{x:NOTE_X,y:lY+yOff,'font-size':lFS,'font-weight':'500',
          fill:lKeyCol},lNoteStr));
      }
    }

    // hit rect
    const lRowH=lFS+8;
    const lHit=mkS('rect',{x:0,y:lY-lRowH/2,width:SVG_W,height:lRowH,
      fill:'transparent',class:'row-hit'});
    lHit.addEventListener('mousedown',()=>{ try{
      _lastCapoSegment='lower';
      const pKey=node.frac*cf;
      if(_togglePin(pKey, false)){ playTone(lFreq); triggerCapoViz(lY, lCol, [{topY:capoYpx(), botY:TY, frac:node.frac, harm:node.harm, color:lCol}]); _showSubNode(node,'lower',lFreq,cf,lY); }
      else { playTone(lFreq); triggerCapoViz(lY, lCol, [{topY:capoYpx(), botY:TY, frac:node.frac, harm:node.harm, color:lCol}]); }
    }catch(e){} });
    lHit.addEventListener('mouseenter',()=>{ try{ if(_pinnedFrac!==null&&_pinnedFrac!==node.frac*cf) return; _showSubNode(node,'lower',lFreq,cf,lY); }catch(e){} });
    lHit.addEventListener('mouseleave',()=>{ try{ clearStrip(); if(!_pinnedFrac) hideLabel(); }catch(e){} });
    lHit.addEventListener('touchstart',()=>{ try{
      _lastCapoSegment='lower';
      const pKey=node.frac*cf;
      if(_togglePin(pKey, true)){ playTone(lFreq); triggerCapoViz(lY, lCol, [{topY:capoYpx(), botY:TY, frac:node.frac, harm:node.harm, color:lCol}]); _showSubNode(node,'lower',lFreq,cf,lY); }
      else { playTone(lFreq); triggerCapoViz(lY, lCol, [{topY:capoYpx(), botY:TY, frac:node.frac, harm:node.harm, color:lCol}]); }
    }catch(e){} },{passive:true});
    lHit.addEventListener('touchend',()=>{ try{ clearStrip(); if(!_pinnedFrac) hideLabel(); }catch(e){} },{passive:true});
    g.appendChild(lHit);

    // ── Upper sub-node ──
    const uFrac = cf + node.frac * (1-cf);
    const uFreq = node.ratio * fund / (1-cf);
    const uY    = TY - uFrac * SPX;
    const uCol  = SUB_COL_UPPER;
    const uIsPri= node.primary;
    const uR    = uIsPri ? 6 : 4;
    const uFS   = uIsPri ? 20 : 15;

    g.appendChild(mkS('line',{x1:SX-(uIsPri?12:8),x2:SX+(uIsPri?12:8),y1:uY,y2:uY,
      stroke:uCol,'stroke-width':uIsPri?1.8:1.2,opacity:0.7}));
    const uCa={cx:SX,cy:uY,r:uR,fill:uIsPri?'rgba(122,58,29,0.1)':'none',
      stroke:uCol,'stroke-width':uIsPri?1.8:1.4,opacity:0.8};
    g.appendChild(mkS('circle',uCa));
    if(uIsPri) g.appendChild(mkS('circle',{cx:SX,cy:uY,r:2.5,fill:uCol,opacity:0.8}));
    // Home node ring — amber ring when this sub-node is a tonal center
    if(isTonalCenter(node.ratio)){
      g.appendChild(mkS('circle',{cx:SX,cy:uY,r:16,fill:'none',stroke:uCol,'stroke-width':2,opacity:0.55}));
    }

    // labels — conditional on capoSubLabelMode
    if(capoSubLabelMode==='both'||capoSubLabelMode==='upper'){
      const uNi2=noteInfo(uFreq);
      const uKd=uNi2.snapped?chromDeg(uNi2.midi,homeKey):'—';
      const uInKey=uNi2.snapped?isInKey(uNi2.midi):false;
      const uNoteStr=uNi2.snapped?uNi2.name+uNi2.octave:'—';
      const uKeyCol=uInKey?'#0F6E56':'#993C1D';
      const uRemapped=capoRulerPerspective==='fullstring'
        ?(uNi2.snapped?uKd:node.label)
        :(remapDegree(node.ratio)||node.label);
      const yOff=uFS*0.38;
      // str°
      g.appendChild(mkS('text',{x:SDEG_X,y:uY+yOff,'font-size':uFS,'font-weight':'500',
        'text-anchor':'middle',fill:uCol,opacity:0.75},node.label));
      // harmonic number superscript
      const uHarmFS=Math.max(8,Math.round(uFS*0.55));
      const _uht=mkS('text',{x:SX-uR-4,y:uY-uR+2,'font-size':uHarmFS,'text-anchor':'end',fill:'#B4B2A9',opacity:0.6});
      _uht.appendChild(document.createTextNode(node.harm+''));
      const _uhf=document.createElementNS('http://www.w3.org/2000/svg','tspan');
      _uhf.setAttribute('font-style','italic'); _uhf.textContent='f';
      _uht.appendChild(_uhf); g.appendChild(_uht);
      // home°
      g.appendChild(mkS('text',{x:HOME_X,y:uY+yOff,'font-size':uFS,'font-weight':'500',
        fill:uCol,opacity:0.85},uRemapped));
      // key° + note (snapped only)
      if(uNi2.snapped){
        g.appendChild(mkS('text',{x:KD_RX,y:uY+yOff,'font-size':uFS,'font-weight':'500',
          'text-anchor':'end',fill:uKeyCol},uKd));
        g.appendChild(mkS('text',{x:NOTE_X,y:uY+yOff,'font-size':uFS,'font-weight':'500',
          fill:uKeyCol},uNoteStr));
      }
    }

    const uRowH=uFS+8;
    const uHit=mkS('rect',{x:0,y:uY-uRowH/2,width:SVG_W,height:uRowH,
      fill:'transparent',class:'row-hit'});
    uHit.addEventListener('mousedown',()=>{ try{
      _lastCapoSegment='upper';
      const pKey=cf+node.frac*(1-cf);
      if(_togglePin(pKey, false)){ playTone(uFreq); triggerCapoViz(uY, uCol, [{topY:nutEffY(), botY:capoYpx(), frac:node.frac, harm:node.harm, color:uCol}]); _showSubNode(node,'upper',uFreq,cf,uY); }
      else { playTone(uFreq); triggerCapoViz(uY, uCol, [{topY:nutEffY(), botY:capoYpx(), frac:node.frac, harm:node.harm, color:uCol}]); }
    }catch(e){} });
    uHit.addEventListener('mouseenter',()=>{ try{ if(_pinnedFrac!==null&&_pinnedFrac!==(cf+node.frac*(1-cf))) return; _showSubNode(node,'upper',uFreq,cf,uY); }catch(e){} });
    uHit.addEventListener('mouseleave',()=>{ try{ clearStrip(); if(!_pinnedFrac) hideLabel(); }catch(e){} });
    uHit.addEventListener('touchstart',()=>{ try{
      _lastCapoSegment='upper';
      const pKey=cf+node.frac*(1-cf);
      if(_togglePin(pKey, true)){ playTone(uFreq); triggerCapoViz(uY, uCol, [{topY:nutEffY(), botY:capoYpx(), frac:node.frac, harm:node.harm, color:uCol}]); _showSubNode(node,'upper',uFreq,cf,uY); }
      else { playTone(uFreq); triggerCapoViz(uY, uCol, [{topY:nutEffY(), botY:capoYpx(), frac:node.frac, harm:node.harm, color:uCol}]); }
    }catch(e){} },{passive:true});
    uHit.addEventListener('touchend',()=>{ try{ clearStrip(); if(!_pinnedFrac) hideLabel(); }catch(e){} },{passive:true});
    g.appendChild(uHit);
  });
}

// Show ruler/sidebar for a capo sub-node
function _showSubNode(node, seg, freq, cf, diagY){
  _activeSegment=seg;
  const col=seg==='lower'?SUB_COL_LOWER:SUB_COL_UPPER;
  // Build a pseudo-node for the ruler (frac within segment, ratio, etc)
  const segFrac = seg==='lower'
    ? node.frac  // sub_frac within [0,cf]
    : node.frac; // sub_frac within [0,1-cf]
  const pseudoNode={
    frac: seg==='lower' ? node.frac*cf : cf+node.frac*(1-cf),
    segFrac: node.frac,
    _origNode: node,  // reference to original NODES entry for refresh
    ratio: node.ratio,
    fs: node.fs, rs: node.rs, desc: node.desc,
    label: node.label, primary: node.primary,
    segment: seg, cf: cf, freq: freq
  };
  _activeFrac=pseudoNode.frac; _activeNode=pseudoNode;
  // True ratio of this node's freq to fundFreq() — for tension tone
  window._activeRatioFund = seg==='lower' ? node.ratio/cf : node.ratio/(1-cf);
  _lastStripArgs={frac:pseudoNode.frac, nodeLabel:node.label, color:col};
  // Row highlight at diagram y
  const rowHl=document.getElementById('row-hl');
  if(rowHl){
    rowHl.innerHTML='';
    const rect=document.createElementNS('http://www.w3.org/2000/svg','rect');
    Object.entries({x:0,y:diagY-16,width:SVG_W,height:32,
      fill:`rgba(${seg==='lower'?'29,122,107':'122,58,29'},0.12)`,rx:2})
      .forEach(([k,v])=>rect.setAttribute(k,v));
    rowHl.appendChild(rect);
  }
  drawRulerSVG(pseudoNode);
  // Sidebar
  const esl=effectiveSpeakingLength();
  const segLen = seg==='lower' ? cf*esl : (1-cf)*esl;
  const lowerIn=fmtLen(node.frac*segLen);
  const upperIn=fmtLen((1-node.frac)*segLen);
  const fund=fundFreq();
  const segFund = seg==='lower' ? fund/cf : fund/(1-cf);
  const lHz=Math.round(segFund*node.ratio);
  const uHz=node.frac<0.999?Math.round(segFund/(1-node.frac)):0;
  const lNi=noteInfo(segFund*node.ratio);
  const uNi=node.frac<0.999?noteInfo(segFund/(1-node.frac)):null;
  const lNote=lNi.snapped?lNi.name+lNi.octave:'—';
  const uNote=uNi&&uNi.snapped?uNi.name+uNi.octave:'—';
  const upper=document.getElementById('sb-upper');
  const lower=document.getElementById('sb-lower');
  const _rr=document.getElementById('rrail');
  const _H=_rr?(_rr.clientHeight||300):300;
  const _TOP=66,_BOT=54,_MH=_H-_TOP-_BOT;
  // Use pseudoNode.frac (full-string frac) for dot position, not segment-local frac
  const _dotY=(_H-_BOT)-pseudoNode.frac*_MH;
  const _dotFrac=_sbDotFrac(_H, _dotY);
  if(upper){ upper.style.flex=String(_dotFrac);
    upper.innerHTML=`<div class="sb-len">${upperIn}</div><div class="sb-hz">${uHz} Hz</div><div class="sb-note">${uNote}</div>`; }
  if(lower){ lower.style.flex=String(1-_dotFrac);
    lower.innerHTML=`<div class="sb-note">${lNote}</div><div class="sb-hz">${lHz} Hz</div><div class="sb-len">${lowerIn}</div>`; }
  // Update top tone strip right panel
  const _ni=noteInfo(freq);
  const _kd=_ni.snapped?chromDeg(_ni.midi,homeKey):'—';
  const _noteStr=_ni.snapped?_ni.name+_ni.octave:'—';
  const _inKey=_ni.snapped?isInKey(_ni.midi):false;
  const _keyCol=_inKey?'#0F6E56':'rgba(153,60,29,0.6)';
  const _dst=document.getElementById('nts-right');
  const _harmStr=node.harm?harmLabel(node.harm):'';
  const _homeLabel=capoRulerPerspective==='fullstring'
    ?(_ni.snapped?_kd:node.label)
    :(remapDegree(node.ratio)||node.label);
  const _upperFracStr=compFrac(node.fs);
  if(_dst) _dst.innerHTML=
    `<div style="display:flex;align-items:baseline;gap:4px;line-height:1;">
       <span style="font-size:18px;font-weight:500;color:#5F5E5A;">${node.label}</span>
       <span style="font-size:10px;color:#ccc;">·</span>
       <span style="font-size:18px;font-weight:500;color:${col};">${_homeLabel}</span>
       <span style="font-size:10px;color:#ccc;">·</span>
       <span style="font-size:18px;font-weight:500;color:${_keyCol};">${_kd}</span>
       <span style="font-size:10px;color:#ccc;">·</span>
       <span style="font-size:18px;font-weight:500;color:${_keyCol};">${_noteStr}</span>
     </div>
     <div style="display:flex;align-items:center;gap:5px;margin-top:2px;">
       <span style="font-size:10px;color:#aaa;">↑</span>
       <span style="font-size:11px;font-weight:600;color:${col};">${_upperFracStr}</span>
       <span style="font-size:10px;color:#ccc;">·</span>
       <span style="font-size:11px;font-weight:500;color:#555;">${upperIn}</span>
       ${_harmStr?`<span style="font-size:10px;color:#ccc;">·</span><span style="font-size:10px;color:#aaa;font-style:italic;">${_harmStr}</span>`:''}
     </div>`;
}

// ── Capo layer render ─────────────────────────────────────────────
function updateCapoLayer(){
  updateColHeaders();
  const layer=document.getElementById('capo-layer');
  if(nodeView!=='capo'){layer.setAttribute('display','none');return;}
  layer.setAttribute('display','');

  const fund=fundFreq();
  const speakingIn=effectiveSpeakingLength();
  const nutY=nutEffY();
  const cy=capoYpx();
  const cn=CAPO_NODES[capoNodeIdx];
  const cf=1-cn.phi; // capo frac from bridge
  const mainFS=30;

  // Update drag marker position
  document.getElementById('capo-drag-rect').setAttribute('y', cy-6);
  document.getElementById('capo-drag-line1').setAttribute('y1',cy-2);
  document.getElementById('capo-drag-line1').setAttribute('y2',cy-2);
  document.getElementById('capo-drag-line2').setAttribute('y1',cy+2);
  document.getElementById('capo-drag-line2').setAttribute('y2',cy+2);

  // Snap ticks with diagonal callout lines to fanned labels — all 9 always shown
  const ticksG=document.getElementById('capo-ticks');
  ticksG.innerHTML='';
  const labelHitsG=document.getElementById('capo-label-hits');
  labelHitsG.innerHTML=''; // cleared separately — renders last (top z-order) in capo-layer
  const mkT=(tag,attrs,txt)=>{const el=document.createElementNS('http://www.w3.org/2000/svg',tag);for(const[k,v]of Object.entries(attrs))el.setAttribute(k,v);if(txt!==undefined)el.textContent=txt;return el;};
  // LABEL_X: positioned between home° (HOME_X=502) and key° (KD_RX=592) columns
  // TICK_X2 shortened to 494 (14px right of string) — cleaner fan line connections
  const TICK_X1=466, TICK_X2=494, LABEL_X=528, LABEL_FS=20, MIN_GAP=LABEL_FS+6;

  // Compute fixed fan positions from ALL nodes sorted by ty (ascending = nut to bridge)
  const allNodes=CAPO_NODES.map((n,i)=>({n,i,ty:nutY+n.phi*(TY-nutY)}));
  allNodes.sort((a,b)=>a.ty-b.ty);
  const labelYs=allNodes.map(d=>d.ty);

  // Anchor P5 at its natural ty, spread upward then downward from there.
  // This keeps P5 (the most-used position) vertically aligned with its tick mark.
  const kP5=allNodes.findIndex(d=>d.n.abbr==='P5');
  // Spread upward from P5 anchor
  for(let pass=0;pass<30;pass++){
    for(let k=kP5-1;k>=0;k--){
      if(labelYs[k+1]-labelYs[k]<MIN_GAP) labelYs[k]=labelYs[k+1]-MIN_GAP;
    }
  }
  // Spread downward from P5 anchor
  for(let pass=0;pass<30;pass++){
    for(let k=kP5+1;k<labelYs.length;k++){
      if(labelYs[k]-labelYs[k-1]<MIN_GAP) labelYs[k]=labelYs[k-1]+MIN_GAP;
    }
  }

  // Draw all ticks + callout lines + labels
  allNodes.forEach((d,k)=>{
    const lY=labelYs[k];
    const isActive=d.i===capoNodeIdx;
    // Tick
    ticksG.appendChild(mkT('line',{x1:isActive?440:TICK_X1,x2:TICK_X2,y1:d.ty,y2:d.ty,
      stroke:CAPO_COL,'stroke-width':isActive?3.5:2.5}));
    // Callout line
    ticksG.appendChild(mkT('line',{x1:TICK_X2,x2:LABEL_X-2,y1:d.ty,y2:lY,
      stroke:CAPO_COL,'stroke-width':isActive?1.5:1,'stroke-dasharray':isActive?'':'3 2',opacity:isActive?1:0.6}));
    // Label: abbr · itvl
    const lblText=d.n.abbr+' · '+d.n.itvl;
    const lbl=mkT('text',{x:LABEL_X,y:lY+LABEL_FS*0.35,'font-size':LABEL_FS,
      'font-weight':isActive?'700':'500',fill:CAPO_COL,opacity:isActive?1:0.55});
    lbl.textContent=lblText; ticksG.appendChild(lbl);
    // Clickable hit — in capo-label-hits group (highest z-order), tight around text only
    const lHitW=Math.min(120, lblText.length*12+6);
    const lHit=mkT('rect',{x:LABEL_X-2,y:lY-LABEL_FS*0.7,width:lHitW,height:LABEL_FS+6,
      fill:'rgba(0,0,0,0)',style:'cursor:pointer;pointer-events:all;'});
    lHit.addEventListener('click',e=>{e.stopPropagation();setCapoNode(d.i);});
    lHit.addEventListener('touchend',e=>{e.stopPropagation();setCapoNode(d.i);},{passive:true});
    labelHitsG.appendChild(lHit);
  });

  // Annotation
  const annG=document.getElementById('capo-ann');
  annG.innerHTML='';
  const mkA=(tag,attrs,txt)=>{const el=document.createElementNS('http://www.w3.org/2000/svg',tag);for(const[k,v]of Object.entries(attrs))el.setAttribute(k,v);if(txt!==undefined)el.textContent=txt;return el;};

  // Full-width capo row hover target — rendered first (behind everything else in capo-ann,
  // drag-marker, and sub-nodes) so sub-node hit rects always take priority.
  const capoRowH=mainFS+10;
  const capoRowHit=mkA('rect',{x:0,y:cy-capoRowH/2,width:SVG_W,height:capoRowH,fill:'transparent',class:'row-hit'});
  capoRowHit.addEventListener('mouseenter',()=>{
    if(_pinnedFrac!==null&&_pinnedFrac!==cf) return;
    _showCapoEndNode('lower',cf);
  });
  capoRowHit.addEventListener('mouseleave',()=>{
    clearStrip();
    if(!_pinnedFrac){const rh=document.getElementById('row-hl');if(rh)rh.innerHTML='';}
  });
  capoRowHit.addEventListener('mousedown',e=>{
    const lFreq=capoLowerFreq();
    playTone(lFreq);
    if(_togglePin(cf, false)){
      document.getElementById('tone-row1').innerHTML=stripVoiceHTML(lFreq, 1-cn.phi, '↓ '+cn.abbr, CAPO_COL);
      _showCapoEndNode('lower',cf);
      triggerCapoViz(cy, CAPO_COL, [{topY:cy, botY:TY, frac:1.0, harm:1, color:SUB_COL_LOWER}]);
    }
  });
  capoRowHit.addEventListener('touchstart',e=>{
    const lFreq=capoLowerFreq();
    playTone(lFreq);
    if(_togglePin(cf, true)){
      document.getElementById('tone-row1').innerHTML=stripVoiceHTML(lFreq, 1-cn.phi, '↓ '+cn.abbr, CAPO_COL);
      _showCapoEndNode('lower',cf);
      triggerCapoViz(cy, CAPO_COL, [{topY:cy, botY:TY, frac:1.0, harm:1, color:SUB_COL_LOWER}]);
    }
  },{passive:true});
  annG.appendChild(capoRowHit);

  // Upper segment shading
  annG.appendChild(mkA('rect',{x:470,y:nutY,width:20,height:Math.max(0,cy-nutY),fill:'rgba(200,130,26,0.08)',rx:2}));

  // Handle label — abbr only, right-aligned just left of buttons
  annG.appendChild(mkA('text',{x:392,y:cy+mainFS*0.38,'font-size':mainFS,'font-weight':'600','text-anchor':'end',fill:CAPO_COL},cn.abbr));

  // ── Travelling play buttons — flush against left edge of drag handle (x=440) ──
  // Arrows only — interval info visible in lower rail snap buttons
  const BTN_X=400, BTN_W=38, BTN_H=28, BTN_R=5, BTN_GAP=18;
  const buttons=[
    {label:'▲', dy:-(BTN_H+BTN_GAP),
     action:()=>{ playTone(capoUpperFreq());
       triggerCapoViz(null, SUB_COL_UPPER, [{topY:nutY, botY:cy, frac:1.0, harm:1, color:SUB_COL_UPPER}]); },
     strip:()=>{ document.getElementById('tone-row1').innerHTML=stripVoiceHTML(capoUpperFreq(), cn.phi, '↑ '+cn.abbr, CAPO_COL); }},
    {label:'▲▼', dy:0,
     action:()=>{ playCapoBoth(); },
     strip:()=>showStripBoth()},
    {label:'▼', dy:BTN_H+BTN_GAP,
     action:()=>{ playTone(capoLowerFreq());
       triggerCapoViz(null, SUB_COL_LOWER, [{topY:cy, botY:TY, frac:1.0, harm:1, color:SUB_COL_LOWER}]); },
     strip:()=>{ document.getElementById('tone-row1').innerHTML=stripVoiceHTML(capoLowerFreq(), 1-cn.phi, '↓ '+cn.abbr, CAPO_COL); }},
  ];
  buttons.forEach(({label,dy,action,strip})=>{
    const bY=cy - BTN_H/2 + dy;
    const bg=mkA('rect',{x:BTN_X,y:bY,width:BTN_W,height:BTN_H,rx:BTN_R,
      fill:'rgba(200,130,26,0.15)',stroke:CAPO_COL,'stroke-width':0.75,style:'cursor:pointer;'});
    const txt=mkA('text',{x:BTN_X+BTN_W/2,y:bY+BTN_H*0.65,'font-size':14,
      'text-anchor':'middle',fill:CAPO_COL,'font-weight':'500',style:'pointer-events:none;'},label);
    bg.addEventListener('click',e=>{e.stopPropagation();action();strip();});
    bg.addEventListener('touchstart',e=>{e.stopPropagation();action();strip();},{passive:true});
    bg.addEventListener('mouseenter',()=>strip());
    bg.addEventListener('mouseleave',clearStrip);
    bg.addEventListener('mousedown',e=>e.stopPropagation());
    annG.appendChild(bg); annG.appendChild(txt);
  });

  updateCapoReadouts();
}



function setNutPreset(i, raw){
  let v=parseFloat(raw);
  if(isNaN(v)) return;
  if(!useInches) v=v/2.54;
  v=Math.max(0, Math.min(stringInches*0.85, v));
  nutPresets[i]=v;
  document.getElementById(`nut-pre-${i}`).value=fmtLen(v);
}
function saveNutPreset(i){
  nutPresets[i]=nutOffsetInches;
  document.getElementById(`nut-pre-${i}`).value=fmtLen(nutOffsetInches);
}
function applyNutPreset(i){
  applyNutOffset(nutPresets[i]);
  render();
  // Play fundamental at new speaking length, update strip, refresh viz
  const fund=fundFreq();
  playTone(fund);
  if(_pinnedFrac!==null){
    // Refresh strip for the pinned node at the new speaking length
    if(_lastStripArgs){
      const freq=_pinnedFrac>=0.999 ? fund : fund*((NODES.find(n=>Math.abs(n.frac-_pinnedFrac)<0.002)||{ratio:1}).ratio);
      showStrip(freq, _lastStripArgs.frac, _lastStripArgs.nodeLabel, _lastStripArgs.color);
    }
    refreshViz();
  } else {
    // Nothing pinned — just trigger viz for the fundamental/nut row
    triggerViz(1.0, 1, NY, '#533AB7');
  }
}
function applyNutOffset(v){
  nutOffsetInches=Math.max(0, Math.min(stringInches*0.85, v));
  if(nodeView==='nut'){
    const sl=effectiveSpeakingLength();
    document.getElementById('len-sl').value=sl;
    document.getElementById('len-ro').value=fmtLen(sl);
  }
  const ro=document.getElementById('nut-offset-ro');
  if(ro) ro.value=fmtLen(nutOffsetInches);
  const sro=document.getElementById('nut-speaking-ro');
  if(sro) sro.value=fmtLen(effectiveSpeakingLength());
  updateNutMarker();
}

// ── Music engine ──────────────────────────────────────────────────
const NOTES=['C','C#','D','D#','E','F','F#','G','G#','A','A#','B'];
const REF_HZ=261.63, REF_MIDI=60, SNAP_CENTS=25;
const CHROM=['1','♭2','2','♭3','3','4','♯4','5','♭6','6','♭7','7'];
let homeKey=7;
const GRAY='#B4B2A9';
// ── Home node color — change these two values to retheme all home node visuals ──
const HOME_COL='#C92CD5';       // home node accent (rings, circles, text, bars)
const HOME_COL_LIGHT='#F7E0F9'; // home node light fill (circle interior)

// ── Mode / scale system ───────────────────────────────────────────
// Interval sequences (semitone steps) for each mode/scale
const MODE_SCALES={
  ionian:         [2,2,1,2,2,2,1],
  dorian:         [2,1,2,2,2,1,2],
  phrygian:       [1,2,2,2,1,2,2],
  lydian:         [2,2,2,1,2,2,1],
  mixolydian:     [2,2,1,2,2,1,2],
  aeolian:        [2,1,2,2,1,2,2],
  locrian:        [1,2,2,1,2,2,2],
  harmonic_minor: [2,1,2,2,1,3,1],
  melodic_minor:  [2,1,2,2,2,2,1],
};
const MODE_NAMES={
  ionian:'Ionian', dorian:'Dorian', phrygian:'Phrygian',
  lydian:'Lydian', mixolydian:'Mixolydian', aeolian:'Aeolian',
  locrian:'Locrian', harmonic_minor:'Harmonic Minor', melodic_minor:'Melodic Minor',
};
let currentMode='ionian';

// Compute the 7 diatonic pitch classes for the current root + mode
function diatonicPitchClasses(){
  const steps=MODE_SCALES[currentMode];
  const pcs=new Set();
  let pc=homeKey;
  pcs.add(((pc%12)+12)%12);
  for(let i=0;i<6;i++){pc+=steps[i];pcs.add(((pc%12)+12)%12);}
  return pcs;
}

// Compute degree labels and note names for current scale
function scaleInfo(){
  const steps=MODE_SCALES[currentMode];
  const degrees=[], noteNames=[];
  let pc=homeKey;
  for(let i=0;i<7;i++){
    degrees.push(chromDeg(pc+60,homeKey));
    noteNames.push(NOTES[((pc%12)+12)%12]);
    pc+=steps[i];
  }
  return{degrees,noteNames};
}
function freqToMidi(f){return 12*Math.log2(f/REF_HZ)+REF_MIDI;}
function noteInfo(f){
  const midi=freqToMidi(f), r=Math.round(midi), cents=Math.round((midi-r)*100);
  return{midi:r,cents,name:NOTES[((r%12)+12)%12],octave:Math.floor(r/12)-1,snapped:Math.abs(cents)<=SNAP_CENTS};
}
function chromDeg(midi,kr){return CHROM[((midi%12+12)%12-(kr%12+12)%12+12)%12];}
function isInKey(midi){return diatonicPitchClasses().has(((midi%12)+12)%12);}

const MODE_DEGREE={ionian:1,dorian:2,phrygian:3,lydian:4,mixolydian:5,aeolian:6,locrian:7};
function setMode(mode, btn){
  currentMode=mode;
  document.querySelectorAll('.mode-btn').forEach(b=>b.classList.remove('on'));
  btn.classList.add('on');
  // 59: when auto-tune is on and a diatonic mode is selected, sync home node
  if(autoTune && MODE_DEGREE[mode]!==undefined){
    setHomeNode(MODE_DEGREE[mode]);
  }
  updateTuneBtn();
  updateScaleSpelling();
  render();
  _maybeAutoTune();
}

// ── Audio ─────────────────────────────────────────────────────────
let audioCtx=null, waveform='string', toneDuration=0.5, volume=0.65;
let polyOn=true;
let activeOsc=null, activeGain=null;

// Audio availability flag — probed at init time via a short timeout.
// If AudioContext creation hangs (sandboxed iframe), the probe times out
// and audio is permanently disabled for this session.
let _audioAvailable=true; // optimistic default; probe may disable it

function getCtx(){
  if(_disableFanOverlay) return null; // desktop iframe — audio + fans both disabled
  if(!_audioAvailable) return null;
  if(!audioCtx){
    try{ audioCtx=new(window.AudioContext||window.webkitAudioContext)(); }
    catch(e){ _audioAvailable=false; return null; }
  }
  return audioCtx;
}

// iOS audio unlock on first touch
document.addEventListener('touchstart',function unlock(){
  if(!_audioAvailable) return;
  const ctx=getCtx();
  if(!ctx) return;
  if(ctx.state==='suspended') ctx.resume().catch(()=>{});
  try{
    const buf=ctx.createBuffer(1,1,22050);
    const src=ctx.createBufferSource();
    src.buffer=buf; src.connect(ctx.destination); src.start(0);
  }catch(e){}
},{once:true,passive:true});

function stopActive(){
  if(activeGain){
    try{
      const t=audioCtx.currentTime;
      activeGain.gain.cancelScheduledValues(t);
      activeGain.gain.setValueAtTime(activeGain.gain.value,t);
      activeGain.gain.linearRampToValueAtTime(0,t+0.03);
    }catch(e){}
    activeOsc=null; activeGain=null;
  }
}

function playTone(freq){
  if(!freq||freq<16||freq>20000)return;
  try{
    const ctx=getCtx();
    if(!ctx) return;
    if(ctx.state==='suspended') ctx.resume().catch(()=>{});
    if(!polyOn) stopActive();
    const osc=ctx.createOscillator();
    const filter=ctx.createBiquadFilter();
    const gain=ctx.createGain();
    osc.connect(filter);
    filter.connect(gain);
    gain.connect(ctx.destination);

    // Waveform mapping
    if(waveform==='sine'){
      osc.type='sine';
      filter.type='lowpass';
      filter.frequency.value=20000;
      filter.Q.value=0.5;
    } else if(waveform==='warm'){
      osc.type='triangle';
      filter.type='lowpass';
      filter.frequency.value=Math.min(1000, freq*8);
      filter.Q.value=0.7;
    } else if(waveform==='string'){
      osc.type='sawtooth';
      filter.type='lowpass';
      filter.frequency.value=Math.min(900, freq*6);
      filter.Q.value=0.8;
    }

    osc.frequency.value=freq;
    const t=ctx.currentTime;
    gain.gain.setValueAtTime(0,t);
    gain.gain.linearRampToValueAtTime(volume,t+0.015);
    gain.gain.setValueAtTime(volume,t+toneDuration*0.82);
    gain.gain.linearRampToValueAtTime(0,t+toneDuration);
    osc.start(t);
    osc.stop(t+toneDuration+0.05);
    if(!polyOn){activeOsc=osc;activeGain=gain;}
  }catch(e){}
}

function setWaveform(w,btn){
  waveform=w;
  document.querySelectorAll('#wav-sine,#wav-warm,#wav-string').forEach(b=>b.classList.remove('on'));
  btn.classList.add('on');
}
function setPoly(on,btn){
  polyOn=on;
  if(!on) stopActive();
  btn.parentElement.querySelectorAll('.tog').forEach(b=>b.classList.remove('on'));
  btn.classList.add('on');
}

// ── Tune to key ───────────────────────────────────────────────────
// Calculate tension needed so fundamental matches home key root (nearest octave)
// f = (1/2L)*sqrt(T/mu)  →  T = (2*L*f)^2 * mu
// Find nearest octave of home key root within playable range
let _tuneSeqTimer=null; // pending sequential tone timer — cancelled on new tune call
let capoArp=false;      // capo arp mode: play individual voices then chord on snap
let nodeViz=true;       // pulsing circle animation on node press
let waveViz=true;       // standing wave visualization on node press
let vizNodeAmp=30;      // node viz circle scale (amp units, same range as wave)
let vizNodeDur=3.0;     // node viz fade duration in seconds
let vizWaveAmp=60;      // wave arch half-amplitude px
let vizWaveDur=3.0;     // wave viz fade duration in seconds
// Legacy aliases — kept so any remaining refs don't break
Object.defineProperty(window,'vizAmp',{get:()=>vizWaveAmp,set:v=>{vizWaveAmp=v;}});
Object.defineProperty(window,'vizDur',{get:()=>vizWaveDur,set:v=>{vizWaveDur=v;}});
// for independent control of each viz type's appearance and timing.
let _arpTimers=[];      // array of pending arp step timers

function clearArpTimers(){
  _arpTimers.forEach(t=>clearTimeout(t));
  _arpTimers=[];
  if(_tuneSeqTimer){ clearTimeout(_tuneSeqTimer); _tuneSeqTimer=null; }
}

// Play capo transition: old interval → new interval.
// Chord-only (capoArp=false): old chord simultaneously → gap → new chord simultaneously.
// Arp (capoArp=true): old lower → old upper → old chord → gap → new lower → new upper → new chord.
function playCapoTransition(oldU, oldL, newU, newL){
  clearArpTimers();
  const D=toneDuration*1000, G=toneSpacing*1000;
  if(!capoArp){
    stopActive();
    playTone(oldU); playTone(oldL);
    _arpTimers.push(setTimeout(()=>{ stopActive(); playTone(newU); playTone(newL); }, D+G));
  } else {
    stopActive();
    playTone(oldL);
    _arpTimers.push(setTimeout(()=>{ playTone(oldU); },        D));
    _arpTimers.push(setTimeout(()=>{ playTone(oldU); playTone(oldL); }, D*2));
    _arpTimers.push(setTimeout(()=>{ playTone(newL); },        D*3+G));
    _arpTimers.push(setTimeout(()=>{ playTone(newU); },        D*4+G));
    _arpTimers.push(setTimeout(()=>{ playTone(newU); playTone(newL); }, D*5+G));
  }
}

// ── Node / Wave Visualization ─────────────────────────────────────
// All viz code is contained here. State flags: nodeViz, waveViz.
// Entry points:
//   triggerViz(frac, harm, svgY, color)        — full-string and nut view
//   triggerCapoViz(svgY, nodeColor, segs)       — capo view
//     segs: [{topY,botY,frac,harm,color}, ...]
// Safe to disable by setting both flags false — no other code
// depends on this section. SVG group #viz-layer is always present
// but empty when both flags are off.
//
// vizAmp controls wave arch amplitude and node circle size.
// vizDur controls fade duration, shared by both viz types.
// Future: consider vizNodeAmp, vizWaveAmp, vizNodeDur, vizWaveDur
// for independent control of each viz type's amplitude and timing.

function toggleNodeViz(){ nodeViz=!nodeViz; }
function toggleWaveViz(){ waveViz=!waveViz; }

function clearViz(){
  const vl=document.getElementById('viz-layer');
  if(vl) vl.innerHTML='';
}

// Node viz: three concentric circles at node position, fading over vizDur.
// vizAmp scales the circle radii (base radii: 12, 22, 32 at vizAmp=18).
// If a node is pinned, stays visible without fading.
function _drawNodeViz(svgY, color){
  const vl=document.getElementById('viz-layer');
  if(!vl) return;
  const scale=vizNodeAmp/18;
  const g=document.createElementNS('http://www.w3.org/2000/svg','g');
  if(_pinnedFrac===null){
    g.style.animation=`vizFadeOut ${vizNodeDur}s ease-out forwards`;
  }
  [12,22,32].forEach((r,i)=>{
    const c=document.createElementNS('http://www.w3.org/2000/svg','circle');
    c.setAttribute('cx',SX); c.setAttribute('cy',svgY);
    c.setAttribute('r',Math.max(2,Math.round(r*scale)));
    c.setAttribute('fill','none');
    c.setAttribute('stroke',color); c.setAttribute('stroke-width','1.5');
    c.setAttribute('opacity',String(0.7-i*0.2));
    g.appendChild(c);
  });
  vl.appendChild(g);
}

// Shared segment wave helper — appends harm arches to group g,
// spanning from topY (segment top) to botY (segment bottom).
// frac: node position in segment (1.0=top, 0.0=bottom).
// Arches above the node are dashed; arches below are solid.
// extraOpacity: override opacity (used for non-speaking zone in nut view).
function _drawSegmentWave(g, topY, botY, frac, harm, color, extraOpacity){
  if(!harm||harm<1) return;
  const segH=botY-topY;
  const archH=segH/harm;
  const archesAbove=Math.round(harm*(1-frac));
  for(let k=0;k<harm;k++){
    const y1=topY+k*archH, y2=topY+(k+1)*archH, midY=(y1+y2)/2;
    const dir=(k%2===0)?-vizWaveAmp:vizWaveAmp; // alternating left/right
    const p=document.createElementNS('http://www.w3.org/2000/svg','path');
    p.setAttribute('d',`M ${SX} ${y1.toFixed(1)} Q ${(SX+dir).toFixed(1)} ${midY.toFixed(1)} ${SX} ${y2.toFixed(1)}`);
    p.setAttribute('fill','none');
    p.setAttribute('stroke',color); p.setAttribute('stroke-width','1.8');
    if(k<archesAbove) p.setAttribute('stroke-dasharray','5 4');
    if(extraOpacity!==undefined) p.setAttribute('opacity',String(extraOpacity));
    g.appendChild(p);
  }
}

// Full-string / nut-height wave viz.
// Draws harm arches from speaking top to bridge; dashed above node, solid below.
// In nut view also extends dashed continuation above effective nut up to main nut.
function _drawWaveViz(frac, harm, color){
  if(nodeView==='capo') return; // capo handled by _drawCapoWaveViz
  const vl=document.getElementById('viz-layer');
  if(!vl||!harm||harm<1) return;
  const speakingTop=(nodeView==='nut')?nutEffY():NY;
  const g=document.createElementNS('http://www.w3.org/2000/svg','g');
  if(_pinnedFrac===null){
    g.style.animation=`vizFadeOut ${vizWaveDur}s ease-out forwards`;
  }
  _drawSegmentWave(g, speakingTop, TY, frac, harm, color, undefined);
  vl.appendChild(g);
}

// Capo wave viz — draws waves for one or both segments.
// segs: [{topY, botY, frac, harm, color}, ...]
// topY/botY are SVG y-coordinates of segment boundaries.
// frac is the node position within the segment (1.0=top, 0.0=bottom).
function _drawCapoWaveViz(segs){
  const vl=document.getElementById('viz-layer');
  if(!vl) return;
  const g=document.createElementNS('http://www.w3.org/2000/svg','g');
  if(_pinnedFrac===null){
    g.style.animation=`vizFadeOut ${vizWaveDur}s ease-out forwards`;
  }
  segs.forEach(({topY,botY,frac,harm,color})=>{
    _drawSegmentWave(g,topY,botY,frac,harm,color,undefined);
  });
  vl.appendChild(g);
}

// Full-string / nut-height entry point.
// frac: node position (1.0=nut/top, 0.0=bridge). harm: harmonic number.
// svgY: SVG y-coord of node. color: node display color.
// Last viz args — stored so refreshViz() can redraw at updated svgY after nut/capo moves
let _lastVizArgs=null, _lastCapoVizArgs=null;

function triggerViz(frac, harm, svgY, color){
  _lastVizArgs={frac, harm, svgY, color};
  _lastCapoVizArgs=null;
  clearViz();
  if(nodeViz) _drawNodeViz(svgY, color);
  if(waveViz) _drawWaveViz(frac, harm, color);
}

// Capo entry point.
// svgY: SVG y for node circles (null = skip node viz, e.g. "both" button).
// nodeColor: color for circles. segs: segment wave data array.
function triggerCapoViz(svgY, nodeColor, segs){
  _lastCapoVizArgs={svgY, nodeColor, segs};
  _lastVizArgs=null;
  clearViz();
  if(nodeViz && svgY!==null) _drawNodeViz(svgY, nodeColor);
  if(waveViz) _drawCapoWaveViz(segs);
}

// Refresh viz at updated node position — call after nut drag
// to keep wave/node viz aligned with the redrawn diagram.
// For capo position changes, clearViz() is called directly.
function refreshViz(){
  if(!nodeViz && !waveViz) return;
  if(!_lastVizArgs) return;
  // Recompute svgY from current nut position using nY(frac)
  const newY=nY(_lastVizArgs.frac);
  triggerViz(_lastVizArgs.frac, _lastVizArgs.harm, newY, _lastVizArgs.color);
}

function tuneToKey(){
  const L=effectiveSpeakingLength()*IN_TO_M, mu=muKgM;
  const rootPc=homeKey;
  const tc=homeNodeRatio(); // home node ratio relative to fundamental

  // Capture the "before" frequency — pinned node if any, else fundamental
  const _beforeFreq = (_activeNode && window._activeRatioFund)
    ? fundFreq() * window._activeRatioFund
    : fundFreq();

  // In capo mode, always tune so the LOWER segment's home node = key root.
  // Lower segment fundamental = fundFreq()/cf, so fundTarget = keyRoot * cf / homeNodeRatio.
  // Upper segment follows automatically from physics (e.g. P5 above for a P5 capo).
  let segScale=1;
  if(nodeView==='capo'){
    const phi=CAPO_NODES[capoNodeIdx].phi;
    const cf=1-phi;
    segScale = capoTuneTarget==='lower' ? cf : (1-cf);
  }

  // Score candidates by distance to 5 lbs sweet spot (calibration point / comfortable mid-range).
  // This prefers middle octaves over very low or very high tensions regardless of current setting.
  const TUNE_SWEET=5.0;
  let bestT=null;
  for(let oct=0;oct<=5;oct++){
    const midi=rootPc+(oct+1)*12;
    const tcTargetFreq=REF_HZ*Math.pow(2,(midi-REF_MIDI)/12);
    // Fundamental target = segment-scaled key root / home node ratio
    const fundTargetFreq=tcTargetFreq*segScale/tc;
    const T=Math.pow(2*L*fundTargetFreq,2)*mu;
    const lbs=T/LBS_TO_N;
    if(lbs>=0.5&&lbs<=15){
      if(bestT===null||Math.abs(lbs-TUNE_SWEET)<Math.abs(bestT-TUNE_SWEET)){
        bestT=lbs;
      }
    }
  }
  if(bestT===null) return;
  tensionLbs=Math.max(0.5,Math.min(15,bestT));
  document.getElementById('ten-sl').value=tenValToSl(tensionLbs);
  document.getElementById('ten-ro').value=tensionLbs.toFixed(1)+' lbs';
  render();

  // Capture "after" frequency using the same ratio against the new tension
  const _afterFreq = (_activeNode && window._activeRatioFund)
    ? fundFreq() * window._activeRatioFund
    : fundFreq();

  // Cancel any pending sequential tone and play before→pause→after
  if(_tuneSeqTimer){ clearTimeout(_tuneSeqTimer); _tuneSeqTimer=null; }
  stopActive();
  playTone(_beforeFreq);
  _tuneSeqTimer=setTimeout(()=>{
    stopActive();
    playTone(_afterFreq);
    // Always trigger viz for the after tone — pinned node or fundamental
    const _vizFrac=_pinnedFrac!==null ? _pinnedFrac : 1.0;
    const _vizHarm=_pinnedFrac!==null
      ? (NODES.find(n=>Math.abs(n.frac-_vizFrac)<0.002)||{harm:1}).harm : 1;
    const _vizY=_pinnedFrac!==null ? nY(_vizFrac) : (nodeView==='nut' ? nutEffY() : NY);
    const _vizCol=_lastVizArgs ? _lastVizArgs.color : '#533AB7';
    triggerViz(_vizFrac, _vizHarm, _vizY, _vizCol);
    _tuneSeqTimer=null;
  }, toneDuration*1000 + toneSpacing*1000);
}

function updateTuneBtn(){
  const label='Tune to '+NOTES[homeKey];
  const label2='Tune String to '+NOTES[homeKey]+' '+MODE_NAMES[currentMode];
  document.getElementById('tune-btn').textContent=label;
  const btn2=document.getElementById('tune-btn2');
  if(btn2) btn2.textContent=label2;
  // Compute both segment note names for the capo root toggle
  const phi=CAPO_NODES[capoNodeIdx].phi;
  const cf=1-phi;
  // semitones upper is above lower = 12*log2(cf/phi)
  const semitones=Math.round(12*Math.log2(cf/phi));
  // Option A: lower=root → upper=root+semitones
  const upperNoteA=NOTES[((homeKey+semitones)%12+12)%12];
  // Option B: upper=root → lower=root-semitones
  const lowerNoteB=NOTES[((homeKey-semitones)%12+12)%12];
  const el_lo_lo=document.getElementById('crt-lo-lo');
  const el_lo_hi=document.getElementById('crt-lo-hi');
  const el_up_lo=document.getElementById('crt-up-lo');
  const el_up_hi=document.getElementById('crt-up-hi');
  if(el_lo_lo) el_lo_lo.textContent='↓'+NOTES[homeKey];
  if(el_lo_hi) el_lo_hi.textContent='↑'+upperNoteA;
  if(el_up_lo) el_up_lo.textContent='↓'+lowerNoteB;
  if(el_up_hi) el_up_hi.textContent='↑'+NOTES[homeKey];
}

// ── My Bass Defaults ──────────────────────────────────────────────
// Session-editable preset. Initializes to calibrated values:
// 69" string, 5 lbs tension, mu=0.000754 kg/m (G1 at 49 Hz)
// Apply: copies defaults fields → physics sliders + triggers render
// Use Current: copies live physics values → defaults fields

function resetDefaults(){
  // Restore hardcoded master defaults — always 69", 5.0 lbs, 0.000754 kg/m
  document.getElementById('def-len').value=fmtLen(69);
  document.getElementById('def-ten').value='5.0 lbs';
  document.getElementById('def-mu').value=(0.000754).toFixed(6);
}

function applyDefaults(){
  let len=parseFloat(document.getElementById('def-len').value);
  let ten=parseFloat(document.getElementById('def-ten').value);
  let mu=parseFloat(document.getElementById('def-mu').value);
  if(isNaN(len)) len=69;
  if(isNaN(ten)) ten=5.0;
  if(isNaN(mu))  mu=0.000754;
  if(!useInches) len=len/2.54;
  len=Math.max(24,Math.min(200,len));
  ten=Math.max(0.5,Math.min(15,ten));
  mu=Math.max(0.0001,Math.min(0.005,mu));

  // In nut height mode: preserve the speaking length ratio when string length changes
  // nutOffset scales proportionally to the new string length
  if(nodeView==='nut' && stringInches>0){
    const ratio=nutOffsetInches/stringInches;
    stringInches=len;
    nutOffsetInches=Math.max(0,Math.min(len*0.85, ratio*len));
  } else {
    stringInches=len;
  }
  tensionLbs=ten; muKgM=mu;

  // Update sliders and readouts
  if(nodeView==='nut'){
    const sl=effectiveSpeakingLength();
    document.getElementById('len-sl').value=sl;
    document.getElementById('len-ro').value=fmtLen(sl);
    const ro=document.getElementById('nut-offset-ro');
    if(ro) ro.value=fmtLen(nutOffsetInches);
  } else {
    document.getElementById('len-sl').value=len;
    document.getElementById('len-ro').value=fmtLen(len);
  }

// Tension: slider 10-150 maps to 1.0-15.0 lbs
// Mu: slider 1-100 maps logarithmically to 0.0001-0.005 kg/m
function tenSlToVal(sv){return sv/10;}
function tenValToSl(v){return Math.round(v*10);}
function muSlToVal(sv){return 0.0001*Math.pow(0.005/0.0001,(sv-1)/99);}
function muValToSl(v){return Math.round(1+99*Math.log(v/0.0001)/Math.log(0.005/0.0001));}

function syncSlider(key,sv){
  const n=parseFloat(sv);
  if(key==='dur'){toneDuration=n;document.getElementById('dur-ro').value=n.toFixed(1)+' s';}
  else if(key==='vol'){volume=n/100;document.getElementById('vol-ro').value=Math.round(n)+'%';}
  else if(key==='spc'){toneSpacing=Math.max(0,Math.min(1.0,n));}
  else if(key==='len'){ _clearPin();
    const n=parseFloat(sv);
    if(nodeView==='nut'){
      // In nut height mode, slider controls effective speaking length
      // so adjust nut offset to achieve that speaking length
      const newSpeaking=Math.max(10, Math.min(stringInches, n));
      nutOffsetInches=stringInches-newSpeaking;
      document.getElementById('len-ro').value=fmtLen(newSpeaking);
    } else {

  else if(key==='ten'){tensionLbs=tenSlToVal(n);document.getElementById('ten-ro').value=tensionLbs.toFixed(1)+' lbs';render();}
  else if(key==='mu'){ _clearPin(); muKgM=muSlToVal(n);document.getElementById('mu-ro').value=muKgM.toFixed(6);render();}
}
function syncReadout(key,raw){

const SX=480, TY=1310, NY=78, SPX=1232, SVG_W=1380;

// ── Chromatic passing-note ticks ──────────────────────────────────
// One ET semitone above each lower-pitch (higher-frac) node neighbour
// in the six M2 gaps: nut→str°2, str°4→5, str°6→7 (both octaves).
// NOTE: tick positions are calculated using equal temperament (2^(-1/12)),
// not just intonation. The actual pinch-fret pitch at these positions is
// only approximately equal to the ET value used for placement (~±few cents).
// For practical playing guidance this is acceptable, but labels derived from
// these positions carry that approximation. This is documented in the README.
const _SEMI=Math.pow(2,-1/12);
// Ticks at 1 ET semitone above each lower node in every whole-step gap:
// nut→2 (9/8), 2→3 (10/9), 4→5 (9/8), 5→6 (10/9), 6→7 (9/8) — both octaves
const CHROM_TICKS=[1.0, 8/9, 3/4, 2/3, 3/5, 1/2, 4/9, 3/8, 1/3, 3/10].map(f=>f*_SEMI);

// Patch render() to populate dyn-chrom-ticks after each full render
const _render_chromTicks=render;
render=function(){
  _render_chromTicks();
  const ctG=document.getElementById('dyn-chrom-ticks');
  if(!ctG) return;
  ctG.innerHTML='';
  if(nodeView==='capo') return; // sub-node layers fill this space in capo mode
  const nutY=nutEffY();
  const fund=fundFreq();
  const lFS=15; // fixed label font size — smaller than node labels, visually distinct
  CHROM_TICKS.forEach(frac=>{
    const y=nY(frac);
    if(y<nutY-2||y>TY+2) return; // outside visible string zone
    // Tick line — extended to pill edge when labeled, standard width otherwise
    const freq=fund/frac;
    const ni=noteInfo(freq);
    const tickLabeled=ni.snapped&&isInKey(ni.midi);
    ctG.appendChild(mk('line',{
      x1:SX-7,x2:tickLabeled?556:SX+7,y1:y,y2:y,
      stroke:'currentColor','stroke-width':'1.5',opacity:'0.65'
    }));
    // Label only if diatonic to current key — no str°, no home°, no interaction
    // NOTE: frequency is ET-based (2^(-1/12) offset) — an approximation, not JI
    if(tickLabeled){
      const kd=chromDeg(ni.midi,homeKey);
      const noteStr=ni.name+ni.octave;
      const yOff=lFS*0.38;
      // Grey background pill behind key° + note columns
      ctG.appendChild(mk('rect',{x:554,y:y-lFS*0.72,width:104,height:lFS+4,rx:3,
        fill:'rgba(128,128,128,0.12)'}));
      // key° right-aligned with 4px right padding — green, same as diatonic in-key nodes
      ctG.appendChild(mk('text',{x:KD_RX-4,y:y+yOff,'font-size':lFS,'font-weight':'700',
        'text-anchor':'end',fill:'#0F6E56'},kd));
      // note name at NOTE_X
      ctG.appendChild(mk('text',{x:NOTE_X,y:y+yOff,'font-size':lFS,'font-weight':'700',
        fill:'#0F6E56'},noteStr));

};
const SDEG_X=438;                        // string degree — fixed, left of string, dark grey bold

// ── Home node ─────────────────────────────────────────────────────
// homeNode: 1-7 (scale degree). 1 = fundamental, 5 = fifth node, etc.
let homeNode=1;

// Just intonation ratios for degrees 1-7
const DEGREE_RATIOS=[1, 9/8, 5/4, 4/3, 3/2, 5/3, 15/8];
const DEGREE_LABELS=['1','2','3','4','5','6','7'];

// Ratio of home node relative to fundamental
function homeNodeRatio(){
  return DEGREE_RATIOS[homeNode-1];
}

// Map a node's ratio to a degree label relative to current home node.
// Algorithm: octave-reduce nodeRatio, look up the corresponding str° (1–7)
// by exact match against DEGREE_RATIOS, then rotate by homeNode offset.
// This is a clean modular rotation — TC° = ((strDeg − homeNode + 7) % 7) + 1.
// Returns null when homeNode===1 (caller falls back to node.label = str°).
function remapDegree(nodeRatio){
  if(homeNode===1) return null;
  let r=nodeRatio;
  if(!isFinite(r)||r<=0) return null;
  let _i=0; while(r>=2&&_i++<60) r/=2;
  _i=0;     while(r<1 &&_i++<60) r*=2;
  // Exact match against the 7 JI degree ratios (EPS well below minimum gap of ~0.083)
  const EPS=0.02;
  let strDeg=null;
  DEGREE_RATIOS.forEach((dr,i)=>{ if(Math.abs(r-dr)<EPS) strDeg=i+1; });
  if(strDeg===null) return null;
  const tc=((strDeg-homeNode+7)%7)+1;
  return DEGREE_LABELS[tc-1];
}

// Is this node the home node (new 1)?
function isTonalCenter(nodeRatio){
  if(homeNode===1){
    let r=nodeRatio;
    if(!isFinite(r)||r<=0) return false;
    let _i=0; while(r>=2&&_i++<60) r/=2;
    _i=0;     while(r<1 &&_i++<60) r*=2;
    return Math.abs(r-1)<0.001;
  }
  const hn=homeNodeRatio();
  let interval=nodeRatio/hn;
  if(!isFinite(interval)||interval<=0) return false;
  let _i=0; while(interval>=2&&_i++<60) interval/=2;
  _i=0;     while(interval<1 &&_i++<60) interval*=2;
  return Math.abs(interval-1)<0.001;
}

// Effective nut Y — moves down in nut height view
function nutEffY(){
  if(nodeView!=='nut') return NY;
  return NY + (nutOffsetInches/stringInches)*SPX;
}
// Node Y — compressed into speaking length zone
function nY(frac){
  const nutY=nutEffY();
  const speakingPx=TY-nutY;
  return TY - frac*speakingPx;
}
function barW(ratio){return Math.min((ratio/BMR)*BMW,BMW);}

function getNodeYS(){return NODES.map(n=>nY(n.frac));}

function fontSize(i, nodeYS){
  const y=nodeYS[i];
  const nutY=nutEffY();
  const above=i>0?nodeYS[i-1]:nutY;
  const below=i<nodeYS.length-1?nodeYS[i+1]:TY;
  const space=Math.min(y-above,below-y);
  return Math.round(Math.max(11,Math.min(36,space*1.4)));
}

function capoSnapFromRawPhi(rawPhi){
  const phi=Math.max(0.05, Math.min(0.95, rawPhi));
  let best=0, bestDist=Infinity;
  CAPO_NODES.forEach((cn,i)=>{const d=Math.abs(cn.phi-phi);if(d<bestDist){bestDist=d;best=i;}});
  if(best!==capoNodeIdx){
    clearViz();
    const _oldU=_capoSegFreq('upper'), _oldL=_capoSegFreq('lower');
    capoNodeIdx=best;
    document.querySelectorAll('.capo-snap-btn').forEach((b,i)=>b.classList.toggle('on',i===best));
    render();
    refreshCapoRowHL();
    refreshCapoViz();
    const _newU=_capoSegFreq('upper'), _newL=_capoSegFreq('lower');
    playCapoTransition(_oldU, _oldL, _newU, _newL);
  }
}

function resolveColor(node,snapped,inKey,isHome){
  if(isHome)       return{fill:HOME_COL_LIGHT,stroke:HOME_COL,dot:HOME_COL,text:HOME_COL,bar:HOME_COL,dash:false};
  if(!snapped)     return{fill:'none',stroke:GRAY,dot:GRAY,text:GRAY,bar:GRAY,dash:true};
  if(node.primary) return inKey
    ?{fill:'var(--inkey-fill)',stroke:'var(--inkey)',dot:'var(--inkey)',text:'var(--inkey)',bar:'var(--inkey)',dash:false}
    :{fill:'#FAECE7',stroke:'rgba(153,60,29,0.6)',dot:'rgba(153,60,29,0.6)',text:'rgba(153,60,29,0.6)',bar:'rgba(216,90,48,0.6)',dash:false};
  return inKey
    ?{fill:'none',stroke:'var(--inkey)',dot:'var(--inkey)',text:'var(--inkey)',bar:'var(--inkey)',dash:false}
    :{fill:'none',stroke:'rgba(216,90,48,0.6)',dot:'rgba(216,90,48,0.6)',text:'rgba(216,90,48,0.6)',bar:'rgba(216,90,48,0.6)',dash:false};
}

function mk(tag,attrs,txt){
  const el=document.createElementNS('http://www.w3.org/2000/svg',tag);
  for(const[k,v]of Object.entries(attrs))el.setAttribute(k,v);
  if(txt!==undefined)el.textContent=txt;
  return el;
}

// ── Tone info strip ───────────────────────────────────────────────
function showStrip(freq, frac, nodeLabel, color){
  const fund=fundFreq();
  const lowerIn=frac*stringInches;
  const upperIn=(1-frac)*stringInches;
  const upperFreq=frac<1 ? fund/(1-frac) : 0;
  const ni=noteInfo(freq);
  const ui=upperFreq>0?noteInfo(upperFreq):null;
  const kd=ni.snapped?chromDeg(ni.midi,homeKey):'—';
  const inKey=ni.snapped?isInKey(ni.midi):false;
  const noteStr=ni.snapped?ni.name+ni.octave:'—';
  const col=color||'#533AB7';
  const keyCol=inKey?'#0F6E56':'rgba(153,60,29,0.6)';
  const upperNoteStr=ui&&ui.snapped?ui.name+ui.octave:'—';
  const upperFreqStr=upperFreq>0?upperFreq.toFixed(1)+' Hz':'—';

  document.getElementById('tone-row1').innerHTML=
    `<div class="strip-large">`+
      `<span class="strip-deg" style="color:${col}">${nodeLabel}</span>`+
      `<span class="strip-keydeg" style="color:${keyCol}">${kd}</span>`+
      `<span class="strip-note" style="color:${keyCol}">${noteStr}</span>`+
      `<span class="strip-freq" style="color:${col}">${freq.toFixed(1)} Hz</span>`+
    `</div>`+
    `<div class="strip-divider"></div>`+
    `<div class="strip-segs">`+
      `<div class="strip-seg-row" style="color:${col}">\u2191 upper: <strong>${fmtLen(upperIn)}</strong> \u00b7 ${upperFreqStr} \u00b7 ${upperNoteStr}</div>`+
      `<div class="strip-seg-row" style="color:${col}">\u2193 lower: <strong>${fmtLen(lowerIn)}</strong> \u00b7 ${freq.toFixed(1)} Hz \u00b7 ${noteStr}</div>`+
    `</div>`;
}

const RX=172, RHW=10, RLX=160, RULER_COL='#533AB7', RULER_FS=11;

function gcdFn(a,b){return b===0?a:gcdFn(b,a%b);}
function complementFrac(fs){
  const p=fs.split('/');
  if(p.length!==2) return '';
  const n=parseInt(p[0]),d=parseInt(p[1]),cn=d-n,g=gcdFn(cn,d);
  return cn===0?'0':`${cn/g}/${d/g}`;
}
