<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Washtub Bass String Map</title>
<style>
*{box-sizing:border-box;}
body{margin:0;padding:0;font-family:system-ui,sans-serif;background:#fff;color:#1a1a1a;font-size:13px;overflow:hidden;}
:root{--inkey:#1a1a1a;--inkey-fill:rgba(0,0,0,0.06);}
@media(prefers-color-scheme:dark){body{background:#1a1a1a;color:#e0e0e0;}:root{--inkey:#d8d8d0;--inkey-fill:rgba(255,255,255,0.08);}}
#ctrl-bar{background:rgba(128,128,128,0.07);border:0.5px solid rgba(128,128,128,0.2);border-radius:10px;padding:10px 14px;margin-bottom:10px;}
.ctrl-sep{height:0.5px;background:rgba(128,128,128,0.2);margin:8px 0;}
.ctrl-row{display:flex;align-items:center;gap:10px;flex-wrap:wrap;}
.ctrl-col{display:flex;flex-direction:column;gap:3px;}
.ctrl-vsep{width:0.5px;background:rgba(128,128,128,0.2);align-self:stretch;margin:0 2px;}
.sec-lbl{font-size:10px;color:#888;text-transform:uppercase;letter-spacing:0.05em;}
@media(prefers-color-scheme:dark){.sec-lbl{color:#666;}}
.chip{font-size:11px;color:#666;background:rgba(255,255,255,0.8);border:0.5px solid rgba(128,128,128,0.2);border-radius:5px;padding:2px 7px;white-space:nowrap;}
.chip strong{color:#1a1a1a;font-weight:500;}
@media(prefers-color-scheme:dark){.chip{background:rgba(255,255,255,0.06);color:#aaa;}.chip strong{color:#e0e0e0;}}
.tog-grp{display:flex;gap:2px;}
.tog{height:24px;padding:0 8px;font-size:11px;background:transparent;border:0.5px solid rgba(128,128,128,0.3);border-radius:4px;color:#666;cursor:pointer;white-space:nowrap;display:flex;align-items:center;}
.tog:hover{border-color:rgba(128,128,128,0.6);color:#333;}
.tog.on{background:#533AB7;color:#fff;border-color:#533AB7;}
.tog.act{background:transparent;border-color:rgba(128,128,128,0.3);color:#666;}
.tog.act:active{background:#533AB7;color:#fff;border-color:#533AB7;}
@media(prefers-color-scheme:dark){.tog{color:#aaa;}.tog:hover{color:#eee;}.tog.act{color:#aaa;}}
.key-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:2px;width:132px;}
.kbtn{height:22px;font-size:11px;font-weight:500;background:transparent;border:0.5px solid rgba(128,128,128,0.3);border-radius:3px;color:#666;cursor:pointer;display:flex;align-items:center;justify-content:center;}
.kbtn:hover{border-color:rgba(128,128,128,0.6);}
.kbtn.on{background:#533AB7;color:#fff;border-color:#533AB7;box-shadow:0 0 0 1.5px #AFA9EC;}
@media(prefers-color-scheme:dark){.kbtn{color:#aaa;}}
.sl-row{display:flex;align-items:center;gap:6px;}
.sl-lbl{font-size:11px;color:#888;white-space:nowrap;min-width:84px;}
input[type=range]{width:110px;cursor:pointer;}
.readout{font-size:11px;font-weight:500;color:#1a1a1a;background:rgba(255,255,255,0.9);border:0.5px solid rgba(128,128,128,0.3);border-radius:4px;padding:2px 5px;width:78px;text-align:center;}
.readout:focus{outline:none;border-color:#533AB7;}
@media(prefers-color-scheme:dark){.readout{background:rgba(255,255,255,0.08);color:#e0e0e0;}}
#canvas-outer{display:none;}
#zoom-rail{display:flex;flex-direction:column;gap:3px;align-items:center;padding-top:4px;width:32px;flex-shrink:0;}
#zoom-rail button{width:26px;height:26px;border:0.5px solid rgba(128,128,128,0.3);background:rgba(255,255,255,0.92);color:#333;border-radius:5px;font-size:15px;cursor:pointer;display:flex;align-items:center;justify-content:center;}
@media(prefers-color-scheme:dark){#zoom-rail button{background:rgba(30,30,30,0.92);color:#ddd;}}
#canvas-wrap{overflow:hidden;flex:1 1 0%;cursor:grab;user-select:none;position:relative;min-height:0;}
#canvas-wrap.dragging{cursor:grabbing;}
#zoom-label{font-size:10px;color:#888;text-align:center;}
.capo-snap-btn{height:22px;font-size:11px;background:transparent;border:0.5px solid rgba(200,130,26,0.35);border-radius:3px;color:#C8821A;cursor:pointer;padding:0 8px;white-space:nowrap;display:flex;align-items:center;}
.capo-snap-btn:hover{border-color:#C8821A;}
.capo-snap-btn.on{background:#C8821A;color:#fff;border-color:#C8821A;}
#svg-inner{transform-origin:top left;}
.row-hit{cursor:pointer;}
#tone-strip{background:rgba(128,128,128,0.07);border:0.5px solid rgba(128,128,128,0.2);border-radius:8px;padding:5px 14px;margin-bottom:8px;height:68px;display:flex;flex-direction:column;justify-content:space-between;overflow:hidden;}
#tone-strip.two-voice{justify-content:flex-start;gap:2px;}
#tone-strip.two-voice .strip-label{margin-bottom:1px;}
#tone-strip.two-voice .strip-main{flex:0 0 auto;}
#tone-strip.two-voice .strip-large{gap:8px;}
#tone-strip.two-voice .strip-deg,#tone-strip.two-voice .strip-keydeg,#tone-strip.two-voice .strip-note,#tone-strip.two-voice .strip-freq{font-size:16px;}
#tone-row2{display:none;}
#tone-row2.visible{display:flex;align-items:center;gap:8px;}
#tone-strip .strip-label{font-size:10px;color:#888;text-transform:uppercase;letter-spacing:0.05em;line-height:1;}
#tone-strip .strip-main{display:flex;align-items:stretch;flex:1;margin-top:4px;}
#tone-strip .strip-large{display:flex;align-items:center;gap:14px;}
#tone-strip .strip-deg{font-size:26px;font-weight:500;line-height:1;}
#tone-strip .strip-keydeg{font-size:26px;font-weight:500;line-height:1;}
#tone-strip .strip-note{font-size:26px;font-weight:500;line-height:1;}
#tone-strip .strip-freq{font-size:26px;font-weight:500;line-height:1;}
#tone-strip .strip-divider{width:0.5px;background:rgba(128,128,128,0.25);margin:0 14px;align-self:stretch;}
#tone-strip .strip-segs{display:flex;flex-direction:column;justify-content:center;gap:3px;}
#tone-strip .strip-seg-row{font-size:11px;color:#888;white-space:nowrap;line-height:1.2;}
#tone-strip .strip-seg-row strong{font-weight:500;color:inherit;}
#tone-strip .strip-idle{font-size:12px;color:#aaa;font-style:italic;display:flex;align-items:center;}

@media(prefers-color-scheme:dark){#tone-strip .strip-label{color:#666;}#tone-strip .strip-seg-row{color:#666;}#tone-strip .strip-idle{color:#555;}}

/* ══ v4 APP SHELL CSS ══════════════════════════════════════════════ */
#app-shell{display:flex;flex-direction:column;height:100vh;overflow:hidden;background:#fff;position:relative;}
@media(prefers-color-scheme:dark){#app-shell{background:#1a1a1a;}}

/* top tone strip */
#new-tone-strip{height:50px;flex-shrink:0;display:flex;align-items:stretch;border-bottom:0.5px solid rgba(128,128,128,0.18);background:#fff;z-index:5;position:relative;}
@media(prefers-color-scheme:dark){#new-tone-strip{background:#252525;}}
#nts-left{flex:1 1 0%;display:flex;flex-direction:column;justify-content:center;padding:4px 10px;gap:1px;border-right:0.5px solid rgba(128,128,128,0.15);}
#nts-scale{font-size:11px;font-weight:500;}
.nts-spell{display:flex;}
.nts-spell span{display:inline-block;width:22px;font-size:9px;text-align:center;}
#nts-num span{color:#533AB7;font-weight:500;}
#nts-let span{color:#888;}
#nts-right{width:140px;flex-shrink:0;display:flex;flex-direction:column;justify-content:center;padding:4px 8px;gap:2px;}
.nts-idle{font-size:11px;color:#aaa;font-style:italic;}

/* app body */
#app-body{flex:1 1 0%;display:flex;overflow:hidden;position:relative;min-height:0;}

/* left rail */
#left-rail{width:40px;flex-shrink:0;border-right:0.5px solid rgba(128,128,128,0.18);display:flex;flex-direction:column-reverse;align-items:center;padding:5px 0;gap:3px;background:rgb(250,250,250);position:relative;z-index:15;}
@media(prefers-color-scheme:dark){#left-rail{background:#252525;}}
#lr-tune-btn{width:30px;height:28px;background:#EEEDFE;border:0.5px solid #AFA9EC;border-radius:5px;display:flex;flex-direction:column;align-items:center;justify-content:center;cursor:pointer;flex-shrink:0;}
.lr-icon{font-size:12px;color:#533AB7;}
.lr-tune-lbl{font-size:6px;color:#533AB7;text-align:center;line-height:1.1;}
.lr-chip{width:30px;height:22px;border:0.5px solid rgba(128,128,128,0.25);border-radius:4px;display:flex;flex-direction:column;align-items:center;justify-content:center;cursor:pointer;background:#fff;flex-shrink:0;}
@media(prefers-color-scheme:dark){.lr-chip{background:#333;}}
.lr-chip-open{border-color:#533AB7;background:#EEEDFE;}
.lr-chip-lbl{font-size:6.5px;color:#aaa;text-transform:uppercase;letter-spacing:0.04em;}
.lr-chip-val{font-size:11px;font-weight:600;color:#533AB7;line-height:1.1;}
.lr-chip-sub{font-size:7px;color:#533AB7;line-height:1;}
.lr-sep{width:26px;height:0.5px;background:rgba(128,128,128,0.2);flex-shrink:0;}
#lr-zoom-cluster{display:flex;flex-direction:column;align-items:center;gap:2px;flex-shrink:0;}
.lr-zb{width:26px;height:26px;border:0.5px solid rgba(128,128,128,0.25);border-radius:3px;font-size:13px;color:#555;display:flex;align-items:center;justify-content:center;background:#fff;cursor:pointer;flex-shrink:0;}
.lr-zb:hover{border-color:rgba(128,128,128,0.5);}
@media(prefers-color-scheme:dark){.lr-zb{background:#333;color:#ddd;}}
.lr-zb-pct{font-size:7.5px;font-weight:500;}
.lr-zoom-pct{font-size:7px;color:#888;text-align:center;}
.lr-tension-lbl{font-size:6.5px;color:#aaa;text-transform:uppercase;letter-spacing:0.04em;flex-shrink:0;}
#lr-tension-track{flex:1 1 0%;min-height:40px;position:relative;display:flex;justify-content:center;align-items:stretch;width:20px;}
#ten-sl-v{-webkit-appearance:slider-vertical;appearance:slider-vertical;writing-mode:vertical-lr;direction:rtl;width:20px;height:100%;cursor:pointer;margin:0;}
#lr-fund{display:flex;flex-direction:column;align-items:center;gap:0;flex-shrink:0;padding-top:2px;width:100%;}
.lr-fund-note{font-size:13px;font-weight:600;color:#533AB7;line-height:1.2;text-align:center;}
.lr-fund-num{font-size:20px;font-weight:600;color:#533AB7;line-height:1;width:100%;text-align:center;overflow:hidden;}
.lr-fund-hz{font-size:8px;color:#aaa;line-height:1.4;}

/* canvas-wrap already has flex:1 from updated rule above */
#canvas-wrap.dragging{cursor:grabbing;}

/* label panel — pointer-events:none so node hits pass through */
#label-panel{position:absolute;right:0;top:0;bottom:0;display:flex;flex-direction:column;justify-content:center;align-items:flex-end;pointer-events:none;z-index:20;opacity:0;transition:opacity 0.12s;}
#label-inner{white-space:nowrap;}

/* ruler rail */
#rrail{width:28px;flex-shrink:0;border-left:0.5px solid rgba(128,128,128,0.15);display:flex;flex-direction:column;align-items:center;padding:10px 0;background:rgba(248,247,244,0.94);position:relative;z-index:13;}
@media(prefers-color-scheme:dark){#rrail{background:rgba(40,40,40,0.94);}}
#rr-track{flex:1;width:2px;background:rgba(128,128,128,0.2);border-radius:1px;position:relative;}
.rr-tick{position:absolute;left:50%;transform:translateX(-50%);width:8px;height:2px;background:rgba(128,128,128,0.4);border-radius:1px;}
#rr-viewport{position:absolute;left:50%;transform:translateX(-50%);width:16px;border-radius:3px;background:rgba(83,58,183,0.12);border:0.5px solid rgba(83,58,183,0.25);cursor:ns-resize;top:0;height:100%;}
#rr-dot{display:none;position:absolute;left:50%;transform:translateX(-50%) translateY(-50%);width:10px;height:10px;border-radius:50%;background:#533AB7;border:2px solid #fff;box-shadow:0 0 0 1.5px #533AB7;z-index:3;}
#rr-fan{position:absolute;inset:0;pointer-events:none;z-index:4;overflow:visible;}

/* bottom rail */
#bottom-rail{height:76px;flex-shrink:0;border-top:0.5px solid rgba(128,128,128,0.18);display:flex;background:rgb(250,250,250);position:relative;z-index:16;}
@media(prefers-color-scheme:dark){#bottom-rail{background:#252525;}}
#br-nv{width:40px;border-right:0.5px solid rgba(128,128,128,0.18);display:flex;flex-direction:column;align-items:center;justify-content:center;padding:4px 3px;gap:2px;flex-shrink:0;}
.br-nvb{width:32px;height:20px;font-size:9px;border:0.5px solid rgba(128,128,128,0.25);border-radius:3px;color:#666;display:flex;align-items:center;justify-content:center;background:#fff;cursor:pointer;}
.br-nvb-on{background:#1a1a1a;color:#fff;border-color:#1a1a1a;}
.br-nvb-cap-on{background:#C8821A;color:#fff;border-color:#C8821A;}
@media(prefers-color-scheme:dark){.br-nvb{background:#333;color:#aaa;}}
#br-ctx{flex:1 1 0%;display:flex;flex-direction:column;min-width:0;overflow:hidden;}
.br-ctx-row{flex:1 1 0%;display:flex;align-items:center;padding:0 6px;gap:4px;border-bottom:0.5px solid rgba(128,128,128,0.1);}
.br-ctx-row:last-child{border-bottom:none;}
.br-ctx-idle{font-size:8.5px;color:#ccc;font-style:italic;}
.br-more-bar{flex:1 1 0%;height:1.5px;background:rgba(128,128,128,0.15);border-radius:1px;}
.br-more-lbl{font-size:8px;color:#bbb;white-space:nowrap;}
#br-ap{width:44px;flex-shrink:0;border-left:0.5px solid rgba(128,128,128,0.18);display:flex;flex-direction:column;align-items:center;justify-content:center;padding:4px 3px;gap:2px;}
.br-apb{width:36px;height:18px;font-size:7.5px;border:0.5px solid rgba(128,128,128,0.25);border-radius:3px;color:#555;display:flex;align-items:center;justify-content:center;background:#fff;cursor:pointer;}
.br-apb-on{background:#533AB7;color:#fff;border-color:#533AB7;}
@media(prefers-color-scheme:dark){.br-apb{background:#333;color:#aaa;}}

/* CoF */
#cof-wrap{position:absolute;left:0;bottom:0;width:160px;height:160px;z-index:14;}
#cof-canvas{display:block;cursor:grab;}
#cof-dot{position:absolute;left:76px;top:4px;width:8px;height:8px;background:#533AB7;border-radius:50%;pointer-events:none;box-shadow:0 0 0 2px #fff;z-index:2;}

/* overflow panel (below bottom rail on desktop, slide-up on mobile) */
#overflow-panel{display:none;position:absolute;bottom:76px;left:0;right:0;z-index:15;background:#fff;border-top:0.5px solid rgba(128,128,128,0.18);padding:10px 12px;flex-direction:column;gap:8px;}
@media(prefers-color-scheme:dark){#overflow-panel{background:#1e1e1e;}}
#overflow-panel.visible{display:flex;}
/* ── bottom rail control styles ── */
.br-chip{font-size:9px;color:#533AB7;font-weight:500;background:rgba(83,58,183,0.07);border:0.5px solid rgba(83,58,183,0.25);border-radius:3px;padding:1px 5px;white-space:nowrap;line-height:1.4;}
.br-chip-lbl{font-size:8px;color:#aaa;white-space:nowrap;}
.br-btn{height:18px;padding:0 6px;font-size:8.5px;border:0.5px solid rgba(128,128,128,0.3);border-radius:3px;color:#555;background:#fff;white-space:nowrap;display:inline-flex;align-items:center;cursor:pointer;}
.br-btn.on{background:#533AB7;color:#fff;border-color:#533AB7;}
.br-preset-btn{height:20px;padding:0 5px;font-size:8.5px;border:0.5px solid rgba(83,58,183,0.3);border-radius:3px;color:#533AB7;background:rgba(83,58,183,0.06);display:inline-flex;align-items:center;justify-content:center;cursor:pointer;flex:1;}
.br-preset-btn.on{background:rgba(83,58,183,0.18);font-weight:600;}
.br-play-btn{flex:1;height:20px;font-size:9px;font-weight:500;border:0.5px solid rgba(200,130,26,0.4);border-radius:3px;color:#C8821A;background:rgba(200,130,26,0.08);display:inline-flex;align-items:center;justify-content:center;cursor:pointer;white-space:nowrap;gap:2px;}
.br-snap-btn{height:18px;padding:0 4px;font-size:8px;border:0.5px solid rgba(200,130,26,0.3);border-radius:3px;color:#C8821A;background:#fff;white-space:nowrap;display:inline-flex;align-items:center;cursor:pointer;}
.br-snap-btn.on{background:#C8821A;color:#fff;border-color:#C8821A;}
.br-wav-btn{height:18px;padding:0 6px;font-size:8.5px;border:0.5px solid rgba(128,128,128,0.3);border-radius:3px;color:#555;background:#fff;white-space:nowrap;display:inline-flex;align-items:center;cursor:pointer;}
.br-wav-btn.on{background:#533AB7;color:#fff;border-color:#533AB7;}
.br-poly-btn{height:18px;padding:0 7px;font-size:8.5px;border:0.5px solid rgba(128,128,128,0.3);border-radius:3px;color:#555;background:#fff;display:inline-flex;align-items:center;cursor:pointer;}
.br-poly-btn.on{background:#533AB7;color:#fff;border-color:#533AB7;}
.br-sl-wrap{display:flex;align-items:center;gap:3px;flex:1;min-width:0;}
.br-sl-lbl{font-size:7.5px;color:#aaa;white-space:nowrap;}
.br-sl-track{flex:1;height:3px;background:rgba(83,58,183,0.2);border-radius:2px;position:relative;cursor:pointer;}
.br-sl-thumb{position:absolute;top:50%;transform:translate(-50%,-50%);width:9px;height:9px;border-radius:50%;background:#533AB7;border:1.5px solid #fff;box-shadow:0 0 0 1px #533AB7;pointer-events:none;}
.br-sl-val{font-size:7.5px;color:#533AB7;font-weight:500;white-space:nowrap;min-width:24px;text-align:right;}
.lgnd-grid{display:grid;grid-template-columns:1fr 1fr;width:100%;height:100%;}
.lgnd-cell{display:flex;align-items:center;gap:3px;padding:2px 5px;}
.lgnd-cell.br{border-right:0.5px solid rgba(128,128,128,0.08);}
.lgnd-cell.bb{border-bottom:0.5px solid rgba(128,128,128,0.08);}
.lgnd-txt{font-size:8px;color:#555;white-space:nowrap;line-height:1.2;}
.ov-title{font-size:9px;color:#aaa;text-transform:uppercase;letter-spacing:0.05em;font-weight:500;}
.ov-sep{height:0.5px;background:rgba(128,128,128,0.15);}
.ov-row{display:flex;align-items:center;gap:5px;}
.ov-lbl{font-size:10px;color:#888;white-space:nowrap;min-width:46px;}
.ov-field{height:22px;border:0.5px solid rgba(128,128,128,0.3);border-radius:3px;font-size:10px;font-weight:500;color:#533AB7;background:rgba(83,58,183,0.04);padding:0 5px;width:62px;flex-shrink:0;}
.ov-btn{height:22px;padding:0 8px;font-size:9px;border:0.5px solid rgba(128,128,128,0.3);border-radius:3px;color:#555;background:#fff;white-space:nowrap;display:inline-flex;align-items:center;cursor:pointer;}
.ov-btn.danger{border-color:rgba(153,60,29,0.3);color:rgba(153,60,29,0.8);}
/* ── CoF + picker overlays ── */
#cof-wrap{position:absolute;left:0;bottom:76px;width:170px;height:170px;z-index:14;pointer-events:auto;}
#cof-canvas{display:block;cursor:grab;}
#cof-canvas.spinning{cursor:grabbing;}
#scale-picker{position:absolute;left:44px;top:50px;z-index:50;background:#fff;border:0.5px solid rgba(128,128,128,0.25);border-radius:8px;box-shadow:0 4px 20px rgba(0,0,0,0.12);padding:6px 0;min-width:140px;display:none;}
@media(prefers-color-scheme:dark){#scale-picker{background:#2a2a2a;}}
#scale-picker.visible{display:block;}
.sp-item{padding:5px 14px;font-size:11px;cursor:pointer;color:#1a1a1a;white-space:nowrap;}
.sp-item:hover{background:rgba(83,58,183,0.07);}
.sp-item.on{color:#533AB7;font-weight:600;background:rgba(83,58,183,0.05);}
.sp-sep{height:0.5px;background:rgba(128,128,128,0.15);margin:3px 0;}
@media(prefers-color-scheme:dark){.sp-item{color:#e0e0e0;}}
#home-picker{position:absolute;left:44px;top:100px;z-index:50;background:#fff;border:0.5px solid rgba(128,128,128,0.25);border-radius:8px;box-shadow:0 4px 20px rgba(0,0,0,0.12);padding:5px;display:none;flex-direction:column;gap:2px;min-width:80px;}
@media(prefers-color-scheme:dark){#home-picker{background:#2a2a2a;}}
#home-picker.visible{display:flex;}
.hp-item{padding:4px 10px;font-size:11px;cursor:pointer;color:#1a1a1a;border-radius:4px;white-space:nowrap;}
.hp-item:hover{background:rgba(83,58,183,0.07);}
.hp-item.on{color:#533AB7;font-weight:600;background:rgba(83,58,183,0.06);}
@media(prefers-color-scheme:dark){.hp-item{color:#e0e0e0;}}
/* ══ end v4 APP SHELL CSS ═══════════════════════════════════════════ */
</style>

<script>
// ══════════════════════════════════════════════════════════════════════════════
// ⚠️  PHYSICS & MUSIC THEORY CORE — DO NOT MODIFY DURING UI REDESIGN (v4.x)
// ══════════════════════════════════════════════════════════════════════════════
// The following functions are FROZEN for all Steps 1–16 of the v4 UI redesign.
// They contain all frequency physics, just intonation math, music theory logic,
// audio engine code, and node rendering logic. UI wiring steps must CALL these
// functions, never rewrite them.
//
// FROZEN FUNCTIONS:
//   tensionToFreq()       — core frequency formula f=(1/2L)√(T/μ)
//   fundFreq()            — fundamental frequency from current physics state
//   effectiveSpeakingLength() — accounts for nut height offset
//   diatonicPitchClasses()   — pitch class set for current key+mode
//   scaleInfo()           — degree labels + note names for current scale
//   freqToMidi()          — frequency → MIDI note number
//   noteInfo()            — MIDI → note name, octave, cents, snapped flag
//   chromDeg()            — chromatic degree label relative to home key
//   isInKey()             — is a MIDI note diatonic to current key+mode?
//   setMode()             — change mode/scale, trigger render
//   playTone()            — Web Audio tone synthesis
//   stopActive()          — stop currently playing tone (mono mode)
//   getCtx()              — get/create AudioContext
//   tuneToKey()           — calculate tension to tune home node to key root
//   remapDegree()         — remap node ratio to degree relative to home node
//   isTonalCenter()       — is this node the home node?
//   homeNodeRatio()       — JI ratio for current home node degree
//   setHomeNode()         — change home node, sync UI, trigger render
//   resolveColor()        — node color logic (in-key, chromatic, home, unsnapped)
//   render()              — full diagram redraw (calls all dynamic draw functions)
//   updateNutMarker()     — nut height layer SVG update
//   updateCapoLayer()     — capo SVG layer update
//   capoYpx()             — capo Y position in SVG pixels
//   capoUpperIn/LowerIn/UpperFreq/LowerFreq() — capo segment math
//   setCapoNode()         — select capo snap interval
//   playCapoBoth()        — play both capo segments
//   syncSlider()          — slider → value → readout → render
//   syncReadout()         — readout → value → slider → render
//   tenSlToVal/tenValToSl/muSlToVal/muValToSl() — slider scale conversions
//   resetDefaults()       — restore hardwired default values
//   applyDefaults()       — copy default fields → physics state → render
//   useCurrentSettings()  — copy live physics → default fields
//   setNutPreset/saveNutPreset/applyNutPreset/applyNutOffset() — nut preset logic
//   buildCapoSnapBtns()   — build capo snap button DOM
//   updateScaleSpelling() — update #scale-spelling chip
//   updateTuneBtn()       — update tune button label
//   updateStatus()        — update status chips
//   mk()                  — SVG element factory
//   fontSize()            — dynamic font size based on node spacing
//   gcdFn/complementFrac()— fraction math for ruler labels
//   showRuler/clearRuler()— SVG ruler annotation (to be replaced in Step 5)
//   showStrip/clearStrip/showStripBoth/stripVoiceHTML() — tone strip (Step 4)
//   hideHoldPanel()       — clear hold panel SVG group
//
// FROZEN CONSTANTS & DATA:
//   LBS_TO_N, IN_TO_M     — unit conversion
//   NOTES, REF_HZ, REF_MIDI, SNAP_CENTS, CHROM — music constants
//   MODE_SCALES, MODE_NAMES — scale definitions
//   NODES                 — harmonic node data (fracs, ratios, labels, desc)
//   CAPO_NODES            — capo snap position data
//   DEGREE_RATIOS, DEGREE_LABELS — JI degree ratios
//   SX, TY, NY, SPX, SVG_W, BR, BMW, BMR — SVG layout constants
//   SDEG_X, HOME_X, KD_RX, NOTE_X, INFO_X, SEG_X — column x positions
//
// UI REDESIGN MAY ONLY:
//   • Add new functions that CALL the above
//   • Add/remove/restructure HTML elements
//   • Add new CSS

// ══════════════════════════════════════════════════════════════════════════════
// ── TODO ──────────────────────────────────────────────────────────

// ── fitH — proper horizontal pan ─────────────────────────────────
// Keeps current sc. Pans tx so the string column sits at ~35% from
// the left edge of the canvas, leaving room for label panel on right.
// SVG has explicit pixel dimensions (1380×1440) so there is no
// letterboxing — SVG x=480 (string) maps directly to inner div px 480.
// DEV NOTE (future): Improve to account for node text label widths at
// high zoom, and for ruler label panel width when active, rather than
// using a fixed 35% heuristic.
function fitH(){
  const cw=canvas.clientWidth;
  // String is at SVG x=480; after our transform its screen x = tx + 480*sc
  // Target: string at 35% of canvas width
  tx=cw*0.35 - 480*sc;
  clamp();
  applyT();
}

// ── fitV — fit full string height vertically ──────────────────────
// Scales so the full 1440px SVG height fits in the canvas, resets pan.
function fitV(){
  sc=canvas.clientHeight/1440;
  tx=0; ty=0;
  clamp(); applyT();
}

// ── Fraction complement helper ────────────────────────────────────
function compFrac(fs){
  const p=fs.split('/'); if(p.length!==2) return '';
  const n=parseInt(p[0]),d=parseInt(p[1]),cn=d-n;
  const g=(a,b)=>b===0?a:g(b,a%b);
  const gg=g(cn,d); return `${cn/gg}/${d/gg}`;
}

// ── Build label HTML for a node ───────────────────────────────────
function buildLabel(n){
  const inKey=isInKey(noteInfo(fundFreq()*n.ratio).midi);
  const nc=inKey?'inkey':'chrom';
  const lIn=(n.frac*effectiveSpeakingLength()).toFixed(1);
  const uIn=((1-n.frac)*effectiveSpeakingLength()).toFixed(1);
  const lHz=Math.round(fundFreq()*n.ratio);
  const uHz=Math.round(fundFreq()/(1-n.frac));
  const uFrac=compFrac(n.fs);
  const ni=noteInfo(fundFreq()*n.ratio);
  const noteName=ni.snapped?ni.name+ni.octave:'—';
  const uNi=noteInfo(fundFreq()/(1-n.frac));
  const uNoteName=uNi.snapped?uNi.name+uNi.octave:'—';
  const uNoteStyle=`font-size:14px;font-weight:500;line-height:1.2;color:${isInKey(uNi.midi)?'#0F6E56':'rgba(153,60,29,0.85)'};`;
  const P='#533AB7';
  const rowStyle='background:rgba(255,255,255,0.75);padding:0 5px 0 3px;white-space:nowrap;display:block;text-align:right;';
  const mainStyle=`font-size:15px;font-weight:500;color:${P};line-height:1.2;`;
  const unitStyle='font-size:11px;color:#aaa;margin-left:1px;';
  const noteStyle=`font-size:14px;font-weight:500;line-height:1.2;color:${inKey?'#0F6E56':'rgba(153,60,29,0.85)'};`;
  const dirStyle=`font-size:10px;font-weight:500;color:${P};`;
  const midStyle=`font-size:13px;font-weight:500;color:${P};line-height:1.3;`;
  const midItvlStyle='font-size:11px;font-weight:500;color:#888;line-height:1.3;';
  return `
    <div style="display:flex;flex-direction:column;align-items:flex-end;padding:3px 0;">
      <span style="${rowStyle}"><span style="${uNoteStyle}">${uNoteName}</span></span>
      <span style="${rowStyle}"><span style="${mainStyle}">${uHz}</span><span style="${unitStyle}"> Hz</span></span>
      <span style="${rowStyle}"><span style="${mainStyle}">${uFrac}</span></span>
      <span style="${rowStyle}"><span style="${mainStyle}">${uIn}</span><span style="${unitStyle}">"</span></span>
      <span style="${rowStyle}"><span style="${dirStyle}">↑ upper</span></span>
    </div>
    <div style="height:1.5px;background:rgba(83,58,183,0.4);"></div>
    <div style="display:flex;flex-direction:column;align-items:flex-end;padding:3px 0;">
      <span style="${rowStyle}"><span style="${midStyle}">${n.fs}</span></span>
      <span style="${rowStyle}"><span style="${midStyle}">${n.rs}</span></span>
      <span style="${rowStyle}"><span style="${midItvlStyle}">${n.desc.split('·')[0].trim()}</span></span>
    </div>
    <div style="height:1.5px;background:rgba(83,58,183,0.4);"></div>
    <div style="display:flex;flex-direction:column;align-items:flex-end;padding:3px 0;">
      <span style="${rowStyle}"><span style="${dirStyle}">↓ lower</span></span>
      <span style="${rowStyle}"><span style="${mainStyle}">${lIn}</span><span style="${unitStyle}">"</span></span>
      <span style="${rowStyle}"><span style="${mainStyle}">${n.fs}</span></span>
      <span style="${rowStyle}"><span style="${mainStyle}">${lHz}</span><span style="${unitStyle}"> Hz</span></span>

function updateRulerDot(frac){
  const dot=document.getElementById('rr-dot');
  if(!dot) return;
  dot.style.display='block';
  dot.style.top=((1-frac)*100)+'%';
}

// ── Fan line: vertical line in ruler from dot to panel centre ─────
function drawFanLine(frac){
  const fan=document.getElementById('rr-fan');
  const track=document.getElementById('rr-track');
  if(!fan||!track) return;
  fan.innerHTML='';
  const trackH=track.offsetHeight||1;
  const dotY=(1-frac)*trackH;
  const midY=trackH/2;
  const line=document.createElementNS(svgNS_v4,'line');
  Object.entries({
    x1:1,y1:Math.min(dotY,midY),
    x2:1,y2:Math.max(dotY,midY),
    stroke:'#3C3489','stroke-width':'3',
    'stroke-linecap':'round',opacity:'0.85'
  }).forEach(([k,v])=>line.setAttribute(k,v));
  fan.appendChild(line);
}

// ── Viewport indicator ────────────────────────────────────────────
function updateVP(){
  const track=document.getElementById('rr-track');
  const vp=document.getElementById('rr-viewport');
  if(!track||!vp) return;
  const trackH=track.offsetHeight||1;
  const diagH=canvas.clientHeight||1;
  const visH=Math.max(6,Math.min(trackH,trackH/sc));
  const maxScroll=diagH*(sc-1);
  const scrollFrac=maxScroll>0?Math.min(1,Math.max(0,-ty/maxScroll)):0;
  vp.style.height=visH+'px';
  vp.style.top=(scrollFrac*(trackH-visH))+'px';
  // keep fan line in sync if a node is active
  if(_activeFrac!==null) drawFanLine(_activeFrac);
}

// ── Viewport drag ─────────────────────────────────────────────────
let _vpDrag=false,_vpStartY=0,_vpStartTy=0;
document.getElementById('rr-viewport').addEventListener('mousedown',e=>{
  e.stopPropagation();
  _vpDrag=true; _vpStartY=e.clientY; _vpStartTy=ty;
});
window.addEventListener('mousemove',e=>{
  if(!_vpDrag) return;
  const track=document.getElementById('rr-track');
  const trackH=track.offsetHeight||1;
  const diagH=canvas.clientHeight||1;
  const maxScroll=diagH*(sc-1);
  const delta=(e.clientY-_vpStartY)/trackH*maxScroll;
  ty=Math.min(0,Math.max(-maxScroll,_vpStartTy-delta));
  applyT();
});
window.addEventListener('mouseup',()=>{ _vpDrag=false; });

// ── Mini slider helper ────────────────────────────────────────────
// Creates a draggable mini slider div synced to a hidden range input.
// onchange(0–1 normalized value) is called on drag.
function makeMiniSlider(pct, onchange){
  const wrap=document.createElement('div');
  wrap.className='br-sl-track';
  const thumb=document.createElement('div');
  thumb.className='br-sl-thumb';
  thumb.style.left=(pct*100)+'%';
  wrap.appendChild(thumb);
  let dragging=false;
  wrap.addEventListener('mousedown',e=>{
    dragging=true; e.preventDefault();
    const move=ev=>{
      if(!dragging) return;
      const r=wrap.getBoundingClientRect();
      const v=Math.max(0,Math.min(1,(ev.clientX-r.left)/r.width));
      thumb.style.left=(v*100)+'%';
      onchange(v);
    };
    const up=()=>{dragging=false;window.removeEventListener('mousemove',move);window.removeEventListener('mouseup',up);};
    window.addEventListener('mousemove',move);
    window.addEventListener('mouseup',up);
  });
  return wrap;
}

// ── Wire duration/volume mini sliders after render ─────────────────
// ── Unified mini-slider wiring ────────────────────────────────────
// Called via setTimeout after every renderBRCtx() and renderOverflowPanel().
// Handles all three slider families: audio dur/vol, nut preset offsets,
// phys defaults length/tension/density.
function wireAllBRSliders(){

  // Generic wiring: given a track el, min, max, callback(value)
  function wireTrack(track, min, max, cb){
    if(!track || track._wired) return;
    track._wired=true;
    const thumb=track.querySelector('.br-sl-thumb');
    if(!thumb) return;
    let drag=false;
    track.addEventListener('mousedown',e=>{
      drag=true; e.preventDefault();
      const move=ev=>{
        if(!drag) return;
        const r=track.getBoundingClientRect();
        const pct=Math.max(0,Math.min(1,(ev.clientX-r.left)/r.width));
        thumb.style.left=(pct*100).toFixed(1)+'%';
        cb(min+pct*(max-min), pct);
      };
      const up=()=>{drag=false;window.removeEventListener('mousemove',move);window.removeEventListener('mouseup',up);};
      window.addEventListener('mousemove',move);
      window.addEventListener('mouseup',up);
    });
    // touch support
    track.addEventListener('touchstart',e=>{
      drag=true;
      const move=ev=>{
        if(!drag) return;
        const r=track.getBoundingClientRect();
        const pct=Math.max(0,Math.min(1,(ev.touches[0].clientX-r.left)/r.width));
        thumb.style.left=(pct*100).toFixed(1)+'%';
        cb(min+pct*(max-min), pct);
      };
      const up=()=>{drag=false;track.removeEventListener('touchmove',move);track.removeEventListener('touchend',up);};
      track.addEventListener('touchmove',move,{passive:true});
      track.addEventListener('touchend',up,{passive:true});
    },{passive:true});
  }

  // ── Audio: dur ────────────────────────────────────────────────
  wireTrack(document.getElementById('br-dur-track'), 0.2, 4, (val)=>{
    const valEl=document.getElementById('br-dur-val');
    if(valEl) valEl.textContent=val.toFixed(1)+'s';
    syncSlider('dur', val);
  });

  // ── Audio: vol ────────────────────────────────────────────────
  wireTrack(document.getElementById('br-vol-track'), 0, 100, (val)=>{
    const valEl=document.getElementById('br-vol-val');
    if(valEl) valEl.textContent=Math.round(val)+'%';
    syncSlider('vol', val);
  });

  // ── Overflow: nut preset sliders ──────────────────────────────
  [0,1,2].forEach(i=>{
    const track=document.getElementById(`ov-nut-sl-${i}`);
    wireTrack(track, 0, stringInches, (val)=>{
      nutPresets[i]=Math.max(0,Math.min(stringInches*0.85,val));
      const field=document.getElementById(`nut-pre-ov-${i}`);
      if(field) field.value=fmtLen(nutPresets[i]);
      // also sync legacy field
      const leg=document.getElementById(`nut-pre-${i}`);
      if(leg) leg.value=fmtLen(nutPresets[i]);
    });
  });

  // ── Overflow: phys defaults sliders ──────────────────────────
  wireTrack(document.getElementById('ov-len-sl'), 24, 200, (val)=>{
    const v=useInches?val.toFixed(1)+'"':(val*2.54).toFixed(1)+' cm';
    const f=document.getElementById('def-len-ov');
    if(f){f.value=v; document.getElementById('def-len').value=v;}
  });
  wireTrack(document.getElementById('ov-ten-sl'), 1, 15, (val)=>{
    const v=val.toFixed(1)+' lbs';
    const f=document.getElementById('def-ten-ov');
    if(f){f.value=v; document.getElementById('def-ten').value=v;}
  });
  // density: log scale — handled by IIFE below, no wireTrack call here
  // mu uses log scale — re-wire manually
  (()=>{
    const track=document.getElementById('ov-mu-sl');
    if(!track || track._wired) return;
    track._wired=true;
    const thumb=track.querySelector('.br-sl-thumb');
    if(!thumb) return;
    let drag=false;
    const doMove=(clientX)=>{
      const r=track.getBoundingClientRect();
      const pct=Math.max(0,Math.min(1,(clientX-r.left)/r.width));
      const val=0.0001*Math.pow(0.005/0.0001,pct);
      thumb.style.left=(pct*100).toFixed(1)+'%';
      const v=val.toFixed(6);
      const f=document.getElementById('def-mu-ov');
      if(f){f.value=v; document.getElementById('def-mu').value=v;}
    };
    track.addEventListener('mousedown',e=>{
      drag=true; e.preventDefault();
      const move=ev=>{if(drag) doMove(ev.clientX);};
      const up=()=>{drag=false;window.removeEventListener('mousemove',move);window.removeEventListener('mouseup',up);};
      window.addEventListener('mousemove',move);
      window.addEventListener('mouseup',up);
    });
    track.addEventListener('touchstart',e=>{
      const move=ev=>{doMove(ev.touches[0].clientX);};
      const up=()=>{track.removeEventListener('touchmove',move);track.removeEventListener('touchend',up);};
      track.addEventListener('touchmove',move,{passive:true});
      track.addEventListener('touchend',up,{passive:true});
    },{passive:true});
  })();
}

// ── v4 CoF WHEEL + PICKERS (Steps 13–14) ══════════════════════════

// ── Circle of Fifths ──────────────────────────────────────────────
let cofVisible=false;
let cofAngle=0;
const COF_CX=85, COF_CY=85, COF_R=68;

function drawCoF(){
  const cv=document.getElementById('cof-canvas');
  if(!cv) return;
  const ctx=cv.getContext('2d');
  const W=170, cx=COF_CX, cy=COF_CY;
  const outerR=78, innerR=34, gap=0.018;
  ctx.clearRect(0,0,W,W);

  // Which position is currently under the selector dot (12 o'clock)
  const selPos=cofKeyAtTop();

  COF_ORDER.forEach((chromIdx,pos)=>{
    const distFromSel=Math.min(
      Math.abs(pos-selPos),
      12-Math.abs(pos-selPos)
    );
    const atDot=(distFromSel===0);

    const midA=(pos/12)*2*Math.PI - Math.PI/2 + cofAngle;
    const sliceAngle=(2*Math.PI/12);
    const startA=midA - sliceAngle/2 + gap;
    const endA  =midA + sliceAngle/2 - gap;

    // Lighting follows dot position, not homeKey
    let fillColor, textColor;
    if(atDot){
      fillColor='#533AB7'; textColor='#fff';
    } else if(distFromSel===1){
      fillColor='rgba(83,58,183,0.18)'; textColor='rgba(83,58,183,0.9)';
    } else if(distFromSel===2){
      fillColor='rgba(83,58,183,0.07)'; textColor='rgba(83,58,183,0.55)';
    } else {
      fillColor='rgba(83,58,183,0.04)'; textColor='rgba(83,58,183,0.32)';
    }

    // Draw slice
    ctx.beginPath();
    ctx.arc(cx,cy,outerR,startA,endA);
    ctx.arc(cx,cy,innerR,endA,startA,true);
    ctx.closePath();
    ctx.fillStyle=fillColor;
    ctx.fill();

    // Label at midpoint radius
    const labelR=(innerR+outerR)/2;
    const lx=cx+labelR*Math.cos(midA);
    const ly=cy+labelR*Math.sin(midA);
    ctx.font=(atDot?'bold ':'')+(atDot?'12':'10.5')+'px system-ui,sans-serif';
    ctx.fillStyle=textColor;
    ctx.textAlign='center';
    ctx.textBaseline='middle';
    ctx.fillText(NOTES[chromIdx],lx,ly);
  });
}

function cofKeyAtTop(){
  // Normalise each position's angle to [-π,π] and find closest to 0 (top = -π/2 + π/2 = 0)
  let best=0, bestDist=Infinity;
  COF_ORDER.forEach((_,pos)=>{
    let a=((pos/12)*2*Math.PI + cofAngle) % (2*Math.PI);
    if(a>Math.PI) a-=2*Math.PI;
    if(Math.abs(a)<bestDist){bestDist=Math.abs(a);best=pos;}
  });
  return best;
}

function snapCoF(){
  const pos=cofKeyAtTop();
  const targetAngle=-(pos/12)*2*Math.PI;
  const start=cofAngle;
  let diff=((targetAngle-start) % (2*Math.PI));
  if(diff>Math.PI) diff-=2*Math.PI;
  if(diff<-Math.PI) diff+=2*Math.PI;
  const duration=220, t0=performance.now();
  function step(t){
    const p=Math.min(1,(t-t0)/duration);
    const ease=1-Math.pow(1-p,3);
    cofAngle=start+diff*ease;
    drawCoF();
    if(p<1){ requestAnimationFrame(step); }
    else{
      cofAngle=targetAngle;
      const newKey=COF_ORDER[pos];
      homeKey=newKey;
      drawCoF(); // redraw with updated homeKey so highlight reflects new selection
      document.querySelectorAll('.kbtn').forEach((b,bi)=>{
        b.classList.toggle('on', COF_ORDER[bi]===newKey);
      });
      updateTuneBtn(); updateScaleSpelling(); updateScaleStrip();
      updateLeftRailChips(); render();
    }
  }
  requestAnimationFrame(step);
}

function initCoF(){
  const homePos=COF_ORDER.indexOf(homeKey);
  cofAngle=-(homePos/12)*2*Math.PI;
  drawCoF();
}

// Drag wiring
(function(){
  const cv=document.getElementById('cof-canvas');
  if(!cv) return;
  let dragging=false, startA=0, startCof=0;
  function ptrAngle(e){
    const r=cv.getBoundingClientRect();
    const cx=(e.touches?e.touches[0].clientX:e.clientX)-r.left-COF_CX;
    const cy=(e.touches?e.touches[0].clientY:e.clientY)-r.top-COF_CY;
    return Math.atan2(cy,cx);
  }
  cv.addEventListener('mousedown',e=>{dragging=true;cv.style.cursor='grabbing';startA=ptrAngle(e);startCof=cofAngle;e.stopPropagation();});
  cv.addEventListener('touchstart',e=>{dragging=true;startA=ptrAngle(e);startCof=cofAngle;e.stopPropagation();},{passive:true});
  window.addEventListener('mousemove',e=>{if(!dragging)return;cofAngle=startCof+(ptrAngle(e)-startA);drawCoF();});
  window.addEventListener('touchmove',e=>{if(!dragging)return;cofAngle=startCof+(ptrAngle(e)-startA);drawCoF();},{passive:true});
  window.addEventListener('mouseup',()=>{if(dragging){dragging=false;cv.style.cursor='grab';snapCoF();}});
  window.addEventListener('touchend',()=>{if(dragging){dragging=false;snapCoF();}});
})();

function tensionToFreq(lbs,inches,mu){
  const L=inches*IN_TO_M, T=lbs*LBS_TO_N;

}

// ── Music engine ──────────────────────────────────────────────────
const NOTES=['C','C#','D','D#','E','F','F#','G','G#','A','A#','B'];
const REF_HZ=261.63, REF_MIDI=60, SNAP_CENTS=25;
const CHROM=['1','♭2','2','♭3','3','4','♯4','5','♭6','6','♭7','7'];
let homeKey=7;
const GRAY='#B4B2A9';

// ── Mode / scale system ───────────────────────────────────────────
// Interval sequences (semitone steps) for each mode/scale
const MODE_SCALES={
  ionian:         [2,2,1,2,2,2,1],
  dorian:         [2,1,2,2,2,1,2],
  phrygian:       [1,2,2,2,1,2,2],
  lydian:         [2,2,2,1,2,2,1],
  mixolydian:     [2,2,1,2,2,1,2],
  aeolian:        [2,1,2,2,1,2,2],
  locrian:        [1,2,2,1,2,2,2],
  harmonic_minor: [2,1,2,2,1,3,1],
  melodic_minor:  [2,1,2,2,2,2,1],
};
const MODE_NAMES={
  ionian:'Ionian', dorian:'Dorian', phrygian:'Phrygian',
  lydian:'Lydian', mixolydian:'Mixolydian', aeolian:'Aeolian',
  locrian:'Locrian', harmonic_minor:'Harmonic Minor', melodic_minor:'Melodic Minor',
};
let currentMode='ionian';

// Compute the 7 diatonic pitch classes for the current root + mode
function diatonicPitchClasses(){
  const steps=MODE_SCALES[currentMode];
  const pcs=new Set();
  let pc=homeKey;
  pcs.add(((pc%12)+12)%12);
  for(let i=0;i<6;i++){pc+=steps[i];pcs.add(((pc%12)+12)%12);}
  return pcs;
}

// Compute degree labels and note names for current scale
function scaleInfo(){
  const steps=MODE_SCALES[currentMode];
  const degrees=[], noteNames=[];
  let pc=homeKey;
  for(let i=0;i<7;i++){
    degrees.push(chromDeg(pc+60,homeKey));
    noteNames.push(NOTES[((pc%12)+12)%12]);
    pc+=steps[i];
  }
  return{degrees,noteNames};
}
function freqToMidi(f){return 12*Math.log2(f/REF_HZ)+REF_MIDI;}
function noteInfo(f){
  const midi=freqToMidi(f), r=Math.round(midi), cents=Math.round((midi-r)*100);
  return{midi:r,cents,name:NOTES[((r%12)+12)%12],octave:Math.floor(r/12)-1,snapped:Math.abs(cents)<=SNAP_CENTS};
}
function chromDeg(midi,kr){return CHROM[((midi%12+12)%12-(kr%12+12)%12+12)%12];}
function isInKey(midi){return diatonicPitchClasses().has(((midi%12)+12)%12);}

function setMode(mode, btn){
  currentMode=mode;
  document.querySelectorAll('.mode-btn').forEach(b=>b.classList.remove('on'));
  btn.classList.add('on');
  updateTuneBtn();
  updateScaleSpelling();
  render();
}

// ── Audio ─────────────────────────────────────────────────────────
let audioCtx=null, waveform='string', toneDuration=0.5, volume=0.65;
let polyOn=true;
// For polyphony=off: track active node so we can stop it cleanly
let activeOsc=null, activeGain=null;

function getCtx(){
  if(!audioCtx) audioCtx=new(window.AudioContext||window.webkitAudioContext)();
  return audioCtx;
}
// iOS audio unlock on first touch
document.addEventListener('touchstart',function unlock(){
  const ctx=getCtx();
  if(ctx.state==='suspended') ctx.resume();
  document.removeEventListener('touchstart',unlock);
},{once:true,passive:true});

function stopActive(){
  if(activeGain){
    try{
      const t=audioCtx.currentTime;
      activeGain.gain.cancelScheduledValues(t);
      activeGain.gain.setValueAtTime(activeGain.gain.value,t);
      activeGain.gain.linearRampToValueAtTime(0,t+0.03);
    }catch(e){}
    activeOsc=null; activeGain=null;
  }
}

function playTone(freq){
  if(!freq||freq<16||freq>20000)return;
  const ctx=getCtx();
  if(ctx.state==='suspended') ctx.resume();
  if(!polyOn) stopActive();
  const osc=ctx.createOscillator();
  const filter=ctx.createBiquadFilter();
  const gain=ctx.createGain();
  osc.connect(filter);
  filter.connect(gain);
  gain.connect(ctx.destination);

  // Waveform mapping
  if(waveform==='sine'){
    osc.type='sine';
    filter.type='lowpass';
    filter.frequency.value=20000; // no filtering for sine
    filter.Q.value=0.5;
  } else if(waveform==='warm'){
    // Warm: filtered triangle — odd harmonics, soft rolloff
    osc.type='triangle';
    filter.type='lowpass';
    filter.frequency.value=Math.min(1000, freq*8); // cutoff tracks pitch
    filter.Q.value=0.7;
  } else if(waveform==='string'){
    // String: filtered sawtooth — full harmonics, warm bass tone
    osc.type='sawtooth';
    filter.type='lowpass';
    filter.frequency.value=Math.min(900, freq*6);
    filter.Q.value=0.8;
  }

  osc.frequency.value=freq;
  const t=ctx.currentTime;
  gain.gain.setValueAtTime(0,t);
  gain.gain.linearRampToValueAtTime(volume,t+0.015);
  gain.gain.setValueAtTime(volume,t+toneDuration*0.82);
  gain.gain.linearRampToValueAtTime(0,t+toneDuration);
  osc.start(t);
  osc.stop(t+toneDuration+0.05);
  if(!polyOn){activeOsc=osc;activeGain=gain;}
}

function setWaveform(w,btn){
  waveform=w;
  document.querySelectorAll('#wav-sine,#wav-warm,#wav-string').forEach(b=>b.classList.remove('on'));
  btn.classList.add('on');
}
function setPoly(on,btn){
  polyOn=on;
  if(!on) stopActive();
  btn.parentElement.querySelectorAll('.tog').forEach(b=>b.classList.remove('on'));
  btn.classList.add('on');
}

// ── Tune to key ───────────────────────────────────────────────────
// Calculate tension needed so fundamental matches home key root (nearest octave)
// f = (1/2L)*sqrt(T/mu)  →  T = (2*L*f)^2 * mu
// Find nearest octave of home key root within playable range
function tuneToKey(){
  const L=effectiveSpeakingLength()*IN_TO_M, mu=muKgM;
  const rootPc=homeKey;
  const tc=homeNodeRatio(); // home node ratio relative to fundamental
  const lenRatio=L/(69*IN_TO_M);
  let bestT=null;
  for(let oct=0;oct<=5;oct++){
    const midi=rootPc+(oct+1)*12;
    // This is the pitch we want the home node to produce
    const tcTargetFreq=REF_HZ*Math.pow(2,(midi-REF_MIDI)/12);
    // So the fundamental needs to be tcTargetFreq / tcRatio
    const fundTargetFreq=tcTargetFreq/tc;
    // Solve f = (1/2L)*sqrt(T/mu) for T
    const T=Math.pow(2*L*fundTargetFreq,2)*mu;
    const lbs=T/LBS_TO_N;
    if(lbs>=0.1&&lbs<=15){
      if(bestT===null||Math.abs(lbs-tensionLbs)<Math.abs(bestT-tensionLbs)){
        bestT=lbs;
      }
    }
  }
  if(bestT===null) return;
  tensionLbs=Math.max(1,Math.min(15,bestT));
  document.getElementById('ten-sl').value=tenValToSl(tensionLbs);
  document.getElementById('ten-ro').value=tensionLbs.toFixed(1)+' lbs';
  render();
}

  const label='Tune to '+NOTES[homeKey];
  const label2='Tune String to '+NOTES[homeKey]+' '+MODE_NAMES[currentMode];
  document.getElementById('tune-btn').textContent=label;
  const btn2=document.getElementById('tune-btn2');
  if(btn2) btn2.textContent=label2;
}

function updateScaleSpelling(){
  const si=scaleInfo();
  const el=document.getElementById('scale-spelling');
  if(el) el.innerHTML=

// ── My Bass Defaults ──────────────────────────────────────────────
// Session-editable preset. Initializes to calibrated values:
// 69" string, 5 lbs tension, mu=0.000754 kg/m (G1 at 49 Hz)
// Apply: copies defaults fields → physics sliders + triggers render
// Use Current: copies live physics values → defaults fields

function resetDefaults(){
  // Restore hardcoded master defaults — always 69", 5.0 lbs, 0.000754 kg/m
  document.getElementById('def-len').value=fmtLen(69);
  document.getElementById('def-ten').value='5.0 lbs';
  document.getElementById('def-mu').value=(0.000754).toFixed(6);
}

function applyDefaults(){
  let len=parseFloat(document.getElementById('def-len').value);
  let ten=parseFloat(document.getElementById('def-ten').value);
  let mu=parseFloat(document.getElementById('def-mu').value);
  if(isNaN(len)) len=69;
  if(isNaN(ten)) ten=5.0;
  if(isNaN(mu))  mu=0.000754;
  if(!useInches) len=len/2.54;
  len=Math.max(24,Math.min(200,len));
  ten=Math.max(1,Math.min(15,ten));
  mu=Math.max(0.0001,Math.min(0.005,mu));

  // In nut height mode: preserve the speaking length ratio when string length changes
  // nutOffset scales proportionally to the new string length
  if(nodeView==='nut' && stringInches>0){
    const ratio=nutOffsetInches/stringInches;
    stringInches=len;
    nutOffsetInches=Math.max(0,Math.min(len*0.85, ratio*len));
  } else {
    stringInches=len;
  }
  tensionLbs=ten; muKgM=mu;

  // Update sliders and readouts
  if(nodeView==='nut'){
    const sl=effectiveSpeakingLength();
    document.getElementById('len-sl').value=sl;
    document.getElementById('len-ro').value=fmtLen(sl);
    const ro=document.getElementById('nut-offset-ro');
    if(ro) ro.value=fmtLen(nutOffsetInches);
  } else {
    document.getElementById('len-sl').value=len;
    document.getElementById('len-ro').value=fmtLen(len);
  }
  document.getElementById('ten-sl').value=tenValToSl(ten);
  document.getElementById('ten-ro').value=ten.toFixed(1)+' lbs';
  document.getElementById('mu-sl').value=muValToSl(mu);
  document.getElementById('mu-ro').value=mu.toFixed(6);
  document.getElementById('def-len').value=fmtLen(len);
  document.getElementById('def-ten').value=ten.toFixed(1)+' lbs';
  document.getElementById('def-mu').value=mu.toFixed(6);
  render();
}

function useCurrentSettings(){
  // Copy live physics values into defaults fields
  document.getElementById('def-len').value=fmtLen(stringInches);
  document.getElementById('def-ten').value=tensionLbs.toFixed(1)+' lbs';
  document.getElementById('def-mu').value=muKgM.toFixed(6);
}

// ── Slider ↔ readout sync ─────────────────────────────────────────
// Tension: slider 10-150 maps to 1.0-15.0 lbs
// Mu: slider 1-100 maps logarithmically to 0.0001-0.005 kg/m
function tenSlToVal(sv){return sv/10;}
function tenValToSl(v){return Math.round(v*10);}
function muSlToVal(sv){return 0.0001*Math.pow(0.005/0.0001,(sv-1)/99);}
function muValToSl(v){return Math.round(1+99*Math.log(v/0.0001)/Math.log(0.005/0.0001));}

function syncSlider(key,sv){
  const n=parseFloat(sv);
  if(key==='dur'){toneDuration=n;document.getElementById('dur-ro').value=n.toFixed(1)+' s';}
  else if(key==='vol'){volume=n/100;document.getElementById('vol-ro').value=Math.round(n)+'%';}
  else if(key==='len'){
    const n=parseFloat(sv);
    if(nodeView==='nut'){
      // In nut height mode, slider controls effective speaking length
      // so adjust nut offset to achieve that speaking length
      const newSpeaking=Math.max(10, Math.min(stringInches, n));
      nutOffsetInches=stringInches-newSpeaking;
      document.getElementById('len-ro').value=fmtLen(newSpeaking);
    } else {
      stringInches=n;
      document.getElementById('len-ro').value=fmtLen(n);
    }
    render();
  }
  else if(key==='ten'){tensionLbs=tenSlToVal(n);document.getElementById('ten-ro').value=tensionLbs.toFixed(1)+' lbs';render();}
  else if(key==='mu'){muKgM=muSlToVal(n);document.getElementById('mu-ro').value=muKgM.toFixed(6);render();}
}
function syncReadout(key,raw){
  let v=parseFloat(raw);
  if(isNaN(v)) return;
  if(key==='dur'){v=Math.max(0.2,Math.min(4,v));toneDuration=v;document.getElementById('dur-sl').value=v;document.getElementById('dur-ro').value=v.toFixed(1)+' s';}
  else if(key==='vol'){v=Math.max(0,Math.min(100,v));volume=v/100;document.getElementById('vol-sl').value=v;document.getElementById('vol-ro').value=Math.round(v)+'%';}
  else if(key==='len'){
    // handle cm input if metric mode
    if(!useInches) v=v/2.54;
    if(nodeView==='nut'){
      const newSpeaking=Math.max(10,Math.min(stringInches,v));
      nutOffsetInches=stringInches-newSpeaking;
      document.getElementById('len-sl').value=newSpeaking;
      document.getElementById('len-ro').value=fmtLen(newSpeaking);
    } else {
      v=Math.max(24,Math.min(200,v));stringInches=v;
      document.getElementById('len-sl').value=v;document.getElementById('len-ro').value=fmtLen(v);
    }
    render();
  }
  else if(key==='ten'){v=Math.max(1,Math.min(15,v));tensionLbs=v;document.getElementById('ten-sl').value=tenValToSl(v);document.getElementById('ten-ro').value=v.toFixed(1)+' lbs';render();}
  else if(key==='mu'){v=Math.max(0.0001,Math.min(0.005,v));muKgM=v;document.getElementById('mu-sl').value=muValToSl(v);document.getElementById('mu-ro').value=v.toFixed(6);render();}
}

const SX=480, TY=1310, NY=78, SPX=1232, SVG_W=1380;
const BR=425, BMW=240, BMR=4;           // pitch bars shifted left to make room for string degree

// ── Home node ─────────────────────────────────────────────────────
// homeNode: 1-7 (scale degree). 1 = fundamental, 5 = fifth node, etc.
let homeNode=1;

// Just intonation ratios for degrees 1-7
const DEGREE_RATIOS=[1, 9/8, 5/4, 4/3, 3/2, 5/3, 15/8];
const DEGREE_LABELS=['1','2','3','4','5','6','7'];

// Ratio of home node relative to fundamental
function homeNodeRatio(){
  return DEGREE_RATIOS[homeNode-1];
}

// Map a node's ratio to a degree label relative to current home node
// Returns null when home node is fundamental (use original labels)
function remapDegree(nodeRatio){
  if(homeNode===1) return null;
  const hn=homeNodeRatio();
  let interval=nodeRatio/hn;
  while(interval>=2) interval/=2;
  while(interval<1)  interval*=2;
  let best=0, bestDist=Infinity;
  DEGREE_RATIOS.forEach((r,i)=>{
    const dist=Math.abs(interval-r);
    if(dist<bestDist){bestDist=dist;best=i;}
  });
  return DEGREE_LABELS[best];
}

// Is this node the home node (new 1)?
function isTonalCenter(nodeRatio){
  if(homeNode===1){
    let r=nodeRatio;
    while(r>=2) r/=2;
    while(r<1)  r*=2;
    return Math.abs(r-1)<0.001;
  }
  const hn=homeNodeRatio();
  let interval=nodeRatio/hn;
  while(interval>=2) interval/=2;
  while(interval<1)  interval*=2;
  return Math.abs(interval-1)<0.001;
}

// Effective nut Y — moves down in nut height view
function nutEffY(){
  if(nodeView!=='nut') return NY;
  return NY + (nutOffsetInches/stringInches)*SPX;
}
// Node Y — compressed into speaking length zone
function nY(frac){
  const nutY=nutEffY();
  const speakingPx=TY-nutY;
  return TY - frac*speakingPx;
}
function barW(ratio){return Math.min((ratio/BMR)*BMW,BMW);}

function getNodeYS(){return NODES.map(n=>nY(n.frac));}

function fontSize(i, nodeYS){
  const y=nodeYS[i];
  const nutY=nutEffY();
  const above=i>0?nodeYS[i-1]:nutY;
  const below=i<nodeYS.length-1?nodeYS[i+1]:TY;
  const space=Math.min(y-above,below-y);
  return Math.round(Math.max(11,Math.min(36,space*1.4)));
}

function updateNutMarker(){
  const layer=document.getElementById('nut-height-layer');

  sdegEl.setAttribute('x',SDEG_X);sdegEl.setAttribute('y',ny+yOff);
  sdegEl.setAttribute('font-size',nutFS);sdegEl.setAttribute('font-weight','500');

  // home degree — right of string

    const kdEl=document.createElementNS('http://www.w3.org/2000/svg','text');
    kdEl.setAttribute('x',KD_RX);kdEl.setAttribute('y',ny+yOff);
    kdEl.setAttribute('font-size',nutFS);kdEl.setAttribute('font-weight','500');
    kdEl.setAttribute('text-anchor','end');kdEl.setAttribute('fill',col);

    const noteEl=document.createElementNS('http://www.w3.org/2000/svg','text');
    noteEl.setAttribute('x',NOTE_X);noteEl.setAttribute('y',ny+yOff);
    noteEl.setAttribute('font-size',nutFS);noteEl.setAttribute('font-weight','500');noteEl.setAttribute('fill',col);
    noteEl.textContent=fi.name+fi.octave;ann.appendChild(noteEl);
  } else {
    const kdEl=document.createElementNS('http://www.w3.org/2000/svg','text');
    kdEl.setAttribute('x',KD_RX);kdEl.setAttribute('y',ny+yOff);
    kdEl.setAttribute('font-size',nutInfoFS);kdEl.setAttribute('text-anchor','end');kdEl.setAttribute('fill','#B4B2A9');kdEl.setAttribute('opacity',0.4);
    kdEl.textContent='—';ann.appendChild(kdEl);
  }

  // Info text
  const infoEl=document.createElementNS('http://www.w3.org/2000/svg','text');
  infoEl.setAttribute('x',INFO_X);infoEl.setAttribute('y',ny+yOff);
  infoEl.setAttribute('font-size',nutInfoFS);infoEl.setAttribute('fill','#533AB7');infoEl.setAttribute('opacity',0.8);
  infoEl.textContent=`1/1  ·  1:1  ·  eff. nut  ·  offset: ${fmtLen(nutOffsetInches)}`;
  ann.appendChild(infoEl);

  // Segment lengths
  const segEl=document.createElementNS('http://www.w3.org/2000/svg','text');
  segEl.setAttribute('x',SEG_X);segEl.setAttribute('y',ny+yOff);

  const rowH=nutFS+10;

  hitEl.addEventListener('touchend',clearStrip,{passive:true});
  // Also start drag from this hit rect
  hitEl.addEventListener('mousedown',e=>{
    if(nodeView!=='nut') return;
    nutDragging=true; e.stopPropagation();
    nutDragStartY=e.clientY; nutDragStartOffset=nutOffsetInches;

    nutDragging=true; e.stopPropagation();
    nutDragStartY=e.touches[0].clientY; nutDragStartOffset=nutOffsetInches;
  },{passive:true});
  ann.appendChild(hitEl);
}

    :{fill:'#FAECE7',stroke:'rgba(153,60,29,0.6)',dot:'rgba(153,60,29,0.6)',text:'rgba(153,60,29,0.6)',bar:'rgba(216,90,48,0.6)',dash:false};

function mk(tag,attrs,txt){
  const el=document.createElementNS('http://www.w3.org/2000/svg',tag);
  for(const[k,v]of Object.entries(attrs))el.setAttribute(k,v);
  if(txt!==undefined)el.textContent=txt;
  return el;
}

// ── Tone info strip ───────────────────────────────────────────────
function showStrip(freq, frac, nodeLabel, color){
  const fund=fundFreq();
  const lowerIn=frac*stringInches;
  const upperIn=(1-frac)*stringInches;
  const upperFreq=frac<1 ? fund/(1-frac) : 0;
  const ni=noteInfo(freq);
  const ui=upperFreq>0?noteInfo(upperFreq):null;
  const kd=ni.snapped?chromDeg(ni.midi,homeKey):'—';
  const inKey=ni.snapped?isInKey(ni.midi):false;
  const noteStr=ni.snapped?ni.name+ni.octave:'—';
  const col=color||'#533AB7';
  const keyCol=inKey?'#0F6E56':'rgba(153,60,29,0.6)';
  const upperNoteStr=ui&&ui.snapped?ui.name+ui.octave:'—';
  const upperFreqStr=upperFreq>0?upperFreq.toFixed(1)+' Hz':'—';

  document.getElementById('tone-row1').innerHTML=
    `<div class="strip-large">`+
      `<span class="strip-deg" style="color:${col}">${nodeLabel}</span>`+
      `<span class="strip-keydeg" style="color:${keyCol}">${kd}</span>`+
      `<span class="strip-note" style="color:${keyCol}">${noteStr}</span>`+
      `<span class="strip-freq" style="color:${col}">${freq.toFixed(1)} Hz</span>`+
    `</div>`+
    `<div class="strip-divider"></div>`+
    `<div class="strip-segs">`+
      `<div class="strip-seg-row" style="color:${col}">\u2191 upper: <strong>${fmtLen(upperIn)}</strong> \u00b7 ${upperFreqStr} \u00b7 ${upperNoteStr}</div>`+
      `<div class="strip-seg-row" style="color:${col}">\u2193 lower: <strong>${fmtLen(lowerIn)}</strong> \u00b7 ${freq.toFixed(1)} Hz \u00b7 ${noteStr}</div>`+
    `</div>`;
}

function clearStrip(){
  document.getElementById('tone-row1').innerHTML=
    '<span class="strip-idle">hover or touch a node to see details</span>';
  const row2=document.getElementById('tone-row2');
  row2.classList.remove('visible');
  row2.innerHTML='';
  document.getElementById('tone-strip').classList.remove('two-voice');
  document.querySelector('#tone-strip .strip-label').textContent='current tone';
}

function stripVoiceHTML(freq, frac, label, color){
  const ni=noteInfo(freq);
  const kd=ni.snapped?chromDeg(ni.midi,homeKey):'—';
  const inKey=ni.snapped?isInKey(ni.midi):false;
  const noteStr=ni.snapped?ni.name+ni.octave:'—';
  const keyCol=inKey?'#0F6E56':'rgba(153,60,29,0.6)';
  const segIn=frac*effectiveSpeakingLength();
  return `<div class="strip-large">`+
    `<span class="strip-deg" style="color:${color}">${label}</span>`+
    `<span class="strip-keydeg" style="color:${keyCol}">${kd}</span>`+
    `<span class="strip-note" style="color:${keyCol}">${noteStr}</span>`+
    `<span class="strip-freq" style="color:${color}">${freq.toFixed(1)} Hz · ${fmtLen(segIn)}</span>`+
  `</div>`;
}

function showStripBoth(){
  const cn=CAPO_NODES[capoNodeIdx];

  const row2=document.getElementById('tone-row2');
  row2.innerHTML=stripVoiceHTML(lFreq, 1-cn.phi, '↓ '+cn.label, CAPO_COL);
  row2.classList.add('visible');
}

function hideHoldPanel(){

// ── Ruler annotation ─────────────────────────────────────────────
const RX=172, RHW=10, RLX=160, RULER_COL='#533AB7', RULER_FS=11;

function gcdFn(a,b){return b===0?a:gcdFn(b,a%b);}
function complementFrac(fs){
  const p=fs.split('/');
  if(p.length!==2) return '';
  const n=parseInt(p[0]),d=parseInt(p[1]),cn=d-n,g=gcdFn(cn,d);
  return cn===0?'0':`${cn/g}/${d/g}`;
}

function showRuler(nodeY, upperIn, lowerIn, nodeFs, nodeFreq, upperFracStr, rulerColor){
  clearRuler();
  const g=document.getElementById('dyn-ruler');
  const nutY=nutEffY();
  const gap=8;
  const labelFS=36;
  const fund=fundFreq();
  const speakingIn=effectiveSpeakingLength();
  const COL=rulerColor||RULER_COL;
  const mkr=(tag,attrs)=>{
    const el=document.createElementNS('http://www.w3.org/2000/svg',tag);
    for(const[k,v]of Object.entries(attrs))el.setAttribute(k,v);
    return el;
  };
  const hash=(y,op,hw,sw)=>mkr('line',{x1:RX-hw,x2:RX+hw,y1:y,y2:y,stroke:COL,
    'stroke-width':sw||1.5,opacity:op});

  // lines: array of strings, stacked outward from node hash
  const label=(y,lines,anchor)=>{
    lines.forEach((txt,i)=>{
      if(!txt) return;
      const ly=anchor==='above'
        ? y - labelFS*0.2 - i*labelFS*1.0
        : y + labelFS*0.9 + i*labelFS*1.0;
      const el=mkr('text',{x:RLX,y:ly,'font-size':labelFS,'text-anchor':'end',
        fill:COL,'font-weight':i===0?'500':'400',opacity:i===0?1:i===1?0.65:0.45});
      el.textContent=txt; g.appendChild(el);
    });
  };

  // Top hash (nut) — light
  g.appendChild(hash(nutY,0.5,10,1.5));
  // Middle hash (node) — heavy
  g.appendChild(hash(nodeY,1.0,14,3));
  // Bottom hash (tub) — light
  g.appendChild(hash(TY,0.5,10,1.5));

  // Upper segment
  if(upperIn > 0.5 && nodeY-nutY > gap*3){
    g.appendChild(mkr('line',{x1:RX,x2:RX,y1:nutY+gap,y2:nodeY-gap,stroke:COL,
      'stroke-width':1,'marker-start':'url(#arrow)','marker-end':'url(#arrow)'}));
    const ufrac=upperFracStr||complementFrac(nodeFs);
    const upperFreq=upperIn>0 ? fund*(speakingIn/upperIn) : 0;
    const uni=upperFreq>0 ? noteInfo(upperFreq) : null;
    const uNote=uni&&uni.snapped ? uni.name+uni.octave : '';
    const uFreq=upperFreq>0 ? upperFreq.toFixed(1)+' Hz' : '';
    label(nodeY-gap-4, [fmtLen(upperIn), ufrac, uFreq, uNote], 'above');
  }

  // Lower segment
  if(TY-nodeY > gap*3){
    g.appendChild(mkr('line',{x1:RX,x2:RX,y1:nodeY+gap,y2:TY-gap,stroke:COL,
      'stroke-width':1,'marker-start':'url(#arrow)','marker-end':'url(#arrow)'}));
    const lni=nodeFreq ? noteInfo(nodeFreq) : null;
    const lNote=lni&&lni.snapped ? lni.name+lni.octave : '';
    const lFreq=nodeFreq ? nodeFreq.toFixed(1)+' Hz' : '';
    label(nodeY+gap+4, [fmtLen(lowerIn), nodeFs, lFreq, lNote], 'below');
  }
}

function clearRuler(){
  document.getElementById('dyn-ruler').innerHTML='';
}

// ── Status update ─────────────────────────────────────────────────
function updateStatus(){
  const fund=fundFreq();
  const fi=noteInfo(fund);
  const fl=fi.snapped?fi.name+fi.octave:'~'+fi.name+fi.octave;
  document.getElementById('st-fund').textContent=fl;
  document.getElementById('st-root').textContent=NOTES[homeKey];
  document.getElementById('st-scale').textContent=NOTES[homeKey]+' '+MODE_NAMES[currentMode];
  const si=scaleInfo();
  document.getElementById('st-scale-degs').textContent=si.degrees.join(' ');
  document.getElementById('st-scale-notes').textContent=si.noteNames.join(' ');
}

// ── Render ────────────────────────────────────────────────────────
function render(){
  updateStatus();
  updateNutMarker();
  updateCapoLayer();
  document.getElementById('dyn-nodes').innerHTML='';
  document.getElementById('dyn-nut').innerHTML='';
  document.getElementById('dyn-home-rings').innerHTML='';
  document.getElementById('dyn-ruler').innerHTML='';
  hideHoldPanel();
  if(nodeView==='capo'){
    const cn=CAPO_NODES[capoNodeIdx];
    showRuler(capoYpx(), capoUpperIn(), capoLowerIn(), '1\u2212'+cn.phiStr, capoLowerFreq(), cn.phiStr, CAPO_COL);
    return;
  }
  const g=document.getElementById('dyn-nodes');
  const homeRingsG=document.getElementById('dyn-home-rings');
  const nutG=document.getElementById('dyn-nut');
  const fund=fundFreq();
  const speakingIn=effectiveSpeakingLength();

  // Compute dynamic node positions and font sizes
  const nodeYS=getNodeYS();
  const fSizes=nodeYS.map((_,i)=>fontSize(i,nodeYS));

  // ── NUT ROW ──
  const nutFS=30, nutInfoFS=16, nutY=73;
  const fi=noteInfo(fund);
  const nutRowH=nutFS+10;

  // ── NUT ROW — hidden in nut height mode (replaced by travelling annotation) ──
  if(nodeView!=='nut'){
    const nutIsHome=isTonalCenter(1);
    const nutHomeLabel=remapDegree(1)||'1';
    const nutColor=nutIsHome?'#533AB7':(fi.snapped?(isInKey(fi.midi)?'#0F6E56':'rgba(153,60,29,0.6)'):GRAY);
    // home ring behind nut if home node=fundamental
    if(nutIsHome){
      nutG.appendChild(mk('circle',{cx:SX,cy:NY,r:16,fill:'none',stroke:'#533AB7','stroke-width':2,opacity:0.35}));
    }
    nutG.appendChild(mk('rect',{x:BR-barW(1),y:nutY-5,width:barW(1),height:10,rx:2,fill:nutColor,opacity:0.55}));
    // Fixed string degree — dark grey bold, left of string
    nutG.appendChild(mk('text',{x:SDEG_X,y:nutY+9,'font-size':nutFS,'font-weight':'500','text-anchor':'middle',fill:'#5F5E5A'},'1'));
    // home degree — right of string
    nutG.appendChild(mk('text',{x:HOME_X,y:nutY+9,'font-size':nutFS,'font-weight':'500',fill:nutColor},nutHomeLabel));
    if(fi.snapped){
      const kd=chromDeg(fi.midi,homeKey);
      const col=isInKey(fi.midi)?'#0F6E56':'rgba(153,60,29,0.6)';
      nutG.appendChild(mk('text',{x:KD_RX,y:nutY+9,'font-size':nutFS,'font-weight':'500','text-anchor':'end',fill:col},kd));
      nutG.appendChild(mk('text',{x:NOTE_X,y:nutY+9,'font-size':nutFS,'font-weight':'500',fill:col},fi.name+fi.octave));
    } else {
      nutG.appendChild(mk('text',{x:KD_RX,y:nutY+9,'font-size':nutInfoFS,'text-anchor':'end',fill:GRAY,opacity:0.4},'—'));
      nutG.appendChild(mk('text',{x:NOTE_X,y:nutY+9,'font-size':nutInfoFS,fill:GRAY,opacity:0.4},'—'));
    }
    nutG.appendChild(mk('text',{x:INFO_X,y:nutY+9,'font-size':nutInfoFS,fill:nutColor,opacity:0.8},'1/1  ·  1:1  ·  fundamental'));
    nutG.appendChild(mk('text',{x:SEG_X,y:nutY+9,'font-size':nutInfoFS,fill:nutColor,opacity:0.65},'— | '+fmtLen(speakingIn)));
    const nutHit=mk('rect',{x:0,y:nutY-nutFS*0.65,width:SVG_W,height:nutRowH,fill:'transparent',class:'row-hit'});
    nutHit.addEventListener('mousedown',()=>{playTone(fund);showStrip(fund,1.0,nutHomeLabel,nutColor);});
    nutHit.addEventListener('mouseenter',()=>{showStrip(fund,1.0,nutHomeLabel,nutColor);showRuler(NY,0,speakingIn,'1/1',fund);});
    nutHit.addEventListener('mouseleave',()=>{clearStrip();clearRuler();});
    nutHit.addEventListener('touchstart',()=>{playTone(fund);showStrip(fund,1.0,nutHomeLabel,nutColor);showRuler(NY,0,speakingIn,'1/1',fund);},{passive:true});
    nutHit.addEventListener('touchend',()=>{clearStrip();clearRuler();},{passive:true});
    nutG.appendChild(nutHit);
  }

  // In nut height mode: update string length field to show effective speaking length
  // String length slider becomes bidirectional — moving it adjusts nut offset
  if(nodeView==='nut'){
    document.getElementById('len-ro').value=fmtLen(speakingIn);
    document.getElementById('len-sl').value=speakingIn;
  }

  // ── NODE ROWS ──
  NODES.forEach((node,i)=>{
    const y=nodeYS[i];
    const freq=fund*node.ratio;
    const ni=noteInfo(freq);
    const inKey=ni.snapped?isInKey(ni.midi):false;
    // home degree remapping
    const remapped=remapDegree(node.ratio);
    const isHome=isTonalCenter(node.ratio);
    const c=resolveColor(node,ni.snapped,inKey,isHome);
    const isT=isHome, isPri=node.primary&&!isHome;
    const displayLabel=remapped||node.label;
    const bw=barW(node.ratio);
    const fs=fSizes[i];
    const infoFS=Math.max(11,Math.round(fs*0.5));
    const yOff=fs*0.38;
    const rowH=fs+10;
    const lowerIn=node.frac*speakingIn;
    const upperIn=(1-node.frac)*speakingIn;

    // home ring — large unfilled ring behind everything at this node position
    if(isHome){
      homeRingsG.appendChild(mk('circle',{cx:SX,cy:y,r:16,fill:'none',stroke:'#533AB7','stroke-width':2,opacity:0.35}));
    }

    g.appendChild(mk('rect',{x:BR-bw,y:y-(isT||isPri?7:5),width:bw,
      height:isT||isPri?14:10,rx:2,fill:c.bar,opacity:isT?0.65:isPri?0.55:0.35}));
    const hw=isT?18:isPri?14:10;
    g.appendChild(mk('line',{x1:SX-hw,x2:SX+hw,y1:y,y2:y,stroke:c.stroke,'stroke-width':isT?2.5:isPri?2:1}));
    const r=isT?10:isPri?8:5;
    const ca={cx:SX,cy:y,r,fill:isT||isPri?c.fill:'none',stroke:c.stroke,'stroke-width':isT||isPri?2:1.5};
    if(c.dash) ca['stroke-dasharray']='3 2';
    g.appendChild(mk('circle',ca));
    if(isT||isPri) g.appendChild(mk('circle',{cx:SX,cy:y,r:isT?4:3,fill:c.dot}));
    // Fixed string degree — dark grey bold, left of string
    g.appendChild(mk('text',{x:SDEG_X,y:y+yOff,'font-size':fs,'font-weight':'500','text-anchor':'middle',fill:'#5F5E5A'},node.label));
    // home degree — right of string, colored
    g.appendChild(mk('text',{x:HOME_X,y:y+yOff,'font-size':fs,'font-weight':'500',fill:c.text},displayLabel));
    if(ni.snapped){
      const kd=chromDeg(ni.midi,homeKey);
      g.appendChild(mk('text',{x:KD_RX,y:y+yOff,'font-size':fs,'font-weight':'500','text-anchor':'end',fill:c.text},kd));
      g.appendChild(mk('text',{x:NOTE_X,y:y+yOff,'font-size':fs,'font-weight':'500',fill:c.text},ni.name+ni.octave));
    } else {
      g.appendChild(mk('text',{x:KD_RX,y:y+yOff,'font-size':infoFS,'text-anchor':'end',fill:GRAY,opacity:0.3},'—'));
      g.appendChild(mk('text',{x:NOTE_X,y:y+yOff,'font-size':infoFS,fill:GRAY,opacity:0.3},'—'));
    }
    g.appendChild(mk('text',{x:INFO_X,y:y+yOff,'font-size':infoFS,fill:c.text,opacity:0.8},
      `${node.fs}  ·  ${node.rs}  ·  ${node.desc}`));
    g.appendChild(mk('text',{x:SEG_X,y:y+yOff,'font-size':infoFS,fill:c.text,opacity:0.7},
      fmtLen(upperIn)+' | '+fmtLen(lowerIn)));

    const hitRect=mk('rect',{x:0,y:y-rowH/2,width:SVG_W,height:rowH,fill:'transparent',class:'row-hit'});
    hitRect.addEventListener('mousedown',()=>{playTone(freq);showStrip(freq,node.frac,displayLabel,c.text);});
    hitRect.addEventListener('mouseenter',()=>{showStrip(freq,node.frac,displayLabel,c.text);showRuler(y,upperIn,lowerIn,node.fs,freq);});
    hitRect.addEventListener('mouseleave',()=>{clearStrip();clearRuler();});
    hitRect.addEventListener('touchstart',()=>{playTone(freq);showStrip(freq,node.frac,displayLabel,c.text);showRuler(y,upperIn,lowerIn,node.fs,freq);},{passive:true});
    hitRect.addEventListener('touchend',()=>{clearStrip();clearRuler();},{passive:true});
    g.appendChild(hitRect);
  });
}

// ── Key grid ──────────────────────────────────────────────────────
const kg=document.getElementById('key-grid');
const COF_ORDER=[0,7,2,9,4,11,6,1,8,3,10,5]; // circle of fifths: C G D A E B F# C# Ab Eb Bb F
COF_ORDER.forEach(i=>{
  const b=document.createElement('button');
  b.className='kbtn'+(i===7?' on':'');
  b.textContent=NOTES[i];
  b.onclick=()=>{homeKey=i;document.querySelectorAll('.kbtn').forEach(x=>x.classList.remove('on'));b.classList.add('on');updateTuneBtn();updateScaleSpelling();render();};
  kg.appendChild(b);
});

// ── Pan / zoom ────────────────────────────────────────────────────
const canvas=document.getElementById('canvas-wrap');
const inner=document.getElementById('svg-inner');
let sc=0.38, scMn=0.2, scMx=3, tx=0, ty=0, dragging=false, dsx, dsy, dtx, dty;

function applyT(){
  inner.style.transform=`translate(${tx}px,${ty}px) scale(${sc})`;
  document.getElementById('zoom-label').textContent=Math.round(sc*100)+'%';
}
function clamp(){
  const sw=1380*sc, sh=1440*sc, ww=canvas.clientWidth, wh=canvas.clientHeight;
  tx=Math.min(0,Math.max(tx,ww-sw));
  ty=Math.min(0,Math.max(ty,wh-sh));
}
function zoom(f){sc=Math.min(scMx,Math.max(scMn,sc*f));clamp();applyT();}
function zoomTo1(){sc=1;tx=0;ty=0;clamp();applyT();}
function zoomFit(){
  setTimeout(()=>{
    sc=canvas.clientHeight/1440;
    tx=0; ty=0;
    applyT();
  },0);
}

canvas.addEventListener('mousedown',e=>{
  if(e.target.classList.contains('row-hit'))return;
  dragging=true;canvas.classList.add('dragging');
  dsx=e.clientX;dsy=e.clientY;dtx=tx;dty=ty;
});
window.addEventListener('mousemove',e=>{
  if(!dragging)return;
  tx=dtx+(e.clientX-dsx);ty=dty+(e.clientY-dsy);clamp();applyT();
});
window.addEventListener('mouseup',()=>{dragging=false;canvas.classList.remove('dragging');});
canvas.addEventListener('wheel',e=>{
  e.preventDefault();
  const r=canvas.getBoundingClientRect(),mx=e.clientX-r.left,my=e.clientY-r.top;
  const f=e.deltaY>0?0.85:1.18, ns=Math.min(scMx,Math.max(scMn,sc*f));
  tx=mx-(mx-tx)*(ns/sc);ty=my-(my-ty)*(ns/sc);sc=ns;clamp();applyT();
},{passive:false});
// ── Canvas touch: two-finger pan + pinch zoom ─────────────────────
// Single-finger touches are exclusively for node hit-rects (row-hit).
// Two-finger touches pan and pinch-zoom the diagram.
let _t2StartDist=0, _t2StartSc=0, _t2StartTx=0, _t2StartTy=0, _t2MidX=0, _t2MidY=0;

function _t2Mid(e){
  return {
    x:(e.touches[0].clientX+e.touches[1].clientX)/2,
    y:(e.touches[0].clientY+e.touches[1].clientY)/2,
    dist:Math.hypot(
      e.touches[1].clientX-e.touches[0].clientX,
      e.touches[1].clientY-e.touches[0].clientY
    )
  };
}

canvas.addEventListener('touchstart',e=>{
  if(e.touches.length===2){
    // Two-finger: start pan+pinch
    dragging=false; // cancel any single-finger drag
    const m=_t2Mid(e);
    _t2StartDist=m.dist; _t2StartSc=sc;
    _t2StartTx=tx; _t2StartTy=ty;
    _t2MidX=m.x; _t2MidY=m.y;
  }
  // Single-finger on non-hit areas: no pan (handled by hit-rects only)
},{passive:true});

canvas.addEventListener('touchmove',e=>{
  if(e.touches.length===2){
    const m=_t2Mid(e);
    // pinch scale
    const ns=Math.min(scMx,Math.max(scMn,_t2StartSc*(m.dist/_t2StartDist)));
    // pan: midpoint movement
    const dx=m.x-_t2MidX, dy=m.y-_t2MidY;
    // scale-adjusted position
    const r=canvas.getBoundingClientRect();
    const mx=_t2MidX-r.left, my=_t2MidY-r.top;
    tx=mx-(mx-_t2StartTx)*(ns/_t2StartSc)+dx;
    ty=my-(my-_t2StartTy)*(ns/_t2StartSc)+dy;
    sc=ns; clamp(); applyT();
    e.preventDefault(); // prevent page scroll during pinch
  }
},{passive:false});

canvas.addEventListener('touchend',e=>{
  if(e.touches.length<2){ dragging=false; }
});

// ── Overflow drag gesture ─────────────────────────────────────────
// The "more ↑" row opens the overflow on tap OR on upward swipe ≥20px.
// Works alongside the existing onclick on the row element.
(function wireOverflowDrag(){
  let _odStartY=0, _odMoved=false;
  document.getElementById('bottom-rail').addEventListener('touchstart',e=>{
    const row=e.target.closest('.br-ctx-row');
    if(!row) return;
    const lbl=row.querySelector('.br-more-lbl');
    if(!lbl) return;
    _odStartY=e.touches[0].clientY; _odMoved=false;
  },{passive:true});
  document.getElementById('bottom-rail').addEventListener('touchmove',e=>{
    const dy=_odStartY-e.touches[0].clientY; // positive = upward
    if(dy>20&&!overflowOpen&&!_odMoved){
      _odMoved=true;
      toggleOverflow();
    } else if(dy<-20&&overflowOpen&&!_odMoved){
      _odMoved=true;
      toggleOverflow();
    }
  },{passive:true});
})();

// Initialize to fit view on load
setTimeout(()=>{
  zoomFit();
  buildCapoSnapBtns();
  updateScaleSpelling();
  updateScaleStrip();
  render();
  initBR();
  initCoF();
},0);
window.addEventListener('resize',()=>{clamp();applyT();});
