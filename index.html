<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Washtub Bass String Map</title>
<style>
*{box-sizing:border-box;}
body{margin:0;padding:0;font-family:system-ui,sans-serif;background:#fff;color:#1a1a1a;font-size:13px;overflow:hidden;overscroll-behavior:none;touch-action:none;}
html{overflow:hidden;overscroll-behavior:none;}
:root{--inkey:#1a1a1a;--inkey-fill:rgba(0,0,0,0.06);}
@media(prefers-color-scheme:dark){body{background:#1a1a1a;color:#e0e0e0;}:root{--inkey:#d8d8d0;--inkey-fill:rgba(255,255,255,0.08);}}
#ctrl-bar{background:rgba(128,128,128,0.07);border:0.5px solid rgba(128,128,128,0.2);border-radius:10px;padding:10px 14px;margin-bottom:10px;}
.ctrl-sep{height:0.5px;background:rgba(128,128,128,0.2);margin:8px 0;}
.ctrl-row{display:flex;align-items:center;gap:10px;flex-wrap:wrap;}
.ctrl-col{display:flex;flex-direction:column;gap:3px;}
.ctrl-vsep{width:0.5px;background:rgba(128,128,128,0.2);align-self:stretch;margin:0 2px;}
.sec-lbl{font-size:10px;color:#888;text-transform:uppercase;letter-spacing:0.05em;}
@media(prefers-color-scheme:dark){.sec-lbl{color:#666;}}
.chip{font-size:11px;color:#666;background:rgba(255,255,255,0.8);border:0.5px solid rgba(128,128,128,0.2);border-radius:5px;padding:2px 7px;white-space:nowrap;}
.chip strong{color:#1a1a1a;font-weight:500;}
@media(prefers-color-scheme:dark){.chip{background:rgba(255,255,255,0.06);color:#aaa;}.chip strong{color:#e0e0e0;}}
.tog-grp{display:flex;gap:2px;}
.tog{height:24px;padding:0 8px;font-size:11px;background:transparent;border:0.5px solid rgba(128,128,128,0.3);border-radius:4px;color:#666;cursor:pointer;white-space:nowrap;display:flex;align-items:center;}
.tog:hover{border-color:rgba(128,128,128,0.6);color:#333;}
.tog.on{background:#533AB7;color:#fff;border-color:#533AB7;}
.tog.act{background:transparent;border-color:rgba(128,128,128,0.3);color:#666;}
.tog.act:active{background:#533AB7;color:#fff;border-color:#533AB7;}
@media(prefers-color-scheme:dark){.tog{color:#aaa;}.tog:hover{color:#eee;}.tog.act{color:#aaa;}}
.key-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:2px;width:132px;}
.kbtn{height:22px;font-size:11px;font-weight:500;background:transparent;border:0.5px solid rgba(128,128,128,0.3);border-radius:3px;color:#666;cursor:pointer;display:flex;align-items:center;justify-content:center;}
.kbtn:hover{border-color:rgba(128,128,128,0.6);}
.kbtn.on{background:#533AB7;color:#fff;border-color:#533AB7;box-shadow:0 0 0 1.5px #AFA9EC;}
@media(prefers-color-scheme:dark){.kbtn{color:#aaa;}}
.sl-row{display:flex;align-items:center;gap:6px;}
.sl-lbl{font-size:11px;color:#888;white-space:nowrap;min-width:84px;}
input[type=range]{width:110px;cursor:pointer;}
.readout{font-size:11px;font-weight:500;color:#1a1a1a;background:rgba(255,255,255,0.9);border:0.5px solid rgba(128,128,128,0.3);border-radius:4px;padding:2px 5px;width:78px;text-align:center;}
.readout:focus{outline:none;border-color:#533AB7;}
@media(prefers-color-scheme:dark){.readout{background:rgba(255,255,255,0.08);color:#e0e0e0;}}
#canvas-outer{display:none;}
#zoom-rail{display:flex;flex-direction:column;gap:3px;align-items:center;padding-top:4px;width:32px;flex-shrink:0;}
#zoom-rail button{width:26px;height:26px;border:0.5px solid rgba(128,128,128,0.3);background:rgba(255,255,255,0.92);color:#333;border-radius:5px;font-size:15px;cursor:pointer;display:flex;align-items:center;justify-content:center;}
@media(prefers-color-scheme:dark){#zoom-rail button{background:rgba(30,30,30,0.92);color:#ddd;}}
#canvas-wrap{overflow:hidden;flex:1 1 0%;cursor:grab;user-select:none;position:relative;min-height:0;}
#canvas-wrap.dragging{cursor:grabbing;}
#zoom-label{font-size:10px;color:#888;text-align:center;}
.capo-snap-btn{height:22px;font-size:11px;background:transparent;border:0.5px solid rgba(200,130,26,0.35);border-radius:3px;color:#C8821A;cursor:pointer;padding:0 8px;white-space:nowrap;display:flex;align-items:center;}
.capo-snap-btn:hover{border-color:#C8821A;}
.capo-snap-btn.on{background:#C8821A;color:#fff;border-color:#C8821A;}
#svg-inner{transform-origin:top left;}
.row-hit{cursor:pointer;}
#tone-strip{background:rgba(128,128,128,0.07);border:0.5px solid rgba(128,128,128,0.2);border-radius:8px;padding:5px 14px;margin-bottom:8px;height:68px;display:flex;flex-direction:column;justify-content:space-between;overflow:hidden;}
#tone-strip.two-voice{justify-content:flex-start;gap:2px;}
#tone-strip.two-voice .strip-label{margin-bottom:1px;}
#tone-strip.two-voice .strip-main{flex:0 0 auto;}
#tone-strip.two-voice .strip-large{gap:8px;}
#tone-strip.two-voice .strip-deg,#tone-strip.two-voice .strip-keydeg,#tone-strip.two-voice .strip-note,#tone-strip.two-voice .strip-freq{font-size:16px;}
#tone-row2{display:none;}
#tone-row2.visible{display:flex;align-items:center;gap:8px;}
#tone-strip .strip-label{font-size:10px;color:#888;text-transform:uppercase;letter-spacing:0.05em;line-height:1;}
#tone-strip .strip-main{display:flex;align-items:stretch;flex:1;margin-top:4px;}
#tone-strip .strip-large{display:flex;align-items:center;gap:14px;}
#tone-strip .strip-deg{font-size:26px;font-weight:500;line-height:1;}
#tone-strip .strip-keydeg{font-size:26px;font-weight:500;line-height:1;}
#tone-strip .strip-note{font-size:26px;font-weight:500;line-height:1;}
#tone-strip .strip-freq{font-size:26px;font-weight:500;line-height:1;}
#tone-strip .strip-divider{width:0.5px;background:rgba(128,128,128,0.25);margin:0 14px;align-self:stretch;}
#tone-strip .strip-segs{display:flex;flex-direction:column;justify-content:center;gap:3px;}
#tone-strip .strip-seg-row{font-size:11px;color:#888;white-space:nowrap;line-height:1.2;}
#tone-strip .strip-seg-row strong{font-weight:500;color:inherit;}
#tone-strip .strip-idle{font-size:12px;color:#aaa;font-style:italic;display:flex;align-items:center;}

@media(prefers-color-scheme:dark){#tone-strip .strip-label{color:#666;}#tone-strip .strip-seg-row{color:#666;}#tone-strip .strip-idle{color:#555;}}

/* ══ v4 APP SHELL CSS ══════════════════════════════════════════════ */
#app-shell{display:flex;flex-direction:column;height:100vh;height:100dvh;overflow:hidden;background:#fff;position:relative;}
@media(prefers-color-scheme:dark){#app-shell{background:#1a1a1a;}}

/* top tone strip */
#new-tone-strip{height:50px;flex-shrink:0;display:flex;align-items:stretch;border-bottom:0.5px solid rgba(128,128,128,0.18);background:#fff;z-index:5;position:relative;}
@media(prefers-color-scheme:dark){#new-tone-strip{background:#252525;}}
#nts-left{flex:1 1 0%;display:flex;flex-direction:column;justify-content:center;padding:4px 10px;gap:1px;border-right:0.5px solid rgba(128,128,128,0.15);}
#nts-scale{font-size:11px;font-weight:500;}
.nts-spell{display:flex;}
.nts-spell span{display:inline-block;width:22px;font-size:9px;text-align:center;}
#nts-num span{color:#533AB7;font-weight:500;}
#nts-let span{color:#888;}
#nts-right{width:140px;flex-shrink:0;display:flex;flex-direction:column;justify-content:center;padding:4px 8px;gap:2px;}
.nts-idle{font-size:11px;color:#aaa;font-style:italic;}

/* app body */
#app-body{flex:1 1 0%;display:flex;overflow:hidden;position:relative;min-height:0;}

/* left rail */
#left-rail{width:56px;flex-shrink:0;border-right:0.5px solid rgba(128,128,128,0.18);display:flex;flex-direction:column-reverse;align-items:center;padding:6px 0;gap:4px;background:rgb(250,250,250);position:relative;z-index:15;}
@media(prefers-color-scheme:dark){#left-rail{background:#252525;}}
#lr-tune-btn{width:46px;height:32px;background:#EEEDFE;border:0.5px solid #AFA9EC;border-radius:6px;display:flex;align-items:center;justify-content:center;cursor:pointer;flex-shrink:0;}
.lr-icon{font-size:12px;color:#533AB7;}
.lr-tune-lbl{font-size:6px;color:#533AB7;text-align:center;line-height:1.1;}
.lr-chip{width:46px;height:26px;border:0.5px solid rgba(128,128,128,0.25);border-radius:5px;display:flex;flex-direction:row;align-items:center;justify-content:center;cursor:pointer;background:#fff;flex-shrink:0;gap:5px;}
@media(prefers-color-scheme:dark){.lr-chip{background:#333;}}
.lr-chip-open{border-color:#533AB7;background:#EEEDFE;}
.lr-chip-lbl{font-size:6.5px;color:#aaa;text-transform:uppercase;letter-spacing:0.04em;}
.lr-ks-chip{width:46px;height:46px;border:0.5px solid #AFA9EC;border-radius:7px;background:#EEEDFE;display:flex;flex-direction:column;align-items:center;justify-content:center;cursor:pointer;flex-shrink:0;gap:1px;padding:3px;}
.lr-ks-chip.open{background:#533AB7;border-color:#533AB7;}
.lr-ks-key{font-size:17px;font-weight:800;color:#533AB7;line-height:1.1;text-align:center;}
.lr-ks-key-open{color:#fff;}
.lr-ks-mode{font-size:9px;font-weight:700;color:#533AB7;opacity:0.75;text-align:center;line-height:1.2;letter-spacing:0.03em;}
.lr-ks-mode-open{color:rgba(255,255,255,0.85);opacity:1;}
.lr-chip-val{font-size:11px;font-weight:600;color:#533AB7;line-height:1.1;}
.lr-chip-sub{font-size:7px;color:#533AB7;line-height:1;}
.lr-sep{width:44px;height:0.5px;background:rgba(128,128,128,0.2);flex-shrink:0;}
#lr-zoom-cluster{display:grid;grid-template-columns:1fr 1fr;gap:2px;width:44px;flex-shrink:0;}
.lr-zb{min-width:0;width:100%;height:24px;border:0.5px solid rgba(128,128,128,0.25);border-radius:4px;font-size:13px;color:#555;display:flex;align-items:center;justify-content:center;background:#fff;cursor:pointer;overflow:hidden;}
.lr-zb:hover{border-color:rgba(128,128,128,0.5);}
@media(prefers-color-scheme:dark){.lr-zb{background:#333;color:#ddd;}}
.lr-zb-pct{font-size:7.5px;font-weight:600;}
.lr-zoom-pct{font-size:7px;color:#888;text-align:center;}
.lr-tension-lbl{font-size:6.5px;color:#aaa;text-transform:uppercase;letter-spacing:0.04em;flex-shrink:0;}
#lr-tension-track{flex:1 1 0%;min-height:40px;position:relative;width:28px;touch-action:none;}
#ten-sl-v{display:none;}
#lr-ten-track-inner{position:absolute;left:50%;top:4px;bottom:4px;transform:translateX(-50%);width:3px;background:rgba(128,128,128,0.25);border-radius:2px;cursor:pointer;}
#lr-ten-fill{position:absolute;bottom:0;left:0;width:100%;background:#533AB7;border-radius:2px;opacity:0.5;}
#lr-ten-thumb{position:absolute;left:50%;transform:translate(-50%,50%);width:16px;height:16px;background:#533AB7;border-radius:50%;border:2.5px solid #fff;box-shadow:0 0 0 1.5px #533AB7;cursor:ns-resize;touch-action:none;}
#lr-fund{display:flex;flex-direction:column;align-items:center;gap:0;flex-shrink:0;padding-top:2px;width:100%;}
.lr-fund-note{font-size:13px;font-weight:600;color:#533AB7;line-height:1.2;text-align:center;}
.lr-fund-num{font-size:20px;font-weight:600;color:#533AB7;line-height:1;width:100%;text-align:center;overflow:hidden;}
.lr-fund-hz{font-size:8px;color:#aaa;line-height:1.4;}
.lr-fund-lbl{font-size:6.5px;color:#aaa;text-transform:uppercase;letter-spacing:0.04em;line-height:1.6;}
.lr-ten-val{font-size:13px;font-weight:600;color:#533AB7;line-height:1.15;text-align:center;}

/* canvas-wrap already has flex:1 from updated rule above */
#canvas-wrap.dragging{cursor:grabbing;}

/* label panel — pointer-events:none so node hits pass through */
/* label panel — kept in DOM but hidden; sidebar replaces it */
#label-panel{display:none;}
#label-inner{display:none;}

/* ruler rail — wider, SVG-based */
#rrail{width:42px;flex-shrink:0;border-left:0.5px solid rgba(128,128,128,0.15);background:rgba(248,247,244,0.97);position:relative;z-index:13;overflow:visible;}
@media(prefers-color-scheme:dark){#rrail{background:rgba(40,40,40,0.97);}}
#rr-svg{position:absolute;inset:0;width:100%;height:100%;overflow:visible;pointer-events:none;}

/* sidebar */
#sidebar{width:72px;flex-shrink:0;border-left:0.5px solid rgba(128,128,128,0.15);background:#fff;display:flex;flex-direction:column;overflow:hidden;position:relative;}
@media(prefers-color-scheme:dark){#sidebar{background:#1e1e1e;}}
#sb-upper{display:flex;flex-direction:column;justify-content:flex-end;padding:4px 5px;min-height:0;}
#sb-lower{display:flex;flex-direction:column;justify-content:flex-start;padding:4px 5px;min-height:0;}
#sb-hrule{height:0.5px;background:rgba(128,128,128,0.28);margin:0 6px;flex-shrink:0;}
.sb-len{font-size:13px;font-weight:700;color:#533AB7;line-height:1.15;}
.sb-hz{font-size:13px;font-weight:700;color:#1a1a1a;line-height:1.15;}
.sb-note{font-size:13px;font-weight:700;line-height:1.15;}
.sb-idle{font-size:9px;color:#ccc;font-style:italic;padding:6px 5px;}

/* bottom rail */
#bottom-rail{height:76px;flex-shrink:0;border-top:0.5px solid rgba(128,128,128,0.18);display:flex;background:rgb(250,250,250);position:relative;z-index:16;}
@media(prefers-color-scheme:dark){#bottom-rail{background:#252525;}}
#br-nv{width:40px;border-right:0.5px solid rgba(128,128,128,0.18);display:flex;flex-direction:column;align-items:center;justify-content:center;padding:4px 3px;gap:2px;flex-shrink:0;}
.br-nvb{width:32px;height:20px;font-size:9px;border:0.5px solid rgba(128,128,128,0.25);border-radius:3px;color:#666;display:flex;align-items:center;justify-content:center;background:#fff;cursor:pointer;}
.br-nvb-on{background:#1a1a1a;color:#fff;border-color:#1a1a1a;}
.br-nvb-cap-on{background:#C8821A;color:#fff;border-color:#C8821A;}
@media(prefers-color-scheme:dark){.br-nvb{background:#333;color:#aaa;}}
#br-ctx{flex:1 1 0%;display:flex;flex-direction:column;min-width:0;overflow:hidden;}
.br-ctx-row{flex:1 1 0%;display:flex;align-items:center;padding:0 6px;gap:4px;border-bottom:0.5px solid rgba(128,128,128,0.1);}
.br-ctx-row:last-child{border-bottom:none;}
.br-ctx-idle{font-size:8.5px;color:#ccc;font-style:italic;}
.br-more-bar{flex:1 1 0%;height:1.5px;background:rgba(128,128,128,0.15);border-radius:1px;}
.br-more-lbl{font-size:8px;color:#bbb;white-space:nowrap;}
#br-ap{width:44px;flex-shrink:0;border-left:0.5px solid rgba(128,128,128,0.18);display:flex;flex-direction:column;align-items:center;justify-content:center;padding:4px 3px;gap:2px;}
.br-apb{width:36px;height:18px;font-size:7.5px;border:0.5px solid rgba(128,128,128,0.25);border-radius:3px;color:#555;display:flex;align-items:center;justify-content:center;background:#fff;cursor:pointer;}
.br-apb-on{background:#533AB7;color:#fff;border-color:#533AB7;}
@media(prefers-color-scheme:dark){.br-apb{background:#333;color:#aaa;}}

/* CoF */
#cof-wrap{position:absolute;left:0;bottom:0;width:160px;height:160px;z-index:14;}
#cof-canvas{display:block;cursor:grab;}
#cof-dot{display:none;}

/* overflow panel (below bottom rail on desktop, slide-up on mobile) */
#overflow-panel{display:none;position:absolute;bottom:76px;left:0;right:0;z-index:15;background:#fff;border-top:0.5px solid rgba(128,128,128,0.18);padding:10px 12px;flex-direction:column;gap:8px;}
@media(prefers-color-scheme:dark){#overflow-panel{background:#1e1e1e;}}
#overflow-panel.visible{display:flex;}
/* ── bottom rail control styles ── */
.br-chip{font-size:9px;color:#533AB7;font-weight:500;background:rgba(83,58,183,0.07);border:0.5px solid rgba(83,58,183,0.25);border-radius:3px;padding:1px 5px;white-space:nowrap;line-height:1.4;}
.br-chip-lbl{font-size:8px;color:#aaa;white-space:nowrap;}
.br-btn{height:18px;padding:0 6px;font-size:8.5px;border:0.5px solid rgba(128,128,128,0.3);border-radius:3px;color:#555;background:#fff;white-space:nowrap;display:inline-flex;align-items:center;cursor:pointer;}
.br-btn.on{background:#533AB7;color:#fff;border-color:#533AB7;}
.br-preset-btn{height:20px;padding:0 5px;font-size:8.5px;border:0.5px solid rgba(83,58,183,0.3);border-radius:3px;color:#533AB7;background:rgba(83,58,183,0.06);display:inline-flex;align-items:center;justify-content:center;cursor:pointer;flex:1;}
.br-preset-btn.on{background:rgba(83,58,183,0.18);font-weight:600;}
.br-play-btn{flex:1;height:20px;font-size:9px;font-weight:500;border:0.5px solid rgba(200,130,26,0.4);border-radius:3px;color:#C8821A;background:rgba(200,130,26,0.08);display:inline-flex;align-items:center;justify-content:center;cursor:pointer;white-space:nowrap;gap:2px;}
.br-snap-btn{height:18px;padding:0 4px;font-size:8px;border:0.5px solid rgba(200,130,26,0.3);border-radius:3px;color:#C8821A;background:#fff;white-space:nowrap;display:inline-flex;align-items:center;cursor:pointer;}
.br-snap-btn.on{background:#C8821A;color:#fff;border-color:#C8821A;}
.br-wav-btn{height:18px;padding:0 6px;font-size:8.5px;border:0.5px solid rgba(128,128,128,0.3);border-radius:3px;color:#555;background:#fff;white-space:nowrap;display:inline-flex;align-items:center;cursor:pointer;}
.br-wav-btn.on{background:#533AB7;color:#fff;border-color:#533AB7;}
.br-poly-btn{height:18px;padding:0 7px;font-size:8.5px;border:0.5px solid rgba(128,128,128,0.3);border-radius:3px;color:#555;background:#fff;display:inline-flex;align-items:center;cursor:pointer;}
.br-poly-btn.on{background:#533AB7;color:#fff;border-color:#533AB7;}
.br-sl-wrap{display:flex;align-items:center;gap:3px;flex:1;min-width:0;}
.br-sl-lbl{font-size:7.5px;color:#aaa;white-space:nowrap;}
.br-sl-track{flex:1;height:3px;background:rgba(83,58,183,0.2);border-radius:2px;position:relative;cursor:pointer;}
.br-sl-thumb{position:absolute;top:50%;transform:translate(-50%,-50%);width:9px;height:9px;border-radius:50%;background:#533AB7;border:1.5px solid #fff;box-shadow:0 0 0 1px #533AB7;pointer-events:none;}
.br-sl-val{font-size:7.5px;color:#533AB7;font-weight:500;white-space:nowrap;min-width:24px;text-align:right;}
.lgnd-grid{display:grid;grid-template-columns:1fr 1fr;width:100%;height:100%;}
.lgnd-cell{display:flex;align-items:center;gap:3px;padding:2px 5px;}
.lgnd-cell.br{border-right:0.5px solid rgba(128,128,128,0.08);}
.lgnd-cell.bb{border-bottom:0.5px solid rgba(128,128,128,0.08);}
.lgnd-txt{font-size:8px;color:#555;white-space:nowrap;line-height:1.2;}
.ov-title{font-size:9px;color:#aaa;text-transform:uppercase;letter-spacing:0.05em;font-weight:500;}
.ov-sep{height:0.5px;background:rgba(128,128,128,0.15);}
.ov-row{display:flex;align-items:center;gap:5px;}
.ov-lbl{font-size:10px;color:#888;white-space:nowrap;min-width:46px;}
.ov-field{height:22px;border:0.5px solid rgba(128,128,128,0.3);border-radius:3px;font-size:10px;font-weight:500;color:#533AB7;background:rgba(83,58,183,0.04);padding:0 5px;width:62px;flex-shrink:0;}
.ov-btn{height:22px;padding:0 8px;font-size:9px;border:0.5px solid rgba(128,128,128,0.3);border-radius:3px;color:#555;background:#fff;white-space:nowrap;display:inline-flex;align-items:center;cursor:pointer;}
.ov-btn.danger{border-color:rgba(153,60,29,0.3);color:rgba(153,60,29,0.8);}
/* ── CoF + picker overlays ── */
#cof-wrap{position:absolute;left:0;bottom:0;width:170px;height:170px;z-index:14;pointer-events:auto;}
#cof-canvas{display:block;cursor:grab;}
#cof-canvas.spinning{cursor:grabbing;}
#scale-picker{position:absolute;left:44px;top:50px;z-index:50;background:#fff;border:0.5px solid rgba(128,128,128,0.25);border-radius:10px;box-shadow:0 4px 24px rgba(0,0,0,0.14);padding:4px 0;min-width:160px;display:none;}
@media(prefers-color-scheme:dark){#scale-picker{background:#2a2a2a;}}
#scale-picker.visible{display:block;}
.sp-item{padding:5px 12px;font-size:19px;cursor:pointer;color:#1a1a1a;text-align:left;}
.sp-item:hover{background:rgba(83,58,183,0.07);}
.sp-item.on{color:#533AB7;font-weight:700;background:rgba(83,58,183,0.05);}

// ── fitH — proper horizontal pan ─────────────────────────────────
// Keeps current sc. Pans tx so the string column sits at ~35% from
// the left edge of the canvas, leaving room for label panel on right.

// letterboxing — SVG x=480 (string) maps directly to inner div px 480.
// DEV NOTE (future): Improve to account for node text label widths at
// high zoom, and for ruler label panel width when active, rather than
// using a fixed 35% heuristic.
function fitH(){
  const cw=canvas.clientWidth;
  // String is at SVG x=480; after our transform its screen x = tx + 480*sc
  // Target: string at 35% of canvas width
  tx=cw*0.35 - 480*sc;
  clamp();
  applyT();
}

const svgNS_v4='http://www.w3.org/2000/svg';

// ── Fraction complement helper ────────────────────────────────────
function compFrac(fs){
  const p=fs.split('/'); if(p.length!==2) return '';
  const n=parseInt(p[0]),d=parseInt(p[1]),cn=d-n;
  const g=(a,b)=>b===0?a:g(b,a%b);
  const gg=g(cn,d); return `${cn/gg}/${d/gg}`;
}

// ── Interval name from just-intonation ratio ──────────────────────
function intervalName(ratio){
  let r=ratio;
  while(r>=2) r/=2; while(r<1) r*=2;
  const table=[
    [1,'P1'],[9/8,'M2'],[5/4,'M3'],[4/3,'P4'],
    [3/2,'P5'],[5/3,'M6'],[15/8,'M7'],[2,'P8']
  ];
  let best='?',bestD=Infinity;
  table.forEach(([v,name])=>{const d=Math.abs(r-v);if(d<bestD){bestD=d;best=name;}});
  return best;
}

// ── Collect home node fracs (nut + tonic NODES) ──────────────────
function getHomeNodeFracs(){
  const fracs=[];
  if(isTonalCenter(1)) fracs.push(1.0); // nut = frac=1 in the coordinate system
  NODES.forEach(n=>{if(isTonalCenter(n.ratio)) fracs.push(n.frac);});
  return fracs.sort((a,b)=>a-b);
}

// ── Row highlight ─────────────────────────────────────────────────
function setRowHL(nodeFrac){
  const g=document.getElementById('row-hl');
  if(!g) return;
  g.innerHTML='';
  if(nodeFrac===null) return;
  const y=nY(nodeFrac); // use nY() so nut view positions match rendered nodes
  const rect=document.createElementNS(svgNS_v4,'rect');
  Object.entries({x:0,y:y-16,width:SVG_W,height:32,fill:'rgba(200,150,20,0.14)',rx:2})
    .forEach(([k,v])=>rect.setAttribute(k,v));
  g.appendChild(rect);
}

let _pinnedFrac=null;
let _lastPinTouch=0; // debounce synthetic mousedown after touchstart

function _setPin(frac, fromTouch){
  _pinnedFrac=frac;
  if(fromTouch) _lastPinTouch=Date.now();
}
function _togglePin(frac, fromTouch){
  if(!fromTouch && Date.now()-_lastPinTouch < 400) return false;
  if(_pinnedFrac===frac){ unpinAndClear(); _lastPinTouch=Date.now(); return false; }
  _setPin(frac, fromTouch); return true;
}
let _activeSegment=null; // 'lower'|'upper'|null — set when a capo sub-node is active // frac of pinned node, null when nothing pinned
let _lastStripArgs=null; // cache last showStrip call args for replay on tension change

// ── Full ruler SVG redraw ─────────────────────────────────────────
function drawRulerSVG(node){
  const rrail=document.getElementById('rrail');
  const svg=document.getElementById('rr-svg');
  if(!rrail||!svg) return;
  const W=rrail.clientWidth||42, H=rrail.clientHeight||300;
  const CX=W/2;
  const TOP_INSET=66, BOT_INSET=54;
  const MINI_TOP=TOP_INSET, MINI_BOT=H-BOT_INSET, MINI_H=MINI_BOT-MINI_TOP;
  const frac=node?node.frac:null;
  const miniY=f=>MINI_BOT-f*MINI_H; // frac=1=nut=top, frac=0=bridge=bottom

  // Always compute fanX2 — needed for home lines even after soft-unpin
  const fanX2=(tx+SX*sc)-canvas.clientWidth;

  // Viewport indicator geometry
  const diagH=canvas.clientHeight||1;
  const visH=Math.max(6,Math.min(MINI_H,MINI_H/sc));
  const maxScroll=diagH*(sc-1);
  const scrollFrac=maxScroll>0?Math.min(1,Math.max(0,-ty/maxScroll)):0;
  const vpTop=MINI_TOP+scrollFrac*(MINI_H-visH);

  let html='';
  let bgHtml=''; // background layer — rendered first (behind everything)

  // Home fracs needed for both fan lines and icons — compute once up front
  const homeFracs=getHomeNodeFracs();

  // Active node fan line
  if(frac!==null){
    const nodeSvgY=TY-frac*SPX;
    const nodeScreenY=ty+nodeSvgY*sc;
    html+=`<line x1="${CX}" y1="${miniY(frac).toFixed(1)}" x2="${fanX2.toFixed(1)}" y2="${nodeScreenY.toFixed(1)}"
      stroke="#533AB7" stroke-width="1" stroke-dasharray="3 3" opacity="0.4"/>`;
  }

  // Home fan lines + shade — only when a node is pinned
  if(_pinnedFrac!==null && frac!==null && homeFracs.length>=1){
    const upperHome=homeFracs.filter(hf=>hf>frac);
    const lowerHome=homeFracs.filter(hf=>hf<frac);
    const nearAbove=upperHome.length?Math.min(...upperHome):null;
    const nearBelow=lowerHome.length?Math.max(...lowerHome):null;
    // Shade in main SVG — proper trapezoid following fan lines
    const shadeG=document.getElementById('dyn-home-shade');
    if(shadeG){
      shadeG.innerHTML='';
      if(nearAbove!==null && nearBelow!==null){
        const x_str=SX;
        const y_strAbove=TY-nearAbove*SPX;
        const y_strBelow=TY-nearBelow*SPX;
        const x_rul=(canvas.clientWidth+CX-tx)/sc;
        const y_rulAbove=(miniY(nearAbove)-ty)/sc;
        const y_rulBelow=(miniY(nearBelow)-ty)/sc;
        const poly=document.createElementNS('http://www.w3.org/2000/svg','polygon');
        poly.setAttribute('points',
          `${x_str},${y_strAbove} ${x_str},${y_strBelow} ${x_rul.toFixed(1)},${y_rulBelow.toFixed(1)} ${x_rul.toFixed(1)},${y_rulAbove.toFixed(1)}`);
        poly.setAttribute('fill','rgba(83,58,183,0.07)');
        poly.setAttribute('pointer-events','none');
        shadeG.appendChild(poly);
      }
    }
    // Home fan lines
    homeFracs.forEach(hf=>{
      const hmSvgY=TY-hf*SPX;
      const hmScreenY=(ty+hmSvgY*sc).toFixed(1);
      html+=`<line x1="${CX}" y1="${miniY(hf).toFixed(1)}" x2="${fanX2.toFixed(1)}" y2="${hmScreenY}"
        stroke="#533AB7" stroke-width="1" stroke-dasharray="3 4" opacity="0.45"/>`;
    });
  } else {
    const shadeG=document.getElementById('dyn-home-shade');
    if(shadeG) shadeG.innerHTML='';
  }

  // Viewport indicator
  html+=`<rect x="${(CX-8).toFixed(1)}" y="${vpTop.toFixed(1)}" width="16" height="${visH.toFixed(1)}"
    rx="3" fill="rgba(83,58,183,0.07)" stroke="rgba(83,58,183,0.18)" stroke-width="0.5"/>`;

  // Capo segment state — hoisted so capo tick can reference before home icon block
  const isSeg=(node&&node.segment);
  const segCf=isSeg?node.cf:null;
  const segType=isSeg?node.segment:null;

  // Ministring
  html+=`<line x1="${CX}" y1="${MINI_TOP}" x2="${CX}" y2="${MINI_BOT}"
    stroke="rgba(128,128,128,0.3)" stroke-width="2" stroke-linecap="round"/>`;
  html+=`<line x1="${CX-5}" y1="${MINI_TOP}" x2="${CX+5}" y2="${MINI_TOP}"
    stroke="rgba(128,128,128,0.4)" stroke-width="1.5"/>`;
  html+=`<line x1="${CX-5}" y1="${MINI_BOT}" x2="${CX+5}" y2="${MINI_BOT}"
    stroke="rgba(128,128,128,0.4)" stroke-width="1.5"/>`;
  // Capo tick — shown when a capo sub-node is active
  if(isSeg && segCf!==null){
    const capoY=miniY(segCf).toFixed(1);
    html+=`<line x1="${(CX-9).toFixed(1)}" y1="${capoY}" x2="${(CX+9).toFixed(1)}" y2="${capoY}"
      stroke="#C8821A" stroke-width="2" stroke-linecap="round"/>`;
    html+=`<text x="${(CX+11).toFixed(1)}" y="${(parseFloat(capoY)+3).toFixed(1)}"
      font-size="7" fill="#C8821A" opacity="0.85">capo</text>`;
  }
  // Home node icons — always full-string perspective (no segment filtering)
  // Full string perspective: always use miniY for dot and home icons
  const activeMiniY=miniY;
  const dotFrac=frac; // pseudoNode.frac is already a main-string frac
  homeFracs.forEach(hf=>{
    const hy=activeMiniY(hf).toFixed(1);
    html+=`<circle cx="${CX}" cy="${hy}" r="7" fill="none" stroke="#533AB7" stroke-width="1.4" opacity="0.35"/>`;
    html+=`<circle cx="${CX}" cy="${hy}" r="4" fill="#EEEDFE" stroke="#533AB7" stroke-width="1.4"/>`;
    html+=`<circle cx="${CX}" cy="${hy}" r="1.8" fill="#533AB7"/>`;
  });

  // Spans + interval labels + dot
  if(frac!==null){
    const dy=activeMiniY(dotFrac);
// higher frac = higher on screen (miniY=MINI_BOT-f*MINI_H)
    const upperHomes=homeFracs.filter(f=>f>dotFrac); // visually above dot
    const lowerHomes=homeFracs.filter(f=>f<dotFrac); // visually below dot
    const upperFrac=upperHomes.length?Math.min(...upperHomes):null; // nearest above
    const lowerFrac=lowerHomes.length?Math.max(...lowerHomes):null; // nearest below

    if(upperFrac!==null){
      const uy=activeMiniY(upperFrac);
      html+=`<line x1="${CX}" y1="${uy.toFixed(1)}" x2="${CX}" y2="${dy.toFixed(1)}"
        stroke="#533AB7" stroke-width="3" stroke-linecap="round"/>`;
      const uHomeRatio=upperFrac===0?1:(NODES.find(n=>Math.abs(n.frac-upperFrac)<0.001)||{ratio:1}).ratio;
      const itvl=intervalName(node.ratio/uHomeRatio);
      const lblY=uy-12;
      html+=`<rect x="${CX-10}" y="${lblY-10}" width="20" height="13" rx="2" fill="rgba(255,255,255,0.92)"/>`;
      html+=`<text x="${CX}" y="${lblY}" text-anchor="middle" font-size="12" font-weight="800" fill="#533AB7">${itvl}</text>`;
    }

    if(lowerFrac!==null){
      const ly=activeMiniY(lowerFrac);
      html+=`<line x1="${CX}" y1="${dy.toFixed(1)}" x2="${CX}" y2="${ly.toFixed(1)}"
        stroke="#533AB7" stroke-width="3" stroke-linecap="round"/>`;
      const lHomeRatio=(NODES.find(n=>Math.abs(n.frac-lowerFrac)<0.001)||{ratio:2}).ratio;
      const itvl=intervalName(lHomeRatio/node.ratio);
      // label BELOW lower home icon (outer edge at ly+7), so label at ly+10
      html+=`<rect x="${CX-10}" y="${ly+10}" width="20" height="13" rx="2" fill="rgba(255,255,255,0.92)"/>`;
      html+=`<text x="${CX}" y="${ly+20}" text-anchor="middle" font-size="12" font-weight="800" fill="#533AB7">${itvl}</text>`;
    }

    // Dot (color by segment)
    const dotCol=isSeg?(segType==='lower'?SUB_COL_LOWER:SUB_COL_UPPER):'#533AB7';
    html+=`<circle cx="${CX}" cy="${dy.toFixed(1)}" r="5" fill="${dotCol}" stroke="#fff" stroke-width="2"/>`;
  }

  // Top inset
  if(frac!==null){
    const upperFracStr=compFrac(node.fs);
    // Upper ratio: invert the complement fraction (e.g. "2/3" → "3:2")
    const _uf=upperFracStr.split('/');
    const upperRatioStr=_uf.length===2?`${_uf[1]}:${_uf[0]}`:'—';
    // Lower ratio: node.rs (e.g. "3:2")
    const lowerRatioStr=node.rs;
    html+=`<text x="${CX}" y="11" text-anchor="middle" font-size="7.5" fill="#aaa">nut</text>`;
    html+=`<text x="${CX}" y="23" text-anchor="middle" font-size="9" fill="#533AB7" font-weight="700">${upperFracStr}</text>`;
    html+=`<text x="${CX}" y="35" text-anchor="middle" font-size="8" fill="#888">${upperRatioStr}</text>`;
    html+=`<text x="${CX}" y="${H-41}" text-anchor="middle" font-size="8" fill="#888">${lowerRatioStr}</text>`;
    html+=`<text x="${CX}" y="${H-29}" text-anchor="middle" font-size="9" fill="#533AB7" font-weight="700">${node.fs}</text>`;
    html+=`<text x="${CX}" y="${H-17}" text-anchor="middle" font-size="7.5" fill="#aaa">bridge</text>`;
  } else {
    html+=`<text x="${CX}" y="11" text-anchor="middle" font-size="7.5" fill="#aaa">nut</text>`;
    html+=`<text x="${CX}" y="${H-17}" text-anchor="middle" font-size="7.5" fill="#aaa">bridge</text>`;
  }

  // Direction arrows
  if(frac!==null){
    const dotY=miniY(frac);
    const AX=CX+14;
    if(dotY>MINI_TOP+20){
      const ay1=MINI_TOP+4, ay2=dotY-4;
      html+=`<line x1="${AX}" y1="${ay1+6}" x2="${AX}" y2="${ay2}"
        stroke="rgba(128,128,128,0.35)" stroke-width="1.5" stroke-linecap="round"/>`;
      html+=`<polyline points="${AX-3},${ay1+6} ${AX},${ay1} ${AX+3},${ay1+6}"
        fill="none" stroke="rgba(128,128,128,0.35)" stroke-width="1.5" stroke-linejoin="round" stroke-linecap="round"/>`;
    }
    if(MINI_BOT-dotY>20){
      const ay1=dotY+4, ay2=MINI_BOT-4;
      html+=`<line x1="${AX}" y1="${ay1}" x2="${AX}" y2="${ay2-6}"
        stroke="rgba(128,128,128,0.35)" stroke-width="1.5" stroke-linecap="round"/>`;
      html+=`<polyline points="${AX-3},${ay2-6} ${AX},${ay2} ${AX+3},${ay2-6}"
        fill="none" stroke="rgba(128,128,128,0.35)" stroke-width="1.5" stroke-linejoin="round" stroke-linecap="round"/>`;
    }
  }

  svg.innerHTML=bgHtml+html;
}

// ── Sidebar builder ───────────────────────────────────────────────
function showLabel(node){
  // If pinned to a different node, don't update the display
  if(_pinnedFrac!==null && Math.abs(_pinnedFrac-node.frac)>0.001) return;
  _activeFrac=node.frac; _activeNode=node;
  window._activeRatioFund=node.ratio||1;
  setRowHL(node.frac);
  drawRulerSVG(node);
  const fund=fundFreq(), esl=effectiveSpeakingLength();
  const lowerIn=(node.frac*esl).toFixed(1);
  const upperIn=((1-node.frac)*esl).toFixed(1);
  const lowerHz=Math.round(fund*node.ratio);
  const upperHz=Math.round(fund/(1-node.frac));
  const lNi=noteInfo(fund*node.ratio), uNi=noteInfo(fund/(1-node.frac));
  const lNote=lNi.snapped?lNi.name+lNi.octave:'—';
  const uNote=uNi.snapped?uNi.name+uNi.octave:'—';
  const lCol=lNi.snapped&&isInKey(lNi.midi)?'#0F6E56':'#993C1D';
  const uCol=uNi.snapped&&isInKey(uNi.midi)?'#0F6E56':'#993C1D';
  const upper=document.getElementById('sb-upper');
  const lower=document.getElementById('sb-lower');
  // Compute dot position as fraction of rrail height to align h-rule with dot
  const _rr=document.getElementById('rrail');
  const _H=_rr?(_rr.clientHeight||300):300;
  const _TOP=66, _BOT=54, _MH=_H-_TOP-_BOT;
  const _dotY=(_H-_BOT)-node.frac*_MH; // miniY with corrected formula
  const _dotFrac=_dotY/_H;
  if(upper){
    upper.style.flex=String(_dotFrac);
    upper.innerHTML=`<div class="sb-len">${upperIn}"</div><div class="sb-hz">${upperHz} Hz</div><div class="sb-note" style="color:${uCol};">${uNote}</div>`;
  }
  if(lower){
    lower.style.flex=String(1-_dotFrac);
    lower.innerHTML=`<div class="sb-note" style="color:${lCol};">${lNote}</div><div class="sb-hz">${lowerHz} Hz</div><div class="sb-len">${lowerIn}"</div>`;
  }
}

function hideLabel(){
  _activeFrac=null; _activeNode=null; _activeSegment=null;

const _origShowStrip_step5=showStrip;
showStrip = function(freq, frac, nodeLabel, color){
  // If something is pinned, only allow updates for the pinned node itself
  if(_pinnedFrac!==null && Math.abs(_pinnedFrac-frac)>0.001) return;
  _origShowStrip_step5(freq, frac, nodeLabel, color);
  _lastStripArgs={frac, nodeLabel, color};
  const node=NODES.find(n=>Math.abs(n.frac-frac)<0.001);
  if(node) showLabel(node); else hideLabel();
};

const _origClearStrip_step5=clearStrip;
clearStrip = function(){
  if(_pinnedFrac!==null) return; // don't clear while something is pinned
  _origClearStrip_step5(); hideLabel();
};

  if(_activeNode){

      // Capo segment node: re-run the appropriate renderer with fresh physics
      const _cf=_activeNode.cf;
      if(_activeNode.segFrac===1.0){
        _showCapoEndNode(_activeNode.segment, _cf);
      } else if(_activeNode._origNode){
        const _pKey=_activeNode.segment==='lower'
          ?_activeNode._origNode.frac*_cf
          :_cf+_activeNode._origNode.frac*(1-_cf);
        const _diagY=TY-_activeNode.frac*SPX;
        _showSubNode(_activeNode._origNode, _activeNode.segment,
          fundFreq()*window._activeRatioFund, _cf, _diagY);
      }
    } else {
      showLabel(_activeNode);
    }
    if(_lastStripArgs){
      const freshFreq=fundFreq()*(window._activeRatioFund||1);
      _origShowStrip_step5(freshFreq, _lastStripArgs.frac, _lastStripArgs.nodeLabel, _lastStripArgs.color);
    }
  } else updateVP();
};

// ── Mini slider helper ────────────────────────────────────────────
// Creates a draggable mini slider div synced to a hidden range input.
// onchange(0–1 normalized value) is called on drag.
function makeMiniSlider(pct, onchange){
  const wrap=document.createElement('div');
  wrap.className='br-sl-track';
  const thumb=document.createElement('div');
  thumb.className='br-sl-thumb';
  thumb.style.left=(pct*100)+'%';
  wrap.appendChild(thumb);
  let dragging=false;
  wrap.addEventListener('mousedown',e=>{
    dragging=true; e.preventDefault();
    const move=ev=>{
      if(!dragging) return;
      const r=wrap.getBoundingClientRect();
      const v=Math.max(0,Math.min(1,(ev.clientX-r.left)/r.width));
      thumb.style.left=(v*100)+'%';
      onchange(v);
    };
    const up=()=>{dragging=false;window.removeEventListener('mousemove',move);window.removeEventListener('mouseup',up);};
    window.addEventListener('mousemove',move);
    window.addEventListener('mouseup',up);
  });
  return wrap;
}

// ── Wire duration/volume mini sliders after render ─────────────────
// ── Unified mini-slider wiring ────────────────────────────────────
// Called via setTimeout after every renderBRCtx() and renderOverflowPanel().
// Handles all three slider families: audio dur/vol, nut preset offsets,
// phys defaults length/tension/density.
function wireAllBRSliders(){

  // Generic wiring: given a track el, min, max, callback(value)
  function wireTrack(track, min, max, cb){
    if(!track || track._wired) return;
    track._wired=true;
    const thumb=track.querySelector('.br-sl-thumb');
    if(!thumb) return;
    let drag=false;
    track.addEventListener('mousedown',e=>{
      drag=true; e.preventDefault();
      const move=ev=>{
        if(!drag) return;
        const r=track.getBoundingClientRect();
        const pct=Math.max(0,Math.min(1,(ev.clientX-r.left)/r.width));
        thumb.style.left=(pct*100).toFixed(1)+'%';
        cb(min+pct*(max-min), pct);
      };
      const up=()=>{drag=false;window.removeEventListener('mousemove',move);window.removeEventListener('mouseup',up);};
      window.addEventListener('mousemove',move);
      window.addEventListener('mouseup',up);
    });
    // touch support
    track.addEventListener('touchstart',e=>{
      drag=true;
      const move=ev=>{
        if(!drag) return;
        const r=track.getBoundingClientRect();
        const pct=Math.max(0,Math.min(1,(ev.touches[0].clientX-r.left)/r.width));
        thumb.style.left=(pct*100).toFixed(1)+'%';
        cb(min+pct*(max-min), pct);
      };
      const up=()=>{drag=false;track.removeEventListener('touchmove',move);track.removeEventListener('touchend',up);};
      track.addEventListener('touchmove',move,{passive:true});
      track.addEventListener('touchend',up,{passive:true});
    },{passive:true});
  }

  // ── Audio: dur ────────────────────────────────────────────────
  wireTrack(document.getElementById('br-dur-track'), 0.2, 4, (val)=>{
    const valEl=document.getElementById('br-dur-val');
    if(valEl) valEl.textContent=val.toFixed(1)+'s';
    syncSlider('dur', val);
  });

  // ── Audio: vol ────────────────────────────────────────────────
  wireTrack(document.getElementById('br-vol-track'), 0, 100, (val)=>{
    const valEl=document.getElementById('br-vol-val');
    if(valEl) valEl.textContent=Math.round(val)+'%';
    syncSlider('vol', val);
  });

  // ── Overflow: nut preset sliders ──────────────────────────────
  [0,1,2].forEach(i=>{
    const track=document.getElementById(`ov-nut-sl-${i}`);
    wireTrack(track, 0, stringInches, (val)=>{
      nutPresets[i]=Math.max(0,Math.min(stringInches*0.85,val));
      const field=document.getElementById(`nut-pre-ov-${i}`);
      if(field) field.value=fmtLen(nutPresets[i]);
      // also sync legacy field
      const leg=document.getElementById(`nut-pre-${i}`);
      if(leg) leg.value=fmtLen(nutPresets[i]);
    });
  });

  // ── Overflow: phys defaults sliders ──────────────────────────
  wireTrack(document.getElementById('ov-len-sl'), 24, 200, (val)=>{
    const v=useInches?val.toFixed(1)+'"':(val*2.54).toFixed(1)+' cm';
    const f=document.getElementById('def-len-ov');
    if(f){f.value=v; document.getElementById('def-len').value=v;}
  });
  wireTrack(document.getElementById('ov-ten-sl'), 1, 15, (val)=>{
    const v=val.toFixed(1)+' lbs';
    const f=document.getElementById('def-ten-ov');
    if(f){f.value=v; document.getElementById('def-ten').value=v;}
  });
  // density: log scale — handled by IIFE below, no wireTrack call here
  // mu uses log scale — re-wire manually
  (()=>{
    const track=document.getElementById('ov-mu-sl');
    if(!track || track._wired) return;
    track._wired=true;
    const thumb=track.querySelector('.br-sl-thumb');
    if(!thumb) return;
    let drag=false;
    const doMove=(clientX)=>{
      const r=track.getBoundingClientRect();
      const pct=Math.max(0,Math.min(1,(clientX-r.left)/r.width));
      const val=0.0001*Math.pow(0.005/0.0001,pct);
      thumb.style.left=(pct*100).toFixed(1)+'%';
      const v=val.toFixed(6);
      const f=document.getElementById('def-mu-ov');
      if(f){f.value=v; document.getElementById('def-mu').value=v;}
    };
    track.addEventListener('mousedown',e=>{
      drag=true; e.preventDefault();
      const move=ev=>{if(drag) doMove(ev.clientX);};
      const up=()=>{drag=false;window.removeEventListener('mousemove',move);window.removeEventListener('mouseup',up);};
      window.addEventListener('mousemove',move);
      window.addEventListener('mouseup',up);
    });
    track.addEventListener('touchstart',e=>{
      const move=ev=>{doMove(ev.touches[0].clientX);};
      const up=()=>{track.removeEventListener('touchmove',move);track.removeEventListener('touchend',up);};
      track.addEventListener('touchmove',move,{passive:true});
      track.addEventListener('touchend',up,{passive:true});
    },{passive:true});
  })();
}

// ── v4 CoF WHEEL + PICKERS (Steps 13–14) ══════════════════════════

// ── Circle of Fifths ──────────────────────────────────────────────
let cofVisible=false;
let cofAngle=0;
const COF_CX=85, COF_CY=85, COF_R=68;

function drawCoF(){
  const cv=document.getElementById('cof-canvas');
  if(!cv) return;
  const ctx=cv.getContext('2d');
  const W=170, cx=COF_CX, cy=COF_CY;
  const outerR=78, innerR=34, gap=0.018;
  ctx.clearRect(0,0,W,W);

  // White background circle — covers diagram content behind wheel
  ctx.beginPath(); ctx.arc(cx,cy,outerR+2,0,Math.PI*2);
  ctx.fillStyle='#fff'; ctx.fill();

  const selPos=cofKeyAtTop();

  COF_ORDER.forEach((chromIdx,pos)=>{
    const distFromSel=Math.min(Math.abs(pos-selPos),12-Math.abs(pos-selPos));
    const atDot=(distFromSel===0);
    const midA=(pos/12)*2*Math.PI - Math.PI/2 + cofAngle;
    const sliceAngle=(2*Math.PI/12);
    const startA=midA - sliceAngle/2 + gap;
    const endA  =midA + sliceAngle/2 - gap;

    let fillColor, textColor;
    if(atDot){fillColor='#533AB7'; textColor='#fff';}
    else if(distFromSel===1){fillColor='#E0DCF5'; textColor='#4A33A8';}
    else if(distFromSel===2){fillColor='#F0EEF9'; textColor='#8E7FCC';}
    else{fillColor='#F7F6FD'; textColor='#B3ABDB';}

    ctx.beginPath();
    ctx.arc(cx,cy,outerR,startA,endA);
    ctx.arc(cx,cy,innerR,endA,startA,true);
    ctx.closePath(); ctx.fillStyle=fillColor; ctx.fill();

    const labelR=(innerR+outerR)/2;
    const lx=cx+labelR*Math.cos(midA), ly=cy+labelR*Math.sin(midA);
    ctx.font=(atDot?'bold ':'')+(atDot?'17':'15')+'px system-ui,sans-serif';
    ctx.fillStyle=textColor; ctx.textAlign='center'; ctx.textBaseline='middle';
    ctx.fillText(NOTES[chromIdx],lx,ly);
  });

  // Selector dot — exactly at top centre of wheel
  ctx.beginPath(); ctx.arc(cx, cy-outerR, 4, 0, Math.PI*2);
  ctx.fillStyle='#533AB7'; ctx.fill();
  ctx.strokeStyle='#fff'; ctx.lineWidth=2; ctx.stroke();

  // ── Donut hole with mode label ──
  ctx.beginPath(); ctx.arc(cx,cy,innerR-2,0,Math.PI*2);
  ctx.fillStyle='#fff'; ctx.fill();
  ctx.strokeStyle='#C4BEE8'; ctx.lineWidth=1; ctx.stroke();

  // Mode number (line 1) + abbreviated name (line 2)
  const abbrev=MODE_ABBREV[currentMode]||'';
  const modeNum={'ionian':'1','dorian':'2','phrygian':'3','lydian':'4',
    'mixolydian':'5','aeolian':'6','locrian':'7',
    'harmonic_minor':'','melodic_minor':''}[currentMode]||'';

  ctx.textAlign='center'; ctx.textBaseline='middle';
  if(modeNum){
    ctx.font='bold 15px system-ui,sans-serif'; ctx.fillStyle='#533AB7';
    ctx.fillText(modeNum, cx, cy-18);
    ctx.font='bold 10px system-ui,sans-serif'; ctx.fillStyle='#6B58C4';
    ctx.fillText(abbrev, cx, cy-4);
  } else {
    ctx.font='bold 11px system-ui,sans-serif'; ctx.fillStyle='#533AB7';
    ctx.fillText(abbrev, cx, cy-10);
  }
}

function cofKeyAtTop(){
  // Normalise each position's angle to [-π,π] and find closest to 0 (top = -π/2 + π/2 = 0)
  let best=0, bestDist=Infinity;
  COF_ORDER.forEach((_,pos)=>{
    let a=((pos/12)*2*Math.PI + cofAngle) % (2*Math.PI);
    if(a>Math.PI) a-=2*Math.PI;
    if(Math.abs(a)<bestDist){bestDist=Math.abs(a);best=pos;}
  });
  return best;
}

function snapCoF(){
  const pos=cofKeyAtTop();
  const targetAngle=-(pos/12)*2*Math.PI;
  const start=cofAngle;
  let diff=((targetAngle-start) % (2*Math.PI));
  if(diff>Math.PI) diff-=2*Math.PI;
  if(diff<-Math.PI) diff+=2*Math.PI;
  const duration=220, t0=performance.now();
  function step(t){
    const p=Math.min(1,(t-t0)/duration);
    const ease=1-Math.pow(1-p,3);
    cofAngle=start+diff*ease;
    drawCoF();
    if(p<1){ requestAnimationFrame(step); }
    else{
      cofAngle=targetAngle;
      const newKey=COF_ORDER[pos];
      _clearPin();
      homeKey=newKey;
      drawCoF(); // redraw with updated homeKey so highlight reflects new selection
      document.querySelectorAll('.kbtn').forEach((b,bi)=>{
        b.classList.toggle('on', COF_ORDER[bi]===newKey);
      });
      updateTuneBtn(); updateScaleSpelling(); updateScaleStrip();
      updateLeftRailChips(); render();
    }
  }
  requestAnimationFrame(step);
}

function initCoF(){
  const homePos=COF_ORDER.indexOf(homeKey);
  cofAngle=-(homePos/12)*2*Math.PI;
  drawCoF();
}

// Drag wiring
(function(){
  const cv=document.getElementById('cof-canvas');
  if(!cv) return;
  let dragging=false, startA=0, startCof=0;
  function ptrAngle(e){
    const r=cv.getBoundingClientRect();
    const cx=(e.touches?e.touches[0].clientX:e.clientX)-r.left-COF_CX;
    const cy=(e.touches?e.touches[0].clientY:e.clientY)-r.top-COF_CY;
    return Math.atan2(cy,cx);
  }
  cv.addEventListener('mousedown',e=>{dragging=true;cv.style.cursor='grabbing';startA=ptrAngle(e);startCof=cofAngle;e.stopPropagation();});
  cv.addEventListener('touchstart',e=>{dragging=true;startA=ptrAngle(e);startCof=cofAngle;e.stopPropagation();},{passive:true});
  window.addEventListener('mousemove',e=>{if(!dragging)return;cofAngle=startCof+(ptrAngle(e)-startA);drawCoF();});
  window.addEventListener('touchmove',e=>{if(!dragging)return;cofAngle=startCof+(ptrAngle(e)-startA);drawCoF();},{passive:true});
  window.addEventListener('mouseup',()=>{if(dragging){dragging=false;cv.style.cursor='grab';snapCoF();}});
  window.addEventListener('touchend',()=>{if(dragging){dragging=false;snapCoF();}});
})();

// Add center-tap detection to CoF canvas — tap inside innerR opens mode picker
(function(){
  const cv=document.getElementById('cof-canvas');
  if(!cv) return;
  let _tapStartX=0, _tapStartY=0, _tapMoved=false;
  cv.addEventListener('mousedown',e=>{_tapStartX=e.clientX;_tapStartY=e.clientY;_tapMoved=false;},{capture:true});
  cv.addEventListener('mousemove',e=>{if(Math.hypot(e.clientX-_tapStartX,e.clientY-_tapStartY)>4)_tapMoved=true;},{capture:true});
  cv.addEventListener('click',e=>{
    if(_tapMoved) return;
    const r=cv.getBoundingClientRect();
    const dx=e.clientX-r.left-COF_CX, dy=e.clientY-r.top-COF_CY;
    const dist=Math.hypot(dx,dy);
    const innerR=34;
    if(dist<innerR){
      e.stopPropagation();
      openModePicker();
    }
  });
  cv.addEventListener('touchend',e=>{
    if(e.changedTouches.length===0) return;
    const r=cv.getBoundingClientRect();
    const dx=e.changedTouches[0].clientX-r.left-COF_CX;
    const dy=e.changedTouches[0].clientY-r.top-COF_CY;
    if(Math.hypot(dx,dy)<34){
      e.stopPropagation();
      openModePicker();
    }
  });
})();

// ── Continuous tone while dragging tension slider ─────────────────
let _cOsc=null, _cGain=null, _cCtx=null, _cDragging=false;

function _tenStartTone(){
  if(_cDragging) return;
  _cDragging=true;
  try{
    if(_cOsc){try{_cOsc.stop();}catch(e){} _cOsc=null;}
    _cCtx=getCtx();
    if(_cCtx.state==='suspended') _cCtx.resume();
    const freq=_tenCurrentFreq();
    _cOsc=_cCtx.createOscillator();
    const _cFilter=_cCtx.createBiquadFilter();
    _cGain=_cCtx.createGain();
    // Match playTone signal chain exactly
    if(waveform==='sine'){
      _cOsc.type='sine';
      _cFilter.type='lowpass'; _cFilter.frequency.value=20000; _cFilter.Q.value=0.5;
    } else if(waveform==='warm'){
      _cOsc.type='triangle';
      _cFilter.type='lowpass'; _cFilter.frequency.value=Math.min(1000,freq*8); _cFilter.Q.value=0.7;
    } else {
      _cOsc.type='sawtooth';
      _cFilter.type='lowpass'; _cFilter.frequency.value=Math.min(900,freq*6); _cFilter.Q.value=0.8;
    }
    _cOsc.connect(_cFilter); _cFilter.connect(_cGain); _cGain.connect(_cCtx.destination);
    _cOsc.frequency.value=freq;
    const t=_cCtx.currentTime;
    _cGain.gain.setValueAtTime(0,t);
    _cGain.gain.linearRampToValueAtTime(volume,t+0.04);
    _cOsc.start();
  }catch(e){_cDragging=false;}
}

function _tenCurrentFreq(){
  // Use stored true ratio (accounts for segment perspective in capo mode)
  const ratio=(typeof window._activeRatioFund==='number'&&window._activeRatioFund>0)
    ? window._activeRatioFund : 1;
  return fundFreq()*ratio;
}

function _tenUpdateTone(){
  if(!_cOsc||!_cCtx||!_cDragging) return;
  try{ _cOsc.frequency.setTargetAtTime(_tenCurrentFreq(),_cCtx.currentTime,0.015); }catch(e){}
}

function _tenStopTone(){
  if(!_cDragging) return;
  _cDragging=false;
  if(!_cGain||!_cCtx) return;
  try{
    const t=_cCtx.currentTime;
    _cGain.gain.cancelScheduledValues(t);
    _cGain.gain.setValueAtTime(_cGain.gain.value,t);
    _cGain.gain.linearRampToValueAtTime(0,t+0.08);
    const o=_cOsc; _cOsc=null; _cGain=null;
    setTimeout(()=>{try{o.stop();}catch(e){}},150);
  }catch(e){}
}

setTimeout(()=>{
  // ── Custom tension thumb drag ─────────────────────────────────
  const tenTrack=document.getElementById('lr-tension-track'); // full 28px hit area
  const tenThumb=document.getElementById('lr-ten-thumb');
  const tenFill =document.getElementById('lr-ten-fill');
  const tenMin=10, tenMax=150;

  function tenSlToFrac(slVal){ return (slVal-tenMin)/(tenMax-tenMin); }
  function tenFracToSl(f){ return Math.round(tenMin+f*(tenMax-tenMin)); }

  function updateTenUI(){
    const f=tenSlToFrac(tenValToSl(tensionLbs)); // use existing tenValToSl
    const pct=(f*100).toFixed(1)+'%';
    if(tenFill)  { tenFill.style.height=pct; }
    if(tenThumb) { tenThumb.style.bottom=pct; }
  }

  // Patch syncSlider + render to keep thumb in sync
  const _ss2=syncSlider;
  syncSlider=function(key,sv){
    _ss2(key,sv);
    if(key==='ten'){ updateTenUI(); _tenUpdateTone(); }
  };
  const _r2=render;
  render=function(){ _r2(); updateTenUI(); };

  // Drag logic
  let _tDrag=false, _tStartY=0, _tStartLbs=0;

  function tenPointerMove(clientY){
    if(!_tDrag||!tenTrack) return;
    const rect=tenTrack.getBoundingClientRect();
    const h=rect.height||1;
    const dy=_tStartY-clientY; // up = increase
    const dfrac=dy/h;
    const dsl=Math.round(dfrac*(tenMax-tenMin));
    const newSl=Math.max(tenMin,Math.min(tenMax, tenValToSl(_tStartLbs)+dsl));
    // apply
    syncSlider('ten', newSl);
    document.getElementById('ten-sl').value=newSl;
    document.getElementById('ten-sl-v').value=newSl;
  }

  function tenStart(clientY){
    _tDrag=true; _tStartY=clientY; _tStartLbs=tensionLbs;
    _tenStartTone();
  }
  function tenEnd(){ _tDrag=false; _tenStopTone(); }

  if(tenThumb){
    tenThumb.addEventListener('pointerdown',e=>{
      e.stopPropagation(); e.preventDefault();
      tenThumb.setPointerCapture(e.pointerId);
      tenStart(e.clientY);
    });
    tenThumb.addEventListener('pointermove',e=>{
      if(!_tDrag) return;
      tenPointerMove(e.clientY);
    });
    tenThumb.addEventListener('pointerup',  ()=>tenEnd());
    tenThumb.addEventListener('pointercancel',()=>tenEnd());
  }

  // Also allow clicking anywhere on the track to jump
  if(tenTrack){
    tenTrack.addEventListener('pointerdown',e=>{
      if(e.target===tenThumb) return;
      e.stopPropagation();
      const rect=tenTrack.getBoundingClientRect();
      const f=1-(e.clientY-rect.top)/rect.height;
      const sl=Math.round(tenMin+Math.max(0,Math.min(1,f))*(tenMax-tenMin));
      syncSlider('ten',sl);
      document.getElementById('ten-sl').value=sl;
      document.getElementById('ten-sl-v').value=sl;
      // then start drag from here
      tenThumb.setPointerCapture(e.pointerId);
      tenStart(e.clientY); _tStartLbs=tensionLbs;
    });
    tenTrack.addEventListener('pointermove',e=>{
      if(!_tDrag) return;
      tenPointerMove(e.clientY);
    });
    tenTrack.addEventListener('pointerup',()=>tenEnd());
    tenTrack.addEventListener('pointercancel',()=>tenEnd());
  }

  updateTenUI();
  window.addEventListener('pointerup', tenEnd);
},0);

function tensionToFreq(lbs,inches,mu){
  const L=inches*IN_TO_M, T=lbs*LBS_TO_N;
  return (1/(2*L))*Math.sqrt(T/mu);
}
function fundFreq(){return tensionToFreq(tensionLbs,effectiveSpeakingLength(),muKgM);}

const SUB_COL_LOWER='#1D7A6B'; // teal — lower segment (bridge→capo)
const SUB_COL_UPPER='#7A3A1D'; // dark amber — upper segment (capo→nut)

function updateCapoSubNodes(){
  const g=document.getElementById('capo-sub-nodes');
  if(!g) return;
  g.innerHTML='';
  if(nodeView!=='capo'){return;}

  const fund=fundFreq();
  const phi=CAPO_NODES[capoNodeIdx].phi; // fraction from NUT
  const cf=1-phi;  // capo fraction from BRIDGE (matches our frac coord system)
  const nutY=nutEffY(), speakingIn=effectiveSpeakingLength();
  const mkS=(tag,attrs,txt)=>{
    const el=document.createElementNS('http://www.w3.org/2000/svg',tag);
    for(const[k,v]of Object.entries(attrs)) el.setAttribute(k,v);
    if(txt!==undefined) el.textContent=txt;
    return el;
  };

  NODES.forEach(node=>{
    // ── Lower sub-node ──
    const lFrac = node.frac * cf;
    const lFreq = node.ratio * fund / cf;
    const lY    = TY - lFrac * SPX;
    const lCol  = SUB_COL_LOWER;
    const lIsPri= node.primary;
    const lR    = lIsPri ? 6 : 4;
    const lFS   = lIsPri ? 20 : 15;

    // circle
    g.appendChild(mkS('line',{x1:SX-(lIsPri?12:8),x2:SX+(lIsPri?12:8),y1:lY,y2:lY,
      stroke:lCol,'stroke-width':lIsPri?1.8:1.2,opacity:0.7}));
    const lCa={cx:SX,cy:lY,r:lR,fill:lIsPri?'rgba(29,122,107,0.12)':'none',
      stroke:lCol,'stroke-width':lIsPri?1.8:1.4,opacity:0.8};
    g.appendChild(mkS('circle',lCa));
    if(lIsPri) g.appendChild(mkS('circle',{cx:SX,cy:lY,r:2.5,fill:lCol,opacity:0.8}));
    // Home node ring — teal ring when this sub-node is a tonal center
    if(isTonalCenter(node.ratio)){
      g.appendChild(mkS('circle',{cx:SX,cy:lY,r:16,fill:'none',stroke:lCol,'stroke-width':2,opacity:0.55}));
    }

    // label (primary only)
    if(lIsPri){
      g.appendChild(mkS('text',{x:SDEG_X,y:lY+lFS*0.38,'font-size':lFS,'font-weight':'500',
        'text-anchor':'middle',fill:lCol,opacity:0.75},node.label));
    }

    // hit rect
    const lRowH=lFS+8;
    const lHit=mkS('rect',{x:0,y:lY-lRowH/2,width:SVG_W,height:lRowH,
      fill:'transparent',class:'row-hit'});
    lHit.addEventListener('mousedown',()=>{
      const pKey=node.frac*cf;
      if(_togglePin(pKey, false)){ playTone(lFreq); _showSubNode(node,'lower',lFreq,cf,lY); }
    });
    lHit.addEventListener('mouseenter',()=>{ if(_pinnedFrac!==null&&_pinnedFrac!==node.frac*cf) return; _showSubNode(node,'lower',lFreq,cf,lY); });
    lHit.addEventListener('mouseleave',()=>{ clearStrip(); if(!_pinnedFrac) hideLabel(); });
    lHit.addEventListener('touchstart',()=>{
      const pKey=node.frac*cf;
      if(_togglePin(pKey, true)){ playTone(lFreq); _showSubNode(node,'lower',lFreq,cf,lY); }
    },{passive:true});
    lHit.addEventListener('touchend',()=>{ clearStrip(); if(!_pinnedFrac) hideLabel(); },{passive:true});
    lHit.addEventListener('touchend',()=>{ clearStrip(); if(!_pinnedFrac) hideLabel(); },{passive:true});
    g.appendChild(lHit);

    // ── Upper sub-node ──
    const uFrac = cf + node.frac * (1-cf);
    const uFreq = node.ratio * fund / (1-cf);
    const uY    = TY - uFrac * SPX;
    const uCol  = SUB_COL_UPPER;
    const uIsPri= node.primary;
    const uR    = uIsPri ? 6 : 4;
    const uFS   = uIsPri ? 20 : 15;

    g.appendChild(mkS('line',{x1:SX-(uIsPri?12:8),x2:SX+(uIsPri?12:8),y1:uY,y2:uY,

      stroke:uCol,'stroke-width':uIsPri?1.8:1.4,opacity:0.8};
    g.appendChild(mkS('circle',uCa));
    if(uIsPri) g.appendChild(mkS('circle',{cx:SX,cy:uY,r:2.5,fill:uCol,opacity:0.8}));
    // Home node ring — amber ring when this sub-node is a tonal center
    if(isTonalCenter(node.ratio)){
      g.appendChild(mkS('circle',{cx:SX,cy:uY,r:16,fill:'none',stroke:uCol,'stroke-width':2,opacity:0.55}));
    }

    if(uIsPri){
      g.appendChild(mkS('text',{x:SDEG_X,y:uY+uFS*0.38,'font-size':uFS,'font-weight':'500',
        'text-anchor':'middle',fill:uCol,opacity:0.75},node.label));
    }

    const uRowH=uFS+8;
    const uHit=mkS('rect',{x:0,y:uY-uRowH/2,width:SVG_W,height:uRowH,
      fill:'transparent',class:'row-hit'});
    uHit.addEventListener('mousedown',()=>{
      const pKey=cf+node.frac*(1-cf);
      if(_togglePin(pKey, false)){ playTone(uFreq); _showSubNode(node,'upper',uFreq,cf,uY); }
    });
    uHit.addEventListener('mouseenter',()=>{ if(_pinnedFrac!==null&&_pinnedFrac!==(cf+node.frac*(1-cf))) return; _showSubNode(node,'upper',uFreq,cf,uY); });
    uHit.addEventListener('mouseleave',()=>{ clearStrip(); if(!_pinnedFrac) hideLabel(); });
    uHit.addEventListener('touchstart',()=>{
      const pKey=cf+node.frac*(1-cf);
      if(_togglePin(pKey, true)){ playTone(uFreq); _showSubNode(node,'upper',uFreq,cf,uY); }
    },{passive:true});
    uHit.addEventListener('touchend',()=>{ clearStrip(); if(!_pinnedFrac) hideLabel(); },{passive:true});
    g.appendChild(uHit);
  });
}

// Show ruler/sidebar for a capo sub-node
function _showSubNode(node, seg, freq, cf, diagY){
  _activeSegment=seg;
  const col=seg==='lower'?SUB_COL_LOWER:SUB_COL_UPPER;
  // Build a pseudo-node for the ruler (frac within segment, ratio, etc)
  const segFrac = seg==='lower'
    ? node.frac  // sub_frac within [0,cf]
    : node.frac; // sub_frac within [0,1-cf]
  const pseudoNode={
    frac: seg==='lower' ? node.frac*cf : cf+node.frac*(1-cf),
    segFrac: node.frac,
    _origNode: node,  // reference to original NODES entry for refresh
    ratio: node.ratio,
    fs: node.fs, rs: node.rs, desc: node.desc,
    label: node.label, primary: node.primary,
    segment: seg, cf: cf, freq: freq
  };
  _activeFrac=pseudoNode.frac; _activeNode=pseudoNode;
  // True ratio of this node's freq to fundFreq() — for tension tone
  window._activeRatioFund = seg==='lower' ? node.ratio/cf : node.ratio/(1-cf);
  _lastStripArgs={frac:pseudoNode.frac, nodeLabel:node.label, color:col};
  // Row highlight at diagram y
  const rowHl=document.getElementById('row-hl');
  if(rowHl){
    rowHl.innerHTML='';
    const rect=document.createElementNS('http://www.w3.org/2000/svg','rect');
    Object.entries({x:0,y:diagY-16,width:SVG_W,height:32,
      fill:`rgba(${seg==='lower'?'29,122,107':'122,58,29'},0.12)`,rx:2})
      .forEach(([k,v])=>rect.setAttribute(k,v));
    rowHl.appendChild(rect);
  }
  drawRulerSVG(pseudoNode);
  // Sidebar
  const esl=effectiveSpeakingLength();
  const segLen = seg==='lower' ? cf*esl : (1-cf)*esl;
  const lowerIn=(node.frac*segLen).toFixed(1);
  const upperIn=((1-node.frac)*segLen).toFixed(1);
  const fund=fundFreq();
  const segFund = seg==='lower' ? fund/cf : fund/(1-cf);
  const lHz=Math.round(segFund*node.ratio);
  const uHz=Math.round(segFund/(1-node.frac));
  const lNi=noteInfo(segFund*node.ratio), uNi=noteInfo(segFund/(1-node.frac));
  const lNote=lNi.snapped?lNi.name+lNi.octave:'—';
  const uNote=uNi.snapped?uNi.name+uNi.octave:'—';
  const upper=document.getElementById('sb-upper');
  const lower=document.getElementById('sb-lower');
  const _rr=document.getElementById('rrail');
  const _H=_rr?(_rr.clientHeight||300):300;
  const _TOP=66,_BOT=54,_MH=_H-_TOP-_BOT;
  const _dotY=(_H-_BOT)-node.frac*_MH;
  const _dotFrac=_dotY/_H;
  if(upper){ upper.style.flex=String(_dotFrac);
    upper.innerHTML=`<div class="sb-len">${upperIn}"</div><div class="sb-hz">${uHz} Hz</div><div class="sb-note">${uNote}</div>`; }
  if(lower){ lower.style.flex=String(1-_dotFrac);
    lower.innerHTML=`<div class="sb-note">${lNote}</div><div class="sb-hz">${lHz} Hz</div><div class="sb-len">${lowerIn}"</div>`; }
  // Update top tone strip right panel
  const _ni=noteInfo(freq);
  const _kd=_ni.snapped?chromDeg(_ni.midi,homeKey):'—';
  const _noteStr=_ni.snapped?_ni.name+_ni.octave:'—';
  const _inKey=_ni.snapped?isInKey(_ni.midi):false;
  const _keyCol=_inKey?'#0F6E56':'rgba(153,60,29,0.6)';
  const _dst=document.getElementById('nts-right');
  if(_dst) _dst.innerHTML=
    `<div style="display:flex;align-items:baseline;gap:4px;line-height:1;">
       <span style="font-size:18px;font-weight:500;color:${col};">${node.label}</span>
       <span style="font-size:10px;color:#999;">·</span>
       <span style="font-size:18px;font-weight:500;color:${_keyCol};">${_kd}</span>
       <span style="font-size:10px;color:#999;">·</span>
       <span style="font-size:18px;font-weight:500;color:${_keyCol};">${_noteStr}</span>
     </div>
     <div style="display:flex;align-items:center;gap:4px;margin-top:1px;">
       <span style="font-size:10px;font-weight:500;color:${col};">${freq.toFixed(1)} Hz</span>
       <span style="font-size:9px;color:#999;">·</span>
       <span style="font-size:10px;color:#1a1a1a;">↑ ${upperIn}"</span>

     </div>`;
}

    {label:cn.label+' · '+cn.itvl, dy:0,
     action:()=>{ playCapoBoth(); showStripBoth(); },
     strip:()=>showStripBoth()},
    {label:'▼  bottom',dy:BTN_H+BTN_GAP,
     action:()=>{ playTone(capoLowerFreq()); _showCapoEndNode('lower',cf); },

// ── Music engine ──────────────────────────────────────────────────
const NOTES=['C','C#','D','D#','E','F','F#','G','G#','A','A#','B'];
const REF_HZ=261.63, REF_MIDI=60, SNAP_CENTS=25;
const CHROM=['1','♭2','2','♭3','3','4','♯4','5','♭6','6','♭7','7'];
let homeKey=7;
const GRAY='#B4B2A9';

// ── Mode / scale system ───────────────────────────────────────────
// Interval sequences (semitone steps) for each mode/scale
const MODE_SCALES={
  ionian:         [2,2,1,2,2,2,1],
  dorian:         [2,1,2,2,2,1,2],
  phrygian:       [1,2,2,2,1,2,2],
  lydian:         [2,2,2,1,2,2,1],
  mixolydian:     [2,2,1,2,2,1,2],
  aeolian:        [2,1,2,2,1,2,2],
  locrian:        [1,2,2,1,2,2,2],
  harmonic_minor: [2,1,2,2,1,3,1],
  melodic_minor:  [2,1,2,2,2,2,1],
};
const MODE_NAMES={
  ionian:'Ionian', dorian:'Dorian', phrygian:'Phrygian',
  lydian:'Lydian', mixolydian:'Mixolydian', aeolian:'Aeolian',
  locrian:'Locrian', harmonic_minor:'Harmonic Minor', melodic_minor:'Melodic Minor',
};
let currentMode='ionian';

// Compute the 7 diatonic pitch classes for the current root + mode
function diatonicPitchClasses(){
  const steps=MODE_SCALES[currentMode];
  const pcs=new Set();
  let pc=homeKey;
  pcs.add(((pc%12)+12)%12);
  for(let i=0;i<6;i++){pc+=steps[i];pcs.add(((pc%12)+12)%12);}
  return pcs;
}

// Compute degree labels and note names for current scale
function scaleInfo(){
  const steps=MODE_SCALES[currentMode];
  const degrees=[], noteNames=[];
  let pc=homeKey;
  for(let i=0;i<7;i++){
    degrees.push(chromDeg(pc+60,homeKey));
    noteNames.push(NOTES[((pc%12)+12)%12]);
    pc+=steps[i];
  }
  return{degrees,noteNames};
}
function freqToMidi(f){return 12*Math.log2(f/REF_HZ)+REF_MIDI;}
function noteInfo(f){
  const midi=freqToMidi(f), r=Math.round(midi), cents=Math.round((midi-r)*100);
  return{midi:r,cents,name:NOTES[((r%12)+12)%12],octave:Math.floor(r/12)-1,snapped:Math.abs(cents)<=SNAP_CENTS};
}
function chromDeg(midi,kr){return CHROM[((midi%12+12)%12-(kr%12+12)%12+12)%12];}
function isInKey(midi){return diatonicPitchClasses().has(((midi%12)+12)%12);}

function setMode(mode, btn){
  currentMode=mode;
  document.querySelectorAll('.mode-btn').forEach(b=>b.classList.remove('on'));
  btn.classList.add('on');
  updateTuneBtn();
  updateScaleSpelling();
  render();
}

// ── Audio ─────────────────────────────────────────────────────────
let audioCtx=null, waveform='string', toneDuration=0.5, volume=0.65;
let polyOn=true;
// For polyphony=off: track active node so we can stop it cleanly
let activeOsc=null, activeGain=null;

function getCtx(){
  if(!audioCtx) audioCtx=new(window.AudioContext||window.webkitAudioContext)();
  return audioCtx;
}
// iOS audio unlock on first touch
document.addEventListener('touchstart',function unlock(){
  const ctx=getCtx();
  if(ctx.state==='suspended') ctx.resume();
  document.removeEventListener('touchstart',unlock);
},{once:true,passive:true});

function stopActive(){
  if(activeGain){
    try{
      const t=audioCtx.currentTime;
      activeGain.gain.cancelScheduledValues(t);
      activeGain.gain.setValueAtTime(activeGain.gain.value,t);
      activeGain.gain.linearRampToValueAtTime(0,t+0.03);
    }catch(e){}
    activeOsc=null; activeGain=null;
  }
}

function playTone(freq){
  if(!freq||freq<16||freq>20000)return;
  const ctx=getCtx();
  if(ctx.state==='suspended') ctx.resume();
  if(!polyOn) stopActive();
  const osc=ctx.createOscillator();
  const filter=ctx.createBiquadFilter();
  const gain=ctx.createGain();
  osc.connect(filter);
  filter.connect(gain);
  gain.connect(ctx.destination);

  // Waveform mapping
  if(waveform==='sine'){
    osc.type='sine';
    filter.type='lowpass';
    filter.frequency.value=20000; // no filtering for sine
    filter.Q.value=0.5;
  } else if(waveform==='warm'){
    // Warm: filtered triangle — odd harmonics, soft rolloff
    osc.type='triangle';
    filter.type='lowpass';
    filter.frequency.value=Math.min(1000, freq*8); // cutoff tracks pitch
    filter.Q.value=0.7;
  } else if(waveform==='string'){
    // String: filtered sawtooth — full harmonics, warm bass tone
    osc.type='sawtooth';
    filter.type='lowpass';
    filter.frequency.value=Math.min(900, freq*6);
    filter.Q.value=0.8;
  }

  osc.frequency.value=freq;
  const t=ctx.currentTime;
  gain.gain.setValueAtTime(0,t);
  gain.gain.linearRampToValueAtTime(volume,t+0.015);
  gain.gain.setValueAtTime(volume,t+toneDuration*0.82);
  gain.gain.linearRampToValueAtTime(0,t+toneDuration);
  osc.start(t);
  osc.stop(t+toneDuration+0.05);
  if(!polyOn){activeOsc=osc;activeGain=gain;}
}

function setWaveform(w,btn){
  waveform=w;
  document.querySelectorAll('#wav-sine,#wav-warm,#wav-string').forEach(b=>b.classList.remove('on'));
  btn.classList.add('on');
}
function setPoly(on,btn){
  polyOn=on;
  if(!on) stopActive();
  btn.parentElement.querySelectorAll('.tog').forEach(b=>b.classList.remove('on'));
  btn.classList.add('on');
}

// ── Tune to key ───────────────────────────────────────────────────
// Calculate tension needed so fundamental matches home key root (nearest octave)
// f = (1/2L)*sqrt(T/mu)  →  T = (2*L*f)^2 * mu
// Find nearest octave of home key root within playable range
function tuneToKey(){
  const L=effectiveSpeakingLength()*IN_TO_M, mu=muKgM;
  const rootPc=homeKey;
  const tc=homeNodeRatio(); // home node ratio relative to fundamental
  const lenRatio=L/(69*IN_TO_M);
  let bestT=null;
  for(let oct=0;oct<=5;oct++){
    const midi=rootPc+(oct+1)*12;
    // This is the pitch we want the home node to produce
    const tcTargetFreq=REF_HZ*Math.pow(2,(midi-REF_MIDI)/12);
    // So the fundamental needs to be tcTargetFreq / tcRatio
    const fundTargetFreq=tcTargetFreq/tc;
    // Solve f = (1/2L)*sqrt(T/mu) for T
    const T=Math.pow(2*L*fundTargetFreq,2)*mu;
    const lbs=T/LBS_TO_N;
    if(lbs>=0.1&&lbs<=15){
      if(bestT===null||Math.abs(lbs-tensionLbs)<Math.abs(bestT-tensionLbs)){
        bestT=lbs;
      }
    }
  }
  if(bestT===null) return;
  tensionLbs=Math.max(1,Math.min(15,bestT));
  document.getElementById('ten-sl').value=tenValToSl(tensionLbs);
  document.getElementById('ten-ro').value=tensionLbs.toFixed(1)+' lbs';
  render();
}

function updateTuneBtn(){
  const label='Tune to '+NOTES[homeKey];
  const label2='Tune String to '+NOTES[homeKey]+' '+MODE_NAMES[currentMode];
  document.getElementById('tune-btn').textContent=label;
  const btn2=document.getElementById('tune-btn2');
  if(btn2) btn2.textContent=label2;
}

function updateScaleSpelling(){
  const si=scaleInfo();
  const el=document.getElementById('scale-spelling');
  if(el) el.innerHTML=
    `<span style="color:#533AB7;font-weight:500;">${si.degrees.join(' · ')}</span>`+
    `<span style="color:rgba(128,128,128,0.4);margin:0 6px;">|</span>`+
    `<span>${si.noteNames.join(' · ')}</span>`;
}

// ── My Bass Defaults ──────────────────────────────────────────────
// Session-editable preset. Initializes to calibrated values:
// 69" string, 5 lbs tension, mu=0.000754 kg/m (G1 at 49 Hz)
// Apply: copies defaults fields → physics sliders + triggers render
// Use Current: copies live physics values → defaults fields

function resetDefaults(){
  // Restore hardcoded master defaults — always 69", 5.0 lbs, 0.000754 kg/m
  document.getElementById('def-len').value=fmtLen(69);
  document.getElementById('def-ten').value='5.0 lbs';
  document.getElementById('def-mu').value=(0.000754).toFixed(6);
}

function applyDefaults(){
  let len=parseFloat(document.getElementById('def-len').value);
  let ten=parseFloat(document.getElementById('def-ten').value);
  let mu=parseFloat(document.getElementById('def-mu').value);
  if(isNaN(len)) len=69;
  if(isNaN(ten)) ten=5.0;
  if(isNaN(mu))  mu=0.000754;
  if(!useInches) len=len/2.54;
  len=Math.max(24,Math.min(200,len));
  ten=Math.max(1,Math.min(15,ten));
  mu=Math.max(0.0001,Math.min(0.005,mu));

  // In nut height mode: preserve the speaking length ratio when string length changes
  // nutOffset scales proportionally to the new string length
  if(nodeView==='nut' && stringInches>0){
    const ratio=nutOffsetInches/stringInches;
    stringInches=len;
    nutOffsetInches=Math.max(0,Math.min(len*0.85, ratio*len));
  } else {
    stringInches=len;
  }
  tensionLbs=ten; muKgM=mu;

  // Update sliders and readouts
  if(nodeView==='nut'){
    const sl=effectiveSpeakingLength();
    document.getElementById('len-sl').value=sl;
    document.getElementById('len-ro').value=fmtLen(sl);
    const ro=document.getElementById('nut-offset-ro');

  } else {

  }
  document.getElementById('ten-sl').value=tenValToSl(ten);
  document.getElementById('ten-ro').value=ten.toFixed(1)+' lbs';
  document.getElementById('mu-sl').value=muValToSl(mu);
  document.getElementById('mu-ro').value=mu.toFixed(6);

  document.getElementById('def-ten').value=ten.toFixed(1)+' lbs';

// ── Slider ↔ readout sync ─────────────────────────────────────────
// Tension: slider 10-150 maps to 1.0-15.0 lbs
// Mu: slider 1-100 maps logarithmically to 0.0001-0.005 kg/m
function tenSlToVal(sv){return sv/10;}
function tenValToSl(v){return Math.round(v*10);}
function muSlToVal(sv){return 0.0001*Math.pow(0.005/0.0001,(sv-1)/99);}
function muValToSl(v){return Math.round(1+99*Math.log(v/0.0001)/Math.log(0.005/0.0001));}

function syncSlider(key,sv){
  const n=parseFloat(sv);
  if(key==='dur'){toneDuration=n;document.getElementById('dur-ro').value=n.toFixed(1)+' s';}
  else if(key==='vol'){volume=n/100;document.getElementById('vol-ro').value=Math.round(n)+'%';}
  else if(key==='len'){ _clearPin();
    const n=parseFloat(sv);
    if(nodeView==='nut'){
      // In nut height mode, slider controls effective speaking length
      // so adjust nut offset to achieve that speaking length
      const newSpeaking=Math.max(10, Math.min(stringInches, n));
      nutOffsetInches=stringInches-newSpeaking;
      document.getElementById('len-ro').value=fmtLen(newSpeaking);
    } else {
      stringInches=n;
      document.getElementById('len-ro').value=fmtLen(n);
    }
    render();
  }
  else if(key==='ten'){tensionLbs=tenSlToVal(n);document.getElementById('ten-ro').value=tensionLbs.toFixed(1)+' lbs';render();}
  else if(key==='mu'){ _clearPin(); muKgM=muSlToVal(n);document.getElementById('mu-ro').value=muKgM.toFixed(6);render();}
}
function syncReadout(key,raw){
  let v=parseFloat(raw);
  if(isNaN(v)) return;
  if(key==='dur'){v=Math.max(0.2,Math.min(4,v));toneDuration=v;document.getElementById('dur-sl').value=v;document.getElementById('dur-ro').value=v.toFixed(1)+' s';}
  else if(key==='vol'){v=Math.max(0,Math.min(100,v));volume=v/100;document.getElementById('vol-sl').value=v;document.getElementById('vol-ro').value=Math.round(v)+'%';}
  else if(key==='len'){ _clearPin();
    // handle cm input if metric mode
    if(!useInches) v=v/2.54;
    if(nodeView==='nut'){
      const newSpeaking=Math.max(10,Math.min(stringInches,v));
      nutOffsetInches=stringInches-newSpeaking;
      document.getElementById('len-sl').value=newSpeaking;
      document.getElementById('len-ro').value=fmtLen(newSpeaking);
    } else {
      v=Math.max(24,Math.min(200,v));stringInches=v;
      document.getElementById('len-sl').value=v;document.getElementById('len-ro').value=fmtLen(v);
    }
    render();
  }
  else if(key==='ten'){v=Math.max(1,Math.min(15,v));tensionLbs=v;document.getElementById('ten-sl').value=tenValToSl(v);document.getElementById('ten-ro').value=v.toFixed(1)+' lbs';render();}
  else if(key==='mu'){v=Math.max(0.0001,Math.min(0.005,v));muKgM=v;document.getElementById('mu-sl').value=muValToSl(v);document.getElementById('mu-ro').value=v.toFixed(6);render();}
}

// One ET semitone above each lower-pitch (higher-frac) node neighbour
// in the six M2 gaps: nut→str°2, str°4→5, str°6→7 (both octaves).
const _SEMI=Math.pow(2,-1/12);
const CHROM_TICKS=[1.0, 3/4, 3/5, 1/2, 3/8, 3/10].map(f=>f*_SEMI);

// Patch render() to populate dyn-chrom-ticks after each full render

  _render_chromTicks();

  if(!ctG) return;
  ctG.innerHTML='';
  if(nodeView==='capo') return; // sub-node layers fill this space in capo mode
  const nutY=nutEffY();
  CHROM_TICKS.forEach(frac=>{
    const y=nY(frac);
    if(y<nutY-2||y>TY+2) return; // outside visible string zone
    ctG.appendChild(mk('line',{
      x1:SX-7,x2:SX+7,y1:y,y2:y,
      stroke:GRAY,'stroke-width':'1.5',opacity:'0.65'

// ── Home node ─────────────────────────────────────────────────────
// homeNode: 1-7 (scale degree). 1 = fundamental, 5 = fifth node, etc.
let homeNode=1;

// Just intonation ratios for degrees 1-7
const DEGREE_RATIOS=[1, 9/8, 5/4, 4/3, 3/2, 5/3, 15/8];
const DEGREE_LABELS=['1','2','3','4','5','6','7'];

// Ratio of home node relative to fundamental
function homeNodeRatio(){
  return DEGREE_RATIOS[homeNode-1];
}

// Map a node's ratio to a degree label relative to current home node
// Returns null when home node is fundamental (use original labels)
function remapDegree(nodeRatio){
  if(homeNode===1) return null;
  const hn=homeNodeRatio();
  let interval=nodeRatio/hn;
  while(interval>=2) interval/=2;
  while(interval<1)  interval*=2;
  let best=0, bestDist=Infinity;
  DEGREE_RATIOS.forEach((r,i)=>{
    const dist=Math.abs(interval-r);
    if(dist<bestDist){bestDist=dist;best=i;}
  });
  return DEGREE_LABELS[best];
}

// Is this node the home node (new 1)?
function isTonalCenter(nodeRatio){
  if(homeNode===1){
    let r=nodeRatio;
    while(r>=2) r/=2;
    while(r<1)  r*=2;
    return Math.abs(r-1)<0.001;
  }
  const hn=homeNodeRatio();
  let interval=nodeRatio/hn;
  while(interval>=2) interval/=2;
  while(interval<1)  interval*=2;
  return Math.abs(interval-1)<0.001;
}

// Effective nut Y — moves down in nut height view
function nutEffY(){
  if(nodeView!=='nut') return NY;
  return NY + (nutOffsetInches/stringInches)*SPX;
}
// Node Y — compressed into speaking length zone
function nY(frac){
  const nutY=nutEffY();
  const speakingPx=TY-nutY;
  return TY - frac*speakingPx;
}
function barW(ratio){return Math.min((ratio/BMR)*BMW,BMW);}

function getNodeYS(){return NODES.map(n=>nY(n.frac));}

function fontSize(i, nodeYS){
  const y=nodeYS[i];
  const nutY=nutEffY();
  const above=i>0?nodeYS[i-1]:nutY;
  const below=i<nodeYS.length-1?nodeYS[i+1]:TY;
  const space=Math.min(y-above,below-y);
  return Math.round(Math.max(11,Math.min(36,space*1.4)));
}

    const kdEl=document.createElementNS('http://www.w3.org/2000/svg','text');
    kdEl.setAttribute('x',KD_RX);kdEl.setAttribute('y',ny+yOff);
    kdEl.setAttribute('font-size',nutFS);kdEl.setAttribute('font-weight','500');
    kdEl.setAttribute('text-anchor','end');kdEl.setAttribute('fill',col);

    noteEl.setAttribute('x',NOTE_X);noteEl.setAttribute('y',ny+yOff);
    noteEl.setAttribute('font-size',nutFS);noteEl.setAttribute('font-weight','500');noteEl.setAttribute('fill',col);
    noteEl.textContent=fi.name+fi.octave;ann.appendChild(noteEl);
  } else {
    const kdEl=document.createElementNS('http://www.w3.org/2000/svg','text');
    kdEl.setAttribute('x',KD_RX);kdEl.setAttribute('y',ny+yOff);
    kdEl.setAttribute('font-size',nutInfoFS);kdEl.setAttribute('text-anchor','end');kdEl.setAttribute('fill','#B4B2A9');kdEl.setAttribute('opacity',0.4);
    kdEl.textContent='—';ann.appendChild(kdEl);
  }

  // Info text
  const infoEl=document.createElementNS('http://www.w3.org/2000/svg','text');
  infoEl.setAttribute('x',INFO_X);infoEl.setAttribute('y',ny+yOff);
  infoEl.setAttribute('font-size',nutInfoFS);infoEl.setAttribute('fill','#533AB7');infoEl.setAttribute('opacity',0.8);

  // Segment lengths
  const segEl=document.createElementNS('http://www.w3.org/2000/svg','text');
  segEl.setAttribute('x',SEG_X);segEl.setAttribute('y',ny+yOff);

  const rowH=nutFS+10;
  const hitEl=document.createElementNS('http://www.w3.org/2000/svg','rect');
  hitEl.setAttribute('x',0);hitEl.setAttribute('y',ny-rowH/2);

  hitEl.addEventListener('touchend',clearStrip,{passive:true});

  hitEl.addEventListener('mousedown',e=>{

    nutDragStartY=e.touches[0].clientY; nutDragStartOffset=nutOffsetInches;
  },{passive:true});
  ann.appendChild(hitEl);
}

    ?{fill:'var(--inkey-fill)',stroke:'var(--inkey)',dot:'var(--inkey)',text:'var(--inkey)',bar:'var(--inkey)',dash:false}
    :{fill:'#FAECE7',stroke:'rgba(153,60,29,0.6)',dot:'rgba(153,60,29,0.6)',text:'rgba(153,60,29,0.6)',bar:'rgba(216,90,48,0.6)',dash:false};
  return inKey
    ?{fill:'none',stroke:'var(--inkey)',dot:'var(--inkey)',text:'var(--inkey)',bar:'var(--inkey)',dash:false}
    :{fill:'none',stroke:'rgba(216,90,48,0.6)',dot:'rgba(216,90,48,0.6)',text:'rgba(216,90,48,0.6)',bar:'rgba(216,90,48,0.6)',dash:false};
}

function mk(tag,attrs,txt){
  const el=document.createElementNS('http://www.w3.org/2000/svg',tag);
  for(const[k,v]of Object.entries(attrs))el.setAttribute(k,v);
  if(txt!==undefined)el.textContent=txt;
  return el;
}
